body:
  text: 聖人故貴一知謂黄帝曰吾問無為謂無為謂不應我非不我應不知應我也吾問狂屈狂屈中欲告我而不我告非不我告中欲告而忘之也今予問乎若若知之奚故不近黄帝曰彼其真是也以其不知也此其似之也以其
