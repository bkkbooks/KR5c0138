body:
  text: 夫騁其竒辯致其危辭者未豐容思於檮杌之口而必競辨於楊墨之間則楊墨乃亂羣言之主也纍劣彼反瓦危委反一云當作丸結繩言小辨危辭若結繩之纍瓦也句謂邪説微隱穿鑿成句一音鉤敝音婢罷也跬音屑敝跬分外用力之貌
