body:
  text: 徐無鬼第二十四徐無鬼因女商見魏武侯武侯勞之曰先生病矣苦於山林之勞故乃肯見於寡人徐無鬼曰我則勞於君君有何勞於我君将盈嗜欲長好悪則性命之情病矣君将黜嗜欲掔好悪則耳目病矣
