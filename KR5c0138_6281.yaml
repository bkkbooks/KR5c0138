body:
  text: 少焉徐無鬼曰嘗語君吾相狗也下之質執飽而止是狸德也中之質若視日上之質若亡其一吾相狗又不若吾相馬也吾相馬直者中繩曲者中鉤方者中矩圎者中規是國馬也而未若天下馬也天下馬有成材若卹若失若喪其一若是者超軼絶塵不如其所武侯大説而笑
