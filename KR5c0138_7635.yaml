body:
  text: 不能及俠人之勇力而以為威强秉人之知謀以為明察因人之德以為賢良非享國而嚴若君父且夫聲色滋味權勢之於人心不待學而樂之體不待象而安之夫欲惡避就固不待師此人之性也天下雖非我孰能辭之知和曰知者之為故動以百姓不違其度是以足而不爭無以為故不求不足故求之爭四處而不自以為貪有餘故辭之棄天下而不自以為亷亷貪之實非以迫外也反監之度勢為天子而不以貴驕人富有天
