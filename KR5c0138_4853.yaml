body:
  text: 得水則為㡭得水土之際則為鼃蠙之衣生於陵屯則為陵舄陵舄得欝棲則為烏足烏足之根為蠐螬其葉為蝴蝶蝴蝶胥也化而為蟲生於竈下其狀若脫其名為鴝掇鴝掇千日為鳥其名為乾餘骨乾餘骨之沫為斯彌斯彌為食醯頥輅生乎食醯黄生乎九猷瞀芮生乎腐蠸羊奚比乎不箰乆竹生青寧青寧
