body:
  text: 為清江使河伯之所漁者余且得予元君覺使人占之曰此神龜也君曰漁者有余且乎左右曰有君曰令余且㑹朝明日余且朝君曰漁何得對曰且之網得白龜焉箕圎五尺君曰獻若之龜龜至君再欲殺之再欲活之心疑卜之曰殺龜以卜吉乃刳龜七十二鑚而無遺筴仲尼曰神龜能見夣扵元君而不能避余且之網知能七十二鑚而無遺筴不能避刳腸之患如是則知有所困神有所不及也
  hash: sha256:386a88f9cb0fccca46d5d6995ca5c32c79f21dd41c4ee412ff9c21a6363d0b58
