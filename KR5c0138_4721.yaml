body:
  text: 而明仁義之行合同異離堅白然不然可不可困百家之知窮衆口之辯吾自以為至達已今吾聞莊子之言汒焉異之不知論之不及與知之弗若與今吾無所開吾喙敢問其方公子牟隱機大息仰天而笑曰子獨不聞夫塪井之鼃乎謂東海之鱉曰吾樂與吾跳梁乎井榦之上入休乎缺甃之崖赴水則接掖持頥蹶泥則沒足滅跗還虷蠏與科斗莫吾能若也且夫擅一壑之水而跨跱塪井之樂此亦至矣夫子奚不時來入觀乎
  hash: sha256:a8de0b2202d7caa75352d095f7bdcd935db109b9818e96414f6e28b5920d4a1a
