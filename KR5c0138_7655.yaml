body:
  text: 太子乃使人以千金奉莊子莊子弗受與使者俱往見太子曰太子何以教周賜周千金太子曰聞夫子眀聖謹奉千金以幣從者夫子弗受悝尚何敢言莊子曰聞太子所欲用周者欲絶王之喜好也使臣上説大王而逆王意下不當太子則身刑而死周尚安所事金乎使臣上説大王下當太子趙國何求而不得也太子曰然吾王所見唯劒士也莊子曰諾周善為劒太子曰然吾王所見劒士皆蓬頭突垂冠曼胡之纓短後之衣
  hash: sha256:b87f58f10bd269ca650a104a3b6157d7195a86716cc916140b1f94d3ff7b8063
