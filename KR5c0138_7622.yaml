body:
  text: 國而孔子受幣論則賤之行則下之則是言行之情悖戰於胷中也不亦拂乎故書曰孰惡孰美成者為首不成者為尾子張曰子不為行即将䟽戚無倫貴賤無義長幼無序五紀六位将何以為别乎滿苟得曰堯殺長子舜流母弟䟽戚有倫乎湯放桀武王伐紂貴賤有義乎王季為適周公殺兄長幼有序乎儒者偽辭墨者兼愛五紀六位将有别乎且子正為名我正為利名利之實不順於理不監於道吾日與子訟於無約曰小人殉
