body:
  text: 莊子衣大布而補之正緳係屨而過魏王魏王曰何先生之憊耶莊子曰貧也非憊也士有道德不能行憊也衣敝屨穿貧也非憊也此所謂非遭時也王獨不見夫騰猿乎其得柟梓豫章也攬蔓其枝而王長其間雖羿
