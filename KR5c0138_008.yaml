body:
  text: 乃曲為之解何哉考劉孝標世說注引逍遙逰向郭義各一條今本無之讓王篇惟注三條漁父篇惟注一條盜跖篇惟注三十八字說劍篇惟注七字似不應簡略至此疑有所脫佚又列子生物者不生化物者不化二句張湛注曰莊子亦有此文併引向秀注一條而今本莊子皆無則是併正文亦有所遺漏蓋其亡已久今已不可復考矣乾隆四十六
