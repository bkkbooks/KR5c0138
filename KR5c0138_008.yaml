body:
  text: 乃曲為之觧何哉考劉孝標世說注引逍遥逰向郭義各一條今本無之讓王篇惟注三條漁父篇惟注一條盗跖篇惟注三十八字說劍篇惟注七字似不應簡畧至此疑有所脫佚又列子生物者不生化物者不化二句張湛注曰荘子亦有此文併引向秀注一條而今本荘子皆無則是併正文亦有所遺漏蓋其亡已久今已不可復考矣乾隆四十六
