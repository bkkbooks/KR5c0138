body:
  text: 物各有性性各有極皆如年知豈尚之所及哉自此以下至于列子歷舉年知之大小各信其一方未有足以相傾者也然後統以無待之人遺彼忘我冥此羣異異方同得而我無功名是故統小大者無小無大者也茍有乎小大則雖大鵬之與斥鷃宰官之與御風同為纍物耳齊死生者無死無生者也茍有乎死生則雖大椿之與蟪蛄彭祖之與朝
