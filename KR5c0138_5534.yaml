body:
  text: 不答不知答也知不得問反於白水之南登狐闋之上而睹狂屈焉知以之言也問乎狂屈曰唉予知之將語若中欲言而忘其所欲言知不得問反於帝宫見黄帝而問焉黄帝曰無思無慮始知道無處無服始安道無從無道始得道知問黄帝曰我與若知之彼與彼不知也其孰是耶黄帝曰彼無為謂真是也狂屈似之我與汝終不近也夫知者不言言者不知故聖人行不言之教
