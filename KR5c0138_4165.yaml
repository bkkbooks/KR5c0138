body:
  text: 曰丘治詩書禮樂易春秋六經自以為乆矣熟知其故矣以奸者七十二君論先王之道而明周召之迹一君無所鉤用甚矣夫人之難説也道之難明邪老子曰幸矣子之不遇治世之君也夫六經先王之陳迹也豈其所以迹哉
