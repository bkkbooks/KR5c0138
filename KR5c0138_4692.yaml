body:
  text: 憐蚿蚿憐蛇蛇憐風風憐目目憐心謂蚿曰吾以一足趻踔而行予無如矣今子之使萬足獨奈何蚿曰不然子不見夫唾者乎噴則大者如珠小者如霧雜而下者不可勝數也今予動吾天機而不知其所以然蚿謂蛇曰吾以衆足行而不及子之無足何也蛇曰夫天機之所動何可易邪吾安用足哉
