body:
  text: 紀渻子為王養鬭雞十日而問雞已乎曰未也方虚憍而恃氣十日又問曰未也猶應嚮景十日又問曰未也猶疾視而盛氣十日又問曰幾矣雞雖有鳴者已無變矣望之似木雞矣其德全矣異雞無敢應者反走矣
