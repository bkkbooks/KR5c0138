body:
  text: 之變而明内聖外王之道上知造化無物下知有物之自造也其言宏綽其㫖𤣥妙至至之道融微㫖雅泰然遣放放而不傲故曰不知義之所適猖狂妄行而蹈其大方含哺而熙乎澹泊鼓腹而㳺乎混茫至人極乎無親孝慈終於兼忘禮樂復乎已能忠信發乎天光用其光則其朴自成是以神器獨化於𤣥冥之境而源流深長也故其長波之所蕩髙風之所扇暢乎物宜適乎民願𢎞其鄙觧其懸灑落之功未加而矜夸所以散故觀
  hash: sha256:69f90b2ef7ab1a0011f68773560afcf5186dde7d5ea0ed9d8565beecee9c2f1e
