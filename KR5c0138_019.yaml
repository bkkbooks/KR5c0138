body:
  text: 之變而明內聖外王之道上知造化無物下知有物之自造也其言宏綽其㫖𤣥妙至至之道融微㫖雅泰然遣放放而不傲故曰不知義之所適猖狂妄行而蹈其大方含哺而熙乎淡泊鼓腹而遊乎混茫至人極乎無親孝慈終於兼忘禮樂復乎已能忠信發乎天光用其光則其朴自成是以神器獨化於𤣥冥之境而源流深長也故其長波之所蕩髙風之所扇暢乎物宜適乎民願𢎞其鄙解其懸灑落之功未加而矜夸所以散故觀
  hash: sha256:225fb15b342d02913449a0c0ea9097c9cdfef2745c2ab700923e7630652bad5e
