body:
  text: 言夫知之登至於道者若此之逺也理固自全非畏死也故真人陸行而非避濡也逺火而非逃熱也無過而非措當也故雖不以熱為熱而未嘗赴火不以濡為濡未嘗蹈水不以死為死未嘗喪生故夫生者豈生之而生哉成者豈成之而成哉故任之而無不至者真人也豈有槩意於所遇哉
