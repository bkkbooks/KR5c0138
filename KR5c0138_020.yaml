body:
  text: 其書超然自以為己當經崑崙涉太虛而㳺惚怳之庭矣雖復貪婪之人進躁之士暫而攬其餘芳味其溢流彷彿其音影猶足曠然有忘形自得之懷況探其逺情而玩永年者乎遂綿邈清遐去離塵埃而返冥極者也晉郭象撰
