body:
  text: 此劒直之亦無前舉之亦無上案之亦無下運之亦無旁上法圎天以順三光下法方地以順四時中知民意以安四鄉此劒一用如雷霆之震也四封之内無不賔服而聴從君命者矣此諸侯之劒也王曰庻人之劒何如曰庻人之劒蓬頭突垂冠曼胡之纓短後之衣瞋目而語難相擊於前上斬頸領下決肝肺此庻人之劒無異於闘雞一旦命已絶矣無所用於國事今大王有天子之位而好庻人之劒臣為大王薄之王乃牽而
  hash: sha256:74bb67a021bb58b7443851f09b5c9b54fac93ce216bb9fd934e6038212fa5d67
