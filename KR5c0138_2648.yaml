body:
  text: 陶者曰我善治埴圓者中規方者中矩匠人曰我善治木曲者中鉤直者應繩夫埴木之性豈欲中規矩鉤繩哉然且世世稱之曰伯樂善治馬而陶匠善治埴木此亦治天下者之過也
