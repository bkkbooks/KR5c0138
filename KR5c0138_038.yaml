body:
  text: 今觀天之蒼蒼竟未知便是天之正色耶天之為逺而無極耶鵬之自上以視地亦若人之自此視天則止而圖南矣言鵬不知道里之逺近趣足以自勝而逝補大鵬之飛九萬里則其下視生物相吹之氣亦如今觀天之色蒼蒼而已言其逺之甚也
