body:
  text: 文王欲舉而授之政而恐大臣父兄之弗安也欲終而釋之而不忍百姓之無天也於是旦而屬之夫夫曰昔者寡人夣見良人黒色而乘駁馬而偏朱蹄號曰寓而政於臧丈人庶幾乎民有瘳乎諸大夫蹵然曰先君王也文王曰然則卜之諸大夫曰先君之命王其無它又何卜焉遂迎臧丈人而授之政典法無更偏令無出三年文王觀於國則列士壊植散羣長官者不成德螤斛不敢
