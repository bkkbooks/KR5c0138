body:
  text: 母維斗得之終古不忒日月得之終古不息堪坏得之以襲崐崘馮夷得之以逰大川肩吾得之以處太山黄帝得之以登雲天顓頊得之以處𤣥宫禺強得之立乎北極西王母得之坐乎少廣莫知其始莫知其終彭祖得之上及有虞下及五霸傅說得之相武丁奄有天下乗東維騎箕尾而比於列星
