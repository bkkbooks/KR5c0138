body:
  text: 奚以知其然也朝菌不知晦朔蟪蛄不知春秋此小年也楚之南有冥靈者以五百歲為春五百歲為秋上古有大椿者以八千歲為春八千歲為秋而彭祖乃今以久特聞衆人匹之不亦悲乎
