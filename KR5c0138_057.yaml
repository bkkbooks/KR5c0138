body:
  text: 奚以知其然也朝菌不知晦朔蟪蛄不知春秋此小年也楚之南有㝠靈者以五百歳為春五百歳為秋上古有大椿者以八千歳為春八千歳為秋而彭祖乃今以久特聞衆人匹之不亦悲乎
