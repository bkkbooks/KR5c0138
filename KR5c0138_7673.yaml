body:
  text: 包以四夷裹以四時繞以渤海帶以常山制以五行論以刑德開以隂陽持以春夏行以秋冬此劒直之無前舉之無上案之無下運之無旁上決浮雲下絶地紀此劒一用匡諸侯天下服矣此天子之劒也文王芒然自失曰諸侯之劒何如曰諸侯之劒以知勇士為鋒以清亷士為鍔以賢良士為以忠勝士為鐔以豪傑士為夾
