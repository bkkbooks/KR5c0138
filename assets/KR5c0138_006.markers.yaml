  - {type: variant, offset: 119, length: 0, content: '', WYG: 旨也髑音獨髏音樓髐苦堯反從子用反縱也顔淵東之齊孔子有憂色子貢下席而問曰小子敢問囘東之齊夫子有憂色何耶孔子曰善哉女問昔者管子有言丘甚善之曰禇小者不可以懐大綆短者不可以汲深夫若是者以為命有所成而形有所適也夫不可損益故當任之而已吾恐囘與齊侯言堯舜黄帝之道而重以燧人神農之言彼将内求於已而不得不得則惑人惑則死内求不得将求於外舍内求外非惑如何且女獨不聞邪昔者海鳥止於魯郊魯侯御而觴之於廟奏九韶以為樂具太牢以為膳鳥乃眩視憂悲不敢食一臠不敢飲一杯三日而死此以己養飬鳥也非以鳥飬飬鳥也夫以鳥養養鳥者宜栖之深林遊之壇陸浮之江湖食之鰌䱔隨行列而止委蛇而處彼唯人言之惡聞奚以夫譊譊為乎咸池九韶之樂張之洞庭之野鳥聞之而飛獸聞之而走魚聞之而下入人卒聞之相與還而觀之魚處水而生人處水而死彼必相與異其好惡故異也故}
