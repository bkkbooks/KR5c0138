  - {type: variant, offset: 120, length: 0, content: '', WYG: 聖不一其能不同其事各隨其情爰居一名雜縣舉頭高八尺樊光註爾雅云形似鳯皇名止於實義設於適是之謂條達而福持實而適故條達性常得故福持列子行食於道從見百嵗髑髏攓蓬而指之曰唯予與女知而未嘗死未嘗}
