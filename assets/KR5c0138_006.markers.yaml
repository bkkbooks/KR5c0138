  - {type: variant, offset: 50, length: 0, content: '', WYG: 停又不可消息盈虚終則有始變化日新未嘗守故是所以語大義之方論萬物之理也物之生也若驟若馳無動而不變無時而不移欲不可執而守何為乎何不為乎夫固將自化若有為不為於其間則敗其自化矣河伯曰然則何貴於道耶以其自化北海若曰知道者必達於理達於理者必明於權明於權者不以物害已知道者知其無能也無能也則何能生我我自然而生耳而四肢百體五臟精神已不為而自成矣又何有意乎生成之後哉達乎斯理者必能遣過分之知遺益生之情而乘變應權故不以外傷内不以物害己而常全也至德者火弗能熱水弗能溺寒暑弗能害禽獸弗能賊夫心之所安則危不能危意無不適故苦不能苦也非謂其薄之也雖心所安亦不使犯之言察乎安危知其不可逃也寧於禍福安乎命之所遇謹於去就審去就之是非莫之能害也不以害為害故莫之能害故曰天在内}
