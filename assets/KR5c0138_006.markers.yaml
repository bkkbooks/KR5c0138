  - {type: variant, offset: 54, length: 4, content: 汝句郭注, WYG: 似故匡人共圍之當堯舜而天下無窮人非知得也當桀紂而天下無通人非知失也時勢適然無為勞心於窮通之間夫水行不避蛟龍者漁父之勇也陸行不避兕虎者獵夫之勇也白刃交於前視死若生者烈士之勇也情各有所安知窮之有命知通之有時臨大難而不懼者聖人之勇也聖人則無所不安由處矣吾命有所制矣命非已制故無所用其心也夫知於命者無徃而非逍遙矣故雖匡陳羑里無異於紫極間堂也無幾何將甲者進辭曰以為陽虎也故圍之今非也請辭而退公孫龍問於魏牟曰龍少學先生之道長而明仁義之行合同異離堅白然不然可不可困百家之知窮衆口之辯吾自以為至達已今吾聞莊子之言汒焉異之不知論之不及與知之弗若與今吾無所開吾喙敢問其方公子牟隱機大息仰天而笑曰子獨不聞夫塪井之鼃乎謂東海之鱉曰吾樂與吾跳梁乎井榦之上入休乎缺甃之崖赴水則接掖持頥蹶泥則沒足滅跗還虷蠏與科斗莫吾能若也且夫擅一壑之水而跨跱塪井之樂此亦至矣夫子奚不時來入觀乎此猶小鳥之自足於蓬蒿塪井壊井也井榦井欄也諸詮之音西京賦作韓音甃側救反如䦨以塼為之著井底闌也虷音寒井中赤蟲也科斗蝦蟇子也東海之鱉左足未入而右膝已縶矣明大之不逰於小非樂然於是逡巡而却告之海曰夫千里之逺不足以舉其大千仞之高不足以極其深禹之時十年九潦而水弗為加益湯之時八年七旱而崖不為加損夫不為頃乆推移不以}
