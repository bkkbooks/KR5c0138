  - {type: variant, offset: 38, length: 7, content: 注六十二字郭注, WYG: 之自多於水乎物有定域雖至知不能出焉故起大小之差將以申明至理之無辨也河伯曰然則吾大天地而小毫末可乎北海若曰否夫物量無窮物物各有量時無止死與生皆時行分無常得與生皆分終始無故日新也是故大知觀於逺近故小而不寡各自足也大而不多亦無餘也知量無窮攬而觀之知逺近大小之物各有量證曏今故曏明也今故猶古今故遙而不悶遙長也掇而不跂掇猶短也知時無止證明古今知變化之不止於死生也故不以長而挹悶短故為跂也察乎盈虗故得而不喜失而不憂知分之無常也察其一盈一虗則知分之不常於得也故能忘其憂喜明乎坦途死生者日新之正道故生而不説死而不禍知終始之不可故也明終始之日新也則知故之不可執而留矣是以渉日新而不愕舍故而不驚死生之化若一説音悅計人之所知不若其所不知所知各有限也其生之時不若未生之時生時各有年也以其至小求窮其至大之域是故迷亂而不能自得也莫若安於所受之分而已由此觀之又何以知毫末之足以定至細之倪又何以知天地之足以窮至大之域以小求大理終不得各安其分則大小俱足矣若毫末不求天地之功則周身之餘皆為棄物天地不見大於秋毫則顧其形象裁自足耳將何以知細之定細大之定大也河伯曰世之議者皆曰至精無形至大不可圍是信情乎北海若曰夫自細視大者不盡自大視細者不明目之所見有常極不能無窮也故於大則有所不盡於細則有所不明直是目之所不逮耳精與大皆非無也庸詎知無形而不可圍者哉夫精小之微也埒大之殷也故異便大小異故所便不得同埒普囘反盛也殷衆也此勢之有也若無形而不可圍則無此異便之勢也夫精粗者期於有形者也有精粗矣故不得無形無形者數之所不能分也不可圍者數之所不能窮也可以言論者物之粗也可以意致者物之精也言之所不能論意之所不能察致者不期精粗焉唯無而已何精粗之有哉夫言意者有也而所言所意者無也故求之於言意之表而入乎無言無意之域而後至焉是故大人之行不出乎害人大人者無意而任天行也舉足而投諸吉地豈出害人之塗哉不多仁恩無害而不自多其恩動不為利應理而動而理自無害為于偽反不賤門𨽻任其所能而位當於斯耳非由賤之故措之斯職貨財弗爭各使分定不多辭譲適中而已事焉不借人各使自任不多食乎力足而已不賤貪汙理自無欲行殊乎俗已獨無可無不可所以與俗殊行下孟反不多辟異任理而自殊辟四亦反為在從衆從衆之所為不賤佞謟自然正直世之爵禄不足以為勸戮耻不足以為辱外事不擾於心知是非之不可為分細大之不可為倪故𤣥同也聞曰道人不聞任物而物性自通則功名歸物矣故不聞至德不得得者生於失也物各無失則得名去也大人無已任物而已已音紀約分之至也約之以至其分故㝠也夫唯極乎無形而不可圍者為然河伯曰若物之外若物之内惡至而倪貴賤惡至而倪小大北海若曰以道觀之物無貴賤各自足也惡音烏下同以物觀之自貴而相賤此區區者乃道之所錯綜而齊之也以俗觀之貴賤不在已斯所謂倒置也以差觀之因其所大而大之則萬物莫不大因其所小而小之則萬物莫不小知天地之為稊米也知毫末之為丘山也則差數覩矣所大者足也所小者無餘也故因其性足以名大則毫末丘山不得異其名因其無餘以稱小則天地稊米無所殊其稱若夫觀差而不由斯道則差數相加幾微相傾不可勝察也以功觀之因其所有而有之則萬物莫不有因其所無而無之則萬物莫不無知東西之相反而不可以相無則功分定矣天下莫不相與為彼我而彼我皆欲自為斯東西之相反也然彼我相與為脣齒脣齒者未嘗相為而脣亡則齒寒故彼之自為濟我之功𢎞矣斯相反而不可以相無者也故因其自為而無其功則天下之功莫不}
