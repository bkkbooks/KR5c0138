  - {type: variant, offset: 52, length: 0, content: '', WYG: 殉名所得有常分殉名則過也謹守}
  - {type: variant, offset: 52, length: 0, content: '', krp: 殉名所得有常分殉名則過也謹守}
  - {type: variant, offset: 53, length: 0, content: '', WYG: 勿失是謂反其真真在性分之内憐蚿蚿憐蛇蛇憐風風憐目目憐心謂蚿曰吾以一足趻踔而行予無如矣今子之使萬足獨奈何蚿曰不然子不見夫唾者乎噴則大者如珠小者如霧雜而下者不可勝數也今予動吾天機而不知其所以然蚿謂蛇曰吾以衆足行而不及子之無足何也蛇曰夫天機之所動何可易邪吾安用足哉物之生也非知生而生也則生之行也豈知行而行哉故足不知所以行目不知所以見心不知所以知俛然而自得矣遲速之節聦明之鍳或能或否皆非我也而或者因欲有其身而矜其能所以逆其機而傷其神器也至人知天機之不可易也故捐聦明棄智慮塊然忘其為而任其自動故萬物無動而不逍遙也求龜反一足獸也黄帝在位諸侯於東海流山得竒獸其狀如牛蒼色無角一足龍走出入水即風雨目光如日月其音如雷名曰黄帝殺之取皮以冐皷聲聞五百里蚿音𤣥馬蚿蟲也廣雅云蛆渠馬蚿蚿憐蛇蛇憐風風憐目目憐心一足蚿多足蛇無足風無形目形綴於此明流於彼心則質幽為神逰外蛇謂風曰予動吾脊脅而行則有似也今子蓬蓬然起於北海蓬然入於南海而似無有何也風曰然予蓬蓬然起於北海而入於南海也然而指我則勝我鰌鰌一作䠓我亦勝我雖然夫折大木蜚大屋者唯我能也故以衆小不勝為大勝也為大勝者唯聖人能之恣其天機無所與爭斯小不勝也然乘萬物御羣才之所為使羣才各自得萬物各自為則天下莫不逍遙矣此乃聖人為大勝也孔子逰於匡宋人圍之數匝而弦歌不輟子路入見曰何夫子之娛也孔子曰來吾語女我諱窮乆矣而不免命也求通乆矣而不得時也將明時命之固當故寄之求諱孔子逰於匡衛人誤圍孔子以為陽虎虎常暴於匡人又孔子弟子顔尅時與虎俱後尅為孔子御至匡匡人共識尅又孔子容貌與虎}
