  - {type: variant, offset: 34, length: 1, content: 卵, WYG: 以自多窮百川之量而縣於海海縣於天地則各有量也此發辭氣者有似乎觀大可以明小尋其意則不然夫世之所患者不夷也故謂大者快然謂小者為無餘質小者塊然謂大者為至足是以上下夸跂俯仰自失此乃生民之所惑也惑者求正正之者莫若先極其差而因其所謂大者至足也故秋毫無以累乎天地矣所謂小者無餘也故天地無以過乎秋毫矣然後惑者有由而反各知其極物安其分逍遙者用其本步而逰乎自得之場矣此莊子之所以發德音也若如惑者之説轉以小大相負則相傾者無窮矣若夫視大而不安其小視少而自以為多将奔馳於勝負之境而助天民之矜夸豈達乎荘生之旨哉尾閭泄海水出外者也計四海之在天地之間也不似礨空之在大澤乎計中國之在海内不似稊米之在太倉乎號物之數謂之萬人處一}
