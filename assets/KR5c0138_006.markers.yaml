  - {type: variant, offset: 51, length: 0, content: '', WYG: 在外天然在内而天然之所順者在外故大宗師曰知天人之所為者至矣明内外之分皆非為也德在乎天恣人任知則流蕩失素也知天人之行本乎天位乎德此天然之知自行而不出乎分者也故雖行於外而常本乎天而位乎德矣蹢䠱而屈伸與機會應者有斯變也蹢丈益反䠱音濁反要而語極知雖落天地事雖接萬物而常不失其要極故天人之道全也要於妙反曰何謂天何謂人北海若曰牛馬四足是謂天絡馬首穿牛鼻是謂人人之生也可不服牛乘馬乎服牛乘馬不可穿絡之乎牛馬不辭穿絡者天命之固當也茍當乎天命則雖寄之人事而本在乎天也故曰無以人滅天穿絡之可也若乃走作過分驅步失節則天理滅矣無以故滅命不因其自為而故為之者命其安在乎無以}
