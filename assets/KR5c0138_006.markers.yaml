  - {type: variant, offset: 65, length: 5, content: 文句向注塊, WYG: 也不亦小乎子徃矣非其任者去之可也且子獨不聞夫夀陵餘子之學行於邯鄲與未得國能又失其故行矣直匍匐而歸耳以此效彼兩失之夀陵邑名未應丁夫為餘子邯音寒鄲音單趙國都也今子不去將忘子之故失子之業公孫龍口呿而不合舌舉而不下乃逸而走莊子釣於濮水楚王使大夫二人徃先焉曰願以竟内累矣莊子持竿不顧曰吾聞楚有神龜死已三千歲矣王巾笥而藏之廟堂之上此龜者寧其死為留骨而貴乎寧其生而曵尾於塗中乎二大夫曰寧生而曵尾塗中莊子曰徃矣吾將曵尾於塗中性各有所安也呿起據反司馬云開也濮水陳地水也惠子相梁莊子徃見之或謂惠子曰莊子來欲代子相於是惠子恐捜於國中三日三夜揚兵整旅莊子徃見之曰南方有鳥其名鵷鶵子知之乎夫鵷鶵發於南海而飛於北海非梧桐不止非練實不食非醴泉不飲於是鴟得腐鼠鵷鶵過之仰而視之曰嚇今子欲以子之梁國而嚇我耶謂所好不同願各有極鵷鶵鸞鳯之属嚇怒拒聲恐其奪已也詩箋云以口拒人曰嚇莊子與惠子逰於濠梁之上荘子曰鯈魚出游從容是魚樂也惠子曰子非魚安知魚之樂莊子曰子非我安知我不知魚之樂欲以起明相非而不可以相知之義耳子非我尚可以知我之非魚則我非魚亦可以知魚之樂也鯈音由白魚也惠子曰我非子固不知子矣子固非魚也子之不知魚之樂全矣舍其本言而給辯以難也莊子曰請循其本子曰女安知魚樂云者既已知吾知之而問我我知之濠上也尋惠子之本言云非魚則無縁相知耳今子非我也而云女安知魚樂者是知我之非魚也苟知我之非魚則凡相知者果可以此知彼不待是魚然後知魚也故循子安知之云已知吾之所知矣而方復問我我正知之於濠上耳豈待入水哉夫物之所生而安者天地不能易其處隂陽不能囘其業故以陸生之所安知水生之所樂未足稱妙耳至樂第十八天下有至樂無有哉有可以活身者無有哉忘歡而後樂足樂足而後身存将以為有樂耶而至樂無歡将以為無樂耶而身以存而無憂樂音洛篇内下出者皆同今奚為奚據奚避奚處奚就奚去奚樂奚惡擇此八者莫足以活身唯無擇而任其所遇者乃全耳惡烏路反夫天下之所尊者富貴夀善也所樂者身安厚味美服好色音聲也所下者貧賤天惡也所苦者身不得安逸口不得厚味形不得美服目不得好色耳不得音聲若不得者則大憂以懼其為形也亦愚哉凡此失之無傷於形而得之有損於性今反以不得為憂故愚夫富者苦身疾作多積財而不得盡用其為形也亦外矣内其形者知足而已夫貴者夜以繼日思慮善否其為形也亦疏矣故親其形者自得於身中而已人之生也與憂俱生夀者惽惽乆憂不死何之苦也其為形也亦逺矣夫遺生然後能忘憂忘憂而後生可樂生可樂而後形是我有富是我物貴是我榮也惽音昬列士為天下見善矣未足以活身吾未知善之誠善耶誠不善耶若以為善矣不足活身以為不善矣足以活人善則過當故不周濟故曰忠諌不聽蹲循勿爭唯中庸之德為然蹲七旬反故夫子胥争之以殘其形不争名亦不成誠有善無有哉故當縁督以為經也今俗之所為與其所樂吾又未知樂之果樂耶果不樂耶吾觀夫俗之所樂舉羣趣者誙誙}
