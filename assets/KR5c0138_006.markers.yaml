  - {type: variant, offset: 90, length: 0, content: '', WYG: 曰夫子貪生失理而為此乎將子有亡國之事斧鉞之誅而為此乎將子有不善之行愧遺父母妻子之醜而為此乎將子有凍餒之患而為此乎将子之春秋故及此乎於是語卒援髑髏枕而卧夜半髑髏見夢曰子之談者似辯士諸子所言皆生人之累也死則無此矣子欲聞死之説乎莊子曰然髑髏曰死無君於上無臣於下亦無四時之事從然}
