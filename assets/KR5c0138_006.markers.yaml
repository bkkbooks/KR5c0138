  - {type: variant, offset: 59, length: 3, content: 七字示, WYG: 少進退者此亦東海之大樂也於是塪井之鼃聞之適適然驚規規然自失也以小羨大故自失且夫知不知是非之竟而猶欲觀於莊子之言是猶使蚉負山商蚷馳河也必不勝任矣物各有分不可強相希效蚷音巨商蚷蟲名北燕謂之馬蚿且夫知不知論極妙之言而自適一時之利者是非塪井之鼃與且彼方跐黄泉而登大皇無南無北奭然四解淪於不測無東無西始於𤣥㝠反於大通言無不至也跐音此子乃規規然而求}
