  - {type: variant, offset: 20, length: 0, content: '', WYG: 有也忘而有之也澹然無極而衆美從之若厲已以為之則不能無極而衆惡生此天地之道聖人之德也不為萬物而萬物自生者天地也不為百行而百行自成者聖人也故曰夫恬淡寂漠虚無無為此天地之平而道德之質也非夫寂漠無為也則危其平而喪其質也故曰聖人休休焉則平易矣休乎恬淡寂漠息乎虚無無為則雖歴乎險阻之變常平易而無難平易則恬惔矣患難生於有為有為亦生於患難故平易恬淡交相成也平易恬淡則憂患不能入邪氣不能襲泯然與正理俱徃故其德全而神不虧夫不平不淡者豈唯傷其形哉神德並喪於内也故曰聖人之生也天行任自然而運動其死也物化蛻然無所係靜而與隂同德動而與陽同波動靜無}
  - {type: page-break, offset: 20, content: '', id: KR5c0138_WYG_006-2a, image: WYG1056/WYG1056-0080a.png}
  - {type: page-break, offset: 20, content: '', id: KR5c0138_WYG_006-2b, image: WYG1056/WYG1056-0080b.png}
  - {type: variant, offset: 20, length: 0, content: '', krp: 有也忘而有之也澹然無極而衆美從之若厲已以為之則不能無極而衆惡生此天地之道聖人之德也不為萬物而萬物自生者天地也不為百行而百行自成者聖人也故曰夫恬淡寂漠虚無無為此天地之平而道德之質也非夫寂漠無為也則危其平而喪其質也故曰聖人休休焉則平易矣休乎恬淡寂漠息乎虚無無為則雖歴乎險阻之變常平易而無難平易則恬惔矣患難生於有為有為亦生於患難故平易恬淡交相成也平易恬淡則憂患不能入邪氣不能襲泯然與正理俱徃故其德全而神不虧夫不平不淡者豈唯傷其形哉神德並喪於内也故曰聖人之生也天行任自然而運動其死也物化蛻然無所係靜而與隂同德動而與陽同波動靜無}
  - {type: variant, offset: 21, length: 4, content: 醉句向注, WYG: 而付之隂陽也不為福先不為禍始感而後應無所唱也迫而後動㑹至乃動不得已而後起任理而起吾不得已也去知與故循天之理天理自然知故無為乎其間故無天災災生於違天無物累累生逆物無人非與人同者衆必是焉無鬼責同於自得故無責其生若浮其死若休汎然無所惜也不思慮付之天理不豫謀理至而應光矣而不耀用天下之自光非吾耀也信矣而不期用天下之自信非吾期也其寢不夢其覺無憂其神純粹一無所欲其魂不罷有欲乃疲罷音皮虚無恬淡乃合天德乃與天地合恬淡之德也故}
  - {type: variant, offset: 21, length: 4, content: 醉句向注, krp: 而付之隂陽也不為福先不為禍始感而後應無所唱也迫而後動㑹至乃動不得已而後起任理而起吾不得已也去知與故循天之理天理自然知故無為乎其間故無天災災生於違天無物累累生逆物無人非與人同者衆必是焉無鬼責同於自得故無責其生若浮其死若休汎然無所惜也不思慮付之天理不豫謀理至而應光矣而不耀用天下之自光非吾耀也信矣而不期用天下之自信非吾期也其寢不夢其覺無憂其神純粹一無所欲其魂不罷有欲乃疲罷音皮虚無恬淡乃合天德乃與天地合恬淡之德也故}
  - {type: variant, offset: 26, length: 2, content: 迷惑, WYG: 悲樂者德之邪喜怒者道之過好惡者德之失故心不憂樂德之至也至德常適故情無所槩一而不變靜之至也静而一者不可變也無所於忤虛之至也其心豁然盡乃無纎介之違不與物交淡之至也物自來耳至淡者無交物之情無所於逆粹之至也若雜乎濁欲則有所不順故曰形勞而不休則弊精用而不已則勞勞則竭物皆有當不可失也水之性不雜則清莫動則平欝閉而不流亦不能清天德之象也象天德者無心而皆㑹也故曰純粹而不雜無非至當之事也靜一而不變常在當上淡而無為與㑹俱而已矣動而以天行若夫逐欲而動人行也此養神之道也夫有干越之劒者柙而藏之不敢用也寳之至也况敢輕用其神乎吳有谿名干谿越有山名若耶並出善銅鑄為名劒也精神四達並流無所不極上際於天下蟠於地夫體天地之極應萬物之數以為精神者故若是矣若是而有落天地之功者任天行耳非輕用也化育萬物不可為象所育無方其名為同帝同天帝之不為純素之道唯神是守守而勿失與神為一常以純素守乎至寂而不蕩於外則㝠也一之精通合于天倫精者物之真也野語有之曰衆人重利廉士重名賢士尚志聖人貴精與神為一非守神也不逺其精非貴精也然其迹則貴守之故素也者謂其無所與雜也純也者謂其不虧其神也苟以不虧為純則雖百行同舉萬變參備乃至純也茍以不雜為素則雖龍章鳯姿粹乎有非常之觀乃至素也若不能保其自然之質而親乎外飾則雖犬羊之鞟庸得謂之純素哉能體純素謂之真人繕性第十六繕性於俗學以求復其初已治性於俗矣而欲以俗學復性命之本所以求者愈非}
