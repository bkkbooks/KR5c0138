  - {type: variant, offset: 49, length: 0, content: '', WYG: 順物之迹不得不殊斯五帝三王之所以不同也河伯曰然則我何為乎何不為乎吾辭受趣舍吾終奈何北海若曰以道觀之何貴何賤是謂反衍貴賤之道反覆相尋無拘而志與道大蹇自拘執則不夷於道何少何多是謂謝施隨其分故所施無常謝代也施用也不伐其德是謂謝施無一而行與道參差不能隨變則不齊於道嚴乎若國之有君其無私德公當而已繇繇乎若祭之有社其無私福天下之所同求繇音由泛泛乎其若四方之無窮其無所畛域泛泛然無所在兼懐萬物其孰承翼掩御羣生反之公内而乎徃者也豈扶疎而承翼哉是謂無方無方故能以萬物為方萬物一齊孰短孰長莫不皆足道無終始物有死生死生者無窮之變耳非終始也不恃其成成無常處一虛一滿不位乎其形不以形為位而守之不變年不可舉欲舉之令去而不能時不可止欲止之}
