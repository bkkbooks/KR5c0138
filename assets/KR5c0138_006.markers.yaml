  - {type: variant, offset: 32, length: 0, content: '', WYG: 方復役思以求明思之愈精失之愈逺謂之蔽蒙之民若夫發蒙者必離俗去欲而後幾焉古之治道者以恬養知恬靜而後知不蕩知不蕩而性不失也生而無以知為也謂之以知養恬夫無以知為而任其自知則雖知周萬物而恬然自得也知與恬交相養而和理出其性知而非為則無害於恬恬而自為則無傷於知斯可謂交相飬矣二者交相飬則和理之分豈出他哉夫德和也道理也和故無不得道故無不理德無不容仁也無不容者非為仁也而仁迹行焉道無不理義也無不理者非為義也而義功著焉義明而物親忠也若夫義明而不由忠則物愈疎中純實而反乎情樂也仁義發中而還任本懐則志得矣志得矣其迹則樂矣樂音洛信行容體而順乎文禮也信行容體而順乎自然之節文者其迹則禮也禮樂徧行則天下亂矣以一體之所復一志之所樂行之天下則一方得而萬方失也彼正而蒙已德德則不冐冐則物必失其性也各正性命而自蒙已德則不以此冐彼也若以此冐彼安得不失其性哉古之人在混芒之中與一世而得澹漠焉當是時也隂陽和靜鬼神不擾四時得節萬物不傷羣生不夭人雖有知無所用之任其自然而已此之謂至一當是時也莫之為而常自然物皆自然故至一也逮德下衰夫德之所以下衰者由聖人不維世則在上者不能無為而羨無為之迹故致斯弊也及燧人伏戯始為天下是故順而不一世已失一或不可解故釋而不推順之而已德又下衰及神農黄帝始為天下是故安而不順安之於其所安而已德又下衰及唐虞始為天下興治化之流淳散朴聖人無心任世之自成成之淳朴皆非聖也聖能任世之自得耳豈能使世得聖哉故皇王之迹與世俱遷而聖人之道未始不全也古堯反本亦作澆離道以善善者過於適之稱故有善而道不全險德以行行者違性而行之故行立而德不夷然後去性而從於心以心自役則性去也心與心識彼我之心競為先識無復任性也知而不足以定天下忘知任性斯乃定也然後附之以文益之以博文滅質博溺心文博者心質之飾也然後民始惑亂無以反其性情而復其初初謂性命之本由是觀之世喪道矣道喪世矣世與道交相喪也夫道以不貴故能存世然世存則貴之貴之道斯喪矣道不能使世不貴而世亦不能不貴於道故交相喪也道之人何由興乎世世亦何由興乎道哉若不貴乃交相興也道無以興乎世世無以興乎道雖聖人不在山林之中其德隱矣今所以不隱由其有情以興也何由而興由無貴也隱故不自隱若夫自隱而用物則道世交相興矣何隱之有哉古之所謂隱士者非伏其身而弗見也非閉其言而不出也非藏其知而不發也時命大謬也莫知反一以息迹而逐迹以求一愈得迹愈失一斯大謬矣雖復起身以明之開言以出之顯知以發之何由而交興哉祗所以交喪也當時命而大行乎天下此澹漠之時也則反一無迹反任物性而物性自一故無迹不當時命而大窮乎天下此不能澹漠之時也則深根寧極而待雖有事之世而聖人未始不澹漠也故深根寧極而待其自為耳斯道之所以不喪也此存身之道也未有身存而世不興者也古之存身者不以辯飾知任其真知而已不以知窮天下此澹泊之情也不以知窮德守其自得而已危然處其所而反其性已又何為哉危然獨正之貌道固不小行遊於坦途德固不小識塊然大通小識傷德小行傷道故曰正己而已矣樂全之謂得志自得其志獨使其心而無哀樂之情斯樂之全者也樂音洛下皆同古之所謂得志者非軒冕之謂也謂其無以益其樂而已矣全其内而足今之所謂得志者軒冕之謂也軒冕在身非性命也物之儻來寄也寄之其來不可圉其去不可止在外物耳得失之非我也故不為軒冕肆志淡然自若不覺寄之在身不為窮約趨俗曠然而得不覺及之在身其樂彼與此同彼此謂軒冕與窮約故無憂而已矣亦無大歡之喜也今寄去則不樂由是觀之雖樂未嘗不荒也夫寄去則不樂者寄來則荒矣斯以外易内也故曰喪已於物失性於俗者謂之倒置之民營外虧内其置倒也秋水第十七秋水時至百川灌河涇流之大兩涘渚崖之間不辨牛馬言其廣也秋水水生於春壯於秋白虎通云水涯也古亂反涇音經涇徑也直度曰徑於是焉河伯欣然自喜以天下之美為盡在已順流而東行至於北海東面而視不見水端於是焉河伯始旋其面目望洋向若而歎曰野語有之曰聞道百以為莫已若者我之謂也且夫我嘗聞少仲尼之聞而輕伯夷之義者始吾弗信今我睹子之難窮也吾非至於子之門則殆矣吾長見笑於大方之家知其小而不能自大則理分有素尚之情無為乎其間河伯姓馮名夷一名水夷一名己見太宗師運命篇一云姓吕名公子馮夷是公子之妻盡注忍反北海故云東海之北是也目盳莫剛反又音旁又音望本亦作望洋音羊盳洋猶望洋仰視貌向若向音嚮許亮反若海神北海若曰井鼃不可以語於海者拘於虛也夏蟲不可以語於氷者篤於時也曲士不可以語於道者束於教也夫物之所生而安者趣各有極今爾出於崖涘觀於大海乃知爾醜爾將可與語大理矣以其知分故可與言理也天下之水莫大於海萬川歸之不知何時止而不盈尾閭泄之不知何時已而不虚春秋不變水旱不知此其過江河之流不可為量數而吾未嘗以此自多者自以比形於天地而受氣於隂陽吾在於天地之間猶小石小木之在大山也方存乎見少}
