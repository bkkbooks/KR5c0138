  - {type: variant, offset: 9, length: 5, content: 走句向郭相, WYG: 已矣此山谷之士非世之人枯槁赴淵者之所好也語仁義忠信恭儉推讓為修而已矣此平世之士教誨之人逰居學者之所好也語大功立大名禮君臣正上下為治而已矣此朝廷之士尊主彊國之人致功并兼者之所好也就藪澤處閒曠釣魚閒處無為而已矣此江海之士避世之人閒暇者之所好也吹呴呼吸吐故納新熊經鳥申為夀而已矣此道引之士養形之人彭祖夀考者之所好也此數子者所好不}
  - {type: page-break, offset: 9, content: '', id: KR5c0138_WYG_006-1b, image: WYG1056/WYG1056-0079d.png}
  - {type: variant, offset: 9, length: 5, content: 走句向郭相, krp: 已矣此山谷之士非世之人枯槁赴淵者之所好也語仁義忠信恭儉推讓為修而已矣此平世之士教誨之人逰居學者之所好也語大功立大名禮君臣正上下為治而已矣此朝廷之士尊主彊國之人致功并兼者之所好也就藪澤處閒曠釣魚閒處無為而已矣此江海之士避世之人閒暇者之所好也吹呴呼吸吐故納新熊經鳥申為夀而已矣此道引之士養形之人彭祖夀考者之所好也此數子者所好不}
  - {type: variant, offset: 15, length: 3, content: 列子見, WYG: 恣具所好各之其方亦所以為逍遙也然此僅各自得焉能靡所不樹哉若夫使萬物各得其分而不自失者故當付之無所執為也枯槁若鮑焦介推赴淵若申徒狄熊經若熊之攀𣗳而引氣也鳥申若鳥之嚬呻也道音導若夫不刻意而高無仁義而脩無功名而治無江海而閒不道引而夀所謂自然無不㤀也無不有也㤀故能有若有之則不能救其㤀矣故有者非有}
  - {type: variant, offset: 15, length: 3, content: 列子見, krp: 恣具所好各之其方亦所以為逍遙也然此僅各自得焉能靡所不樹哉若夫使萬物各得其分而不自失者故當付之無所執為也枯槁若鮑焦介推赴淵若申徒狄熊經若熊之攀𣗳而引氣也鳥申若鳥之嚬呻也道音導若夫不刻意而高無仁義而脩無功名而治無江海而閒不道引而夀所謂自然無不㤀也無不有也㤀故能有若有之則不能救其㤀矣故有者非有}
