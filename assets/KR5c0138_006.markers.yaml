  - {type: variant, offset: 123, length: 3, content: 齋句向, WYG: 可勝計種章勇反得水則為㡭得水土之際則為鼃蠙之衣生於陵屯則為陵舄陵舄得欝棲則為烏足烏足之根為蠐螬其葉為蝴蝶蝴蝶胥也化而為蟲生於竈下其狀若脫其名為鴝掇鴝掇千日為鳥其名為乾餘骨乾餘骨之沫為斯彌斯彌為食醯頥輅生乎食醯黄生乎九猷瞀芮生乎腐蠸羊奚比乎不箰乆竹生青寧青寧生程程生馬馬生人人又反入於機萬物皆出於機皆入於機此言一氣而萬形有變化而無死生也得水則為㡭此古絶字音絶今讀音繼萬物雖有兆朕得水土氣乃相繼而生也本或作㫁又作續㫁得水土之際則為鼃户蝸反蠙步田反又音賔之衣言物根在水土際布在水中就水上視不見抄之可得如張緜在水中楚人謂之鼃蠙之衣生於陵屯阜也言物因水成而陸産生於陵屯化作車前改名陵舄也一名澤舄隨燥變也然不知其祖言物化無常形也人之死也亦或化為草木之精或化為人也陵舄得欝栖則為烏足欝栖蟲名烏足草名生水邊也言欝栖在陵舄之中則化為烏足也一云欝栖糞壌也言陵舄在糞化為烏足也烏足之根為蠐音齊螬音曹一本作螬䗲云蝎也其葉為蝴蝶音蝶蛺蝶即蝴蝶也草化為蟲蟲化為草未始有極蝴蝶胥也一名胥也化而為蟲生於竈下得熱氣而生也其狀若脫它括反新出皮恱好也鴝其俱反掇丁活反乾音干沫音末口中汁也斯彌蟲也食如字一本作蝕醯許反蝕醯若酒上蠛蠓也頥以之反輅音路一音洛黄音况頥蟲名九猷音由九宜為乆乆老也猷蟲名也瞀莫豆反芮如銳反腐音輔蠸音權亦蟲名也爾雅云一名守𤓰一名忿鼠也羊奚比毗志反箰息尹反羊奚草名根似蕪菁與乆竹比合而為物皆生於非𩔖也青寧蟲名青寧生程未聞程生馬馬生人俗本多誤故具録之莊子}
