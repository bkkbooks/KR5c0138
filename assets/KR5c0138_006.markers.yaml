  - {type: variant, offset: 77, length: 0, content: '', WYG: 懐而恣物耳果有樂無有哉吾以無為誠樂矣夫無為之樂無憂而已又俗之所大苦也故曰至樂無樂至譽無譽俗以鏗鏘為樂美善為譽天下是非果未可定也雖然無為可以定是非我無為而任天下}
  - {type: variant, offset: 77, length: 0, content: '', krp: 懐而恣物耳果有樂無有哉吾以無為誠樂矣夫無為之樂無憂而已又俗之所大苦也故曰至樂無樂至譽無譽俗以鏗鏘為樂美善為譽天下是非果未可定也雖然無為可以定是非我無為而任天下}
  - {type: variant, offset: 79, length: 1, content: 殆, WYG: 非是非者各自任則定矣至樂活身唯無為幾存百姓足則吾身近乎存也請嘗試言之天無為以之清地無為以之寧皆自清寧耳非為之所得故兩無為相合萬物皆化不為而自合故皆化若有意乎為之則有時而滯也芒乎芴乎而無從出乎皆自出耳未有為而出之也芒李音荒又乎晃反下同芴音忽下同芴乎芒乎而無有象乎無有為之象萬物職職皆從無為殖皆自殖耳故曰天地無為也而無不為也若有為則有不齊也人也孰能得無為哉得無為則無樂而樂至矣莊子妻死惠子弔之莊子則方箕踞鼓盆而歌惠子曰與人居長子老身死不哭亦足矣又鼔盆而歌不亦甚乎莊子曰不然是其始死也我獨何能無槩然察其始而本無生非徒無生也而本無形非徒無形也而本無氣雜乎芒芴之間變而有氣氣變而有形形變而有生今又變而之死是相與為春秋冬夏四時行也人且偃然寢於巨室而我噭噭然隨而哭之自以為不通乎命故止也未明而槩已達而止斯所以誨有情者將令推至理以遣累也支離叔與滑介叔觀於㝠伯之丘崐崘之虚黄帝之所休俄而柳生其左肘其意蹷蹷然惡之支離叔曰子惡之乎滑介叔曰亡予何惡生者假借也假之而生生者塵垢也死生為晝夜且吾與子觀化而化及我我又何惡焉斯皆先示有情然後尋至理以遣之若云我本無情故能無憂則夫有情者遂自絶於逺曠之域而迷困於憂樂之塲矣莊子之楚}
