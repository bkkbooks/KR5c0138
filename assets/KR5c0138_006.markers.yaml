  - {type: variant, offset: 47, length: 0, content: '', WYG: 矣因其不可相無而有其功則天下之功莫不皆有矣若乃忘其自為之功而思夫相為之惠惠之愈勤而偽薄滋甚天下失業而情性瀾漫矣故其功分無時可定也以趣觀之因其所然而然之則萬物莫不然因其所非而非之則萬物莫不非知堯桀之自然而相非則趣操覩矣物皆自然故無不然物皆相非故無不非無不非則無然矣無不然則無非矣無然無非者堯也有然有非者桀也然此二君各受天素不能相為故因堯桀以觀天下之趣操其不能相為也可見矣昔者堯舜譲而帝之噲譲而絶湯武争而王白公爭而滅夫順天應人而受天下者其迹則争譲之迹也尋其迹者失其所以迹矣故絶滅也由此觀之争譲之禮堯桀之行貴賤有時未可以為常也梁麗可以衝城而不可以窒穴言殊器也騏驥驊騮一日而馳千里捕鼠不如狸狌言殊技也鴟鵂夜撮蚤察毫末晝出瞋目而不見丘山言殊性也就其殊而任之則萬物莫不當也梁麗小舩也一云屋棟也淮南子鴟夜聚蚤察分毫末許慎云鵂夜聚食蚤蝨不失也一本作蚉音文故曰蓋師是而無非師治而無亂乎是未明天地之理萬物之情者也夫天地之理萬物之情以得我為是失我為非適性為治失性為亂然物無定極我無常適殊性異便是非無主若以我之所是則彼不得非此知我而不見彼者耳故以道觀者於是非無當也付之天均恣之兩行則殊方異𩔖同焉皆得也師是或云師順也是猶師天而無地師陰而無陽其不可行明矣然且語而不舍非愚則誣也天地陰陽對生也是非治亂互有也將奚去哉舍音捨下同帝王殊禪三代殊繼差其時逆其俗者謂之簒夫當其時順其俗者謂之義之徒黙黙乎河伯女惡知貴賤之門小大之家俗之所貴有時而賤物之所大世或小}
