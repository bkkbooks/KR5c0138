  - {type: variant, offset: 30, length: 3, content: 郭向並, WYG: 之其斷在溝中比犧樽於溝中之斷則美惡有間矣其於失性一也跖與曽史行義有間矣然其失性均也且夫失性有五一曰五色亂目使目不明二曰五聲亂耳使耳不聦三曰五薫鼻困惾中顙四曰五味濁口使口厲爽五曰趣舍滑心使性飛揚此五者皆生之害也而楊墨乃始離跂自以為得非吾所謂得也夫得者困可以為得乎則鳩鴞之在於籠也亦可以為得矣且夫趣舍聲色以柴其内皮弁鷸冠搢笏紳脩以約其外内支盈於柴柵外重纆繳睆睆然在纆繳之中而自以為得則是罪人交臂歴指而虎豹在於嚢檻亦可以為得矣惾子公反困惾猶刻賊不通也鷸尹必反烏名也一名翠似燕紺色出欝林取其羽毛以飾冠天道第十三天道運而無所積故萬物成帝道運而無所積故天下歸聖道運而無所積故海内服此三者皆恣物之性而無所牽滯也積謂滯積不通明於天通於聖六通四辟於帝王之德者其自為也昧然無不静者矣任其自為故雖六通四辟而無傷於靜也六通謂六氣隂陽風雨晦明四辟毘赤反謂四方開也聖人之静也非曰靜也善故靜也善之乃靜則有時而動也萬物無足以鐃心者故靜也斯乃自得也鐃乃孝反又女交反水靜則明燭鬚眉平中准大匠取法焉水靜猶明而况精神聖人之心靜乎天地之鍳也萬物之鏡也夫有其具而任其自為故所照無不洞明夫虚靜恬淡寂漠無為者天地之平而道德之至凡不平不至者生於有為故帝王聖人休焉未嘗動也休則虚虚則實實者倫矣倫理也虚則靜靜則動動則得矣不失其所以動靜則無為無為也則任事者責矣夫無為也則羣才萬品各任其事而自當其責矣故曰巍巍乎舜禹之有天下而不與焉此之謂也無為則俞俞俞俞者憂患不能處年夀長矣俞俞然從容自得之貌夫虚靜恬淡寂漠無為者萬物之本也尋其本皆在不為中來明此以南鄉堯之為君也明此以北面舜之為臣也以此處上帝王天子之德也以此處下𤣥聖素王之道也此皆無為之至也有其道為天下所歸而無其爵者所謂素王自貴也鄉許亮反以此退居而間游江海山林之士服以此進為而撫世則功大名顯而天下一也此又其次也故退則巢許之流進則伊望之倫也夫無為之體大矣天下何所不為哉故主上不為冢宰之任則冢宰靜而司尹矣冡宰不為百官之所執則百官靜而御事矣百官不為萬民之所務則萬民靜而安其業矣萬民不易彼我之所能則天下之彼我靜而自得矣故自天子以下至於庶人下及昆蟲孰能有為而成哉是故彌無為而彌尊也間音閑靜而聖動而王時行則行時止則止無為也而尊自然為物所尊奉樸素而天下莫能與之争美夫美配天者唯樸素也夫明白於天地之德者此之謂大本大宗與天和者也天地以無為為德故明其宗本則與天地無逆也所以均調天下與人和者也夫順天所以應人也故天和至而人和盡也與人和者謂之人樂與天和者謂之天樂天樂適則人樂足矣樂音洛下同莊子曰吾師乎吾師乎萬物而不為戾變而相雜故曰自耳非吾師之暴戾子兮反澤及萬世而不為仁仁者兼愛之名耳無愛故無所稱仁長於上古而不為夀夀者期之逺耳無期故無所稱夀長丁文反覆載天地刻彫衆形而不為巧巧者為之妙耳皆自爾故無所稱巧此之謂天樂㤀樂而榮足故曰知天樂者其生也天行其死也物化靜而與隂同德動而與陽同波故知天樂者無天怨無人非無物累無鬼責故曰其動也天其靜也地動靜雖殊無心一也一心定而王天下其鬼不祟其魂不疲常無心故王天下而不疲病王徃况反下王天同祟雖遂反禍也一心定而萬物服言以虚靜推於天地通於萬物此之謂天樂我心常靜則萬物之心通矣通則服不通則叛天樂者聖人之心以畜天下也聖人之心所以畜天下者奚為哉天樂而已夫帝王之德以天地為宗以道德為主以無為為常無為也則用天下而有餘有餘者閒暇之謂也有為也則為天下用而不足不足者汲汲然欲為物用也欲為物用故可得而臣也及其為臣亦有餘也故古之人貴夫無為也上無為也下亦無為也是下與上同德下與上同德則不臣下有為也上亦有為也是上與下同道上與下同道則不主夫工人無為於刻木而有為於用斧主上無為於親事而有為於用臣臣能親事主能用臣斧能刻木而工能用斧各當其能則天理自然非有為也若乃主代臣事則非王矣臣秉主用則非臣矣故各司其任則上下咸得而無為之理至矣上必無為而用天下下必有為為天下用此不易之道也無為之言不可不察也夫用天下者亦有用之為耳然自得此為率性而動故謂之無為也今之為天下用者亦自得耳但居下者親事故雖舜禹為臣猶稱有為故對上下則君靜而臣動比古今則堯舜無為而湯武有事然各用其性而天機𤣥發則古今上下無為誰有為也故古之王天下者知雖落天地不自慮也辯雖彫萬物不自説也能雖窮海内不自為也夫在上者患於不能無為而代人臣之所司使咎繇不得行其明斷后稷不得施其播殖則羣才失其任而主上困於役矣故冕旒垂目而付之天下天下皆得其自為斯乃無為而無不為者也故上下皆無為矣但上之無為則用下下之無為則自用也天不産而萬物化地不長而萬物育所謂自爾帝王無為而天下功功自彼成故曰莫神於天莫富於地莫大於帝王故曰帝王之德配天地同乎天地之無為也此乘天地馳萬物而用人羣之道也本在於上末在於下要在於主詳在於臣三軍五兵之運德之末也賞罰利害五刑之辟教之末也禮法度數刑名比詳治之末也鐘皷之音羽旄之容樂之末也哭泣衰絰隆殺之服哀之末也此五末者須精神之運心術之動然後從之者也夫精神心術者五未之本也任自然運動則五事之末不振而自舉也末學者古人有之而非所以先也所以先者本也君先而臣從父先而子從兄先而弟從長先而少從男先而女從夫先而婦從夫尊卑先後天地之行也故聖人取象焉言此先後雖是人事然皆在至理中來非聖人之所作也天尊地卑神明之位也春夏先秋冬後四時之序也萬物化作萌區有狀盛衰之殺變化之流也夫天地至神而有尊卑先後之序而况人道乎明夫尊卑先後之序固有物之所不能無也宗廟尚親朝廷尚尊郷黨尚齒行事尚賢大道之序也言非但人倫所尚也語道而非其序者非其道也語道而非其道者安取道所以取道為有序也是故古之明大道者先明天而道德次之天者自然也自然既明則物得其道也道德已明而仁義次之物得其道而和理自適也仁義已明而分守次之理適而不失其分也分守已明而形名次之得分而物物之名各當其形也形名已明而因任次之無所復改因任已明而原省次之物各自任則罪責除也原省所景反原除省廢也原省已明而是非次之各以得性為是失性為非是非已明而賞罰次之賞罰者失得之報也夫至治之道本在於天而末極於斯賞罰已明而愚知處宜貴賤履位言各當其才也仁賢不肖襲情各自行其所能之情必分其能無相易業必由其名名當其實故由名而實不濫也以此事上以此畜下以此治物以此脩身知謀不用必歸其天此之謂太平治之至也故書曰有形有名形名者古人有之而非所以先也古之語大道者五變而形名可舉九變而賞罰可言也自然之序驟而語形名不知其本也驟而語賞罰不知其始也倒道而言迕道而説者人之所治也安能治人治人者必順序迕音悟横也驟而語形名賞罰此有知治之具非知治之道治道先明天不為棄賞罰也但當不失其先後之序耳可用於天下不足以用天下此之謂辯士一曲之人也夫用天下者必大通順序之道禮法數度刑名比詳古人有之此下之所以事上非上之所以畜下也寄此事於羣才斯乃畜下也昔者舜問於堯曰天王之用心何如堯曰吾不敖無告無告者所謂頑民也敖五報反不廢窮民恒加恩也苦死者嘉孺子而哀婦人此吾所以用心已舜曰美則美矣而未大也堯曰然則何如舜曰天德而出寕與天合德則雖出而靜日月照而四時行若晝夜之有經雲行而雨施矣此皆不為而自然也施始跂反堯曰膠膠擾擾乎自嫌有事子天之合也我人之合也夫天地者古之所大也而黄帝堯舜之所共美也故古之王天下者奚為哉天地而已矣孔子西藏書於周室子路謀曰由聞周之徴藏史有老者免而歸居夫子欲藏書則試徃因焉孔子曰善徃見老而老不許於是繙十二經以説老中其説曰大謾願聞其要孔子曰要在仁義老曰請問仁義人之性邪孔子曰然君子不仁則不成不義則不生仁義真人之性也又將奚為矣老曰請問何謂仁義孔子曰中心物愷兼愛無私此仁義之情也此常人之所謂仁義者也故寄孔老以正之藏書藏其所著書也徴藏才浪反徴藏藏名也一云徴典也史藏府之史老吐甘反或云老是孔子時老子號也免而歸言老子見周之末不復可匡所以辭去也繙音煩煩寃也十二經説者云詩書禮樂易春秋六經又加六緯合為十二經也一說云易上下經并十翼為十二乂一云春秋十二公經也物本亦作勿愷開待反樂也老曰意幾乎後言夫兼愛不亦迂乎夫至仁者無愛而直前也意於其反不平聲也下同幾音机本作頎云頎長也後言長也迂音于無私焉乃私也世所謂無私者釋已而愛人夫愛人者欲人之愛已此乃甚私非㤀私而公也夫子若欲使天下無失其牧乎則天地固有常矣日月固有明矣星辰固有列矣禽獸固有羣矣樹木固有立矣皆已自足牧養也夫子亦放德而行循道而趨已至矣不待兼愛也放方徃反又何偈偈乎掲仁義若撃鼔而求亡子焉無由得之偈偈居謁反意夫子亂人之性也事至而愛當義而止斯㤀仁義者也常念之則亂真矣士成綺見老子而問曰吾聞夫子聖人也吾固不辭逺道而來願見百舍重趼而不敢息今吾觀子非聖人也鼠壌有餘蔬言其不惜物也士成綺人姓名也百舍百日止宿也重直龍反趼古顯反胝也許慎云足指約中斷傷為趼蔬讀曰糈糈粒也鼠壌内有遺餘之粒惡過甚也一云如鼠之推壌餘益蔬外也而棄妹不仁也無近恩故曰棄棄妹一本作妹之者不仁釋名云妹未也謂未學之徒須慈誘之乃見棄薄不仁之甚也生熟不盡於前至足故恒有餘生熟生膾也一云生熟謂好惡也而積歛無崖萬物歸懐來者受之不小立界畔也積子亦反斂力檢反老子漠然不應不以其言槩意士成綺明日復見曰昔者吾有刺於子今吾心正郤矣何故也自怪刺譏之心所以壊也郤去逆反或云息也老子曰夫巧知神聖之人吾自以為脱焉脱過去也昔者子呼我牛也而謂之牛呼我馬也而謂之馬隨物所名茍有其實人與之名而弗受有實故不以毁譽經心也再受其殃一毁一譽若受之於心則名實俱累斯所以再受其殃也吾服也恒服服者容行之謂也不以毁譽自殃故能不變其容吾非以服有服有為為之則不能恒服士成綺鴈行避影履行遂進而問脩身若何老子曰而容崖然進趨不安之貌而目衝然衝出之貌而顙頯然髙露發美之貌頯去軌反本又作顯而口闞然虓豁之貌闞許覧反虓火交反而状義然踶自持之貌似繫馬而止也志在奔馳動而持不能自舒放也發也機趣舍速也察而審明是非也知巧而覩於泰泰者多於本性之謂也巧於見泰則拙於抱朴凡以為不信凡此十事以為不信性命而蕩夫毁譽皆非脩身之道也邉竟有人焉其名為竊亦知汝所行非正人也邉竟音境有人焉其名為竊邊陲之人不聞知禮樂之正縱有言語偶㑹墳典皆是盗所得其道何足語哉老子曰夫道於大不終於小不遺故萬物備廣廣乎其無不容也淵乎其不可測也形德仁義神之末也非至人孰能定之夫至人有世不亦大乎而不足以為之累用世故不患其大也天下奮棅而不與之偕靜而順之棅音柄威權也審乎無假而不與利遷任真而直徃也極物之真能守其本故外天地遺萬物而神未嘗有所困也通乎道合乎德退仁義進道德也賔禮樂以情性為主也至人之心有所定矣定於無為也世之所貴道者書也書不過語語有貴也語之所貴者意也意有所隨意之所隨者不可以言傳也而世因貴言傳書世雖貴之哉猶不足貴也為其貴非其貴也其貴恒在意言之表故視而可見者形與色也聽而可聞者名與聲也悲夫世人以形色名聲為足以得彼之情夫形色名聲果不足以得彼之情得彼情惟㤀言遺書者耳則知者不言言者不知而世豈識之哉此絶學去尚之意也桓公讀書於堂上輪扁斵輪於堂下釋椎鑿而上問桓公曰敢問公之所讀為何言邪公曰聖人之言也曰聖人在乎公曰已死矣曰然則君之所讀者古人之糟粕已夫桓公曰寡人讀書輪人安得議乎有説則可無説則死輪扁曰臣也以臣之事觀之斵輪徐則甘而不固疾則苦而不入不徐不疾得之於手而應於心口不能言有數存焉於其間臣不能以喻臣之子臣之子亦不能受之於臣是以行年七十而老斵輪此言物各有性教學之無益也古之人與其不可傳也死矣然則君之所讀者古人之糟粕已夫當古之事已滅於古矣雖或傳之豈能使古在今哉古不在今今事已變故絶學任性與時變化而後至焉天運第十四天其運乎不運而自行也地其處乎不處而自止也日月其爭於所乎不爭所而自代謝也孰主張是孰維綱是皆自爾孰居無事推而行是無則無所能推有則各自有事然則無事而推行是者誰乎哉各自行耳意者其有機緘而不得已邪意者其運轉而不能自止邪自爾故不可知也雲者為雨乎雨者為雲乎二者俱不能相為各自爾也為于偽反孰隆施是孰居無事滛樂而勸是風起北方一西一東有上彷徨孰嘘吸是孰居無事而披拂是敢問何故設問所以自爾之故施音弛樂音洛勸本作倦云讀曰隨言誰無所作主隨天徃來運轉無已也上時掌反彷薄皇反徨音皇本作旁皇飈風也巫咸祒曰來吾語女天有六極五常夫物事之近或知其故然尋其原以至乎極則無故而自爾也自爾則無所待問其故也但當順之祒音條巫咸殷相也祒竒名也六極四方上下也帝王順之則治逆之則凶夫假學可變而天性不可逆也九洛之事治成德備監照下土天下戴之此謂上皇順其自爾故也商大宰蕩問仁於莊子莊子曰虎狼仁也曰何謂也莊子曰父子相親何為不仁曰請問至仁莊子曰至仁無親無親者非薄惡之謂也夫人之一體非有親也而首自在上足自處下府藏居内皮毛在外外内上下尊卑貴賤於其體中各任其極而未有親愛於其間也然至仁足矣故五親六族賢愚逺近不失分於天下者理自然也又奚取於有親哉大宰曰蕩聞之無親則不愛不愛則不孝謂至仁不孝可乎莊子曰不然夫至仁尚矣孝固不足以言之必言之於忘仁忘孝之地然後至矣此非過孝之言也不及孝之言也凡名生於不及者故過仁孝之名而涉乎無名之境然後至焉夫南行者至於郢北面而不見㝠山是何也則去之逺也㝠山在乎北極而南行以觀之至仁在乎無親而仁愛以言之故郢雖見而愈逺㝠山仁孝雖彰而愈非至理也郢楚都也在江陵㝠山北海山名故曰以敬孝易以愛孝難以愛孝易而忘親難㤀親易使親忘我難使親忘我易兼忘天下難兼忘天下易使天下兼忘我難夫至仁者百節皆適則終日不自識也聖人在上非有為也之使各自得而已耳自得其為則衆務自適羣生自足天下安得不各自忘我哉各自忘矣主其安在乎斯所謂兼忘也夫德遺堯舜而不為也遺堯舜然後堯舜之德全耳若係之在心則非自得也利澤施於萬世天下莫知也泯然常適豈直太息而言仁孝乎哉失於江湖乃思濡沫夫孝悌仁義忠信貞廉此皆自勉以役其德者也不足多也故曰至貴國爵并焉并者除棄之謂也夫貴在於身身猶忘之况國爵乎斯貴之至也并必領反棄除也至富國財并焉至富者自足而已故除天下之財也至願名譽并焉所至願者適也得適而仁孝之名都去矣是以道不渝去華取實故也北門成問於黄帝曰帝張咸池之樂於洞庭之野吾始聞之懼復聞之怠卒聞之而惑蕩蕩黙黙乃不自得不自得坐㤀之謂也帝曰女殆其然哉吾奏之以人徴之以天行之以禮義建之以太清由此觀之知夫至樂者非聲音之謂也必先順乎天應乎人得於心而適於性然後發之以聲奏之以曲耳故咸池之樂必待黄帝之化而後成焉夫至樂者先應之以人事順之以天理行之以五德應之以自然然後調理四時太和萬物四時迭起萬物循生一盛一衰文武倫經一清一濁隂陽調和流光其聲自然律吕以滿天地之間但當順而不奪則至樂全蟄蟲始作吾驚之以雷霆因其自作而用其所以動蟄音執爾雅云靜也其卒無尾其始無首運轉無極一死一生一僨一起所常無窮以變化為常則所常者無窮也而一不可待女故懼也初聞無窮之變不能待之以一故懼然悚聽吾又奏之以隂陽之和燭之以日月之明所謂用天之道其聲能短能長能柔能剛變化齊一不主故常齊一於變化故不主故常在谷滿谷在阬滿阬至樂之道無不周也阬苦庚反爾雅云虚也塗卻守神塞其兊也以物為量大制不割其聲揮綽所謂闡諧其名高明名當其實則高明也是故鬼神守其幽不離其所日月星辰行其紀不失其度吾止之於有窮常在極上住也流之於無止隨變而徃也子欲慮之而不能知也望之而不能見也逐之而不能及也故闇然恣使化去儻然立於四虚之道𢎞敞無偏之謂倚於槁梧而吟無所復為也目知窮乎所欲見力屈乎所欲逐吾既不及已夫言物之知力各有所齊限形充空虚乃至委蛇女委蛇故怠夫形充空虚無身也故能委蛇委蛇任性而悚懼之情怠也吾又奏之以無怠之聲意既怠矣乃復無怠此其至也調之以自然之命命之所有者非為也皆自然耳故若混逐叢生混然無係隨叢而生林樂而無形至樂者適而已適在體中故無别形布揮而不曵自布耳幽昏而無聲所謂至樂動於無方夫動者豈有方而後動哉居於窈㝠所謂寜極或謂之死或謂之生或謂之實或謂之榮行流散徙不主常聲隨物變也世疑之稽於聖人明聖人應非世唱也聖也者逹於情而遂於命也故有情有命者莫不資焉天機不張而五官皆備此之謂天樂忘樂而樂足非張而後備無言而心説心說在適不在言也説音恱故有焱氏為之頌曰聽之不聞其聲視之不見其形充滿天地包裹六極女欲聽之而無接焉而故惑也此乃無樂之樂樂之至也焱必遥反樂也者始於懼懼故祟懼然悚聽故是祟耳未太和也祟雖遂反吾又次之以怠怠故遁迹稍㓕也卒之於惑惑故愚愚故道道可載而與之俱也以無知為愚愚乃至也重意記中庸鬼神視之而弗見聽之而弗聞大學心不在焉視而不見聽而不聞莊天運篇聽之不聞其聲視之不見其形孔子西遊於衛顔淵問師金曰以夫子之行為奚如師金曰惜乎而夫子其窮哉顔淵曰何也師金曰夫芻狗之未陳也盛以篋衍巾以文繡尸祝齋戒以將之及其已陳也行者踐其首脊蘓者取而爨之而已將復取而盛以箧巾以文繡遊居寢卧其下彼不得夢必且數眜焉廢棄之物於時無用則更致他妖也蘓草也取草者得以炊也案方言云江淮南楚之間謂之蘓眯音米物入眼為病也厭也今而夫子亦取先王已陳芻狗取弟子逰居寝卧其下故伐樹於宋削迹於衛窮於商周是非其夢邪圍於陳蔡之間七日不火食死生相與鄰是非其眯耶此皆絶聖棄知之意耳無所稍嫌也夫先王典禮所以適時用也時過而不棄即為民妖所以興矯效之端也夫水行莫如用舟而陸行莫如用車以舟之可行於水也而求推之於陸則没世不行尋常古今非水陸與周魯非舟車與今蘄行周於魯是猶推舟於陸也勞而無功身必有殃彼未知夫無方之傳應物而不窮者也時移世異禮亦宜變故因物而無所係焉斯不勞而有功也且子獨不見夫桔橰者乎}
