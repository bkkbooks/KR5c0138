  - {type: variant, offset: 45, length: 0, content: '', WYG: 不哭而民不非也若非之則强哭堯之治天下使民心親民有為其親殺其殺而民不非也殺降也言親疏有降殺為于偽反殺其殺並所戒反降也舜之治天下使民心競民孕婦十月生子子生五月而能言教之也不至乎孩而始誰誰者别人之意也未孩已擇人言其競教成也則人始有天矣不能同彼我則心競於親疏故不終其天年也禹之治天下使民心變人有心而兵有順此言兵有順則天下已有不順故也殺盗非殺盗自應死殺之順也故非殺人自為種而天下耳不能}
