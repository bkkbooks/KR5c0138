  - {type: variant, offset: 46, length: 1, content: 盗, WYG: 齊萬物而人人自别斯人自為種也承百代之流而㑹乎當今之變其弊至於斯者非禹也故曰天下耳言聖知之迹非亂天下而天下必有斯亂種章勇反是以天下大駭儒墨皆起此乃百代之弊其作始有倫而今乎婦女今之以女為婦而上下悖逆者非作始之無理但至理之弊遂至於此何言哉弊生於理故無所復言余語女三皇五帝之治天下名曰治之而亂莫甚焉必弊故也三皇之知上悖日月之明下睽山川之精中墮四時之施其知憯於蠆之尾鮮規之獸莫得安其性命之情者而猶自以為聖人}
