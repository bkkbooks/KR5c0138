  - {type: variant, offset: 36, length: 5, content: 相同胠篋篇, krp: 獻之於其君使道而可進則人莫不進之於其親使道而可以告人則人莫不告其兄弟使道而可以與人則人莫不與其子孫然而不可者無他也中無主而不止心中無受道之質則雖聞道而過去也外無正而不行中無主則外物亦無正己者也故未嘗通也由中出者不受於外}
  - {type: variant, offset: 44, length: 0, content: '', WYG: 出由中出者聖人之道也外有能受之者乃出耳由外入者無主於中聖人不隱由外入者假學以成性者也雖由假學成然要當内有其質若無主於中則無以藏聖道也名公器也夫名者天下之所共用不可多取矯節過實多取者也多取而天下亂也仁義先王之蘧廬也猶傳舍也止可以一宿而不可乆處覯而多責夫仁義者人之性也人性有變古今不同故逰寄而過去則宜若無滯而舍於一宿則見見則偽生偽生而責多矣古之至人假道於仁託宿於義随時而變無常迹也以遊逍遙之虚食於茍簡之田立於不貸之囿逍遙無為也有為則非仁義茍簡易飬也日從其簡故易養也不貸無出也不貸者不損已以為物也古者謂是采真之逰逰而任之則真采也采真則色不偽矣以富為是者不能譲禄以顯為是者不能讓名親權者不能與人柄天下未有以所非自累者而各沒命於所是所是而以沒其命者非立乎不貸之圃也操之則慄舍之則悲舍之悲者操之不能不慄也而一無所鍳以闚其所不休者是天之戮民也言其知進而不知止則性命喪矣所以為戮怨恩取與諌教生殺八者正之器也唯循大變無所湮者為能用之故曰正者正也其心以為不然者天門弗開矣守故不變則失正矣湮音因天門一云謂心也一云大道也孔子見老而語仁義老曰夫播穅眯目則天地四方易位矣蚊虻膚則通昔不寝矣外物物之雖小而傷性已大矣子合反齧也通昔昔夜也夫仁義然乃憤吾心亂莫大焉尚之以加其性故亂七感反吾子使天下無失其朴質全而仁義著吾子亦放風而動揔德而立矣風自動而依之德自立而秉之斯易持易行之道也又奚傑然若負建鼔而求亡子者邪言夫掲仁義以趋道德之鄉其猶挈鼔而求迯者無由得也夫鵠不日浴而白烏不日黔而黒自然各已足黔巨唵反黒也黒白之朴不足以為辯俱自然耳無所偏尚名譽之觀不足以為廣夫至足者忘名譽忘名譽乃廣耳觀古亂反一本作讙泉涸魚相與處於陸相呴以濕相濡以沫言仁義之譽皆生於不足不若相㤀於江湖斯乃忘仁而仁者也孔子見老歸三日不談弟子問曰夫子見老亦將何規哉孔子曰吾乃今於是乎見龍龍合而成體散而成章謂老聃能變化乘乎雲氣而飬乎陰陽言其因御無方自然已足予口張而不能嗋予又何規老哉子貢曰然則人固有尸居而龍見雷聲而淵黙發動如天地者乎賜亦可得而觀乎遂以孔子聲見老老方将倨堂而應微曰予年運而徃矣子将何以戒我乎子貢曰夫三王五帝之治天下不同其係聲名一也而先生獨以為非聖人如何哉老曰小子少進子何以謂不同對曰堯授舜舜授禹禹用力而湯用兵文王順紂而不敢逆武王逆紂而不肯順故曰不同老曰小子少進余語女三王五帝之治天下黄帝之治天下使民心一民有其親}
