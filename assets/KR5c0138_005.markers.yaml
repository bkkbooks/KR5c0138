  - {type: variant, offset: 34, length: 0, content: '', WYG: 之則俯舍之則仰彼人之所引非引人也故俯仰而不得罪於人故夫三皇五帝之禮義法度不矜於同而矜於治期於合時宜應治體而已桔音結橰音羔故譬三皇五帝之禮義法度其猶柤棃橘柚邪其味相反而皆可於口故禮義法度者應時而變者也彼以為美而此或以為惡故當應時而變然後皆適也柤側加反今取猨狙而衣以周公之服彼必齕齧挽裂盡去而後慊觀古今之異猶猨狙之異乎周公也故西施病心而矉其里其里之醜人見而美之歸亦捧心而矉其里其里之富人見之堅閉門而不出貧人見之挈妻子而去之走彼知美矉而不知矉之所以美况夫禮義當其時而用之則西施也時過而不棄則醜人也惜乎而夫子其窮哉孔子行年五十有一而不聞道乃南之沛見老老曰子來乎吾聞子北方之賢者也子亦得道乎孔子曰未得也老子曰子惡乎求之哉曰吾求之於度數五年而未得也老子曰子又惡乎求之哉曰吾求之於隂陽十有二年而未得此皆寄孔老以明}
