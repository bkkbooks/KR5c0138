  - {type: variant, offset: 48, length: 0, content: '', WYG: 可耻乎其無恥也子貢蹵蹵然立不安子貢本謂老子獨絶三王故欲同三王於五帝耳今又見老子通毁五帝上及三皇則失其所以為談矣七感反音例許謁反或云依字上當作蠆下當作蠍通俗文云長尾為蠆短尾為蠍鮮規之獸明貌一云小蟲也一云小獸也孔子謂老曰丘治詩書禮樂易春秋六經自以為乆矣熟知其故矣以奸者七十二君論先王之道而明周召之迹一君無所鉤用甚矣夫人之難説也道之難明邪老子曰幸矣子之不遇治世之君也夫六經先王之陳迹也豈其所以迹哉所以迹者真性也夫任物之真性者其迹則六經也奸音干三蒼云犯也鉤取也今子之所言猶迹也夫迹履之所出而迹豈履哉况今之人事則以自然為復六經為迹夫白鶂之相視眸子不運而風化蟲雄鳴於上風雌應於下風而化鶂以眸子相視蟲以鳴聲相應俱不待合而便生子故曰風化鶂五歴反𩔖自為雌雄故風化夫同𩔖之雌雄各自有以相感相感之異不可勝極茍得其𩔖其化不難故乃有遙感而風化也𩔖自為雌雄故風化或説云方之物𩔖猶如草木異種而同𩔖也山海經云亶爰之山有獸焉其狀如狸而有髪其名曰獅𩔖帶小有烏其状如鳥五采文其名曰竒𩔖皆自牡牝也性不可易命不可變時不可}
