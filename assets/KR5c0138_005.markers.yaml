  - {type: variant, offset: 5, length: 1, content: 但, WYG: 教於彼也孝子不䛕其親忠臣不謟其君臣子之盛也親之所言而然所行而善則世俗謂之不肖子君之所言而然所行而善則世俗謂之不肖臣而未知此其必然邪此直違俗而從君親故俗謂不肖耳未知至當正在何許世俗之所謂然而然之所謂善而善之則不謂之道䛕之人也然則俗故嚴於親而尊於君邪言俗不為尊嚴於君親而從俗俗不謂之謟䛕尊嚴不足以服物則服物者更在於從俗是以聖人未嘗獨異於世必與}
