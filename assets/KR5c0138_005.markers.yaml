  - {type: variant, offset: 1, length: 2, content: 代已, WYG: 榮子之徒未足以為全德子貢之迷沒於此人即若列子之心醉於季咸也謷五羔反反於魯以告孔子孔子曰彼假脩渾沌氏之術者也以其背今向古羞為世事故知其非真渾沌也識其一不知其二徒識修古抱灌之朴而不知因時任物之易也治其内而不治其外夫真渾沌都不治也豈以外物為異而偏有所治哉夫明白入素無為復朴體性抱神以逰世俗之間者汝將固驚耶此真渾沌也故與世同波而不自失則雖逰於世俗而冺然無迹豈必使汝驚哉且渾沌氏之術予與汝何足以識之哉在彼為彼在此為此渾沌𤣥同孰識之哉所識者常識其迹耳諄芒將東之大壑適遇苑風於東海之濵苑風曰子將奚之曰將之大壑曰奚為焉曰夫大壑之為物也注焉而不滿酌焉而不竭吾將逰焉苑風曰夫子無意於横目之民乎願聞聖治諄芒曰聖治乎官施而不失其宜拔舉而不失其能畢見其情事而行其所為皆因而任之行言自為而天下化使物為之則不化也手撓顧指四方之民莫不俱至此之謂聖治言其指麾顧眄而民各至其性也任其自為故願聞德人曰德人者居無思行無慮率自然耳不藏是非美惡無是非於胷中而任之天下四海之内共利之之謂恱共給之之為安無自私之懐也怊乎若嬰兒之失其母也儻乎若行而失其道也財用有餘而不知其所自來飲食取足而不知其所從此謂德人之容德者神人迹也故曰容願聞神人願聞所以迹也曰上神乘光與形滅亡乘光者乃無光此謂照曠無我而任物空虚無所懐者非闇塞也致命盡情天地樂而萬事銷亡情盡命至天地樂矣事不妨樂斯無事矣萬物復情此之謂混冥情復而混冥無迹也門無鬼與赤張滿稽觀於武王之師赤張滿稽曰不及有虞氏乎故離此患也門無鬼曰天下均治而有虞氏治之邪其亂而後治之與言二聖俱以亂故治之則揖讓之與用師直是時異耳未有勝負於其間也赤張滿稽曰天下均治之為願而何計以有虞氏為均治則願各足矣復何為計有虞氏之德而推以為君哉許無鬼之言是也有虞氏之藥瘍也天下皆患創亂故求虞氏之藥瘍音羊頭創也言創以喻亂求虞氏藥治之秃而施髢病而求醫孝子操藥以修慈父其色燋然聖人羞之明治天下者故以為榮秃吐木反髢大細反至德之世不尚賢賢當其位非尚之也不使能能者自為非使之也上如標校出物上而不自高也標方小反言樹標之枝無心在上也校胡孝反一本作枝民如野鹿放而自得也者三章不尚賢使民不爭不貴難得之貨使民不為盗端正而不知以為義相愛而不知以為仁實而不知以為忠當而不知以為信率性自然非由知也蠢動而相使不以為賜用其自動故動而不謝是故行而無迹工能任其自行故無迹也事而無𫝊各止其分故}
