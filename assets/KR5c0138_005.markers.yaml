  - {type: variant, offset: 7, length: 0, content: '', WYG: 消息故在皇為皇在王為王豈有背俗而用我哉謂已道人則勃然作色謂已䛕人則怫然作色世俗遂以多同為正故謂之道䛕則作色不受而終身道人也終身䛕人也亦不問道理期於相善耳合譬飾辭聚衆也是終始本末不相坐夫合譬飾辭應受道䛕之罪而世復以此得人以此聚衆亦為從俗者恒不}
