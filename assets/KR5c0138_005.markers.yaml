markers:
  front:
  - {type: variant, offset: 0, length: 0, content: '', WYG: 欽定四庫全書莊子注巻五晉郭象注天地第十二天地雖大其化均也均於不為而自化也萬物雖多其治一也一以自得為治人卒雖衆其主君也天下異心無心者主也君原於德而成於天以德為原無物不得得者自得故得而不謝所以成天故曰𤣥古之君天下無為也天德而已矣任自然之運動以道觀言而天下之君正無為者自然為君非邪也以道觀分而君臣之義明各當其分則無為位上有為位下也以道觀能而天下之官治官各當其所能則治矣以道汎觀而萬物之應備無為也則天下各以其無為應之故通於天地者德也萬物莫不皆得則天地通行於萬物者道也道不塞其所由則萬物自得其行矣上治人者事也使人人自得其事能有所藝者技也技者萬物之末用也技兼於事事兼於義義兼於德德兼於道道兼於天夫本末之相兼猶手臂之相包故一身和則百節皆適天道順則本末俱暢故曰古之畜天下者無欲而天下足無為而萬物化淵靜而百姓定記曰通於一而萬事畢無心得而鬼神服一無為而羣理都舉記書名也云老子所作夫子曰夫道載覆萬物者也洋洋乎大哉君子不可以不刳心焉有心則累其自然故當刳而去之夫子莊子也一云老子也無為為之之謂天不為此為而此為自為乃天道無為言之之謂德不為此言而此言自言乃真德愛人利物之謂仁此任其性命之情也不同同之之謂大萬物萬形各止其分不引彼以同我乃成大耳行不崖異之謂寛𤣥同彼我則萬物自容故有餘有萬不同之謂富我無不同故能獨有斯萬故執德之謂紀德者人之綱要德成之謂立非德而成者不謂立循於道之謂備夫道非偏物也不以物挫志之謂完内自得也君子明於此十者則韜乎其事心之大也心大故事無不容也沛乎其為萬物逝也德澤滂沛任萬物之自徃也若然者藏金於山藏珠於淵不貴難得之物不利貨財乃能㤀我况貨財乎不近富貴自來寄耳心常去之逺也不樂夀不哀夭所謂縣解不榮通不醜窮㤀夀夭於胷中况窮通之間哉不拘一世之利以為己私分皆委之萬物也不以王天下為己處顯忽然不覺榮之在身顯則明不顯則黙而已萬物一府死生同状蛻然無所在也夫子曰夫道淵乎其居也漻乎其清也金石不得無以鳴聲由寂彰故金石有聲不考不鳴因以明體道者物感而後應也萬物孰能定之應感無方夫王德之人素逝而耻通於事任素而徃耳非好通於事也立之本原而知通於神本立而知不逆故其德廣任素通神而後彌廣其心之出有物採之物採之而後出耳非先物而唱也故形非道不生生非德不明存形窮生立德明道非王德者邪蕩蕩乎忽然出勃然動而萬物從之乎此謂王德之人忽勃皆無心而應之貌動出無心故萬物從之斯蕩矣故能存形窮生立德明道而成王德也視乎㝠㝠聽乎無聲㝠㝠之中獨見曉焉無聲之中獨聞和焉若夫視聽而不寄之於寂則有闇昧而不和也故深之又深而能物焉窮其原而後能物物神之又神而能精焉極至順而後能盡妙故其與萬物接也至無而供其求我斯而都任彼則彼求自供時騁而要其宿大小長短脩逺皆恣而任之會其所極而已黄帝逰乎赤水之北登乎崐崘之丘而南望還歸遺其𤣥珠此寄明得真之所由赤水在崑崙山下使知索之而不得言用知不足以得真知音智使離朱索之而不得使喫詬索之而不得也聦明喫詬失真愈逺喫詬多力也乃使象㒺象㒺得之黄帝曰異哉象㒺乃可以得之乎明得真者非用心也象㒺然即真也堯之師曰許由許由之師曰齧缺齧缺之師曰王倪王倪之師曰被衣堯問於許由曰齧缺可以配天乎謂為天子吾藉王倪以要之欲因其師以要而使之許由曰殆哉圾乎天下圾危也齧缺之為人也聦明叡知給數以敏其性過人聦敏過人則使人跂之屢傷於人也而又乃以人受天用知以求復其自然彼審乎禁過而不知過之所由生夫過生於聦明而又役知以禁之其過彌甚矣故曰無過在去知不在於強禁與之配天乎彼且乘人而無天若與之天下彼且遂使後世任知而失真方且本身而異形夫以萬物為本則羣變可一而異形可同斯迹也將遂使後世由已以制物則萬物乖矣方且尊知而火馳賢者當位於前則知見尊於後奔競而火馳也方且為緒使将興後世事役之端方且為物絯將遂使後世拘牽而制物也絯公才反方且四顧而物應將遂使後世指麾以動物令應上務方且應衆宜將遂使後世不能㤀善而利仁以應宜也方且與物化將遂使後世與物相逐而不能自得於内而未始有恒此皆盡當時之宜也然今日受其得而明日承其弊矣故曰未始有恒夫何足以配天乎雖然有族有祖其事𩔖可得而祖効可以為衆父而不可以為衆父父衆父父者所以迹也治亂之率也言非但治主乃為亂率北面之禍也夫桀紂非能殺賢臣乃賴聖知之迹以禍之南面之賊也田恒非能弑君乃資仁義以賊之堯觀乎華華封人曰嘻聖人請祝聖人使聖人夀堯曰辭使聖人富堯曰辭使聖人多男子堯曰辭封人曰夀富多男子人之所欲也女獨不欲何邪堯曰多男子則多懼富則多事夀則多辱是三者非所以養德也故辭封人曰始也我以女為聖人邪今然君子也天生萬民必授之職多男子而授之職則何懼之有物皆得所而志定也華胡化反又胡花反地名也封人守封疆人也富而使人分之則何事之有寄之天下故無事也夫聖人鶉居無意而期安也鶉音淳鶉居謂無常處也又云如鶉之居猶言野處而鷇食仰物而足鷇口豆反主哺鷇鷇食者言仰物而足也鳥行而無彰率性而動非常迹也天下有道則與物皆昌猖狂妄行而自蹈大方也天下無道則脩德就間雖湯武之事茍順天應人未為不間也故無為而無不為者非不間也間音閑千嵗厭世去而上僊夫至人極夀命之長任窮理之變其生也天行其死也物化故云厭世而上僊也乘彼白雲至于帝鄉氣之散無不之三患莫至身常無殃則何辱之有封人去之堯隨之曰請問封人曰退已堯治天下伯成子髙立為諸侯堯授舜舜授禹伯成子髙辭為諸侯而耕禹徃見之則耕在野禹趨就下風立而問焉曰昔堯治天下吾子立為諸侯堯授舜舜授予而吾子辭為諸侯而耕敢問其故何也子髙曰昔堯治天下不賞而民勸不罰而民畏今子賞罰而民且不仁德自此衰刑自此立後世之亂自此始矣夫子闔行邪無落吾事俋俋乎耕而不顧夫禹時三聖相承治成德備功美漸去故史籍無所載仲尼不能間是以雖有天下而不與焉斯乃有而無之也故考其時而禹為最優計其人則雖三聖故一堯耳時無聖人故天下之心俄然歸啓夫至公而居當者付天下於百姓取與之非已故失之不求得之不辭忽然而徃侗然而來是以受非毁於㢘節之士而名列於三王未足怪也莊子因斯以明堯之弊弊起於堯而釁成於禹况後世之無聖乎寄逺迹於子高使棄而不治將以絶聖人而反一遺知而寧極耳其實則未聞也夫莊子之言不可以一塗詰或以黄帝之迹禿堯舜之脛豈獨貴堯而賤禹哉故當遺其所寄而録其絶聖棄知之意焉伯成子髙通變經云老子從此天地開闢以來吾身一千三百變後世得道伯成子高是也泰初有無無有無名無有故無所名一之所起有一而未形一者有之初至妙者也至妙故未有物理之形耳夫一之所起起於至一非起於無也然莊子之所以屢稱無於初者何故初者未生而得生得生之難而猶上不資於無下不待於知然而自得此生矣又何營生於已生以失其自生哉物得以生謂之德夫無不能生物而云物得以生乃所以明物生之自得任其自得斯可謂德也未形者有分且然無間謂之命留動而生物物成生理謂之形形體保神各有儀則謂之性夫德形性命因變立名其於自爾一也性脩反德德至同於初恒以不為而自得之同乃虚虚乃大不同於初而中道有為則具懐中故為有物也有物而容養之德小矣合喙鳴無心於言而自言者合於喙鳴喙下豆反喙鳴合與天地為合天地亦無心而自動其合緡緡若愚若昬坐忘而自合耳非昭察以合之緡武巾反是謂𤣥德同乎大順德𤣥而所順者大矣夫子問於老曰有人治道若相放可不可然不然若相放效强以不可為可不然為然則矯其性情也夫子仲尼也辯者有言曰離堅白若懸㝢言其高顯易見若是則可謂聖人乎老曰是胥易技係勞形怵心者也執留之狗成思猨狙之便自山林來言此皆失其常然也竹鼠也一云執留之狗謂有能故被留係成愁思也猨音𡊮狙七徐反便婢面反言便㨗見捕丘予告若而所不能聞與而所不能言凡有首有趾無心無耳者衆首趾猶始終也無心無耳言其自化有形者與無形無状而皆存者盡無言有形者善變不能與無形無状者並存也故善治道者不以故自持也將順日新之化而已其動止也其死生也其廢起也此又非其所以也此言動止死生盛衰廢興未始有常皆自然而然非其所用而然故放之而自得也有治在人不在乎主自用㤀乎物㤀乎天其名為㤀已天物皆㤀非獨㤀已復何所有哉㤀已之人是之謂入於天人之所不能㤀者已也已獨㤀之又奚識哉斯乃不識不知而㝠于自然將閭葂見季徹曰魯君謂葂也曰請受教辭不獲命既已告矣未知中否請嘗薦之吾謂魯君曰必服恭儉拔出公忠之屬而無阿私民孰敢不輯季徹局局然笑曰若夫子之言於帝王之德猶螳螂之怒臂以當車軼則必不勝任矣必服恭儉非㤀儉而儉也拔出公忠非㤀忠而忠也故雖無阿私而不足以勝矯詐之任也且若是則其自為處危其觀䑓此皆自處高顯若䑓觀之可覩也多物將徃將使物不止於本性之分而矯跂自多以附之投迹者衆亢足投迹不安其本步也將閭葂覤覤然驚曰葂也汒若於夫子之所言矣雖然願先生之言其風也季徹曰大聖之治天下也揺蕩民心使之成教易俗舉滅其賊心而皆進其獨志若性之自為而民不知其所由然夫志各有趣不可相效也故因其自揺而揺之則雖揺而非為也因其自蕩而蕩之則雖蕩而非動也故其賊心自滅獨志自進教成俗易悶然無迹履性自為而不知所由皆云我自然矣舉皆也若然者豈兄堯舜之教民溟涬然弟之哉溟涬甚貴之謂也不肯多譲堯舜而推之為兄也欲同乎德而心居矣居者不逐於外也心不居則德不同也子貢南逰於楚反於晋過漢陰見一丈人方將為圃畦鑿隧而入井抱甕而出灌搰搰然用力甚多而見功寡子貢曰有械於此一日浸百畦用力甚寡而見功多夫子不欲乎為圃者卬而視之曰奈何曰鑿木為機後重前輕挈水若抽數如泆湯其名為橰為圃者忿然作色而笑曰吾聞之吾師有機械者必有機事有機事者必有機心機心存於胷中則純白不備純白不備則神生不定神生不定者道之所不載也吾非不知羞而不為也夫用時之所用者乃純備也斯人欲脩純備而抱一守古失其旨也橰本又作橋或作臯同音羔桔橰也吾師謂老子也子貢瞞然慙俯而不對有間為圃者曰子奚為者邪曰孔丘之徒也為圃者曰子非夫博學以擬聖於于以蓋衆獨弦哀歌以賣名聲於天下者乎汝方將㤀汝神氣墮汝形骸而庶幾乎不㤀不墮則無庶幾之道於于並如字本或作於吁音同夸誕貌一云行仁恩之貌而身之不能治而何暇治天下乎子徃矣無乏吾事子貢卑陬失色頊頊然不自得行三十里而後愈其弟子曰向之人何為者邪夫子何故見之變容失色終日不自反邪曰始吾以為天下一人耳謂孔子也不知復有夫人也吾聞之夫子事求可功求成用力少見功多者聖人之道聖人之道即用百姓之心耳今徒不然執道者德全德全者形全形全者神全神全者聖人之道也託生與民並行而不知其所之茫乎淳備哉功利機巧必亡夫人之心此乃聖王之道非夫人也子貢閒其假脩之説而服之未知純白者之同乎世也若夫人者非其志不之非其心不為雖以天下譽之得其所謂謷然不顧以天下非之失其所謂儻然不受天下之非譽無益損焉是謂全德之人哉我之謂風波之民此}
