  - {type: variant, offset: 74, length: 0, content: '', WYG: 而孰非乎無始曰不知深矣知之淺矣弗知内矣知之外矣於是泰清中而歎曰弗知乃知乎知乃不知乎孰知不知之知凡得之不由於知乃㝠也無始曰道不可聞聞而非也道不可見見而非也道不可言言而非也故黙成乎不聞不見之域而後至焉知形形之不形乎形白形耳形形者竟無物也道不當名有道名而竟無物故名之不能當也無始曰有問道而應之者不知道也雖問道者亦未聞道不知故問問之而應則非道也不應則非問者所得故雖問之亦終不聞也道無問問無應絶學去教而歸於自然之意也無問問之是問窮也}
