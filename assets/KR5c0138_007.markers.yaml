  - {type: variant, offset: 0, length: 2, content: 吾示, WYG: 欽定四庫全書莊子注巻七晉郭象注達生第十九達生之情者不務生之所無以為生之所無以為者分外物也達命之情者不務知之所無奈何知之所無奈何者命表事也養形必先之物物有餘而形不養者有之矣知止其分物稱其生生斯足矣有餘則傷也有生必先無離形形不離而生亡者有之矣守形太甚故生亡也離力智反下同生之來不能却其去不能止非我所制則無為有懐於其間悲夫世之人以為養形足以存生故彌養之而彌失之而養形果不足以存生養之彌厚則死地彌至則世奚足為哉莫若放而任之雖不足為而不可不為者其為不免矣性分各自為者皆在至理中來故不可免也是以善養生者從而任之夫欲免為形者莫如棄世棄世則無累無累則正平正平則與彼更生更生則幾矣更生者日新之謂也付之日新則性命盡矣幾其依反事奚足棄而生奚足遺棄事則形不勞遺生則精不虧所以遺棄之夫形全精復與天為一俱不為也天地者萬物之父母也無所偏為故能子萬物合則成體散則成始所在皆成無常處形精不虧是謂能移與化俱也精而又精反以相天還輔其自然也相息亮反子列子問關尹曰至人潜行不窒其心虚故能御羣實關尹關令尹喜也蹈火不熱行乎萬物之上而不慄至適故無不可耳非物往可之請問何以至於此闗尹曰是純氣之守也非知巧果敢之列居予語女凡有貌象聲色者皆物也物何以相逺唯無心者獨逺耳夫奚足以至乎先是色而已同是一物耳未足以相先也則物之造乎不形而止乎無所化常逰於極夫得是而窮之者物焉得而止焉夫至極者非物所制彼将處乎不淫之度止於所受之分而藏乎無端之紀㝠然與變化日新遊乎萬物之所終始終始者物之極壹其性飾則二矣養其氣不以心使之合其德不以物離性以通乎物之所造萬物皆造於自爾夫若是者其天守全其神無郤物奚自入焉夫醉者之墜車雖疾不死骨節與人同而犯害與人異其神全也乘亦不知也墜亦不知也死生驚懼不入乎其胸中是故物而不慴彼得全於酒而猶若是醉故失其所知耳非自然無心者也郤去逆反而况得全於天乎聖人藏於天故莫之能傷也不闗性分之外故曰藏復讐者不折鏌干夫干將鏌鎁雖與讎為用然報讐者不事折}
