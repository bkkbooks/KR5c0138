  - {type: variant, offset: 106, length: 0, content: '', WYG: 聖人之愛人也終無已者亦乃取於是者也取於自爾故恩流百代而不廢也顔淵問乎仲尼曰囘嘗聞諸夫子曰無有所将無有所迎囘敢問其遊仲尼曰古之人外化而内不化以心順形而形自化今之人内化而外不化以心使形與物化者一不化者也常無心故一不化一不化乃能與物化耳安化安不化化與不化皆任彼耳斯無心也安與之相靡直無心而恣其自化耳非將迎而靡順之必與之莫多不將不迎}
