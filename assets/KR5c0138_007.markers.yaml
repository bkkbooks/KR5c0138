  - {type: variant, offset: 19, length: 0, content: '', WYG: 為已成者未之嘗全墮許規反孰能去功與名而還與衆人功自衆成故還之道流而不明昧然而自行耳居得行而不名}
  - {type: variant, offset: 19, length: 0, content: '', krp: 為已成者未之嘗全墮許規反孰能去功與名而還與衆人功自衆成故還之道流而不明昧然而自行耳居得行而不名}
  - {type: variant, offset: 20, length: 0, content: '', WYG: 彼皆居然自得此行耳非由名而後處之純純常常乃比於狂無心而動故也削迹捐勢不為功名功自彼成故勢不在我而名迹皆去是故無責於人人亦無責焉恣情任彼故彼各自當其責也至人不聞子何喜哉寂澹無懐乃至人也孔子曰善哉辭其交逰去其弟子逃於大澤衣裘褐食杼栗取於棄人間之好也入獸不亂羣入鳥不亂行若草木之無心故為禽獸所不畏鳥獸不惡而况人乎蓋寄言以極推至誠之信任乎物而無受害之地也孔子問子桑虖曰吾再逐於魯伐樹於宋削迹於衛窮於商周圍於陳蔡之間吾犯此數患親交益疏徒友益散何與子桑虖曰子獨不聞假人之亡與林囘棄千金之璧負赤子而趨或曰為其布與赤子之布寡矣布謂匹帛也虖音户布謂貨財也為其累與赤子之累多矣棄千金之璧負赤子而趨何也林囘曰彼以利合此以天屬也夫以利合者迫窮禍患害相棄也以天屬者迫窮禍患害相收也夫相收之與相棄亦逺矣且君子之交淡若水小人之交甘若醴君子淡以親道合故親小人甘以絶飾利故甘利不可常有時而絶彼無故以合者則無故以離夫無故而自合者天屬也合不由故則故不足以離之也然則有故而合必有故而離矣孔子曰敬聞命矣徐行翔佯而歸絶學捐書弟子無挹於前其愛益加進去飾任素故也異日桑虖又曰舜之將死真泠禹曰汝戒之哉形莫若縁情莫若率因形率情不矯之以利也泠音零冷曉也謂以真道曉語禹也冷或為命又作令命猶教也縁則不離率則不勞形不假故常全情不矯故常逸不離不勞則不求文以待形任朴而直前也不求文以待形固不待物朴素而足莊子衣大布而補之正緳係屨而過魏王魏王曰何先生之憊耶莊子曰貧也非憊也士有道德不能行憊也衣敝屨穿貧也非憊也此所謂非遭時也王獨不見夫騰猿乎其得柟梓豫章也攬蔓其枝而王長其間雖羿逢蒙不能眄睨也遭時得地則升其長枝故雖古之善射莫之能害大布粗布也緳賢節反帶也係屨屨穿故係眄一作睥睨音詣邪視也憊薄計反柟音南木名攬舊歴敢反蔓音萬郭武半反王徃况反兩枝相去長逺及其得柘棘枳枸之間也危行側視振動悼慓此筋骨非有加急而不柔也處勢不便未足以逞其能也今處昏上亂相之間而欲無憊奚可得耶此比干之見剖心徵也夫勢不便而强為之則又戮矣柘章夜反枸音矩孔子窮於陳蔡之間七日不火食左據槁木右撃槁枝而歌焱氏之風有其具而無其數有其聲而無宫角木聲與人聲犁然有當於人之心顔囘端拱還目而窺之仲尼恐其廣己而造大也愛己而造哀也曰囘無受天損易唯安之故易焱必遙反造適也易以豉反無受人益難物之倘來不可禁禦無始而非卒也於今為始者於昨為卒則所謂始者即是卒矣言變化之無窮人與天一也皆自然夫今之歌者其誰乎任其自爾則歌者非我也囘曰敢問無受天損易仲尼曰飢渇寒暑窮桎不行天地之行也運物之泄也不可逃也言與之偕逝之謂也所謂不識不知而順帝之則也言我也為人臣者不敢去之執臣之道猶若是而况乎所以待天乎所在皆安不以損為損斯待天而不受其損也何謂無受人益難仲尼曰始用四達感應旁通為四達爵祿並至而不窮旁通故可以御高大也物之所利乃非己也非己求而取之吾命有在外者也人之生必外有接物之命非如瓦石止於形質而已君子不為盗賢人不為吾若取之何哉盗竊者私取之謂也今賢人君子之致爵禄非私取之受之而已故曰鳥莫知於鷾鴯目之所不宜處不給視雖落其實棄之而走避禍之知音智鷾音意鴯音而或云鷾鴯燕也目之所不宜處昌吕反言不可止處目已羅絡知之故棄之也其畏人也而襲諸人間未有自疏外於人而人存之者也畏人而入於人間此鳥之所以稱知也矣社稷存焉爾况之至人則𤣥同天下故天下樂推而不厭相與社而稷之斯無受人益之所以為難也何謂無始而非卒仲尼曰化其萬物而不知其禪之者莫覺其變禪市戰反授予也焉知其所終焉知其所始正而待之而已耳日夜相代未始有極故正而待之無所為懐也焉於䖍反下同何謂人與天一耶仲尼曰有人天也有天亦天也凡所謂天皆明不為而自然人之不能有天性也言自然則自然矣人安能故有此自然哉自然耳故曰性聖人晏然體逝而終矣晏然無矜而體與變俱也荘周逰乎雕陵之樊覩一異鵲自南方來者翼廣七尺目大運寸感周之顙而集於栗林莊周曰此何鳥哉翼殷不逝目大不覩蹇裳躩步執弹而留之覩一蝉方得美䕃而忘其身螳螂執翳而摶之見得而忘其形執木葉以自翳於蝉而忘其形之見乎異鵲也運寸可囘一寸也感觸也翼殷不逝目大不覩殷大也留力救反宿留伺其便也異鵲從而利之見利而忘其真目能視翼能逝此鳥之真性也今見利故忘之真身也荘周然曰噫物固相累相為利者恒相為累二𩔖相召也夫有欲於物者物亦有欲之捐弹而反走虞人逐而誶之誶問之也以周為盗栗也荘周反入}
