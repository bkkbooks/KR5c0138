  - {type: variant, offset: 90, length: 3, content: 秋水篇, WYG: 為不神者求耶思求更致不了為于偽反無古無今無始無終非唯無不得化而為有也有亦不得化而為無矣是以夫有之為物雖千變萬化而不得一為無也不得一為無故自古無未有之時而常存也未有子孫而有子孫可乎言世世無極言其要有由不得無故而有傳世故有子孫不得無子而有孫也如是天地不得先無而今有也冉求未對仲尼曰已矣未應矣不以生生死夫死者獨化而死耳非夫生者生此死也不以死死生生者亦獨化而生耳死生有待耶獨化死生皆有所一體死}
