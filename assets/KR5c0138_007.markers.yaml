  - {type: variant, offset: 4, length: 0, content: '', krp: 其無心鏌音莫吴王闔閭使干將造劒劒有二狀一曰干將二曰鏌鎁鏌鎁干將妻名也雖有忮心者不怨飄瓦飄落之瓦雖復中人人莫之怨者由其無情忮音支害也是以天下平均凡不平者由有情故無攻戰之亂無殺戮之形者由此道也無情之道大矣不開人之天而開天之天不慮而知開天也知而後感開人也然則開天者性之動也開人者知之用也開天者德生性動者遇物而當足則忘餘斯德生也開人者賊生知用者從感而求勸而不已斯賊生也不厭其天不忽於人任其天性而動則人理亦自全矣民幾乎以其真民之所患偽之所生常在於知用不在於性動也仲尼適楚出於林中見痀僂者承蜩猶掇之也仲尼曰子巧乎有道邪曰我有道也五六月累丸二而不墜則失者錙銖累二丸於竿頭是用手之停審也其承蜩所失者不過錙銖之間也痀於禹反僂音縷承一本作美蜩音條蟬也掇丁活反拾也五六月黏蟬時也累劣彼反下同謂累之於竿頭也累三而不墜則失者十一所失愈少累五而不墜猶掇之也停審之至故乃無所復失吾處身也若厥株拘吾執臂也若槁木之枝不動之至厥本或作橛同其月反株音誅拘音俱厥䜿也䜿若株拘也槁苦老反雖天地之大萬物之多而唯蜩翼之知吾不反不側不以萬物易蜩之翼何為而不得遺彼故得此孔子顧謂弟子曰用志不分乃凝於神其痀僂丈人之謂乎顔淵問仲尼曰吾嘗濟乎觴深之淵津人操舟若神吾問焉曰操舟可學邪曰可善游者數能言物雖有性亦須數習而後能耳若乃夫沒人則未嘗見舟而便操之也沒人謂能鶩沒於水底吾問焉而不吾告敢問何謂也仲尼曰善游者數能忘水也習以成性遂若自然若乃夫沒人之未嘗見舟而便操之也彼視淵若陵視舟之覆猶其車却也視淵若陵故視舟之覆於淵猶車之却退於坂也覆却萬方陳乎前而不得入其舍覆却雖多而猶不以經懐以其性便故也惡徃而不暇所遇皆閒暇也以瓦注者巧以鉤注者憚以黄金注者㱪所要愈重則其心愈矜也注之𣗳反撃也憚音丹忌惡也一曰難也㱪音昬説文云㱪矜也補注射也射而賭物曰注其巧一也而有所矜則重外也凡外重者内拙夫欲養生全内者其唯無所矜重也田開之見周威公威公曰吾聞祝腎學生學生者務中適吾子與祝腎逰亦何聞焉田開之曰開之操拔篲以侍門庭亦何聞於夫子威公曰田子無譲寡人願聞之開之曰聞之夫子曰善養生者若牧羊然視其後者而鞭之威公曰何謂也田開之曰魯有單豹者岩居而水飲不與民共利行年七十而猶有嬰兒之色不幸遇餓虎餓虎殺而食之有張毅者髙門縣薄無不走也行年四十而有内熱之病以死豹養其内而虎食其外毅飬其外而病攻其内此二子者皆不鞭其後者也夫守一方之事至於過理者不及於㑹通之適也鞭其後者去不及也縣音𤣥薄簾也走至也言無不至門奉貴富也補走趍走也帷薄之外不趍而猶必走恭之至也吕氏春秋曰張毅好恭是也仲尼曰無入而藏藏既内矣而又入之此過於入也無出而陽陽既外矣而又出之此過於出也柴立其中央若槁木之無心而中適是立也三者若得其名必極名極而實當也夫畏塗者十殺一人則父子兄弟相戒也必盛卒徒而後敢出焉不亦知乎人之所取畏者袵席之上飲食之間而不知為之戒者過也十殺一耳便大畏之至於色欲之害動皆之死地而莫不冐之斯過之甚也祝宗人𤣥端以臨牢筴説彘曰汝奚惡死吾将三月㹖汝十日戒三日齊藉白茅加汝肩尻乎彫爼之上則汝為之乎為彘謀曰不如食以糠糟而錯之牢筴之中自為謀則茍生有軒冕之尊死得於腞楯之上聚僂之中則為之為彘謀則去之自為謀則取之所異彘者何也欲贍則身亡理常俱耳不間人獸也筴初革反牢豕室也木欄也㹖音患養也尻苦羔反楯食凖反腞猶也楯猶案也僂力主反聚僂器名也今塜壙中注為之一云聚僂棺槨也一云聚當作菆才官反僂當作蔞力乆反謂殯於菆塗蔞翣之中桓公田於澤管仲御見鬼焉公撫管仲之手曰仲父何見對曰臣無所見公反誒詒為疾數日不出齊士有皇子告敖者曰公則自傷鬼惡能傷公夫忿滀之氣散而不反則為不足上而不下則使人善怒下而不上則使人善忘不上不下中身當心則為病桓公曰然則有鬼乎曰有沈有履竈有髻户内之煩壌雷霆處之東北方之下者倍阿鮭蠪躍之西北方之下者則泆陽處之水有罔象丘有崒山有野有澤有委蛇公曰請問委蛇之状何如皇子曰委蛇其大如轂其長如轅紫衣而朱冠其為物也惡聞雷車之聲則捧其首而立見之者殆乎霸桓公囅然而笑曰此寡人之所見者也於是正衣冠與之坐不終日而不知病之去也此章言憂來而累生者不明也患去而生得者達理也誒音哀詒音䑓誒詒失魂魄也皇子告敖皇姓告敖字齊之賢士也滀敕六反沈水汙也漏神名竈有髻音結竈神著赤衣狀如美女鮭戸蝸反蠪音聾倍阿神名也鮭蠪状如小兒長一尺四寸黒衣赤幘大冠帶劒持戟泆音逸泆陽豹頭馬尾作狗頭一云神名也罔象本作無傷云狀如小兒赤黒色赤爪大耳長臂一云水神名崒本又作莘所巾反又音臻状如狗有角文身五采求龜反状如鼔而一足方音傍本亦作同皇本亦作同状如蛇兩頭五采文委於危反紀渻子為王養鬭雞十日而問雞已乎曰未也方虚憍而恃氣十日又問曰未也猶應嚮景十日又問曰未也猶疾視而盛氣十日又問曰幾矣雞雖有鳴者已無變矣望之似木雞矣其德全矣異雞無敢應者反走矣此章言養之以至於全者猶無敵於外况自全乎王齊王也虚憍居喬反高仰頭也應應對之應下同嚮許丈反本亦作響景於領反應響鳴顧景行孔子觀於吕梁縣水三十仞流沫四十里黿鼉魚鱉之所不能游也見一丈夫游之以為有苦而欲死也使弟子並流而拯之數百步而出被髮行歌而游於塘下孔子從而問焉曰吾以子為鬼察子則人也請問蹈水有道乎曰亡吾無道吾始乎故長乎性成乎命與齊俱入與汨偕出磨翁而旋入者齊也囘伏而湧出者汨也吕梁今西河離石西有此縣絶世謂之黄梁淮南子曰古者龍門未鑿河出孟門之上也齊囘水如磨齊也汨胡忽反從水之道而不為私焉任水而不任己此吾所以蹈之也孔子曰何謂始乎故長乎性成乎命曰吾生於陵而安於陵故也長於水而安於水性也不知吾所以然而然命也此章言人有偏能得而任之則天下無難矣用夫無難以涉乎生生之道何徃而不通也梓慶削木為鐻鐻成見者驚猶鬼神不似人所作也梓慶魯大匠也梓官名慶其名也鐻音據樂器也似夾鍾魯侯見而問焉曰子何術以為焉對曰臣工人何術之有雖然有一焉臣將為鐻未嘗敢以耗氣也必齊以靜心齊三日而不敢懐慶賞爵禄齊五日不敢懐非譽巧拙齊七日輒然忘吾有四枝形體也當是時也無公朝視公朝若無則跂慕之心絶矣其巧專而外滑消性外之事去也然後入山林觀天性形軀至矣然後成見鐻然後加手焉不然則己必取材中者也見賢遍反中丁仲反則以天合天不離其自然也器之所以疑神者其是與盡因物之妙故乃疑是鬼神所作耳東野稷以御見荘公進退中繩左右旋中規莊公以為文弗過也使之鉤百而反顔闔遇之入見曰稷之馬将敗公密而不應少焉果敗而反公曰子何以知之曰其馬力竭矣而猶求焉故曰敗斯明至當之不可過也東野稷孫卿作東野畢荘公衛莊公文弗過也謂過織組之文也使之鉤百而反稷白矜其能圓而驅之如鉤復迹百反而不知止工倕旋而蓋規矩指與物化而不以心稽故其靈䑓一而不桎雖工倕之巧猶任規矩此言因物之易也倕音垂云工倕堯時巧人也旋圎也瞿句也倕工巧任規以見為圎覆蓋其句指不以施度也是與物化之不以心稽留也補蓋車蓋指手指忘足屨之適也忘要帶之適也百體皆適則都忘其身也知忘是非心之適也是非生於不適耳不内變不外從事㑹之適也所遇而安故無所變從也始乎適而未嘗不適者忘適之適也識適者猶未適也有孫休者踵門而詫子扁慶子曰休居鄉不見謂不脩臨難不見謂不勇然而田原不遇歲事君不遇世賔於鄉里逐於州部則胡罪乎天哉休惡遇此命也扁子曰子獨不聞夫至人之自行耶忘其肝膽遺其耳目闇付自然也詫救駕反告也芒然彷徨乎塵垢之外凡非真性皆塵垢也逍遙乎無事之業凡自為者皆無事之業也是謂為而不恃率性自為耳非恃而為之長而不宰任其自長耳非宰而長之今汝飾知以驚愚脩身以明汙昭昭乎若掲日月而行也汝得全而形軀具而九竅無中道夭於聾盲跛蹇而比於人數亦幸矣又何暇乎天之怨哉子徃矣孫子出扁子入坐有間仰天而歎弟子問曰先生何為歎乎扁子曰向者休來吾告之以至人之德吾恐其驚而遂至於惑也弟子曰不然孫子之所言是耶先生之所言非耶非固不能惑是孫子所言非耶先生所言是耶彼固惑而來矣又奚罪焉扁子曰不然昔者有鳥止於魯郊魯君説之為具}
  - {type: variant, offset: 5, length: 1, content: 沖, WYG: 牢以饗之奏九韶以樂之鳥乃始憂悲眩視不敢飲食此之謂以己飬飬鳥也若夫以鳥養飬鳥者宜棲之深林浮之江湖食之以委蛇則平陸而已矣各有所便也委蛇泥鰌今休欵啓寡聞之民也吾告以至人之德譬之若載鼷以車馬樂鴳以鐘皷也彼又惡能無驚乎哉此章言善養生者各任性分之適而至矣欵空也啓開也如空之開所見小也鴳音晏山木第二十莊子行於山中見大木枝葉盛茂伐木者止其旁而不取也問其故曰無所可用荘子曰此木以不材得終其天年夫子出於山舍於故人之家故人喜命豎子殺鴈而烹之豎子請曰其一能鳴其一不能鳴請奚殺主人曰殺不能鳴者明日弟子問於莊子曰昨日山中之木以不材得終其天年今主人之鴈以不材死先生将何處莊子笑曰周將處夫材與不材之間材與不材之間似之而非也故未免乎累設將處此耳以此未免於累竟不處若夫乘道德而浮逰則不然無譽無訾一龍一蛇與時俱化而無肯專為一上一下以和為量浮逰乎萬物之祖物物而不物於物則胡可得而累耶此神農黄帝之法則也故莊子亦處焉若夫萬物之情人倫之𫝊則不然合則離成則毁廉則挫尊則議有為則虧賢則謀不肖則欺胡可得而必乎哉悲夫弟子志之其唯道德之鄉乎不可必故待之不可以一方也唯與時俱化者為能涉變而常通耳𫝊直専反事願可傳行也市南宜僚見魯侯魯侯有憂色市南子曰君有憂色何也魯侯曰吾學先王之道脩先君之業吾敬鬼尊賢親而行之無須㬰離居然不免於患吾是以憂市南子曰君之除患之術淺矣育其身矜其國故雖憂懐萬端尊賢尚行而患慮愈深者矣市南宜僚熊宜僚也居市南因為號也夫豐狐文豹棲於山林伏於巖穴靜也夜行晝居戒也雖飢渴隱約猶且胥疏於江湖之上而求食焉定也然且不免於罔羅機辟之患是何罪之有哉其皮為之灾也今魯國獨非君之皮耶吾願君刳形去皮洒心去欲而逰於無人之野欲令無其身忘其國而任其自化也豐大也胥相疏草謂相望疏草也補相視疏逺無人之處南越有邑焉名為建德之國寄之南越取其去魯之逺也其民愚而朴少私而寡欲知作而不知藏與而不求其報不知義之所適不知禮之所将猖狂妄行乃蹈乎大方各恣其本步而人人自蹈其方則萬方得矣不亦大乎其生可樂其死可𦵏言可終始處之吾願君去國捐俗與道相輔而行所謂去國捐俗謂蕩除其胷中也君曰彼其道逺而險又有江山我無舟車奈何真謂欲使之南越市南子曰君無形倨形倨躓礙之謂無留居留居滯守之謂無留居無留安居以為君車形與物夷心與物化斯寄物以自載也君曰彼其道幽逺而無人吾誰與為鄰吾無糧我無食安得而至焉市南子曰少君之費寡君之欲雖無糧而乃足所謂知足則無所不足也君其涉於江而浮於海望之而不見其崖愈徃而不知其所窮絶情欲之逺也送君者皆自崖而反君欲絶則民各反守其分君自此逺矣超然獨立於萬物之上也故有人者累有人者有之以為己私也見有於人者憂見有於人者為人所役用也故堯非有人非見有於人也雖有天下皆寄之百官委之萬物而不與焉斯非有人也因民任物而不役已斯非見有于人也吾願去君之累除君之憂而獨與道遊於大}
