  - {type: variant, offset: 49, length: 3, content: 句食狶, WYG: 必矣正亭卒也獲其名也監市又魁也豨大豕也履踐也夫市魁履豕履其股脚豨難肥處故知豕肥耳問道亦况下賤則知道也汝唯莫必無乎逃物若必謂無之逃物則道不周矣道而不周則未足以為道至道若是大言亦然明道不逃物周徧咸三者異名同實其指一也嘗相與遊乎無何有之宫同合而論無所終窮乎若逰有則不能周徧咸也故同合而論之然后知道無不在知道之無不在然后能曠然無懐而逰彼無窮也嘗相與無為乎澹而靜乎漠而清乎調而間乎此皆無為故也間音閑寥己吾志寥然空虚無徃焉而不知其所至志茍寥然則無所徃矣無徃焉故徃而不知其所至有徃焉則理未動而志已驚矣去而來不知其所止斯順之也吾已徃來焉而不知其所終但徃來不由於知耳不為不徃來也徃來者自然之常理也其有終乎彷徨乎馮閎大知入焉而不知其所窮馮閎者虚廓之謂也大知逰乎廖廓恣變化之所}
