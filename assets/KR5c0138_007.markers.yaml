  - {type: variant, offset: 20, length: 0, content: '', krp: 彼皆居然自得此行耳非由名而後處之純純常常乃比於狂無心而動故也削迹捐勢不為功名功自彼成故勢不在我而名迹皆去是故無責於人人亦無責焉恣情任彼故彼各自當其責也至人不聞子何喜哉寂澹無懐乃至人也孔子曰善哉辭其交逰去其弟子逃於大澤衣裘褐食杼栗取於棄人間之好也入獸不亂羣入鳥不亂行若草木之無心故為禽獸所不畏鳥獸不惡而况人乎蓋寄言以極推至誠之信任乎物而無受害之地也孔子問子桑虖曰吾再逐於魯伐樹於宋削迹於衛窮於商周圍於陳蔡之間吾犯此數患親交益疏徒友益散何與子桑虖曰子獨不聞假人之亡與林囘棄千金之璧負赤子而趨或曰為其布與赤子之布寡矣布謂匹帛也虖音户布謂貨財也為其累與赤子之累多矣棄千金之璧負赤子而趨何也林囘曰彼以利合此以天屬也夫以利合者迫窮禍患害相棄也以天屬者迫窮禍患害相收也夫相收之與相棄亦逺矣且君子之交淡若水小人之交甘若醴君子淡以親道合故親小人甘以絶飾利故甘利不可常有時而絶彼無故以合者則無故以離夫無故而自合者天屬也合不由故則故不足以離之也然則有故而合必有故而離矣孔子曰敬聞命矣徐行翔佯而歸絶學捐書弟子無挹於前其愛益加進去飾任素故也異日桑虖又曰舜之將死真泠禹曰汝戒之哉形莫若縁情莫若率因形率情不矯之以利也泠音零冷曉也謂以真道曉語禹也冷或為命又作令命猶教也縁則不離率則不勞形不假故常全情不矯故常逸不離不勞則不求文以待形任朴而直前也不求文以待形固不待物朴素而足莊子衣大布而補之正緳係屨而過魏王魏王曰何先生之憊耶莊子曰貧也非憊也士有道德不能行憊也衣敝屨穿貧也非憊也此所謂非遭時也王獨不見夫騰猿乎其得柟梓豫章也攬蔓其枝而王長其間雖羿逢蒙不能眄睨也遭時得地則升其長枝故雖古之善射莫之能害大布粗布也緳賢節反帶也係屨屨穿故係眄一作睥睨音詣邪視也憊薄計反柟音南木名攬舊歴敢反蔓音萬郭武半反王徃况反兩枝相去長逺及其得柘棘枳枸之間也危行側視振動悼慓此筋骨非有加急而不柔也處勢不便未足以逞其能也今處昏上亂相之間而欲無憊奚可得耶此比干之見剖心徵也夫勢不便而强為之則又戮矣柘章夜反枸音矩孔子窮於陳蔡之間七日不火食左據槁木右撃槁枝而歌焱氏之風有其具而無其數有其聲而無宫角木聲與人聲犁然有當於人之心顔囘端拱還目而窺之仲尼恐其廣己而造大也愛己而造哀也曰囘無受天損易唯安之故易焱必遙反造適也易以豉反無受人益難物之倘來不可禁禦無始而非卒也於今為始者於昨為卒則所謂始者即是卒矣言變化之無窮人與天一也皆自然夫今之歌者其誰乎任其自爾則歌者非我也囘曰敢問無受天損易仲尼曰飢渇寒暑窮桎不行天地之行也運物之泄也不可逃也言與之偕逝之謂也所謂不識不知而順帝之則也言我也為人臣者不敢去之執臣之道猶若是而况乎所以待天乎所在皆安不以損為損斯待天而不受其損也何謂無受人益難仲尼曰始用四達感應旁通為四達爵祿並至而不窮旁通故可以御高大也物之所利乃非己也非己求而取之吾命有在外者也人之生必外有接物之命非如瓦石止於形質而已君子不為盗賢人不為吾若取之何哉盗竊者私取之謂也今賢人君子之致爵禄非私取之受之而已故曰鳥莫知於鷾鴯目之所不宜處不給視雖落其實棄之而走避禍之知音智鷾音意鴯音而或云鷾鴯燕也目之所不宜處昌吕反言不可止處目已羅絡知之故棄之也其畏人也而襲諸人間未有自疏外於人而人存之者也畏人而入於人間此鳥之所以稱知也矣社稷存焉爾况之至人則𤣥同天下故天下樂推而不厭相與社而稷之斯無受人益之所以為難也何謂無始而非卒仲尼曰化其萬物而不知其禪之者莫覺其變禪市戰反授予也焉知其所終焉知其所始正而待之而已耳日夜相代未始有極故正而待之無所為懐也焉於䖍反下同何謂人與天一耶仲尼曰有人天也有天亦天也凡所謂天皆明不為而自然人之不能有天性也言自然則自然矣人安能故有此自然哉自然耳故曰性聖人晏然體逝而終矣晏然無矜而體與變俱也荘周逰乎雕陵之樊覩一異鵲自南方來者翼廣七尺目大運寸感周之顙而集於栗林莊周曰此何鳥哉翼殷不逝目大不覩蹇裳躩步執弹而留之覩一蝉方得美䕃而忘其身螳螂執翳而摶之見得而忘其形執木葉以自翳於蝉而忘其形之見乎異鵲也運寸可囘一寸也感觸也翼殷不逝目大不覩殷大也留力救反宿留伺其便也異鵲從而利之見利而忘其真目能視翼能逝此鳥之真性也今見利故忘之真身也荘周然曰噫物固相累相為利者恒相為累二𩔖相召也夫有欲於物者物亦有欲之捐弹而反走虞人逐而誶之誶問之也以周為盗栗也荘周反入}
  - {type: variant, offset: 21, length: 0, content: '', WYG: 月不庭藺且從而問之夫子何為頃間甚不庭乎荘周曰吾守形而忘身夫身在人間世有夷險若推夷易之形於此世而不度此世之所宜斯守形而忘身者也三月不庭不出坐庭中三月藺力信反且子餘反藺且莊子弟子觀於濁水而迷於清淵見彼而不明即因彼以自見幾忘反鍳之道也且吾聞諸夫子曰入其俗從其俗不違其禁令也今吾逰於雕陵而忘吾身異鵲感吾顙遊於栗林而忘真栗林虞人以吾為戮吾所以不庭也以見問為戮夫荘子推平於天下故每寄言以出竒乃毁仲尼賤老上掊撃乎三皇下痛病其一身也陽子之宋宿於逆旅逆旅人有妾二人其一人美其一人惡惡者貴而美者賤陽子問其故逆旅小子對曰其美者自美吾不知其美也其惡者自惡吾不知其惡也陽子曰弟子記之行賢而去自賢之行安徃而不愛哉言自賢之道無時而可陽子陽朱也田子方第二十一田子方侍坐於魏文侯數稱谿工文侯曰谿工子之師耶子方曰非也無擇之里人也稱道數當故無擇稱之文侯曰然則子無師耶子方曰有曰子之師誰耶子方曰東郭順子文侯曰然則夫子何故未嘗稱之子方曰其為人也真無假也田子方魏文侯師也名無擇谿工賢人也人貌而天雖貌與人同而獨任自然虚縁而葆真虚而順物故真不失清而容物夫清者患於太㓗今清而容物與天同也物無道正容以悟之使人之意也消曠然清虚正己而已而物邪自消無擇何足以稱之子方出文侯儻然終日不言召前立臣而語之曰逺矣全德之君子始吾以聖知之言仁義之行為至矣吾聞子方之師吾形解而不欲動口鉗而不欲言自覺其近吾所學者真土梗耳非真物也土梗土人也遭雨則壊夫魏真為我累耳知至貴者以人爵為累也温伯雪子適齊舍於魯魯人有請見之者温伯雪子曰不可吾聞中國之君子明乎禮義而陋於知人心吾不欲見也至於齊反舍於魯是人也又請見温伯雪子曰徃也蘄見我今也又蘄見我是必有以振我也出而見客入而歎明日見客又入而歎其僕曰每見之客也必入而歎何耶曰吾固告子矣中國之民明乎禮義而陋于知人心昔之見我者進退一成規一成矩從容一若龍一若虎槃辟其步逶蛇其迹其諌我也似子其道我也似父禮義之弊有斯飾也道音導是以歎也仲尼見之而不言己知其心矣子路曰吾子欲見温伯雪子乆矣見之而不言何耶仲尼曰若夫人者目擊而道存矣亦不可以容聲矣目裁徃意已達無所容其德音也擊動也顔淵問於仲尼曰夫子步亦步夫子趨亦趨夫子馳亦馳夫子奔逸絶塵而囘瞠若乎後矣夫子曰囘何謂耶曰夫子步亦步也夫子言亦言也夫子趨亦趨也夫子辯亦辯也夫子馳亦馳也夫子言道囘亦言道也及奔逸絶塵而囘瞠若乎後者夫子不言而信不比而周無器而民蹈乎前而不知所以然而已矣仲尼曰惡可不察與夫哀莫大於心死而人死亦次之夫心以死為死乃更速其死其死之速由哀以自喪也無哀則已有哀則心死者乃哀之大也日出東方而入於西極萬物莫不比方皆可見也有目有趾者待是而後成功目成見功足成行功也是出則存是入則亡直以不見為亡耳竞不亡萬物亦然有待也而死有待也而生待隱謂之死待顯謂之生竟無死生也吾一受其成形而不化以待盡夫有不得變而為無故一受成形則化盡無期也效物而動自無心也日夜無隙恒化新也而不知其所終不以死為死也薫然其成形薫然自成又奚為哉知命不能規乎其前丘以是日徂不係於前與變俱徃故曰徂徂病也吾終身與女交一臂而失之可不哀與夫變化不可執而留也故雖執臂相守而不能令停若哀死者則此亦可哀也今人未嘗以此為哀奚獨哀死耶女殆著乎吾所以著也彼已盡矣而女求之以為有是求馬於唐肆也唐肆非停馬處也言求向者之有不可復得也人之生若馬之過肆耳恒無駐須臾新故之相續不舍晝夜也著見也言女殆見吾所以見者耳吾所以見者日新也故已盡矣安得有之著音張慮反又一音張畧反吾所以著者外化也女殆庻於此耳吾一不化者則非女所及也是求馬於唐肆也唐肆非停馬處也又云唐停也吾服女也甚㤀服者思存之謂也甚忘謂過去之速也言女去忽然思之恒欲不及女服吾也亦甚忘俱爾耳不問賢之與聖未有得停者雖然女奚患}
