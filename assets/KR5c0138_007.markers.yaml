  - {type: variant, offset: 43, length: 0, content: '', WYG: 百化也秋毫為小待之成體秋豪雖小非無亦無以容其質天下莫不沈浮終身不故日新也隂陽四時運行各得其序不待為之惽然若亡而存昭然若存則亡矣惽音昬油然不形而神挈然有形則不神油音由謂無所給措也萬物畜而不知此之謂本根畜之而不得其本性之根故不知其所以畜也畜同勅六反可以觀於天矣與天同觀齧缺問道乎衣被衣曰若正汝形一汝視天和将至攝汝知一汝度神將來舍德将為汝美道将為汝居汝瞳焉如新生之犢而無求其故言未卒齧缺睡寐被衣大説行歌而去之曰形若槁骸心若死灰真其實知不以故自持與變俱也媒媒晦晦無心而不可與謀彼何人哉獨化者也舜問乎丞曰道可得而有乎曰汝身非汝有也汝何得有夫道夫身者非汝所能有也塊然而自有耳身非汝所有而况道哉舜師也一云古有四輔前疑后丞葢官名舜曰}
