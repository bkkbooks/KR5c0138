  - {type: variant, offset: 10, length: 1, content: 改, WYG: 門之外三月而成上下之縣王子慶忌見而問焉曰子何術之設奢曰一之間無敢設也澹然抱一耳非敢假設以益事也壇祭地縣音𤣥怪簡故問之}
