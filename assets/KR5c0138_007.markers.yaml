  - {type: variant, offset: 88, length: 1, content: 證, WYG: 察也是用之者假不用者也以長得其用而况乎無不用者乎物孰不資焉都無懐則物來皆應冉求問於仲尼曰未有天地可知耶仲尼曰可古猶今也言天地常存乃無未有之時冉求失問而退明日復見曰昔者吾問未有天地可知乎夫子曰可古猶今也昔日吾昭然今日吾昧然敢問何謂也仲尼曰昔之昭然也神者先受之虚心以待命斯神受也今之昧然也且}
