  - {type: variant, offset: 44, length: 0, content: '', WYG: 身非吾有也孰有之哉曰是天地之委形也生非汝有是天地之委和也性命非汝有是天地之委順也若身是汝有者則美惡死生當制之由汝今氣聚而生汝不能禁也氣散而死汝不能止也明其委結而自成耳非汝有也委積也孫子非汝有是天地之委蛻也氣自委結而蟬蛻也蛻敕外反故行不知所徃處不知所持食不知所味皆在自爾中來故不知也天地之彊陽氣也又胡可得而有耶彊陽猶運動耳明斯道也庶可以遺身而忘生也孔子問於老曰今日晏間敢問至道老曰汝齋戒疏瀹而心澡雪而精神掊擊而知夫道窅然難言哉将為汝言其崖略夫昭昭生於㝠㝠有倫生於無形精神生於道皆所以明其獨生而無所資借形本生於精皆由精以至粗而萬物以形相生故九竅者胎生八竅者卵生言萬物雖以形相生亦皆自然耳故胎卵不能易種而生明神氣之不可為也其來無迹其徃無崖無門無房四達之皇皇也夫率自然之性逰無迹之塗者放形骸於天地之間寄精神於八方之表是以無門無房四達皇皇逍遙六合與時偕行也邀於此者四肢彊思慮恂達耳目聦明其用心不勞其應物無方人生而遇此道則天性全而精神定天不得不髙地不得不廣日月不得不行萬物不得不昌此其道與言此皆不得不然而自然耳非道能使然也且夫博之不必知辯之不必慧聖人以斷之矣㫁棄知慧而付之自然也若夫益之而不加益損之而不加損者聖人之所保也使各保其正分而已故無用知慧為也淵淵乎其若海容恣無量魏魏乎其終則復始也與化俱者乃積無窮之紀可謂魏魏運量萬物而不匱用物而不役已故不匱也則君子之道彼其外與名取於身而足萬物皆徃資焉而不匱此其道與還用物故我不匱此明道之贍物在於不贍不贍而物自得故曰此其道與言至道之無功無功乃足稱道也中國有人焉非陰非陽無所偏名處於天地之間直且為人敖然自放所遇而安了無功名將反於}
