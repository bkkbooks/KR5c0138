  - {type: variant, offset: 5, length: 1, content: 沖, krp: 牢以饗之奏九韶以樂之鳥乃始憂悲眩視不敢飲食此之謂以己飬飬鳥也若夫以鳥養飬鳥者宜棲之深林浮之江湖食之以委蛇則平陸而已矣各有所便也委蛇泥鰌今休欵啓寡聞之民也吾告以至人之德譬之若載鼷以車馬樂鴳以鐘皷也彼又惡能無驚乎哉此章言善養生者各任性分之適而至矣欵空也啓開也如空之開所見小也鴳音晏山木第二十莊子行於山中見大木枝葉盛茂伐木者止其旁而不取也問其故曰無所可用荘子曰此木以不材得終其天年夫子出於山舍於故人之家故人喜命豎子殺鴈而烹之豎子請曰其一能鳴其一不能鳴請奚殺主人曰殺不能鳴者明日弟子問於莊子曰昨日山中之木以不材得終其天年今主人之鴈以不材死先生将何處莊子笑曰周將處夫材與不材之間材與不材之間似之而非也故未免乎累設將處此耳以此未免於累竟不處若夫乘道德而浮逰則不然無譽無訾一龍一蛇與時俱化而無肯專為一上一下以和為量浮逰乎萬物之祖物物而不物於物則胡可得而累耶此神農黄帝之法則也故莊子亦處焉若夫萬物之情人倫之𫝊則不然合則離成則毁廉則挫尊則議有為則虧賢則謀不肖則欺胡可得而必乎哉悲夫弟子志之其唯道德之鄉乎不可必故待之不可以一方也唯與時俱化者為能涉變而常通耳𫝊直専反事願可傳行也市南宜僚見魯侯魯侯有憂色市南子曰君有憂色何也魯侯曰吾學先王之道脩先君之業吾敬鬼尊賢親而行之無須㬰離居然不免於患吾是以憂市南子曰君之除患之術淺矣育其身矜其國故雖憂懐萬端尊賢尚行而患慮愈深者矣市南宜僚熊宜僚也居市南因為號也夫豐狐文豹棲於山林伏於巖穴靜也夜行晝居戒也雖飢渴隱約猶且胥疏於江湖之上而求食焉定也然且不免於罔羅機辟之患是何罪之有哉其皮為之灾也今魯國獨非君之皮耶吾願君刳形去皮洒心去欲而逰於無人之野欲令無其身忘其國而任其自化也豐大也胥相疏草謂相望疏草也補相視疏逺無人之處南越有邑焉名為建德之國寄之南越取其去魯之逺也其民愚而朴少私而寡欲知作而不知藏與而不求其報不知義之所適不知禮之所将猖狂妄行乃蹈乎大方各恣其本步而人人自蹈其方則萬方得矣不亦大乎其生可樂其死可𦵏言可終始處之吾願君去國捐俗與道相輔而行所謂去國捐俗謂蕩除其胷中也君曰彼其道逺而險又有江山我無舟車奈何真謂欲使之南越市南子曰君無形倨形倨躓礙之謂無留居留居滯守之謂無留居無留安居以為君車形與物夷心與物化斯寄物以自載也君曰彼其道幽逺而無人吾誰與為鄰吾無糧我無食安得而至焉市南子曰少君之費寡君之欲雖無糧而乃足所謂知足則無所不足也君其涉於江而浮於海望之而不見其崖愈徃而不知其所窮絶情欲之逺也送君者皆自崖而反君欲絶則民各反守其分君自此逺矣超然獨立於萬物之上也故有人者累有人者有之以為己私也見有於人者憂見有於人者為人所役用也故堯非有人非見有於人也雖有天下皆寄之百官委之萬物而不與焉斯非有人也因民任物而不役已斯非見有于人也吾願去君之累除君之憂而獨與道遊於大}
  - {type: variant, offset: 7, length: 2, content: 勝句, WYG: 之國欲令蕩然無有國之懐莫無也方舟而濟於河有虚舩來觸舟雖有惼心之人不怒有一人在其上則呼張歙之一呼而不聞再呼而不聞於是三呼邪則必以惡聲隨之向也不怒而今也怒向也虚而今也實人能虚己以逰世其孰能害之世雖變其於虚己以免害一也方並也北宫奢為衛公賦斂以為鐘為壇乎}
