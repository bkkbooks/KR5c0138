  - {type: variant, offset: 85, length: 1, content: 殆, WYG: 外矣以無内待問窮若是者外不觀乎宇宙内不知乎大初是以不過乎崐崘不遊乎大虚若夫婪落天地逰虚涉逺以入乎㝠㝠者不應而已矣大音泰光曜問乎無有曰夫子有乎其無有乎光曜不得問而熟視其状貌窅然空然終日視之而不見聽之而不聞搏之而不得也光曜曰至矣其孰能至此乎予能有無矣而未能無無也及為無有矣何從至此哉此皆絶學之意也於道絶之則夫學者乃在根本中來矣故學之善者其唯不學乎窅烏了反搏音博大馬之捶鉤者年八十矣而不失豪芒玷捶鉤之輕重而無毫芒之差也捶之睡反大馬司馬也江東三魏之間人皆謂鍜為捶大馬曰子巧與有道與曰臣有守也臣之年二十而好捶鉤於物無視也}
