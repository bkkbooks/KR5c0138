  - {type: variant, offset: 29, length: 9, content: 字尾五十一字鄉吾示, WYG: 解四斗曰螤長官者不成德則同務也潔然自成則與衆務異也斔斛不敢入於四境則諸侯無二心也天下相信故能同律度量衡也文王於是焉以為太師北面而問曰政可以及天下乎臧丈人昧然而不應泛然而辭朝令而夜遁終身無聞為功者非已故功成而身不得不退事遂而名不得不去名去身退乃可以及天下也大音泰顔淵問於仲尼曰文王其猶未耶又何以夢為乎仲尼曰黙女無言夫文王盡之也任諸大夫而不自任斯盡之也而又何論刺焉彼直以循斯須也斯須者百姓之情當悟未悟之頃故文王循而發}
