  - {type: variant, offset: 40, length: 0, content: '', WYG: 合其大情也列御冦為伯昬無人射引之盈貫盈貫謂溢鏑也為于為反貫古亂反鏑也措杯水其肘上左手如柜右手如附枝右手放發而左手不知故可措之杯水也措七故反肘竹九反發之適矢復沓矢去也箭適去復軟沓也適丁歴反復扶又反方矢復寓箭方去未至的已復寄杯於肘上言其捷敏之妙也當是時猶象人也不動之至伯昬無人曰是射之射非不射之射也嘗與女登髙山履危石臨百仞之淵若能射乎於是無人遂登高山履危石臨百仞之淵背逡巡足二分垂在外揖御冦而進之御冦伏地汗流至踵伯昬無人曰夫至人者上闚青天下潜黄泉揮斥八極神氣不變揮斥猶縱放德充於内則神滿於外無逺近幽深所在皆明故審安危之幾澹然自得也今汝然有恂目之志爾於中也殆矣夫不能明至分故有懼有懼而所喪多矣豈唯射乎恂救律反恂又作眴音荀爾雅云恂慄也目之志恂謂眩也欲以眩悦人之目故恂也中丁仲反又如字中精神也䘮息浪反後章同肩吾問於孫叔敖曰子三為令尹而不榮華三去之而無憂色吾始也疑子今視子之鼻間栩栩然子之用心獨奈何孫叔敖曰吾何以過人哉吾以其来不可却也其去不可止也吾以為得失之非我也而無憂色而已矣我何以過人哉且不知其在彼乎其在我乎其在彼亡乎我在我耶亡乎彼曠然無係𤣥同彼我則在彼非獨亡在我非獨存也栩况甫反方将躊躇方将四顧何暇知乎人貴人賤哉躊躇四顧謂無可無不可躊直留反躇直於反仲尼聞之曰古之真人知者不得説美人不得濫盗人不得刦伏戲黄帝不得友伏戲黄帝者功號耳非所以功者也故况功號於所以功相去逺矣故其名不足以友於人也刦居業反元嘉本作却戯音羲死生亦大矣而無變乎已况爵祿乎若然者其神經乎大山而無介入乎淵泉而不濡處卑細而不憊充滿天地既以與人已愈有割肌膚以為天下者彼我俱失也使人人自得於己者與人而不損於己也其神明充滿天地故所在皆可所在皆可故不損己為物而放於自得之地也介音界憊皮拜反楚王與凡君坐少焉楚王左右曰凡亡者三言有三亡徴也凡國名在汲郡共縣案左傳凡周公之後也隐七年天王使凡伯來聘俗本此後有孔子窮於陳蔡及孔子謂顔囘二章與譲王篇同衆家並於譲王篇音之檢此二章無郭訌似如重出古本皆無謂無者是也凡君曰凡之亡也不足以喪吾存遺凡故也夫凡之亡不足以喪吾存則楚之存不足以存存夫遺之者不以亡為亡則存亦不足以為存矣曠然無矜乃常存也由是觀之則凡}
