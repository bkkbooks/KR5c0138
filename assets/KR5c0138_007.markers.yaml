  - {type: variant, offset: 42, length: 0, content: '', WYG: 亡而楚未始存也存亡更在於心之所措耳天下竟無存亡知北遊第二十二知北遊於𤣥水之上登隱弅之丘而適遭無為謂焉知謂無為謂曰予欲有問乎若何思何慮則知道何處何服則安道何從何道則得道三問而無為謂不答也非不答不知答也知不得問反於白水之南登狐闋之上而睹狂屈焉知以之言也問乎狂屈曰唉予知之將語若中欲言而忘其所欲言知不得問反於帝宫見黄帝而問焉黄帝曰無思無慮始知道無處無服始安道無從無道始得道知問黄帝曰我與若知之彼與彼不知也其孰是耶黄帝曰彼無為謂真是也狂屈似之我與汝終不近也夫知者不言言者不知故聖人行不言之教任其自行斯不言之教也弅音紛唉哀在反道不可致道在自然非可言致者也德不可至不失徳故稱德稱德而不至也仁可為也義可虧也禮相偽也故曰失道而後德失德而後仁失仁而後義失義而後禮禮者道之華而亂之首也禮有常則故矯效之所由生也故曰為道者日損損華偽也損之又損之以至於無為無為而無不為也華去而朴全則雖為而非為也今已為物也物失其所故有為物欲復歸根不亦難乎其易也其唯大人乎其歸根之易者唯大人耳大人體合變化故化物不難易以䜴反生也死之徒知變化之道者不以為易死也生之始孰知其紀更相為始則未知孰死孰生也人之生氣之聚也聚則為生散則為死俱是聚也俱是散也若死生為徒吾又何患患生於異故萬物一也是其所美者為神奇其所惡者為腐腐復化為神奇神奇復化為腐故曰通天下一氣耳各以所美為神奇所惡為臭腐耳然彼之所美我之所惡也我之所美彼或惡之故通共神竒通共臭腐耳死生彼我豈殊哉聖人故貴一知謂黄帝曰吾問無為謂無為謂不應我非不我應不知應我也吾問狂屈狂屈中欲告我而不我告非不我告中欲告而忘之也今予問乎若若知之奚故不近黄帝曰彼其真是也以其不知也此其似之也以其忘之也予與若終不近也以其知之也狂屈聞之以黄帝為知言明夫自然者非言知之所得故當昧乎無言之地是以先舉不言之標而后寄明於黄帝則夫自然之㝠物槩乎可得而見也天地有大美而不言四時有明法而不議萬物有成理而不説此孔子之所以云予欲無言大美謂覆載之美也聖人者原天地之美而達萬物之理是故至人無為任其自為而已大聖不作唯因任也觀於天地之謂也觀其形容象其物宜與天地不異今彼神明至精與彼百化百物自化而神明不奪物已死生方圎莫知其根也夫死者已自死生者已自生圓者已自圎方者已自方未有為其根者故莫知扁然而萬物自古以固存豈待為之而后存焉扁音偏又音幡六合為巨未離其内計六合在無極之中則陋矣離力智反其内謂不能}
