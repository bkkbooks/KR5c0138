  - {type: variant, offset: 45, length: 1, content: 句, WYG: 不逐末也自本觀之生者喑醷物也直聚氣也喑音蔭醷於界反喑醷聚氣貌雖有夀夭相去幾何須㬰之説也奚足以為堯桀之是非死生猶未足殊况夀夭之間哉幾居豈反果蓏有理物無不理但當順之蓏力果反人倫雖難所以相齒人倫有知慧之變}
