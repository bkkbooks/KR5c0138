  - {type: variant, offset: 22, length: 3, content: 句郭増, krp: 雖忘乎故吾吾有不忘者存不忘者存謂繼之以日新也雖忘故吾而新吾已至未始非吾吾何患焉故能離俗絶塵而與物無不𡨕也孔子見老老新沐方将髪而乾慹然似非人寂澹之至慹乃牒反不動貌説文云怖也孔子便而待之少焉見曰丘也眩與其信然與向者先生形體掘若槁木似遺物離人而立於獨也無其心身而後外物去也與音餘下同掘音屈槁苦老反老曰吾遊於物之初初未有而歘有故逰於物初然後明有物之不為而自有也孔子曰何謂邪曰心困焉而不能知口辟焉而不能言欲令仲尼必求之於言意之表也辟必亦反辟卷不開也嘗為女議乎其將試議隂陽以擬向之無形耳未之敢必為于偽反至隂肅肅至陽赫赫肅肅出乎天赫赫發乎地言其交也兩者交通成和而物生焉或為之紀而莫見其形莫見為紀之形明其自爾消息滿虚一晦一明日改月化日有所為未嘗守故而莫見其功自爾故無功生有所乎萌萌於未聚也死有所乎歸歸於散也始終相反乎無端而莫知乎其所窮所謂迎之不見}
