  - {type: variant, offset: 16, length: 1, content: 九, WYG: 大塗者乎泰然無執用天下之自為斯大通之塗也故曰經之營之不日成之孔子圍於陳蔡之間七日不火食太公任徃弔之曰子幾死乎曰然子惡死乎曰然自同於好惡耳聖人無好惡也任曰予嘗言不死之道東海有鳥焉名曰意怠其為鳥也翂翂翐翐而似無能引援而飛迫脅而棲既𢎞大舒緩又心無常係翂音分翐音秩進不敢為前退不敢為後常從容處中食不敢先嘗必取其緒其於隨物而已緒次緒也是故其行列不斥與羣俱也行戸剛反下亂行而外人卒不得害是以免於患患害生於役知以奔兢卒子恤反終也直木先伐甘井先竭才之害也子其意者飾知以驚愚脩身以明汙昭昭乎如揭日月而行故不免也夫察焉小異則與衆為忤矣混然大同則無獨異於世矣故夫昭昭者乃㝠㝠之迹也将寄言以遺迹故因陳蔡以託患昔吾聞之大成之人曰自伐者無功功成者墮名成者虧恃功}
