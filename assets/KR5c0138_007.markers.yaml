  - {type: variant, offset: 107, length: 0, content: '', WYG: 足而止豨韋氏之囿黄帝之圃有虞氏之宫湯武之室夫無心而自化乃羣聖所逰處君子之人若儒墨者師故以是非相也而况今之人乎和也夫儒之師天下之難和者而無心者猶故和之而况其凡乎子兮反和也聖人處物不傷物至順也不傷物者物亦不能傷也在我而已唯無所傷者為能與人相将迎無心故至順至順故能無所将迎而義冠於将迎也山林與壌與使我欣欣然而樂與山林皋壌未善於我而我便樂之}
