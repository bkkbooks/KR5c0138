  - {type: variant, offset: 45, length: 1, content: 句, krp: 不逐末也自本觀之生者喑醷物也直聚氣也喑音蔭醷於界反喑醷聚氣貌雖有夀夭相去幾何須㬰之説也奚足以為堯桀之是非死生猶未足殊况夀夭之間哉幾居豈反果蓏有理物無不理但當順之蓏力果反人倫雖難所以相齒人倫有知慧之變}
  - {type: variant, offset: 47, length: 0, content: '', WYG: 難也然其知慧自相齒耳但當從而任之聖人遭之而不違順所遇也過之而不守宜過而過調而應之德也偶而應之道也調偶和合之謂也帝之所興王之所起也如斯而已人生天地之間若白駒之過郤忽然而已乃不足惜白駒或云日也郤去逆反本亦作隙隙孔也注然勃然莫不出焉油然漻然莫不入焉出入者變化之謂耳言天下未有不變也漻音流已化而生又化而死俱是化也生物哀之死物不哀人𩔖悲之死𩔖不悲解其天弢墮其天袠解脫也弢勅刀反弓衣也墮許規反袠陳筆反紛乎宛乎變化煴宛於阮反魂魄将徃乃身從之乃大歸乎無為用心於其間也不形之形形之不形不形形乃成若形之則敗其形矣是人之所同知也雖知之然不能任其自形而反形之所以多敗非将至之所務也務則不至此衆人之所同論也雖論之然故不能不務所以不至也彼至則不論悗然不覺乃至論則不至明見無值闇至乃值辯不若黙道不可聞聞不若塞此之謂大得黙而塞之則無所奔逐故大得東郭子問於荘子曰所謂道惡乎在荘子曰無所不在東郭子曰期而後可欲令荘子指名所在莊子曰在螻蟻曰何其下耶曰在稊稗曰何其愈下耶曰在瓦甓曰何其愈甚耶曰在屎溺東郭子不應莊子曰夫子之問也固不及質舉其標質言無所不任而方復怪此斯不及質也稗蒲賣反稊稗二草名正獲之問於監市履豨也每下愈况豨大豕也夫監市之履豕以知其肥瘦者愈履其難肥之處愈知豕肥之要今問道之所在而每况之於下賤則明道之不}
