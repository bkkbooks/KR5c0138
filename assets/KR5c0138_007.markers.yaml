  - {type: variant, offset: 67, length: 0, content: '', WYG: 皆以至言為狂而不信也故非老龍連叔之徒莫足與言也訑音但弇堈弔聞之曰夫體道者天下之君子所繫焉言體道者人之宗主弇音奄堈音剛今於道秋毫之端萬分未得處一焉秋毫之端細矣又未得其萬分之一而猶知藏其狂言而死又况夫體道者乎明夫至道非言之所得也唯在乎自得耳視之無形聽之無聲於人之論者謂之㝠㝠所以論道而非道也㝠㝠而猶復非道明道之無名於是泰清問乎無窮曰子知道乎無窮曰吾不知又問乎無為無為曰吾知道曰子之知道亦有數乎曰有曰其數若何無為曰吾知道之可以貴可以賤可以約可以散此吾所以知道之數也泰清以之言也問乎無始曰若是}
