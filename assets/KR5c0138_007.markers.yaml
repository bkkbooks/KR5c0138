  - {type: variant, offset: 12, length: 0, content: '', WYG: 奢聞之既雕既琢復歸於朴還用其本性也侗乎其無識任其純朴而已儻乎其怠疑無所趣也萃乎芒乎其送徃而迎來無所欣説來者勿禁徃者勿止任彼也從其彊梁順乎衆也彊梁多力也隨其曲傅無所係也謂曲附己者隨之也因其自窮用其不得不爾故朝夕賦斂而毫}
