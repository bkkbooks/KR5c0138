  - {type: variant, offset: 27, length: 1, content: 十, WYG: 隨之不見其後非是也且孰為之宗孔子曰請問逰是老曰夫得是至美至樂也得至美而逰乎至樂謂之至人至美無美至樂無樂故也且如字舊于餘反樂音洛下同孔子曰願聞其方曰草食之獸不疾易藪水生之蟲不疾易淵行小變而不失其大常也死生亦小變也喜怒哀樂不入於胷次知其小變而不失大常故也次中也夫天下也者萬物之所一也得其所一而同焉則四肢百體将為塵垢而死生終始将為晝夜而莫之能滑而况得喪禍福之所介乎愈不足患棄𨽻者若棄泥塗知身貴於𨽻也知身之貴于𨽻故棄之若遺土耳茍知死生之變所在皆我則貴者常在也貴在於我而不失於變所貴者我也而我與變俱故無失也且萬化而未始有極也夫孰足以患心已為道者解乎此所謂縣解孔子曰夫子德配天地而猶假至言以修心古之君子孰能脱焉老曰不然夫水之於汋也無為而才自然矣至人之於德也不修而物不能離焉若天之自高地之自厚日月之自明夫何修焉不修不為而自得也汋音灼取也孔子出以告顔囘曰丘之於道也其猶醯雞與醯雞者甕中之蠛蠓醯許西反若酒上蠛蠓也微夫子之發吾覆也吾不知天地之大全也比吾全於老猶甕中之與天地矣莊子見魯哀公哀公曰魯多儒士少為先生方者荘子曰魯少儒哀公曰舉魯國而儒服何謂少乎荘子曰周聞之儒者冠圜冠者知天時履方履者知地形緩佩玦者事至而斷君子有其道者未必為其服也為其服者未必知其道也公固以為不然何不號於國中曰無此道而為此服者其罪死於是哀公號之五日而魯國無敢儒服者獨有一丈夫儒服而立乎公門公即召而問以國事千轉萬變而不窮荘子曰以魯國而儒者一人耳可謂多乎德充於内者不修飾於外百里奚爵祿不入於心故飯牛而牛肥使秦穆公忘其賤與之政也有虞氏死生不入於心故足以動人内自得者外事全也飯煩晚反忘其賤謂忘其飯牛之賤也宋元君将畫圗衆史皆至受揖而立䑛筆和墨在外者半有一史後至者儃儃然不趨受揖不立因之舍公使人視之則解衣般礴臝君曰可矣是真畫者也内足者神閒而意定受揖而立受命揖而立也儃吐但反般字又作槃礴旁各反般礴謂箕坐也臝本又作羸同力果反将畫故解衣見形文王觀於臧見一丈人釣而其釣莫釣聊以卒歲臧地名也非持其釣有釣者也竟無所求常釣也不以得失經意其於假釣而已文王欲舉而授之政而恐大臣父兄之弗安也欲終而釋之而不忍百姓之無天也於是旦而屬之夫夫曰昔者寡人夣見良人黒色而乘駁馬而偏朱蹄號曰寓而政於臧丈人庶幾乎民有瘳乎諸大夫蹵然曰先君王也文王曰然則卜之諸大夫曰先君之命王其無它又何卜焉遂迎臧丈人而授之政典法無更偏令無出三年文王觀於國則列士壊植散羣長官者不成德螤斛不敢入於四境列士壊植散羣則尚同也所謂和其光同其塵夫夫大夫也一云夫夫古讀為大夫無它無違命壊音懐下同植行列也散羣言不養徒衆也一云植者疆界頭造屋以待諌者也長丁丈反下同不成德不利功名也螤音庾補屬之大夫古本作夫夫夫一大也泰山石始皇文曰御史夫夫盖篆字夫與大同見文選}
