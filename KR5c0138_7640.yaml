  text: 貪財而取慰貪權而取竭靜居則溺體澤則馮可謂疾矣為欲富就利故滿若堵耳而不知避且馮而不舍可謂辱矣財積而無用服膺而不舍滿心戚醮求益而不止可謂憂矣内則疑刦請之賊外則畏㓂盗之害内周樓疏外不敢獨行可謂畏矣
