body:
  text: 任公子為大鉤巨緇五十犗以為餌蹲乎㑹稽投竿東海旦旦而釣期年不得魚已而大魚食之牽巨鉤陷沒而下騖揚而奮鬐白波若山海水震蕩聲侔鬼神憚赫千里任公子得若魚離而腊之自制河以東蒼梧以北莫不厭若魚者已而後世輇才諷説之徒皆
