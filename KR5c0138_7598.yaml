body:
  text: 今子脩文武之道掌天下之辯以教後世縫衣淺帶矯言偽行以迷惑天下之主而欲求富貴焉盗莫大於子天下何故不謂子為盗丘而乃謂我為盗跖子以甘辭説子路而使從之使子路去其危冠解其長劒而受教於子天下皆曰孔丘能止暴禁非
