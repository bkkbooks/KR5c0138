body:
  text: 自用謂之貪見過不更聞諫愈甚謂之狠人同於己則可不同於已雖善不善謂之矜此四患也能去八疵無行四患而始可教已孔子愀然而歎再拜而起曰丘再逐於魯削迹於衛伐樹於宋圍於陳蔡丘不知所失而離此四謗者何也客悽然變容曰甚矣子之難悟也人有畏影惡迹而去之走者舉足愈數而迹愈多走愈疾而影不離身自以為尚遲疾走不休絶力而死不知處隂以休影處靜以息迹愚亦甚矣子審仁義之間察同
