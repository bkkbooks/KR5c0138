body:
  text: 子堯曰辭封人曰夀富多男子人之所欲也女獨不欲何邪堯曰多男子則多懼富則多事夀則多辱是三者非所以養德也故辭封人曰始也我以女為聖人邪今然君子也天生萬民必授之職多男子而授之職則何懼之有
