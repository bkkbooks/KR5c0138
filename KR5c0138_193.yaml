body:
  text: 惠子謂莊子曰魏王貽我大瓠之種我樹之成而實五石以盛水漿其堅不能自舉也剖之以為瓢則瓠落無所容非不呺然大也吾為其無用而掊之莊子曰夫子固拙於用大矣宋人有善為不龜手之藥者世世以洴澼絖為事
