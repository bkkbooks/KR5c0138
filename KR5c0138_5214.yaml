body:
  text: 孔子問子桑虖曰吾再逐於魯伐樹於宋削迹於衛窮於商周圍於陳蔡之間吾犯此數患親交益疏徒友益散何與子桑虖曰子獨不聞假人之亡與林囘棄千金之璧負赤子而趨或曰為其布與赤子之布寡矣
