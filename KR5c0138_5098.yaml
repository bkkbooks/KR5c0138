body:
  text: 狐文豹棲於山林伏於巖穴靜也夜行晝居戒也雖飢渴隱約猶且胥疏於江湖之上而求食焉定也然且不免於罔羅機辟之患是何罪之有哉其皮為之灾也今魯國獨非君之皮耶吾願君刳形去皮洒心去欲而逰於無人之野
