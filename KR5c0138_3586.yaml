body:
  text: 亂目使目不明二曰五聲亂耳使耳不聦三曰五薫鼻困惾中顙四曰五味濁口使口厲爽五曰趣舍滑心使性飛揚此五者皆生之害也而楊墨乃始離跂自以為得非吾所謂得也夫得者困可以為得乎則鳩鴞之在於籠也亦可以為得矣且夫趣舍聲色以柴其内皮弁鷸冠搢笏紳脩以約其外内支盈於柴柵外重纆繳睆睆然在纆繳之中而自以為得則是罪人交臂歴指而虎豹在於嚢檻亦可以為得矣
