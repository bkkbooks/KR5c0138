body:
  text: 美也四者離位而亂莫大焉官治其職人憂其事乃無所陵故田荒室露衣食不足徴賦不屬妻妾不和長少無序庻人之憂也能不勝任官事不治行不清白羣下荒怠功美不有爵禄不持大夫之憂也廷無忠臣國家昬亂國技不巧貢職不美春秋後倫不順天子諸侯之憂也
