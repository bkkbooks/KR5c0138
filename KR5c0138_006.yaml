body:
  text: 神巫季咸一章皆棄而走句向郭相同列子見之而心醉句向注曰迷惑其道也而又奚卵焉句向注六十二字郭注皆無之故使人得而相汝句郭注多七字示之以地文句向注塊然如土也郭注無之是殆見吾杜德機句鄉吾示之以天壤句名實不入句向郭並同是殆見吾善者機也句向注多九字子之先生坐不齋句向注二十二字郭注無之鄉
