body:
  text: 公曰何謂也田開之曰魯有單豹者岩居而水飲不與民共利行年七十而猶有嬰兒之色不幸遇餓虎餓虎殺而食之有張毅者髙門縣薄無不走也行年四十而有内熱之病以死豹養其内而虎食其外毅飬其外而病攻其内此二子者皆不鞭其後者也
