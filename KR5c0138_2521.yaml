body:
  text: 夫長者不為有餘短者不為不足此則駢贅皆出於形性非假物也然駢與不駢其於各足而此獨駢枝則於衆以為多故曰侈耳而惑者或云非性因欲割而棄之是道有所不存徳有所不載而人有棄財物有棄用也豈是至治之意哉夫物有小大能有少多所大即駢所多即贅駢贅之分物皆有之若莫之任是都棄萬物之性也拇音母足大指也駢拇謂足拇指連第二指也枝指手有六指也音岐謂指有岐也贅
  hash: sha256:7d06d77a76fce07387f38df105334c110691f276d504f93958574ddfa13bdcd9
