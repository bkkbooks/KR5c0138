body:
  text: 今子不去將忘子之故失子之業公孫龍口呿而不合舌舉而不下乃逸而走莊子釣於濮水楚王使大夫二人徃先焉曰願以竟内累矣莊子持竿不顧曰吾聞楚有神龜死已三千歲矣王巾笥而藏之廟堂之上此龜者寧其死為留骨而貴乎寧其生而曵尾於塗中乎二大夫曰寧生而曵尾塗中莊子曰徃矣吾將曵尾於塗中
  hash: sha256:bba8411dd33fd32058074919e1be0acf0268ed3335c4bcd5439c20e725d589c0
