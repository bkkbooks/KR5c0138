body:
  text: 於魯魯人有請見之者温伯雪子曰不可吾聞中國之君子明乎禮義而陋於知人心吾不欲見也至於齊反舍於魯是人也又請見温伯雪子曰徃也蘄見我今也又蘄見我是必有以振我也出而見客入而歎明日見客又入而歎其僕曰每見之客也必入而歎何耶曰吾固告子矣中國之民明乎禮義而陋于知人心昔之見我者進退一成規一成矩從容一若龍一若虎
