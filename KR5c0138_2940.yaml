body:
  text: 黄帝立為天子十九年令行天下聞廣成子在於空同之上故徃見之曰我聞吾子達於至道敢問至道之精吾欲取天地之精以佐五榖以養民人吾又欲官陰陽以遂羣生為之奈何廣成子曰而所欲問者物之質
