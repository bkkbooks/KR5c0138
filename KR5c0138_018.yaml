body:
  text: 莊子注原序夫莊子者可謂知本矣故未始藏其狂言言雖無會而獨應者也夫應而非㑹則雖當無用言非物事則雖髙不行與夫寂然不動不得已而後起者固有間矣斯可謂知無心者也夫心無為則隨感而應應隨其時言唯謹爾故與化為體流萬代而㝠物豈曽設對獨遘而㳺談乎方外哉此其所以不經而為百家之冠也然莊生雖未體之言則至矣通天地之統序萬物之性達死生
  hash: sha256:6c2d6ffec40443cb2c37f44fc0409100a892a95e297a521101e23f9056fe2b38
