body:
  text: 莊子注原序夫莊子者可謂知本矣故未始藏其狂言言雖無會而獨應者也夫應而非會則雖當無用言非物事則雖髙不行與夫寂然不動不得已而後起者固有間矣斯可謂知無心者也夫心無為則隨感而應應隨其時言唯謹爾故與化為體流萬代而冥物豈曽設對獨遘而遊談乎方外哉此其所以不經而為百家之冠也然莊生雖未體之言則至矣通天地之統序萬物之性達死生
  hash: sha256:1f42833ee8907d4781cc6ff0935cdbeea924bbe0d0a0db402d4d664757c1051f
