body:
  text: 南伯子葵曰道可得學邪曰惡惡可子非其人也夫卜梁倚有聖人之才而無聖人之道我有聖人之道而無聖人之才吾欲以教之庶幾其果為聖人乎不然以聖人之道吿聖人之才亦易矣吾猶守而告之參日而後能外天下
