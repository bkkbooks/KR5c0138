body:
  text: 三患莫至身常無殃則何辱之有封人去之堯隨之曰請問封人曰退已堯治天下伯成子髙立為諸侯堯授舜舜授禹伯成子髙辭為諸侯而耕禹徃見之則耕在野禹趨就下風立而問焉曰昔堯治天下吾子立為諸侯堯授舜舜授予而吾子辭為諸侯而耕敢問其故
