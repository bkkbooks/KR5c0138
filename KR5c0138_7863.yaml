body:
  text: 故君子逺使之而觀其忠近使之而觀其敬煩使之而觀其能卒然問焉而觀其知急與之期而觀其信委之以財而觀其仁告之以危而觀其莭醉之以酒而觀其則雜之以處而觀其色九徴至不肖人得矣
