body:
  text: 天陰生糞上見日則死一名日及故不知月之終始也糞上芝朝生暮死晦者不及朔朔者不及晦一名舜英朝生暮落木槿也晦㝠也朔旦也蛄音姑蟪蛄寒蟬也一名蝭蟧春生夏死夏生秋死蛁勞也或曰山蟬秋鳴
