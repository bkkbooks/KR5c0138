body:
  text: 於是焉河伯欣然自喜以天下之美為盡在已順流而東行至於北海東面而視不見水端於是焉河伯始旋其面目望洋向若而歎曰野語有之曰聞道百以為莫已若者我之謂也且夫我嘗聞少仲尼之聞而輕伯夷之義者始吾弗信今我睹子之難窮也吾非至於子之門則殆矣吾長見笑於大方之家
