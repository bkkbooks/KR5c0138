body:
  text: 孔子謂栁下季曰夫為人父者必能詔其子為人兄者必能教其弟若父不能詔其子兄不能教其弟則無貴父子兄弟之親矣今先生世之才士也弟為盗跖為天下害而弗能教也丘為先生羞之丘請為先生往説之栁下季
