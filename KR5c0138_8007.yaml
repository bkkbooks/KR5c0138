body:
  text: 黄帝有咸池堯有大章舜有大韶禹有大夏湯有大濩文王有辟雍之樂武王周公作武古之䘮禮貴賤有儀上下有等天子棺槨七重諸侯五重大夫三重士再重今墨子獨生不歌死不服桐棺三寸而無槨以為法式以此教人恐不愛人以此自行固不愛已
