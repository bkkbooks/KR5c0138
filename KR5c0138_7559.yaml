body:
  text: 要利是推亂以易暴也吾聞古之士遭治世不避其任遇亂世不為茍存今天下闇周德衰其並乎周以塗吾身也不如避之以潔吾行二子北至於首陽之山遂餓而死焉若伯夷叔齊者其於富貴也茍可得已則必不賴髙節戾行獨樂其志不事於世此二士之節也
