body:
  text: 子貢乗大馬中紺而表素軒車不容巷徃見原憲原憲華冠縰履杖藜而應門子貢曰嘻先生何病原憲應之曰憲聞之無財謂之貧學而不能行謂之病今憲貧也非病也子貢逡巡而有愧色原憲笑曰夫希世而行比周而友學以為人教以為己仁義之慝輿馬之飾憲不忍為也
