body:
  text: 自而治天下雲氣不待族而雨草木不待黄而落日月之光益以荒矣而佞人之心翦翦者又奚足以語至道黄帝退捐天下築特室席白茅閒居三月復徃邀之廣成子南首而卧黄帝順下風膝行而進再拜稽首而問曰聞吾子達於至道敢問治身奈何而可以長久廣成子蹷然而起曰善哉問乎
