body:
  text: 者不及春春鳴者不及秋廣雅云蟪蛄蛁勞也即楚詞所云寒螿者也𡨕靈木名也江南生以葉生為春葉落為秋此木以二千歲為一年椿木一名蕣蕣木槿也此木三萬二千歲為一年彭祖名鏗堯臣封於彭城歷虞
