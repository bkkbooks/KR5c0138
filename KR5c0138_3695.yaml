body:
  text: 此乘天地馳萬物而用人羣之道也本在於上末在於下要在於主詳在於臣三軍五兵之運德之末也賞罰利害五刑之辟教之末也禮法度數刑名比詳治之末也鐘皷之音羽旄之容樂之末也哭泣衰絰隆殺之服哀之末也此五末者須精神之運心術之動然後從之者也
