body:
  text: 而觀乎遂以孔子聲見老老方将倨堂而應微曰予年運而徃矣子将何以戒我乎子貢曰夫三王五帝之治天下不同其係聲名一也而先生獨以為非聖人如何哉老曰小子少進子何以謂不同對曰堯授舜舜授禹禹用力而湯用兵文王順紂而不敢逆武王逆紂而不肯順故曰不同老曰小子少進余語女三王五帝之治天下黄帝之治天下使民心一民有其親死不哭而民不非也
