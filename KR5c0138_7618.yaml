body:
  text: 子張問於滿茍得曰盍不為行無行則不信不信則不任不任則不利故觀之名計之利而義真是也若棄名利反之於心則夫士之為行不可一日不為乎滿苟得曰無耻者富多信者顯夫名利之大者幾在無耻而信故觀之名計之利而信真是
