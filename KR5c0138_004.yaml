body:
  text: 元風惟秋水至樂二篇未竟而秀卒秀子幼其義零落然頗有别本遷流象為人行薄以秀義不傳於世遂竊以為己注乃自注秋水至樂二篇又易馬蹄一篇其餘衆篇或㸃定文句而已其後秀義别本出故今有向郭二莊其義一也晉書象本傳亦采是文絶無異語錢曽讀書敏求記謂世代遼逺傳聞異詞晉書所云恐未必信案向秀之注陳振孫稱
