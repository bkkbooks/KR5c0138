body:
  text: 三日不舉火十年不製衣正冠而纓絶捉衿而肘見納屨而踵決曳縰而歌商頌聲滿天地若出金石天子不得臣諸侯不得友故養志者忘形養形者忘利致道者忘心矣孔子謂顔回曰回來家貧居卑胡不仕乎顔回對曰不願仕回有郭外之田五十畆足以給飦粥郭内之田十畆足以為絲麻鼓琴足以自娛
