body:
  text: 異之際觀動靜之變適受與之度理好惡之情和喜怒之節而幾於不免矣謹修而身慎守其真還以物與人則無所累矣今不修之身而求之人不亦外乎孔子愀然曰請問何謂真客曰真者精誠之至也不精不誠不能動人故强哭者雖悲不哀强怒者雖嚴不威强親者雖笑不和真悲無聲而哀真怒未發而威真親未笑而和真在内者神動於外是所以貴真也其用於人理也事親則慈孝事君則忠貞飲酒則歡樂處䘮則悲哀忠
  hash: sha256:9dfaeaf03a58c83d21a49d87c3f4c0d768428eba2e0970eb33cdcbb3955de280
