body:
  text: 於是逡巡而却告之海曰夫千里之逺不足以舉其大千仞之高不足以極其深禹之時十年九潦而水弗為加益湯之時八年七旱而崖不為加損夫不為頃乆推移不以多少進退者此亦東海之大樂也於是塪井之鼃聞之適適然驚規規然自失也
