body:
  text: 人之生也形雖七尺而五常必具故雖區區之身乃舉天地以奉之故天地萬物凡所有者不可一日而相無也一物不具則生者無由得生一理不至則天年無縁得終然身之所有者知或不知也理之所存者為或不為也故知之所知者寡而身之所有者衆為之所為者少而理之所存者博在上者莫能器之而求其備焉人之所知不必同而所為不敢異異則偽成矣偽成而真不喪者未之有也或好知不倦以困其百體所好不過一枝而舉根俱弊斯以其所知而害所不知也若夫知之盛也知人之所為者有分故任而不彊也知人之所知者有極故用而不蕩也故所知不以無崖自困則一體之中知與不知闇相與㑹而俱全矣斯以其所知養所不知也
