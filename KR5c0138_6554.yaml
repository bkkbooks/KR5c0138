body:
  text: 子綦有八子陳諸前召九方歅曰為我相吾子孰為祥九方歅曰梱也為祥子綦瞿然喜曰奚若曰梱也将與國君同食以終其身子綦索然出涕曰吾子何為以至於是極也九方歅曰夫與國君同食澤及三族而况於父母乎今夫子聞之而泣是禦福也子則
