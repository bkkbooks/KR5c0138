body:
  text: 宋代已不傳但時見陸氏文今以釋文所載校之如逍遙逰有蓬之心句釋文郭向並引絶不相同胠篋篇聖人不死大盜不止句釋文引向注二十八字又為之斗斛以量之句釋文引向注十六字郭本皆無然其餘皆互相出入又張湛列子注中凡文與莊子相同者亦兼引向郭二注所載達生篇佝僂丈人承蜩一條向注與郭一字不異應帝王篇
