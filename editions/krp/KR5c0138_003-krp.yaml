body:
  text: 莊子注巻三晉郭象注大宗師第六雖天地之大萬物之當其所宗而師者無心也知天之所為知人之所為者至矣知天人之所為者皆自然也則内放其身而外㝠於物與衆𤣥同任之而無不至也知天之所為者天而生也天者自然之謂也夫為為者不能為而為自為耳為知者不能知而知自知耳自知耳不知也不知也則知出於不知矣自為耳不為也不為也則為出於不為矣為出於不為故以不為為主知岀於不知故以不知為宗是故真人遺知而知不為而為自然而生坐忘而得故知稱絶而為名去也知人之所為者以其知之所知以養其知之所不知終其天年而不中道夭者是知之盛也人之生也形雖七尺而五常必具故雖區區之身乃舉天地以奉之故天地萬物凡所有者不可一日而相無也一物不具則生者無由得生一理不至則天年無縁得終然身之所有者知或不知也理之所存者為或不為也故知之所知者寡而身之所有者衆為之所為者少而理之所存者博在上者莫能器之而求其備焉人之所知不必同而所為不敢異異則偽成矣偽成而真不喪者未之有也或好知不倦以困其百體所好不過一枝而舉根俱弊斯以其所知而害所不知也若夫知之盛也知人之所為者有分故任而不彊也知人之所知者有極故用而不蕩也故所知不以無崖自困則一體之中知與不知闇相與㑹而俱全矣斯以其所知養所不知也雖然有患雖知盛未若遺知任天之無患也夫知有所待而後當夫知者未能無可無不可故必有待也若乃任天而生者則遇物而當也其所待者特未定也有待則無定也庸詎知吾所謂天之非人乎所謂人之非天乎我生有崖天也必欲盛之人也然此人之所謂耳物無非天也天也者自然也人皆自然則治亂成敗遇與不遇非人為也皆自然耳且有真人而後有真知有真人而後天下之知皆得其真而不可亂也何謂真人古之真人不逆寡凡寡皆不逆則所順者衆不雄成不恃其成而處物先不謩士縱心直前而羣士自合非謀謩以致之謩沒乎反若然者過而弗悔當而不自得也直自全當而無過耳非以得失經心若然者登髙不慄入水不濡入火不熱是知之能登假於道也若此言夫知之登至於道者若此之逺也理固自全非畏死也故真人陸行而非避濡也逺火而非逃熱也無過而非措當也故雖不以熱為熱而未嘗赴火不以濡為濡未嘗蹈水不以死為死未嘗喪生故夫生者豈生之而生哉成者豈成之而成哉故任之而無不至者真人也豈有槩意於所遇哉古之真人其寢不夢無意想也其覺無憂當所遇而安也其食不甘理當食耳其息深深真人之息以踵乃在根本中來衆人之息以喉屈服者其嗌言若哇氣不平暢嗌音益其耆欲深者其天機淺深根寧極然後反一無欲古之真人不知說生不知惡死與化為體說音恱惡烏路反其出不訢其入不距泰然而任之訢音欣欣出則營生距入則惡死翛然而往翛然而來而已矣寄之至理故往來而不難翛音蕭不忘其所始不求其所終終始變化皆忘之矣豈宜逆忘其生而猶復探求死意也受而喜之不問所受者何物遇之而無不適也忘而復之復之不由於識乃至是之謂不以心捐道不以人助天是之謂真人人生而靜天之性也感物而動性之欲也物之感人無窮人之逐欲無節則天理滅矣真人知用心則背道助天則傷生故不為也若然者其心志所居而安為志其容寂雖行而無傷於静其顙䪻䪻太朴之貌凄然似秋殺物非為威也煖然似春生物非為仁也喜怒通四時夫體道合變者與寒暑同其温嚴而未嘗有心也然有温嚴之貌生殺之節故寄名於喜怒與物有宜而莫知其極無心於物故不奪物宜無物不宜故莫知其極故聖人之用兵也亡國而不失人心利澤施乎萬世不為愛人因人心之所欲亡而亡之故不失人心也夫白日登天六合俱照非愛人而照之也故聖人之在天下煖焉若陽春之自和故澤者不謝凄乎若秋霜之自降故彫落者不怨故樂通物非聖人也夫聖人無樂也直莫之塞而物自通有親非仁也至仁無親任理而自存天時非賢也時之者未若忘時而自合之賢也利害不通非君子也不能一是非之塗而就利違害則傷徳而累當矣行名失己非士也善為士者遺名而自得故名當其實而福應其身亡身不真非役人也自失其性而矯以從物受役多矣安能役人若狐不偕務光伯夷叔齊箕子胥餘紀他申徒狄是役人之役適人之適而不自適其適者也斯皆舍己殉人殉彼傷我也狐不偕古賢人也務光黄帝時人耳長七寸箕子胥餘胥餘箕子名也見尸子箕子胥餘漆身為厲被髮狂或云尸子云比干也胥餘其名他徒何反申徒狄殷時人負石自沉於河古之真人其狀義而不朋與物同宜而非朋黨若不足而不承浄虛無餘如若不足也下之而無不止若不足而不承也承迎也又音拯與乎其觚而不堅也常逰於獨而非固守張乎其虛而不華也矌然無懷乃至於實邴邴乎其似喜乎至人無喜暢然和適故似喜也崔乎其不得已乎動靜行止常居必然之極滀乎進我色也不以物傷己也與乎止我徳也無所趨也厲乎其似世乎至人無厲與世同行故若厲也厲本作廣云苞羅者廣也謷乎其未可制也豪放而自得謷志逺貌連乎其似好閉也綿邈深逺莫見其門悗乎忘其言也不識不知而天機自發故悗然也以刑為體刑者治之體非我為以禮為翼禮者世之所以自行耳非我制以知為時知者時之動非我唱以徳為循徳者自彼所循非我作以刑為體者綽乎其殺也任治之自殺故雖殺而寛以禮為翼者所以行於世也順世之所行故無不行以知為時者不得已於事也夫髙下相受不可逆之流也小大相羣不得已之勢也曠然無情羣知之府也承百流之㑹居師人之極者奚為哉任時世之知委必然之事付之天下而已以徳為循者言其與有足者至於丘也丘者所以本也以性言之則性之本也夫物各有足足於本也付羣徳之自循斯與有足者至於本也本至而理盡矣而人真以為勤行者也凡此皆自彼而成成之不在已則雖處萬機之極而常閒暇自適忽然不覺事之經身悗然不識言之在口而人之大迷真可為勤行者也故其好之也一其弗好之也一常無心而順彼故好與不好所善所惡與彼無二也其一也一其不一也一其一也天徒也其不一也人徒也夫真人同天人拘彼我不以其一異乎不一其一與天為徒無有而不一者天也其不一與人為徒彼彼而我我者人也天與人不相勝也是之謂真人夫真人同天人齊萬致萬致不相非天人不相勝故曠然無不一㝠然無不在而𤣥同彼我也死生命也其有夜旦之常天也其有晝夜之常天之道也故知死生者命之極非妄然也若夜旦耳奚所係哉人之有所不得與皆物之情也夫真人在晝得晝在夜得夜以死生為晝夜豈有所不得乎人之有所不得而憂娯在懷皆物情耳非理也彼特以天為父而身猶愛之而況其卓乎卓者獨化之謂也夫相因之功莫若獨化之至也故人之所因者天也天之所生者獨化也人皆以天為父故晝夜之變寒暑之節猶不敢惡隨天安之況乎卓爾獨化至於𤣥𡨕之竟又安得而不任之哉既任之則死生變化唯命之從也人特以有君為愈乎已而身猶死之而況其真乎夫真者不假於物而自然也夫自然之不可避豈直君命而己哉泉涸魚相與處於陸相呴以濕相濡以沫不如相忘於江湖與其不足而相愛豈若有餘而相忘而其譽堯而非桀也不如兩忘而化其道夫非譽皆生於不足故至足者忘善惡遺死生與變化為一曠然無不適矣又安知堯桀之所在邪夫大塊載我以形勞我以生佚我以老息我以死夫形生老死皆我也故形為我載生為我勞老為我佚死為我息四者雖變未始非我我奚惜哉塊苦怪反又苦對反徐胡罪反佚音逸故善吾生者乃所以善吾死也死與生皆命也無善則己有善則生不獨善也故若以吾生為善乎則吾死亦善也夫藏舟於壑藏山於澤謂之固矣方言生死變化之不可逃故先舉固逃之極然然後明之以必變之符將任化而無係也然而夜半有力者負之而走昧者不知也夫無力之力莫大於變化者也故乃掲天地以趍新負山岳以舍故故不暫停忽已涉新則天地萬物無時而不移也世皆新矣而日以為故舟日易矣而視之若舊山日更矣而視之若前今交一臂而失之皆在㝠中去矣故向者之我非復今我也我與今俱往豈常守故哉而世莫之覺遂謂今之所遇可係而在豈不昧哉藏小大有宜猶有所遯不知與化為體而思藏之使不化則雖至深至固各得其所宜而無以禁其日變也故夫藏而有之者不能止其遯也無藏而任化者變不能變也若夫藏天下於天下而不得所遯是恒物之大情也無所藏而都任之則與物無不㝠與化無不一故無外無内無死無生體天地而合變化索所遯而不得矣此乃常存之大情非一曲之小意特犯人之形而猶喜之若人之形者萬化而未始有極也人形乃是萬化之一遇耳未可喜也無極之中所遇者皆若人耳豈特人形可喜而餘物無樂邪樂音洛下同其為樂可勝計邪本非人而化為人化為人失於故矣失故而喜喜所遇也變化無窮何所不遇所遇而樂樂豈有極乎故聖人將逰於物之所不得遯而皆存夫聖人逰於變化之途放於日新之流萬物萬化亦與之萬化化者無極亦與之無極誰得遯之哉夫於生為亡而於死為存於死為存則何時而非存哉善天善老善始善終人猶效之此自均於百年之内不善少而否老未能體變化齊死生也然其平粹猶足以師人也又况萬物之所係而一化之所待乎此𤣥同萬物而與化為體故其為天下之所宗也不亦宜乎夫道有情有信無為無形有無情之情故無為也有常無之信故無形也可傳而不可受古今傳而宅之莫能受而有之可得而不可見咸得自容而莫見其狀自本自根未有天地自古以固存明無不待有而無也神鬼神帝生天生地無也豈能生神哉不神鬼帝而鬼帝自神斯乃不神之神也不生天地而天地自生斯乃不生之生也故夫神之果不足以神而不神則神矣功何足有事何足恃哉在太極之先而不為髙在六極之下而不為深先天地生而不為久長於上古而不老言道之無所不在也故在髙為無髙在深為無深在久為無久在老為無老無所不在而所在皆無也且上下無不格者不得以髙卑稱也内外無不至者不得以表裏名也與化俱移者不得言久也終始常無者不可謂老也豨韋氏得之以挈天地伏戲得之以襲氣母維斗得之終古不忒日月得之終古不息堪坏得之以襲崐崘馮夷得之以逰大川肩吾得之以處太山黄帝得之以登雲天顓頊得之以處𤣥宫禺強得之立乎北極西王母得之坐乎少廣莫知其始莫知其終彭祖得之上及有虞下及五霸傅說得之相武丁奄有天下乗東維騎箕尾而比於列星道無能也此言得之於道乃所以明其自得耳自得耳道不能使之得也我之未得又不能為得也然則凡得之者外不資於道内不由於己掘然自得而獨化也夫生之難也猶獨化而自得之矣既得其生又何患於生之不得而為之哉故為生果不足以全生以其生之不由於己為也而為之則傷其真生也狶韋氏上古帝王名挈要也得天地要也襲入也氣母元氣之母也維斗北斗所以為天之綱維終古終古久也鄭𤣥注周禮云終古猶言常也堪坏神名人面獸形淮南作欽負崐崘山名馮夷清冷𫝊曰華陰僮鄉隄伯人也服八石得水仙是為河伯一云以八月庚子浴於河而溺死一云渡河溺死大川河也肩吾山神不死黄帝得道而上天也顓音專頊許玉反顓頊帝髙陽氏𤣥宮北方宫也月令曰其帝𩔖頊人面鳥身珥兩青蛇踐兩赤蛇名禺強崔云大荒經曰北海之神名曰禺強靈龜為之使歸藏曰昔穆王子筮卦於禺強案海外經云北方禺強黒身手足乘兩龍郭璞以為水神人面鳥身簡文云北海神也一名禺京是黄帝之孫也西王母山海經云狀如人狗尾逢頭戴勝善哨居洵水之涯漢武内傳云西王母與上元夫人降帝美容貌神仙人也少廣山名或西方空界之名彭祖解見逍遥篇夀七百歲或以為仙不死武丁至列星𫝊說殷相也武丁殷王髙宗也東維箕斗之間天漢津之東維也星經曰一星在尾上言其乘東維騎箕尾之間也𫝊說死其精神乘東維託龍角乃列宿今尾上有𫝊說星南伯子葵問乎女偊曰子之年長矣而色若孺子何也曰吾聞道矣聞道則任其自生故氣色全也葵當作綦聲之誤也偊音禹一云是婦人也南伯子葵曰道可得學邪曰惡惡可子非其人也夫卜梁倚有聖人之才而無聖人之道我有聖人之道而無聖人之才吾欲以教之庶幾其果為聖人乎不然以聖人之道吿聖人之才亦易矣吾猶守而告之參日而後能外天下外猶遺也已外天下矣吾又守之七日而後外物物者朝夕所須切已難忘已外物矣吾又守之九日而後能外生都遺也已外生矣而後能朝徹遺生則不惡死不惡死故所遇即安豁然無滯見幾而作斯朝徹也朝徹而後能見獨當所遇而安之忘先後之所接斯見獨者也見獨而後能無古今與獨俱往無古今而後能入於不死不生夫係生故有死惡死故有生是以無係無惡然後能無死無生殺生者不死生生者不生其為物無不將也任其自將故無不將無不迎也任其自迎故無不迎無不毁也任其自毁故無不毁無不成也任其自成故無不成其名為攖寧夫與物㝠者物縈亦縈而未始不寧也攖寧也者攖而後成者也物縈而獨不縈則敗矣故縈而任之則莫不曲成矣南伯子葵曰子獨惡乎聞之曰聞諸副墨之子副墨之子聞諸洛誦之孫洛誦之孫聞之瞻明瞻明聞之聶許聶許聞之需役需役聞之於謳於謳聞之𤣥㝠𤣥㝠者所以名無而非無副墨可以副二𤣥墨也此以下姓名或寓之耳無其人洛誦誦通也苞洛無所不通也瞻明神明洞徹也聶許許與也攝而保之無所施與也需役懦弱為役也需待也役亭毒也於音烏謳煦也欲化之貌𤣥㝠強名曰𤣥視之㝠然所名無而非無也𤣥㝠聞之參寥夫階名以至無者必得無於名表故雖𤣥㝠猶未極而又推寄於參寥亦𤣥之又𤣥也參髙也寥曠不可名也參寥聞之疑始夫自然之理有積習而成者盖増近以至逺硏粗以至精故乃七重而後無之名九重而後疑無是始也疑始又疑無是始則始非無名也子杞子輿子犂子來四人相與語曰孰能以無為首以生為脊以死為尻孰知死生存亡之一體者吾與之友矣四人相視而笑莫逆於心遂相與為友俄而子輿有病子把往問之曰偉哉夫造物者將以予為此拘拘也曲僂發背上有五管頤𨼆於齊肩髙於頂句贅指天陰陽之氣有沴沴陵亂也子把崔云淮南作子水行年五十四而病傴僂尻苦羔反自說病狀也拘拘體拘攣不伸也句俱樹反指天也句贅項推也其形似贅言其上向也其心閒而無事不以為患閒音閑跰而鑑于井曰嗟乎夫造物者又將以予為此拘拘也夫任自然之變者無差也與物嗟耳跰步田反下悉田反病不能行故跰也子把曰女惡之乎曰亡予何惡浸假而化予之左臂以為雞予因以求時夜浸假而化予之右臂以為彈予因以求鴞炙浸假而予之尻以為輪以神為馬予因而乗之豈更駕哉浸漸也夫體化合變則無往而不因無因而不可也且夫得者時也當所遇之時世謂之得失者順也時不暫停順往而去世謂之失安時而處順哀樂不能入也此古之所謂懸解也而不能自解者物有結之一不能自解則衆物共結之矣故能解則無所不解則無所而解也樂音洛縣音𤣥解音蟹下同縣解無所係也且夫物不勝天久矣吾又何惡焉天不能無晝夜我安能無死生而惡之哉俄而子來有病喘喘然將死其妻子環而泣之犂往問之曰叱避無怛化夫死生猶寤寐耳於理當寐耳於理當寐不願人驚之將化而叱無為怛之也喘喘川轉反其户與之語曰偉哉造化又將奚以汝為將奚以汝適以汝為鼠肝乎以汝為蟲臂乎子來曰父母於子東西南北唯命之從陰陽於人不翅於父母自古或有能違父母之命者未有能違陰陽之變而距晝夜之節者也鼠肝委棄土壤而已取㣲滅至賤彼近吾死而我不聽我則悍矣彼何罪焉死生猶晝夜耳未足為逺也時當死亦非所禁而横有不聽之則適足悍逆於理以其死矣速由於我悍非死之罪也彼謂死耳在生故以死為彼夫大塊載我以形勞我以生佚我以老息我以死故善吾生者乃所以善吾死也理常俱也今大冶鑄金金踴躍曰我且必為鏌鋣大冶必以為不祥之金今一犯人之形而曰人耳人耳夫造化者必以為不祥之人人耳人耳唯願為人也亦猶金之踴躍也皆知金之不祥而不能任其自化夫變化之道靡所不遇今一遇人形豈故為哉生非故為時自生耳然而有之不亦妄乎鏌音莫鋣以嗟反鏌鋣劍名今一以天地為大鑪以造化為大冶惡乎往而不可哉今皆知金之有係為不祥故明已之無異於金則所係之情可解可解則天地可也成然寐蘧然覺寐寤自若不以死生累心子桑户孟子反子琴張三人相與友曰孰能相與於無相與相為於無相為夫體天地㝠而化者雖手足異任五藏殊管未嘗相與而百節同和斯相與於無相與也未嘗相為而表裏俱濟斯相為於無相為也若乃役其心志以恤手足運其股肱以營五藏則相營愈篤而外内愈困矣故以天下為一體者無愛為於其間也孰能登天逰霧撓挑無極無所不任撓而小反挑徒堯反撓挑猶宛轉也宛轉𤣥曠之中循環之名相忘以生無所終窮忘其生則無不忘矣故能隨變任化無所窮竟三人相視而笑莫逆於心遂相與友若然者豈友哉盖寄明至親而無愛念之近情也莫然有間而子桑户死未葬孔子聞之使子貢往待事焉或編曲或鼓琴相和而歌曰嗟來桑户乎嗟來桑户乎而已反其真而我猶為人猗人哭亦哭俗内之迹也齊死生忘哀樂臨尸能歌方外之至也莫然定也有間有頃也曲蚕箔猗於直反辭也子貢趨而進曰敢問臨尸而歌禮乎二人相視而笑曰是惡知禮意夫知禮意者必逰外以經内守母以存子稱情而直往也若乃矜乎名聲牽乎形制則孝不以誠慈不任實父子兄弟懷情相欺豈禮之大意哉子貢反以告孔子曰彼何人者邪修行無有而外其形骸臨尸而歌顔色不變無以命之彼何人者邪孔子曰彼逰方之外者也而丘逰方之内者也夫理有至極外内相𡨕未有極逰外之致而不𡨕於内者也未有能㝠於内而不遊於外者也故聖人常逰外以私内無心以順有故雖終日揮形而神氣無變俯仰萬機而淡然自若夫見形而不及神者天下之常累也是故觀其與羣物並行則莫能謂之遺物而離人矣觀其體化而應務則莫能謂之坐忘而自得矣豈直謂聖人不然哉乃必謂至理之無此是故莊子將明流統之所宗以釋天下之可悟若直就稱仲尼之如此或者将據所見以排之故超聖人之内迹而寄方外於數子宜忘其所寄以尋述作之大意則夫逰外私内之道坦然自明而莊子之書故是涉俗盖世之談矣無以命之命名也外内不相及而丘使女往弔之丘則陋矣夫弔者方内之近事也施之於方外則陋矣彼方且與造物者為人而逰乎天地之一氣皆𡨕之故無二彼以生為附贅縣疣若疣之自縣贅之自附此氣之時聚非所樂也縣音𤣥疣音尤以死為決潰癰若之自決癰之自潰此氣之自散非所惜也胡虬反潰胡對反夫若然者又惡知死生先後之所在死生代謝未始有極與之俱往則無往不可故不知勝負之所在也假於異物託於同體假因也今死生聚散變化無方皆異物也無異而不假故所假雖異而共成一體也忘其肝膽遺其耳目任之於理而𡨕往也反覆終始不知端倪五藏猶忘何物足識哉未始有識故能放身於變化之塗𤣥同於反覆之波而不知終始之所極也芒然彷徨乎塵垢之外逍遥乎無為之業所謂無為之業非拱黙而已所謂塵垢之外非伏於山林也彼又惡能憒憒然為世俗之禮以觀衆人之耳目哉其所以觀示於衆人者皆其塵垢耳非方外之㝠物也子貢曰然則夫子何方之依子貢不聞性與天道故見其所依而不見其所以依也夫所以依者不依也世豈覺之哉曰丘天之戮民也以方内為桎梏明所貴在方外也夫逰外者依内離人者合俗故有天下者無以天下為也是以遺物而後能入羣坐忘而後能應務愈遺之愈得之茍居斯極則雖欲釋之而理固自來斯乃天人之所不赦者也雖然吾與汝共之雖為世所桎梏但為與汝共之耳明已但自在外也子貢曰敢問其方問所以逰外而共内之意孔子曰魚相造乎水人相造乎道相造乎水者穿池而養給相造乎道者無事而生定所造雖異其於由無事以得事自方外以共内然後養給而生定則莫不皆然也俱不自知耳故成無為也故曰魚相忘乎江湖人相忘乎道術各自足而相忘者天下莫不然也至人常足故常忘也子貢曰敢問畸人問向之所謂方外而不耦於俗者又安在也曰畸人者畸於人而侔於天夫與内㝠者逰於外也獨能逰小以𡨕内任萬物之自然使天性各足而帝王道成斯乃畸於人而侔於天也故曰天之小人人之君子人之君子天之小人也以自然言之則人無小大以人理言之則侔於天者可謂君子矣顔回問仲尼曰孟孫才其母死哭泣無涕中心不慼居喪不哀無是三者以善喪盖魯國固有無其實而得其名者乎回一怪之魯國觀其禮而顔回察其心孟孫才三桓後才其名也仲尼曰夫孟孫氏盡之矣進於知矣盡死生之理應内外之宜者動而以天行非知之匹也唯簡之而不得簡擇死生而不得其異若春秋冬夏四時行耳夫已有所簡矣孟孫氏不知所以生不知所以死已簡而不得故無不安無不安故不以生死槩意而付之自化也不知就先不知就後所遇而安若化為物不違化也以待其所不知之化已乎死生宛轉與化為一猶乃忘其所知於當今豈待所未知而豫憂者哉且方將化惡知不化哉方將不化惡知己化哉已化而生焉知未生之時哉未化而死焉知己死之後哉故無所避就而與化俱往也吾特與汝其夢未始覺者邪夫死生猶覺夢耳今夢自以為覺則無以明覺之非夢也茍無以明覺之非夢則亦無以明生之非死矣死生覺夢未知所在當其所遇無不自得何為在此而憂彼哉且彼有駭形而無損心以變化為形之駭動耳故不以死生損累其心有旦宅而無情死以形骸之變為旦宅之日新耳其情不以為死旦宅旦暮改易宅是神居也孟孫氏特覺人哭亦哭是自其所以乃夫常覺者無往而有逆也故人哭亦哭正自是其所宜也且也相與吾之耳矣夫死生變化吾皆吾之既皆是吾吾何失哉未始失吾吾何憂哉無逆故人哭亦哭無憂故哭而不哀庸詎知吾所謂吾之乎靡所不吾也故𤣥同外内彌貫古今與化日新豈知吾之所在也且汝夢為鳥而厲乎天夢為魚而投於淵言無往而不自得也不識今之言者其覺者乎其夢者乎夢之時自以為覺則焉知今者之非夢邪亦焉知其非覺邪覺夢之化無往而不可則死生之變無時而足惜也造適不及笑獻笑不及排所造皆適則忘適矣故不及笑也排者推移之謂也夫禮哭必哀獻笑必樂哀樂存懷則不能與適推移矣今孟孫常適故哭而不哀與化俱往也安排而去化乃入於寥天一安於推移而與化俱去故乃入於寂寥而與天為一也自此以上至於子杞其致一也所執之喪異故歌哭不同一本造敵不及笑獻芥不及安排而造化不及眇眇不及雄漂淰雄漂淰不及簟筮簟筮乃入於漻天意而子見許由許由曰堯何以資汝資者給濟之謂意而子賢士也意而子曰堯謂我汝必躬服仁義而明言是非許由曰而奚來為軹夫堯既已黥汝以仁義而劓汝以是非矣汝將何以逰夫遥蕩恣睢轉徙之塗乎言其將以形教自虧殘而不能復逰夫自得之場無係之塗也軹者辭也李云是也黥其京反毁道徳以為仁義不似黥乎破𤣥同以為是非不似劓乎意而子曰雖然吾願逰於其藩不敢復求涉中道也且願逰其藩傍而已藩域也許由曰不然夫盲者無以與乎睂目顔色之好瞽者無以與乎青黄黼黻之觀意而子曰夫無莊之失其美據梁之失其力黄帝之亡其知皆在鑪捶之間耳言天下之物未必皆自成也自然之理亦有須治鍜而為器者耳故此之三人亦皆聞道而後亡其所務也此皆寄言以遣云為之累無莊據梁皆人名無莊無莊飾也據梁強梁也錘䲭頭頗口句鐵以吹火也一云盧謂之瓮捶當作甀盧甀之間言小處也庸詎知夫造物者之不息我黥而補我劓使我乗成以隨先生邪夫率性直往者自然也往而傷性性傷而能改者亦自然也庸詎知我之自然當不息黥補劓而乗可成之道以隨夫子邪而欲棄而勿告恐非造物之至許由曰噫未可知也我為汝言其大畧吾師乎吾師乎萬物而不為義澤及萬世而不為仁皆自然耳亦無愛為於其間也安所寄其仁義子兮反碎也長於上古而不為老日新也長丁文反覆載天地刻雕衆形而不為巧自然故非巧也此所逰已遊於不為而師於無師也顔回曰回益矣以損之為益也仲尼曰何謂也曰回忘仁義矣曰可矣猶未也仁者兼愛之迹義者成物之功愛之非仁仁迹行焉成之非義義功見焉存夫仁義不足以知愛利之由無心故忘之可也但忘功迹故猶未𤣥達它日復見曰回益矣曰何謂也曰回忘禮樂矣曰可矣猶未也禮者形體之用樂者樂生之具忘其具未若忘其所以具也它日復見曰回益矣曰何謂也曰回坐忘矣仲尼蹵然曰何謂坐忘顔回曰墮枝體黜聰明離形去知同於大通此謂坐忘夫坐忘者奚所不忘哉既忘其迹又忘其所以迹者内不覺其一身外不識有天地然後曠然與變化為體而無不通也仲尼曰同則無好也無物不同則未嘗不適未嘗不適何好何惡哉化則無常也同於化者唯化所適故無常也而果其賢乎丘也請從而後也子輿與子桑友而霖雨十日子輿曰子桑殆病矣裹飯而往食之此二人相為於無相為者也今裹飯而相食者乃任之天理而自爾非相為而後往也左傳云雨三日以往為霖至子桑之門則若歌若哭鼓琴曰父邪母邪天乎人乎有不任其聲而趨舉其詩焉子輿入曰子之歌詩何故若是嫌其有情所以趨出逺理不任其聲憊也趨舉其詩無音曲也曰吾思夫使我至此極者而弗得也父母豈欲吾貧哉天無私覆地無私載天地豈私貧我哉求其為之者而不得也然而至此極者命也言物皆自然無為之者也應帝王第七夫無心而任乎自化者應為帝王也齧缺問於王倪四問而四不知齧缺因躍而大喜行以告蒲衣子蒲衣子曰而乃今知之乎有虞氏不及泰氏夫有虞氏之與泰氏皆世事之迹耳非所以迹也所以迹者無迹也世孰名之哉未之嘗名何勝負之有邪然無迹者乘羣變履萬世世有夷險故迹有不及也蒲衣子尸子云蒲衣八歲舜讓以天下即被衣王倪之師也淮南子曰齧缺問道於被衣泰氏上古帝王也有虞氏其猶藏仁以要人亦得人矣而未始出於非人夫以所好為是人所惡為非人者唯以是非為域者也夫能出於非人之域者必入於無非人之竟矣故無得無失無可無不可豈直藏仁而要人也懷仁心以結人也泰氏其卧徐徐其覺于于一以已為馬一以已為牛夫如是又奚是人非人之有哉斯可謂出於非人之域其知情信任其自知故情信其徳甚真任其自得故無偽而未始入於非人不入乎是非之域所以絶於有虞之世肩吾見狂接輿狂接輿曰日中始何以語女肩吾曰吿我君人者以已出經式義度人孰敢不聽而化諸接輿曰是欺徳也以已制物則物失其真日中始人姓名賢者也出行也經常也式用也用仁義以法度人也其於治天下也猶涉海鑿河而使蚉負山也夫寄當於萬物則無事而自成以一身制天下則功莫就而任不勝也夫聖人之治也治外乎全其性分之内而已正而後行各正性命乎能其事者而已矣不為其所不能且鳥髙飛以避矰弋之害鼷鼠深穴乎神丘之下以避重鑿之患禽獸猶各有以自存故帝王任之而不為則自成也而曾二蟲之無知言汝曾不如此二蟲之各存而不待教乎天根逰於殷陽至蓼水之上適遭無名人而問焉曰請問為天下無名人曰去汝鄙人也何問之不預也問為天下則非起於大初止於𤣥㝠也天根人姓名也予方將與造物者為人任人之自為厭則又乘夫莽眇之鳥以出六極之外而逰無何有之鄉以處壙埌之野莽眇羣碎之謂耳乘羣碎馳萬物故能出處常通而無狹滯之地埌音浪壙埌猶曠蕩也汝又何帠以治天下感予之心為言皆放之自得之場則不治而自治也帠音藝法也又復問無名人曰汝逰心於淡任其性而無所飾焉則淡矣合氣於漠漠然静於性而止順物自然而無容私焉而天下治矣任情自生公也心欲益之私也容私果不足以生生而順公乃全也陽子居見老曰有人於此嚮疾彊梁物徹疏明學道不勌如是者可比明王乎老曰是於聖人也胥易技係勞形怵心者也言此功夫容身不得不足以比聖王陽子居名也且也虎豹之文來田猨狙之便執斄之狗來藉如是者可比明王乎此皆以其文章技能係累其身非涉虛以御乎無方也虎豹以皮有文章見獵也田獵也斄音旄牛也藉繩也繫也陽子居蹵然曰敢問明王之治老曰明王之治功盖天下而似不自已天下若無明王則莫能自得今之自得實明王之功也然功在無為而還任天下天下皆得自任故似非明王之功化貸萬物而民弗恃夫明王皆就足物性故人人皆云我自爾而莫知恃賴於明王賴吐代反有莫舉名使物自喜雖有盖天下之功而不舉以為己名故物皆自以為得而喜立乎不測居變化之塗日新而無方而逰於無有者也與萬物為體則所逰者虛也不能㝠物則迕物不暇何暇逰虛哉鄭有神巫曰季咸知人之死生存亡禍福夀天期以歳月旬日若神鄭人見之皆棄而走不喜自聞死日也列子見之而心醉歸以吿壺子曰始吾以夫子之道為至矣則又有至焉者矣謂季咸之至又過於夫子壺子曰吾與汝既其文未既其實而固得道與衆雌而無雄而又奚卵焉言列子之未懷道也既盡也言汝受訓未熟故未成若衆雌無雄則無卵也而以道與世亢必信夫故使人得而相汝未懷道則有心有心而亢其一方以必信於世故可得而相之嘗試與來以予示之明日列子與之見壺子出而謂列子曰嘻子之先生死矣弗活矣不以旬數矣吾見怪焉見濕灰焉列子入泣涕沾襟以吿壺子壺子曰鄉吾示之以地文萌乎不震不正萌然不動亦不自正與枯木同其不華濕灰均於寂魄此乃至人無感之時也夫至人其動也天其靜也地其行也水流其止也淵黙淵黙之與水流天行之與地止其於不為而自爾一也今季咸見其尸居而外心即謂之將死覩其神動而天隨因謂之有生誠應不以心而理自𤣥符與變化升降而以世為量然後足為物生而順時無極故非相者所測耳此應帝王之大意也是殆見吾杜徳機也徳機不發曰杜徳杜徳機塞吾徳之機嘗又與來明日又與之見壺子出而謂列子曰幸矣子之先生遇我也有瘳矣全然有生矣吾見其杜權矣權機也今乃自覺昨日之所見見其杜權故謂之將死列子入以吿壺子壺子曰鄉吾示之以天壤天壤之中覆載之功見矣比之地文不猶卵乎此應感之容也名實不入任自然而覆載則天機𤣥應而名利之飾皆為棄物而機發於踵常在極上起是殆見吾善者機也機發而善於彼彼乃見之嘗又與來明日又與之見壺子出而謂列子曰子之先生不齊吾無得而相焉試齊且復相之列子入以吿壺子壺子曰吾鄉示之以大冲莫勝居大冲之極浩然泊心而𤣥同萬方故勝負莫得措其間也是殆見吾衡氣機也無往不平混然一之以管闚天者莫見其涯故似不齊鯢桓之審為淵止水之審為淵流水之審為淵淵有九名此處三焉淵者静黙之謂耳夫水常無心委順外物故雖流之與止鯢桓之與龍躍常淵然自若未始失其静黙也夫至人用之則行捨之則止行止雖異而𤣥黙一焉故畧舉三異以明之雖波流九變治亂紛如居其極者常淡然自得泊乎忘為也鯢桓二魚名也一云鯢鯨魚也桓盤桓也審處也審為蟠蟠聚也回流所鍾之域也淵有九名淮南子云有九琁之淵許慎註云至深也補列子九淵作鯢旋則桓當為盤桓審作畨一作潘水之盤回也嘗又與來明日又與之見壺子立未定自失而走壺子曰追之列子追之不及反以報壺子曰已滅矣已失矣吾弗及已壺子曰鄉吾示之以未始出吾宗雖變化無常深根寧極也吾與之虛而委蛇無心而隨物化委於危反蛇以支反委蛇至順之貌不知其誰何汎然無所係也因以為弟靡因以為波流故逃也變化頽靡世事波流無往而不因也夫至人一耳然應世變而時動故相者無所措其目自失而走此明應帝王者無方也為第音頽文回反弟靡不窮之貌崔云猶遜伏也然後列子自以為未始學而歸三年不出為其妻爨食豕如食人忘貴賤也食音嗣於事無與親唯所遇耳雕琢復朴去華取實塊然獨以其形立外飾去也紛而封哉雖動而真不散也一以是終使物各自終無為名尸因物則物各自當其名也無為謀府使物各自謀也無為事任付物使各自任無為知主無心則物各自主其知也知音智體盡無窮因天下之自為故馳萬物而無窮而逰無朕任物故無迹盡其所受乎天足則止也而無見得見得則不知止亦虛而已不虛則不能任羣實至人之用心若鏡鍳物而無情不將不逆應而不藏來即應去即止故能勝物而不傷物來即鑒鑒不以心故雖天下之廣而無勞神之苦南海之帝為儵北海之帝為忽中央之帝為渾沌儵與忽時相與遇於渾沌之地渾沌待之甚善儵與忽謀報渾沌之徳曰人皆有七竅以視聽食息此獨無有嘗試鑿之日鑿一竅七日而渾沌死為者敗之儵音叔莊子注巻三
