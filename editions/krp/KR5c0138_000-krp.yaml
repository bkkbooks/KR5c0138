  text: 欽定四庫全書子部十四
  hash: sha256:59b6c5006a29a1c169640e5600631b30d9a17b0b2b0283c6e596da3e89cb6da6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0138_WYG_000-1a, image: WYG1056/WYG1056-0001a.png}
body:
  text: 荘子注道家𩔖提要臣等謹案莊子注十卷晉郭象注象字子元河南人辟司徒掾稍遷至黄門侍郎束海王越引為太傅主簿事迹具晉書本傳劉義慶世說新語曰注荘子者數十家莫能究其㫖統向秀於舊注外别為解義妙演奇致大暢元風惟秋水至樂二篇未竟而秀卒秀子幼其義零落然頗有别本遷流象為人行薄以秀義不傳於世遂竊以為己注乃自注秋水至樂二篇又易馬蹄一篇其餘衆篇或㸃定文句而已其後秀義别本出故今有向郭二荘其義一也晉書象本傳亦采是文絶無異語錢曽讀書敏求記謂世代遼逺傳聞異詞晉書所云恐未必信案向秀之注陳振孫稱宋代已不傳但時見陸氏文今以釋文所載校之如逍遥逰有蓬之心句釋文郭向並引絶不相同胠篋篇聖人不死大盗不止句釋文引向注二十八字又為之斗斛以量之句釋文引向注十六字郭本皆無然其餘皆互相出入又張湛列子注中凡文與荘子相同者亦兼引向郭二注所載達生篇佝僂丈人承蜩一條向注與郭一字不異應帝王篇神巫季咸一章皆棄而走句向郭相同列子見之而心醉句向注曰迷惑其道也而又奚卵焉句向注六十二字郭注皆無之故使人得而相汝句郭注多七字示之以地文句向注塊然如土也郭注無之是殆見吾杜徳機句鄉吾示之以天壤句名實不入句向郭並同是殆見吾善者機也句向注多九字子之先生坐不齋句向注二十二字郭注無之鄉吾示之以太沖莫勝句郭改其末句淵有九名以處三焉句郭増其首十六字尾五十一字鄉吾示之以未始出吾宗句故逃也句食狶如食人句向郭並同於事無與親以下則並大同小異是所謂竊據向書㸃定文句者殆非無證又秋水篇與道大蹇句釋文云蹇向紀輦反則此篇向亦有注併世說所云象自注秋水至樂二篇者尚未必實録矣錢曽乃曲為之觧何哉考劉孝標世說注引逍遥逰向郭義各一條今本無之讓王篇惟注三條漁父篇惟注一條盗跖篇惟注三十八字說劍篇惟注七字似不應簡畧至此疑有所脫佚又列子生物者不生化物者不化二句張湛注曰荘子亦有此文併引向秀注一條而今本荘子皆無則是併正文亦有所遺漏蓋其亡已久今已不可復考矣乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀莊子注原序夫莊子者可謂知本矣故未始藏其狂言言雖無會而獨應者也夫應而非㑹則雖當無用言非物事則雖髙不行與夫寂然不動不得已而後起者固有間矣斯可謂知無心者也夫心無為則隨感而應應隨其時言唯謹爾故與化為體流萬代而㝠物豈曽設對獨遘而㳺談乎方外哉此其所以不經而為百家之冠也然莊生雖未體之言則至矣通天地之統序萬物之性達死生之變而明内聖外王之道上知造化無物下知有物之自造也其言宏綽其㫖𤣥妙至至之道融微㫖雅泰然遣放放而不傲故曰不知義之所適猖狂妄行而蹈其大方含哺而熙乎澹泊鼓腹而㳺乎混茫至人極乎無親孝慈終於兼忘禮樂復乎已能忠信發乎天光用其光則其朴自成是以神器獨化於𤣥冥之境而源流深長也故其長波之所蕩髙風之所扇暢乎物宜適乎民願𢎞其鄙觧其懸灑落之功未加而矜夸所以散故觀其書超然自以為己當經崑崙涉太虛而㳺惚怳之庭矣雖復貪婪之人進躁之士暫而攬其餘芳味其溢流彷彿其音影猶足曠然有忘形自得之懷況探其逺情而玩永年者乎遂綿邈清遐去離塵埃而返冥極者也晉郭象撰
