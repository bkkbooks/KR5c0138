body:
  text: 莊子注巻八晉郭象注雜篇庚桑楚第二十三老之役有庚桑楚者偏得老之道以北居畏壘之山其臣之畫然知者去之其妾之挈然仁者逺之畫然飾知挈然矜仁老之役役學徒弟子也廣雅云役使也庚桑楚楚名庚桑姓也太史公書作亢桑偏音篇畏本或作㟪畏於鬼仄壘力罪反㟪壘山名也或云在魯又云在梁州畫音獲知音智挈本又作契言人以仁智為臣妾庚桑悉棄仁智也擁腫之與居擁腫朴也鞅掌之為使鞅掌自得居三年畏壘大壌畏壘之民相與言曰庚桑子之始來吾洒然異之異其棄智而任愚壌而掌反本又作穣豐也今吾日計之而不足嵗計之而有餘夫與四時俱者無近功庶幾其聖人乎子胡不相與尸而祝之社而稷之乎庚桑子聞之南面而不釋然弟子異之庚桑子曰弟子何異於予夫春氣發而百草生正得秋而萬寳成夫春與秋豈無得而然哉天道已行矣夫春秋生成皆得自然之道故不為也正得秋而萬寶成天地以萬物為寶至秋而成也吾聞至人尸居環堵之室而百姓猖狂不知所如徃直自徃耳非由知也環廣雅云圓也堵丁魯反一丈曰堵環堵者面各一丈言小也今以畏壘之細民而焉欲爼豆予于賢人之間我其杓之人耶不欲為物標杓杓音的吾是以不釋於老之言云功成事遂而百姓皆謂我自爾今畏壘反此故不釋然弟子曰不然夫尋常之溝巨魚無所還其體而鯢鰌為之制步仞之丘陵巨獸無所隱其軀而㜸狐為之祥弟子謂大人必有豐禄也八尺曰尋倍尋曰常六尺為步七尺曰仞廣一步髙一仞也孔安國云八尺曰仞小爾雅云四尺曰仞㜸魚竭反云野狐依之作妖祥也且夫尊賢授能先善與利自古堯舜以然而况畏壘之民乎夫子亦聽矣庚桑子曰小子來夫函車之獸介而離山則不免于罔罟之患吞舟之魚碭而失水則蟻能苦之故鳥獸不厭髙魚龞不厭深去利逺害乃全函車之獸獸大如車也一云大容車介音戒廣雅云獨也離力智反碭徒浪反謂陽溢而失水也夫全其形生之人藏其身也不厭深𦕈而已矣若嬰身於利禄則粗而淺且夫二子者又何足以稱揚哉二子謂堯舜是其於辯也將妄鑿垣墻而殖蓬蒿也将令後世妄行穿鑿而殖亂也簡髮而櫛數米而炊理錐刀之末也櫛莊畢反理於小利也竊竊乎又何足以濟世哉混然一之無所治為乃濟舉賢則民相軋将戾拂其性以待其所尚軋烏反任知則民相盗真不足而以知繼之則偽矣偽以求生非盗如何知音智之數物者不足以厚民民之於利甚勤子有殺父臣有殺君正晝為盗日中穴阫無所復顧殺本又作弑阫音裴云阫墻也言無所畏忌吾語汝大亂之本必生于堯舜之間其末存乎千世之後千世之後其必有人與人相食者也堯舜遺其迹飾偽播其後以致斯弊南榮趎蹵然正坐曰若趎之年者已長矣将惡乎托業以及此言邪庚桑子曰全汝形守其分也趎昌于反庚桑弟子也漢書古今人表作南榮疇抱汝生無攬乎其生之外也無使汝思慮营营若此三年則可以及此言也南榮趎曰目之與形吾不知其異也而盲者不能自見耳之與形吾不知其異也而聾者不能自聞心之與形吾不知其異也而狂者不能自得目與目耳與耳心與心其形相似而所能不同茍有不同則不可强相法效也形之與形亦辟矣未有閉之辟婢亦反開也而物或間之耶欲相求而不能相得兩形雖開而不能相得將有間也間問厠之間今謂趎曰全汝形抱汝生勿使汝思慮营营趎勉聞道達耳矣早聞形隔故難化也勉强也本或作晚達耳僅達於耳未徹入於心也庚桑子曰辭盡矣曰奔蜂不能化藿蠋越雞不能伏鵠卵魯雞固能矣雞之與雞其德非不同也有能與不能者其才固有巨小也今吾才小不足以化子子胡不南見老子南榮趎贏糧七日七夜至老子之所老子曰子自楚之所來乎南榮趎曰唯老子曰子何與人偕來之衆也挾三言而來故奔蜂小蜂也一云土蜂蠋音蜀豆藿中大青虫也越雞小雞也或云荆雞也魯雞大雞也今蜀雞也贏音盈南榮趎瞿然顧其後老子曰子不知吾所謂乎南榮趎俯而慙仰而歎曰今者吾忘吾答因失吾問老子曰何謂也南榮趎曰不知乎人謂我朱愚知乎反愁我軀不仁則害人仁則反愁我身不義則傷彼義則反愁我已我安逃此而可此三言者趎之所患也願因楚而問之老子曰向吾見若眉睫之間吾因以得汝矣今汝又言而信之若規規然若喪父母掲竿而求諸海也汝亡人哉惘惘乎汝欲反汝情性而無由入可憐哉南榮趎請入就舍召其所好去其所惡十日自愁復見老子老子曰汝自洒濯孰哉欝欝乎然而其中津津乎猶有惡也夫外韄者不可繁而捉将内揵内韄者不可繆而捉将外揵揵闗揵也耳目外也心術内也夫全形抱生莫若忘其心術遺其耳目若乃聲色韄於外則心術塞於内欲惡韄於内則耳目喪於外固必無得無失而後為通也睷音接目毛也韄音霍捉則角反外内韄者道德不能持而况放道而行者乎偏韄且不可况外内俱韄乎将耳目眩惑於外而心術流蕩於内雖繁手以執之綢繆以持之弗能止也放方徃反依也南榮趎曰里人有病里人問之病者能言其病然其病病者猶未病也若趎之聞大道譬猶飲藥以加病也趎願聞衛生之經而已矣老子曰衛生之經能抱一乎不離其性加如字元嘉本作知病崔本作駕云加也衛生李云防衛其生令合道也能勿失乎還自得也能無卜筮而知吉凶乎當則吉過則凶無所卜也能止乎止於分也能已乎無追故迹能諸人而求諸已乎全我而不效彼能翛然乎無停迹也翛音霄人音育順也能侗然乎無節礙也能兒子乎兒子終日嘷而嗌不嗄和之至也任聲之自出不由於喜怒皥户羔反又作号嗌音益喉也也嗄於邁反啞也終日握而手不掜共其德也任手之自握非獨得也捲手曰握掜五禮反崔云寄也共壹也終日視而目不瞚偏不在外也任目之自見非係於色也瞚字又作瞬動也行不知所之任足之自行無所趣居不知所為縱體而自任也與物委蛇斯順之也委於危反蛇以支反而同其波物波亦波是衛生之經已南榮趎曰然則是至人之德已乎若能自而用此言便欲自謂至人之德曰非也是乃所謂氷解凍釋者能乎明非自爾夫至人者相與交食乎地而交樂乎天自無其心皆與物共交俱也共也樂音洛不以人物利害相攖不相與為怪不相與為謀不相與為事翛然而徃侗然而來是謂衛生之經已曰然則是至乎謂已便可得此言而至耶曰未也吾固告汝曰能兒子乎非以此言為不至也但能聞而學者非自至耳茍不自至則雖聞至言道可以為經胡可得至哉故學者不至至者不學也兒子動不知所為行不知所之身若槁木之枝而心若死灰若是者禍亦不至福亦不來禍福無有惡有人災也禍福生於失得人災由於愛惡今槁木死灰無情之至則愛惡失得無自而來宇泰定者發乎天光夫德宇泰然而定則其所發者天光耳非人耀宇器宇也謂器宇閒泰則靜定也發乎天光者人見其人天光自發則人見其人物見其物物各自見而不見彼所以泰然而定也人有脩者乃今有恒人而脩人則自得矣所以常泰有恒者人之天助之常泰故能反居我宅而自然獲助也人之所舍謂之天民天之所謂之天子出則天子處則天民此二者俱以泰然而自得之非為而得之也學者學其所不能學也行者行其所不能行也辯者辯其所不能辯也凡所能者雖行非為雖習非學雖言非辯知止乎其所不能知至矣所不能知不可强知故止斯至也若有不即是者天鈞敗之意雖欲為為者必敗理終不能備物以将形因其自備而順其成形藏不虞以生心心自生耳非虞而出之虞者億度之謂敬中以達彼理自達彼耳非慢中而敬外若是而萬惡至者皆天也天理自有窮通而非人也有為而致惡者乃是人不足以滑成安之若命故其成不滑滑音骨不可内於靈䑓靈䑓者心也清暢故憂患不能入靈䑓者有持有持者謂不動於物耳其實非持而不知其所持若知其所持則持之而不可持者也持則失也不見其誠已而發此妄發作不見其誠已而發謂不自照其内而外馳也毎發而不當發而不由已誠何由而當當丁浪反爾雅云毎雖也謂雖有發動不中當業入而不事不居其分内毎更為失發由已誠乃為得也為不善乎顯眀之中者人得而誅之為不善乎幽間之中者鬼得而誅之眀乎人眀乎鬼者然後能獨行幽顯無愧於心則獨行而不懼間音閑劵内者行乎無名劵分也夫遊於分内者行不由於名券外者志乎期費有益無益期欲損己以為物也費芳貴反下同廣雅云期卒也費耗也言若存分外而不止者卒有所費耗也行乎無名者唯庸有光本有斯光因而用之志乎期費者唯賈人也雖已所無猶惜彼而販賣也賈音古人見其猶之魁然夫期費者人已見其矣而猶自以為安魁安也謂衆人已見其跂求分外而猶自安可羞愧之甚也與物窮者物入焉窮謂終始與物且者其身之不能容焉能容人且謂劵外而跂者跂者不立焉能自容不能自容焉能容人人不獲容則去也且始也不能容人者無親無親者盡人身且不能容則雖已非已况能有親乎故盡是他人兵莫于志鏌鎁為下夫志之所攖燋火凝水故其為兵甚於劒㦸也七坎反痛也冦莫大於隂陽無所逃於天地之間非隂陽賊之心則使之也心使氣則隂陽徴結於五臟而所在皆隂陽也故不可逃道通其分也其成也毀也成毀無常分而道皆通分符問反所惡乎分者其分也以備不守其分而求備焉所以惡分也惡烏路反下同所以惡乎備者其有以備本分不備而有以求備所以惡備也若其本分素備豈惡之哉故出而不反見其鬼不反守其分内則其死不久故出而不反謂情識外馳而不反觀於内也見其鬼永淪危殆資死之術已行及之故曰見鬼也出而得是謂得死不出而無得乃得生出而得是謂得死若情識外馳以為得者是曰得死耳非理也㓕而有實鬼之一也已㓕其性矣雖有斯生何異於鬼㓕而有實鬼之一也廣雅云㓕殄也盡也實塞也既殄塞純朴之道而外馳澆薄之境雖復行尸於世與鬼何别故云鬼一也以有形者象無形者而定矣雖有斯形茍能曠然無懐則生全而形定也出無本歘然自生非有本入無竅歘然自死非有根出生也入死也本始也竅孔也所以知有形累於無形者以其出入無本竅故也有實而無乎處有長而無乎本剽有所出而無竅者有實言出者自有實耳其所出無根竅以出之處昌㨿反下同長丁丈反増也又如字下同剽本亦作摽同甫小反末也所出夫生必有所出也而無此眀所出是無也既是無矣何能有所出耶竅者有實既言有竅必有實求實不得竅亦無也有實而無乎處者宇也宇者有四方上下而四方上下未有窮處有實而無手處者宇也三蒼云四方上下為宇宇雖有實而無定處可求也有長而無本剽者宙也宙者有古今之長而古今之長無極有長而無本剽者宙也三蒼云徃古來今曰宙説文曰舟輿所極覆為宙長猶増也本始也宙雖有増長亦不知其始末所至者也有乎生有乎死有乎出有乎入入出而無見其形死生出入皆欻然自爾無所由故無所見其形是謂天門天門者萬物之都名也謂之天門猶云衆妙之門也天門者無有也萬物出乎無有死生出入皆歘然自爾未有為之者也然有聚散隱顯故有出入之名徒有名耳竟無出入門其安在乎故以無為門以無為門則無門也有不能以有為有夫有之未生以何為生乎故必自有耳豈有之所能有乎必出乎無有此所以明有之不能為有而自有耳非謂無能為有也若無能為有何謂無乎而無有一無有一無有則遂無矣無者遂無則有自歘生眀矣聖人藏乎是任其自生而不生生古之人其知有所至矣惡乎至有以為未始有物者至矣盡矣弗可以加矣其次以為有物矣将以生為喪也喪其散而之乎聚也惡音烏喪息浪反以死為反也還融液也是以分已雖欲均之然已分矣分方云反其次曰始無有既而有生生俄而死以無有為首以生為體以死為㞍孰知有無死生之一守者吾與之為友是三者雖異公族也或有而無之或有而一之或分而齊之故謂三也此三者雖有盡與不盡然俱能無是非於胷中故謂之公族㞍苦羔反昭景也著戴也甲氏也著封也非一也此四者雖公族然已非一則向之三者已復差之著丁畧反又張慮反戴本亦作載甲氏也著張慮反久也又丁畧反封也非一也一説云昭景甲三者皆楚同宗也著戴者謂著冠世世處楚朝為衆人所戴仰也著封者謂世世處封邑而光著久也昭景甲三姓雖異論本則同也一云昭景二姓楚之所顯戴皆甲姓顯封雖非一姓同出公族喻死生同也此兩説與註不同聊出之耳有生黬也直聚氣也黬烏簟反云黶有庛也有庛者欲披除之字林云釡底黒也披然曰移是既披然而有分則各是其所是也是無常在故曰移披普皮反然曰移是或云緘然聚而生披然散而死也嘗言移是非所言也所是之移己著於言前矣雖然不可知者也不言其移則其移不可知故試言也臘者之有膍胲可散而不可散也物各有用臘力闔反膍音毘牛百葉也本或作毘音昆獐也胲古來反足大指也一云備也案臘者大祭備物而殽有膍胲此雖從散禮應具不可散棄也觀室者周於寢廟又適其偃焉偃謂屛厠偃於晚反為是舉移是寝廟則以饗燕屏厠則以偃溲當其偃溲則寢廟之是移於屛厠矣故是非之移一彼一此誰能常之故至人因而乗之則均耳為于偽反請嘗言移是是以生為本物之變化無時非生生則所在皆本也以知為師所知雖異而各師其知因以乘是非乘是非者無是非也果有名實物之名實果各自有因以已為質質主也物各謂已是足以為是非之主使人以為己節人皆謂已是故莫通因以死償節當其所守非真脱也償常亮反廣雅云償報也復也案謂殺身以成名節成而身死故曰以死償節若然者以用為知以不用為愚以徹為名以窮為辱不能隨所遇而安之知音智移是今之人也𤣥古之人無是無非何移之有是蜩與鷽鳩同於同也同共是其所同蜩音條本或作鷽音同蹍市人之足則辭以放驁稱已脱誤以謝之蹍女展反廣雅云履也驁五報反廣雅云妄也兄則以嫗言嫗詡之無所辭謝嫗於禹反大親則已矣眀恕素足故曰至禮有不人不人者視人若已視人若已則不相辭謝斯乃禮之至也至義不物各得其宜則物皆我也至知不謀謀而後知非自然知至仁無親譬之五臟未曽相親而仁已至也至信辟金金玉者小信之質耳至信則除矣辟必領反除也徹志之勃解心之謬去德之累達道之塞貴富顯嚴名利六者勃志也容動色理氣意六者謬心也悪欲喜怒哀樂六者累德也去就取與知能六者塞道也此四六者不盪胷中則正正則靜靜則明明則虚虚則無為而無不為也盪動也道者德之欽也生者德之光也性者生之質也性之動謂之為以性自動故稱為耳此乃真為非有為也為之偽謂之失知者接也知者謨也知者之所不知猶睨也夫目之能視非知視而視也不知視而視不知知而知耳所以為自然若知而後為則知偽也動以不得已之謂德若得已而動則為强動者耳故失也動無非我之謂治動而效彼則亂名相反而實相順也有彼我之名故反名得其實則順羿工乎中㣲而拙乎使人無已譽善中則善取譽矣理常俱聖人工乎天而拙乎人任其自然天也有心為之人也夫工乎天而俍乎人者唯全人能之工於天即俍於人矣謂之全人全人則聖人也俍音良良工也惟蟲能蟲唯蟲能天能還守蟲即是能天全人悪天悪人之天而况吾天乎人乎都不知而任之斯而謂工乎天悪天烏路反下同一雀適羿羿必得之威也威以取物物必逃之以天下為之籠則雀無所逃天下之物各有所好所好各得則逃将安在是故湯以胞人籠伊尹秦穆公以五羊之皮籠百里奚是故非以其所好籠之而可得者無有也介者拸畫外非譽也畫所以飾容貌也刖者之貌既以殘則不復以好醜在懐故拸而棄之介音界乂云刖也拸敕紙反又音他本亦作移畫飾容之具無足故不復愛之一云拸離也胥靡登髙而不懼遺死生也無賴於生故不畏死胥靡刑徒人也一云人也一云腐刑也夫復謵不餽而忘人不識人之所惜復音服謵音習餽廣雅云遺也一音愧元嘉本作愧忘人復者温復之謂也謵翫也夫人翫習者雖復小事皆所至惜今温復人之所習既得之矣而不還歸以饋遺之此至愚不獲人之所習者也無復相為之情故曰忘人忘人因以為天人矣無人之情則自然為天人故敬之而不喜侮之而不怒者唯同乎天和者為然彼形殘胥靡而猶同乎天和况天和之自然乎出怒不怒則怒出於不怒矣出為無為則為出於無為矣此故是無不能生有有不能為生之意也欲靜則平氣欲神則順心有為也欲當則縁於不得己不得己之𩔖聖人之道平氣則靜理足順心則神功至縁於不得己則所為皆當故聖人之以斯為道豈求無為於恍愡之外哉徐無鬼第二十四徐無鬼因女商見魏武侯武侯勞之曰先生病矣苦於山林之勞故乃肯見於寡人徐無鬼曰我則勞於君君有何勞於我君将盈嗜欲長好悪則性命之情病矣君将黜嗜欲掔好悪則耳目病矣情欲好悪内外無可徐無鬼緍山人魏之隱士也武侯名擊文侯之子治安邑勞之力報反唯山林之勞一字如字餘并下章並力報反長丁丈反好呼報反下下章同悪烏路反下下章同掔苦田反又口閑反爾雅云固也一云引去也云牽也我将勞君君有何勞於我武侯超然不對不説其言少焉徐無鬼曰嘗語君吾相狗也下之質執飽而止是狸德也中之質若視日上之質若亡其一吾相狗又不若吾相馬也吾相馬直者中繩曲者中鉤方者中矩圎者中規是國馬也而未若天下馬也天下馬有成材若卹若失若喪其一若是者超軼絶塵不如其所武侯大説而笑夫真人之言何遜哉唯物所好之可也下之質一本無質字執飽而止以執字絶句云放下之能執禽也狸德謂貪如狐狸也視日瞻逺也若亡其一一身也謂精神不動若無其身也中丁仲反下皆同直謂馬齒曲謂背上方謂頭圎謂目成材字亦作才言自然已足不須教習也卹音恤失音逸本作佚李云卹失皆驚竦若飛也喪息浪反下章同其一言喪其耦也軼音逸徐無鬼出女商曰先生獨何以説吾君乎吾所以説吾君者横説之則以詩書禮樂從説之則以金板六弢奉事而大有功者不可為數而吾君未嘗啟齒是直樂鴳以鍾鼔耳故愁弢吐刀反金板六弢皆周書篇名或曰袐韯也本又作六韜謂太公六韜文武虎豹龍犬也今先生何以説吾君使吾君説若此乎徐無鬼曰吾直告之吾相狗馬耳女商曰若是乎曰子不聞夫越之流人乎去國數日見其所知而喜各思其本性之所好流人有罪自流徙者也去國旬月見所嘗見於國中者喜及期年也見似人者而喜矣不亦去人滋乆思人滋深乎各得其所好則無思無思則忘其所以喜也期音基夫逃虚空者藜藋柱乎鼪鼬之逕踉位其空聞人足音跫然而喜矣而况乎昆弟親戚之謦欬其側者乎得所至樂則大悦也虚空司馬云故懐家處為空虛也藋徒弔反本或作擢同柱誅矩反塞也鼪音生又音姓鼬由救反逕本亦作徑位其空謂處虚空之間也跫巨恭反喜貌行人之聲而喜喻武侯之無人君之德而處在防衛之間雖臨朝僑厲愈非其意及得其所思猶逃竄之聞人音安能不跫然改貌釋然而喜也謦苦頂反又音罄欬苦愛反一音器喻言笑也但呼聞所好猶大悦况骨肉之情歡之至也久矣夫莫以真人之言謦欬吾君之側乎所以未嘗啟齒也夫真人之言所以得吾君性也始得之而喜久得之則忘徐無鬼見武侯武侯曰先生居山林食芧栗厭葱韭以賔寡人久矣夫今老耶其欲于酒肉之味耶其寡人亦有社稷之福耶徐無鬼曰無鬼生於貧賤未嘗敢飲食君之酒肉将來勞君也君曰何哉奚勞寡人曰勞君之神與形武侯曰何謂耶徐無鬼曰天地之飬也一不以為君而恣之無極芧音序又食汝反韭音久賔本或作擯擯棄也又必人反賔客也干求也社稷之福耶謂善言嘉謀可以利社稷也登髙不可以為長居下不可以為短君獨為萬乘之主以苦一國之民以養耳目鼻口如此違天地之平也夫神者不自許也物與之耳許與也夫神者好和而悪姦與物共者和也自許者姦也夫姦病也故勞之唯君所病之何也武侯曰欲見先生久矣吾欲愛民而為義偃兵其可乎徐無鬼曰不可愛民害民之始也愛民之迹為民所尚尚之為愛愛已偽也姦病姦者以正從邪也謂病也所病之何也服而無對也或云養違天地獨恣其欲自許不損於神而以姦為病故不知所以以此為病何為乎偃息也為義偃兵造兵之本也為義則名彰名彰則競興競興則喪其真矣父子君臣懐情相欺雖欲偃兵其可得乎君自此為之則殆不成從無為為之乃成耳凡成美悪器也美成於前則偽生於後故成美者乃悪器也君雖為仁義幾且偽哉民将以偽繼之耳未皆為真也形固造形仁義有形固偽形必作成固有伐成則顯也變固外戰失其常然成固有伐變固外戰成功在已亦衆所不與欲無有伐其可得乎夫偽生形造又伐焉非本所圖勢之變也既有偽伐得無戰乎君亦必無盛鶴列於麗譙之間鶴列陳兵也麗譙髙樓也鶴列謂兵如鶴之列行一云鶴列鐘鼔也麗如字又力智反力支反譙本亦作嶕在逍反麗譙樓觀名也案謂華麗而嶕嶢無徒驥於錙壇之宫步兵曰徒但不當為義愛民耳亦無為盛兵徒馬無徒徒步也錙壇壇名無藏逆於得得中有逆則失耳藏一本作藏得作德凡非理而貪貪得而居之此藏逆於德内者也孰有貪德而可以德不失哉固宜無藏而捨之又云謂有貪則逆道也無以巧勝人守其朴而朴各有所能則平無以謀勝人率其真知而知各有所長則均無以戰勝人以道應物物服而無勝名夫殺人之士民兼人之土地以養吾私與吾神者其戰不知孰善勝之悪乎在不知以何為善則雖尅非已勝悪音烏下同君若勿已矣脩胷中之誠以應天地之情而勿攖若未能已則莫若脩已之誠夫民死已脱矣君将悪乎用夫偃兵哉甲兵無所陳非偃也黄帝将見大隗乎具茨之山方眀為御昌寓乘張若謵朋前馬昆閽滑稽後車至於襄城之野七聖皆迷無所問塗聖者名也名生而物迷矣欲之乎大隗其可得乎隗五罪反大司神名具茨一本作次同祀資反又音資山名在滎陽宻縣東今名㤗隗山寓音禹乘車右也謵音習前馬二人先馬導也適遇牧馬童子問塗焉曰若知具茨之山乎曰然若知大隗之所存乎曰然黄帝曰異哉小童非徒知具茨之山又知大隗之所存請問為天下小童曰夫為天下者亦若此而已矣又奚事焉各自若則無事矣無事乃可以為天下也予少而自遊於六合之内予適有瞀病有長者教子曰若乗日之車而遊於襄城之野日出而逰日入而息少詩召反瞀莫豆反風眩貌一云瞀讀曰睊謂眩也日之車以日為車也今子病少痊予又且復遊於六合之外夫為天下亦若此而已予又奚事焉夫為天下莫過自放任自放任矣物亦奚攖焉故我無為而民自化痊七全反除也黄帝曰夫為天下者則誠非吾子之事事由民作雖然請問為天下令民自得必有道也小童辭黄帝又問小童曰夫為天下者亦奚以異乎牧馬者哉亦去其害馬者而已矣馬以過分為害去起吕反黄帝再拜稽首稱天師而退師夫天然而去其過分則大隗至也知士無思慮之變則不樂辯士無談説之序則不樂察士無凌誶之事則不樂皆囿於物者也不能自得於内而樂物於外故可囿也故各以所樂囿之則萬物不召而自來非强之也知音智樂音洛察識也凌謂相凌轢誶音信廣雅云問也又音祟招世之士興朝中民之士榮官筋力之士矜難勇敢之士奮患兵革之士樂戰枯槁之士宿名法律之士廣治禮樂之士敬容仁義之士貴際士之不同若此故當之者不可昜其方朝直遥反中民善治民也難乃旦反宿積久也枯槁一生以為娛其所寢宿唯名而已貴際謂盟㑹事農夫無草萊之士則不比商賈無市井之士則不比能同則事同所以比比毗志反下同庶人有旦暮之業則業得其志故勸百工有器械之巧則壯事非其巧則惰壯猶疾也錢財不積則貪者憂物得所嗜而樂也權勢不尤則夸者悲勢物之徒樂變權勢生於事變遭時有所用不能無為也凡此諸士用各有時時用則不能自己也茍不遭時則雖欲自用其可得乎故貴賤無常此皆順比於嵗不物於昜者也士能各有其極若四時之不可易耳故當其時物順其倫次則各有用矣是以順歲則時序易性則不物物而不物非毁如何馳其形性潜之萬物終身不反悲夫不守一家之能而之萬方以要時利故匍匐而歸所以悲也莊子曰射者非前期而中謂之善射天下皆羿也可乎不期而中謂誤中者也非善射也若謂誤中為善射是則天下皆可謂之羿可乎言不可也中丁仲反惠子曰可莊子曰天下非有公是也而各是其所是天下皆堯也可乎若謂謬中者羿也則自是者亦可謂堯矣莊子以此明妄中者非羿而自是者非堯也惠子曰可莊子曰然則儒墨楊秉四與夫子為五果孰是耶若皆尭也則五子何為復相非乎或者若魯遽者耶其弟子曰我得夫子之道矣吾能冬鼎而夏造氷矣魯遽曰是直以陽召陽以隂召隂非吾所謂道也吾示子乎吾道於是乎為之調瑟廢一於堂廢一於室鼓宫宫動鼓角角動音律同矣俱亦以陽召陽而横自以為是遽音渠周初時人廢置也夫或改調一弦於五音無當也隨調而改鼓之二十五弦皆動旡聲則旡以相動有聲則非同不應今改此一弦而二十五弦皆改其以急緩為調也未始異於聲而音之君已魯遽以此夸諸弟子然亦以同應同耳未獨能為其事也且若是者耶五子各私所見而是其所是然亦無異於魯遽之夸其弟子而未能相出也惠子曰今夫儒墨楊秉且方與我以辯相拂以辭相鎮以聲而未始吾非也則奚若矣未始吾非者各自是也惠子欲以此為至莊子曰齊人蹢子於宋者其命閽也不以完投之異國使閽者守之出使或子不保其全此齊人之不慈也然亦自以為是故為之蹢呈亦反投也其求鈃鍾也以束縳乃反以愛鍾器為是束縳恐其破傷鈃音刑字林云鈃似小鍾而長頸又云似壺而大以束縳恐其破傷案此言賤子貴鈃自以為是也其求唐子也而未始出域有遺𩔖矣唐失也失亡其子而不能逺索遺其氣𩔖而亦未始自非人之自是有斯謬矣唐子謂失亡子也遺𩔖遺亡也亡其種𩔖故也惠施畔道而存皆猶齊人逺子而束縳也夫楚人寄而蹢閽者俱寄止而不能自投於髙地也夜半於無人之時而與舟人闘未始離於岑而足以造於怨也岑岸也夜半獨上人舩未離岸已共人闘言齊楚二人所行若此而未嘗自以為非今五子自是豈異斯哉夜上人舩人必擠已於水也莊子送葬過惠子之墓顧謂從者曰郢人堊慢其鼻端若蠅翼使匠石斵之匠石運斤成風聽而斵之瞑目恣手從才用反郢楚都也漢書音義作優人服䖍云優人古之善塗塈者施廣領大䄂以仰塗而領䄂不汚有小飛泥誤著其鼻因令匠石運斤而斵之堊烏路反慢本亦作漫猶塗之也盡堊而鼻不傷郢人立不失容宋元君聞之召匠石曰嘗試為寡人為之匠石曰臣則嘗能斵之雖然臣之質死久矣自夫子之死也吾無以為質矣吾無與言之矣非夫不動之質忘言之對則雖至言妙斵而旡所用之為寡于偽反管仲有病桓公問之曰仲父之病病矣可不謂云至於大病則寡人悪乎屬國而可管仲曰公誰欲與公曰鮑叔牙曰不可其為人絜亷善士也其於不已若者不比之又一聞人之過終身不忘使之治國上且鉤乎君下且逆乎民其得罪於君也将弗久矣公曰然則孰可對曰勿已則隰朋可其為人也上忘而下畔髙而不亢大病謂死也上忘而下畔言在上不自髙於下旡背者也愧不若皇帝而哀不已若者故旡棄人以德分人謂之聖以財分人謂之賢以賢臨人未有得人者也以賢下人未有不得人者也其於國有不聞也其於家有不見也勿已則隰朋可若皆聞見則事鍾於己而群下旡所措手足故遺之可也未能盡遺故僅可也吴王浮于江登乎狙之上衆狙見之恂然棄而走逃於深蓁有一狙焉委蛇攫見巧乎王王射之敏給敏疾也給續括也攫具縳反本又作搔素報反摶捷矢捷速也矢徃雖速而狙猶能摶摶音博王命相者趨射之狙執死王顧謂其友顔不疑曰之狙也伐其巧恃其便以敖予以至此殛也戒之哉嗟乎無以汝色驕人哉顔不疑歸而師董梧以鋤其色去樂辭顯三年而國人穪之稱其忘巧遺色而任夫素朴相者息亮反佐王獵者也趨音促急也執死見執而死也之狙也之猶是也便婢面反董梧有道者也師其德以鋤色南伯子綦隱几而坐仰天而嘘顔成子入見曰夫子物之尤也形固可使若槁骸心固可使若死灰乎曰吾嘗居山宂之中矣當是時也田禾一覩我而齊國之衆三賀之以得見子綦為榮隱於靳反田禾齊君也尊德故國人慶之我必先之彼故知之我必賣之彼故鬻之若我而不有之彼悪得而知之若我而不賣之彼悪得而鬻之嗟乎我悲人之自喪者吾又悲夫悲人者吾又悲夫悲人之悲者其後而日逺矣子綦知夫為之不足以救彼而適足以傷我故以不悲悲之則其悲稍寧而泊然旡心枯槁其形所以為日逺矣仲尼之楚楚王觴之孫叔敖執爵而立市南宜僚受酒而祭曰古之人乎於此言已古之言者必於㑹同孫叔敖案左傳孫叔敖是楚莊王相哀公十六年仲尼卒後白公為亂宜僚未嘗仕楚又宣十二年𫝊楚有熊相宜僚則與叔敖同時去孔子甚逺蓋寄言也曰丘也聞不言之言矣未之嘗言聖人旡言其所言者百姓之言耳故曰不言之言苟以言為不言則雖言出於口故為未之嘗言於此乎言之今将於此言於旡言市南宜僚弄丸而兩家之離解孫叔敖甘寢秉羽而郢人投兵此二子息訟以黙澹泊自若而兵難自解宜僚楚之勇士也善弄丸楚白公勝将作亂役今尹子西子期石乞曰市南有熊宜僚者若得之可以當五百人乃徃告之不許也承之以劒弄丸如故曰吾亦不泄子白公遂殺子西子期歎息兩家而已宜僚不預其患甘寢秉羽言叔敖願安寢恬卧以飬德於廟堂之上折衝於千里之外敵國不敢犯郢人投兵旡所攻伐也郢楚都也丘願有喙三尺茍所言非己則雖終身言故為未嘗言耳是以有喙三尺未足稱長凡人閉口未是不言喙許反三尺言長也彼之謂不道之道彼謂二子此之謂不言之辯此謂仲尼彼謂甘寢此謂弄丸故德緫乎道之所一道之所容者雖旡方然緫其大歸莫過於自得故一也而言休乎知之所不知至矣言止其分非至如何道之所一者德不能同也各自得耳非相同也而道一也不能同一本作相同知之所不能知者辯不能舉也非其分故不能舉名若儒墨而㓙矣夫儒墨欲同所不能同舉所不能舉故㓙故海不辭東流大之至也明受之旡所辭所以成大聖人并包天地澤及天下而不知其誰氏汎然都任是故生無爵有而旡之死無謚謚所以名功功不在已故雖謚而非已有實不聚令萬物各知足名不立功非已為故名歸於物此之謂大人若為而有之則小矣狗不以善吠為良人不以善言為賢賢出於性非言所為而况為大乎夫大愈不可為而得夫為大不足以為大而况為德乎唯自然乃德耳夫大備矣莫若天地然奚求焉而大備矣天地大備非求之也知大備者無求無失無棄不以物易已也知其自備者不舍已而求物故無求旡失旡棄也反已而不窮反守我理我理自通循古而不摩順常性而自至耳非摩拭大人之誠不為而自得故曰誠子綦有八子陳諸前召九方歅曰為我相吾子孰為祥九方歅曰梱也為祥子綦瞿然喜曰奚若曰梱也将與國君同食以終其身子綦索然出涕曰吾子何為以至於是極也九方歅曰夫與國君同食澤及三族而况於父母乎今夫子聞之而泣是禦福也子則祥矣父則不祥子綦曰歅汝何足以識之而梱祥邪盡於酒肉入於鼻口矣而何足以知其所自來吾未嘗為牧而牂生於奥未嘗好田而鶉生於宎若勿怪何耶夫所以怪出於不意故也歅音因善相馬人淮南子作九方臯牂子郎反爾雅云牝羊也奥西南隅也一曰豕牢也宎字又作烏弔反東北隅也一云東南隅鶉火地生鶉也一云窟也吾所與吾子遊者遊於天地不有所為吾與之邀樂於天吾與之邀食於地隨所遇於天地耳邀遇也吾不與之為事不與之為謀不與之為怪怪異也循常任性脱然自爾吾與之乗天地之誠而不以物與之相攖斯不為也吾與之一委蛇而不與之為事所宜斯順耳旡擇也今也然有世俗之償焉夫有功於物物乃報吾不為功而償之何也凡有怪徴者必有怪行殆乎非我與吾子之罪幾天與之也今旡怪行而有怪徴故知其天命也吾以是泣也夫為而然者勿為則已矣不為而自至則不可奈何也故泣之無幾何而使梱之於燕盗得之於道全而鬻之則難不若刖之則易全恐其逃故不如刖之易售也幾居豈反於是刖而鬻之於齊適當渠公之街終身食肉而終齧缺遇許由曰子将奚之曰将逃堯曰奚謂邪曰夫堯畜畜然仁吾恐其為天下笑後世其人與人相食與仁者争尚之原故也渠公齊之富室為街正買梱自代終身食肉至死一云渠公屠者與梱君臣同食肉也夫民不難聚也愛之則親利之則至譽之則勸致其所惡則散愛利出乎仁義捐仁義者寡利仁義者衆夫仁義之行唯且無誠仁義既行将偽以為之且假夫禽貪者器仁義可見則夫貪者将假斯器以獲其志禽之貪者殺害旡極仁義貪者傷害旡窮是以一人之㫁制利天下若夫仁義各出其情則其㫁正不制乎一人譬之猶一覕也覕割也萬物萬形而以一劑割之則有傷也覕薄結反暫見貌夫堯知賢人之利天下也而不知其賊天下也夫唯外乎賢者知之矣外賢則賢不偽有暖姝者有濡需者有卷婁者所謂暖姝者學一先生之言則暖暖姝姝而自説也自以為足矣而未知未始有物也意盡形告豈知我之獨化於𤣥寞之竟哉暖吁爰反柔貌姝妖貌濡需謂偷安須之頃卷音權卷婁猶拘攣也是以謂暖姝者也濡需者豕蝨是也擇䟽鬛自以為廣宫大囿奎蹄曲隈乳間股脚自以為安室利處不知屠者之一旦皷臂布草操煙火而已與豕俱焦也此以域進此以域退此其所謂濡需者也非有通變藐世之才而偷安乎一時之利者皆豕蝨者也蝨音瑟卷娄者舜也羊肉不慕蟻蟻慕羊肉羊肉羶也舜有羶行百姓悦之故三徙成都至鄧之虚而十有萬家堯聞舜之賢舉之童土之地曰冀得其來之澤舜舉乎童土之地年齒長矣聦眀衰矣而不得休歸所謂卷婁者也聖人之形不異凡人故耳目之用衰也至於精神則始終常全耳若少則未成及長而衰則聖人之聖曽不崇朝可乎年長心勞無愛樂之志是猶羊肉不慕蟻也羶設然反行下孟反鄧邑名童土地旡草木也長丁丈反是以神人悪衆至衆自至耳非好而致之悪烏路反衆至則不比不比則不利也明舜之所以有天下蓋於不得已耳豈比而利之比毗至反故無所甚親無所甚踈抱德煬和以順天下此謂真人於蟻棄知於魚得計於羊棄意於民則蒙澤於舜則形勞煬音羊炙也為和氣所炙知音智蟻得水則死魚得水則生羊得水則病一説云真人旡羶故不致蟻是蟻棄知也共處相忘之大道旡沾濡之德是魚得計也羊旡羶行而不致蟻是羊棄意也以目視目以耳耳以心復心此三者未能無其耳目心意也若然者其平也繩未能去繩而自平去起吕反其變也循未能絶迹而𤣥㑹古之真人以天待之居旡事以待事事斯得不以人入天以有事求旡事事斯荒古之真人得之也生失之也死得之也死失之也生得失各隨其所居耳於生為得於死為失得失未始有常也藥也其實堇也桔梗也雞也豕零也是時為帝者也何可勝言當其所須則旡賤非其時則旡貴貴賤有時誰能常也堇音靳烏頭也治風冷庳桔音結梗古猛反桔梗治心腹血痰瘕痺雞即雞頭也名芡與藕子合為散服之延年豕零本作豕囊云名猪苓根似猪可以治渴案四者皆藥草名是時為帝者也藥草有時迭相為帝謂其土根榮採藥各得所用也句踐也以甲楯三千棲於㑹稽唯種也能知亡之所以存唯種也不知其身之所以愁故曰鴟目有所適鶴脛有所節解之也悲各適其一時之用不能靡所不可則有時而失有時而失故有時而悲矣解去也句音鉤㑹古外反稽音雞種章勇反越大夫名也吴越春秋云姓文字少禽故曰風之過河也有損焉日之過河也有損焉有形者自然相與為累唯外夫形者磨之而不磷有損有形自然相累世能累物物能累人故大夫種所以不免也請只風與日相與守河而河以為未始其攖也實已損矣而不自覺恃源而往者也所以不覺非不損也恃源徃也恃本亦作恃源而注者也水由源注雖遇風日不能損也道成其性雖在於世不能移也故水之守土也審影之守人也審物之守物也審旡意則止於分所以為審故目之於眀也殆耳之於聦也殆心之於殉也殆有意則旡崖故殆凡能其於府也殆殆之成也不給改所以貴其旡能而任其天然禍之長也兹萃萃聚也苟不能忘知則禍之長也多端矣長丁丈反其反也縁功反守其性則其功不作而成其果也待久欲速則不果而人以為已寶不亦悲乎已寳謂有其知能故有亡國戮民無已皆有其身之禍不知問是也不知問禍之所由由乎有心而脩心以救禍也故足之於地也踐雖踐恃其所不蹍而後善博也人之知也少雖少恃其所不知而後知天之所謂也夫忘天地遺萬物然後蜩翼可得而知也况欲知天之所謂而可以不旡其心哉一足常不徃故能行廣逺也知大一知大隂知大目知大均知大方知大信知大定至矣大一通之道也大隂解之用其分内則萬事無滯也大目視之用萬物之自見亦大目也大均縁之因其本性令各自得則大均也大方體之體之使各得其分則萬方俱得所以為大方也大信稽之命之所期旡令越逸斯大信也大定持之真不撓則自定故持之以大定斯不持也盡有夭夫物未有旡自然者也循有照循之則明旡所作也㝠有樞至理有極但當㝠之則得其樞要也始有彼始有之者彼也故我述而不作則其解之也似不解之者夫解任彼則彼自解解之無功故似不解其知之也似不知之也用彼知也不知而後知之我不知則彼知自用彼知自用則天下莫不皆知也其問之也不可以有崖應物宜而旡方而不可以無崖各以其分頡滑有實萬物雖頡滑不同而物物各自有實也頡滑謂錯亂也古今不代各自有故不可相代而不可以宜各盡其分也則可不謂有大揚㩁乎㩁而揚之有大根也㩁畧而揚顯之也闔不亦問是已奚惑然為若問其大㩁則物有至分故忘已恁物之理可得而知也奚為而惑若此也以不惑解惑復於不惑是尚大不惑夫惑不可解故尚大不惑愚之至也是以聖人從而任之所以皇王殊迹隨世為名也則陽第二十五則陽逰於楚夷節言之於王王未之見夷節歸彭陽見王果曰夫子何不譚我於王王果曰我不若公閲休彭陽曰公閱休奚為者邪曰冬則擉龞于江夏則休乎山樊有過而問者曰此予宅也言此者以抑彭陽之進趨則陽名則陽字彭陽也一云姓彭名則陽周初人也夷節楚臣果楚賢人譚音談本亦作談説也公閲休𨼆士也擉初角反刺也予宅以𨼆居山隂自顯也夫夷節已不能而况我乎吾又不若夷節夫夷節之為人也無德而有知不自許以之神其交固顛㝠乎富貴之地言已不若夷節之好富貴能交結意盡形名任知以干上也知音智㝠音眠顛㝠猶迷惑也言其交結人主情馳富貴補不自許以之神句神在我之自然者也非相助以德相助消也茍進故德薄而名消夫凍者假衣於春暍者反冬乎冷風言已順四時之施不能赴彭陽之意暍音謁字林云傷暑也夫楚王之為人也形尊而嚴其於罪也無赦如虎非侫人正德其孰能撓焉故聖人其窮也使家人忘其貧澹然無欲樂足於所遇不以侈靡為貴而以道德為榮故其家人不識貧之可苦其達也使王公忘爵禄而化卑輕爵禄而重道德超然兩忘不覺榮之在身故使王公失其所以為髙而化卑居髙而以卑為本也其於物也與之為娱矣不以為物自苦其於人也樂道之通而保已焉通彼而不喪我故或不言而飲人以和人各自得斯飲和矣豈待言哉飲於鴆反與人並立而使人化望其風而靡之父子之宜彼其乎歸居欲彼父父子子各歸其所而一間其所施其所施同天地之德故間靜而不二間音閑其於人心者若是其逺也故曰待公閲休欲其釋楚王而從閱休将以静泰之風鎮其動心也聖人達綢繆所謂𤣥通周盡一體矣無内外而皆洞照而不知其然性也不知其然而自然者非性如何復命搖作而以天為師搖者自搖作者自作莫不復命而師其天然也復命搖作搖動也萬物動作生長各有天然則是復其命也人則從而命之也此非赴名而髙其迹師性而動其迹自髙故人不能下其名也命名也憂乎知而所行恒無幾時其有止也若之何任知其行則憂患相繼知音智幾居豈反時其有止也若之何憂乎智謂有為者以形智不至為憂也不知用智必喪喪而更以不智為憂及其智之所行有弊無濟故其憂患相接無須停息故曰恒無幾時其有止也不能遺智去憂非可憂如何生而美者人與之鑑不告則不知其美於人也鑑鏡也鑑物無私故人美之今夫鑑者豈知鑑而鑑耶生而可鑑則人謂之鑑耳若人不相告則莫知其美於人譬之聖人人與之名若知之若不知之若聞之若不聞之其可喜也終無已夫鑑之可喜由其無情不問知與不知聞與不聞來即鑑之故終無已若鑑由聞知則有時而廢也人之好之亦無已性也若性所不好豈能久照好乎報反聖人之愛人也人與之名不告則不知其愛人也聖人無愛若鏡耳然而事濟於物故人與之名若人不相告則莫知其愛人也若知之若不知之若聞之若不聞之其愛人也終無已蕩然以百姓為蒭狗而道合於愛人故能無已若愛人由乎聞知則有時而衰也人之安之亦無已性也性之所安故能久舊國舊都望之暢然得舊猶暢然况得性乎暢然喜悦貌雖使丘陵草木之緡緡合也緡音昏盛也入之者十九猶之暢然况見見聞聞者也見所嘗見聞所嘗聞而猶暢然况體其體用其用也十九謂見十識九也見見聞聞見所見聞所聞以十仞之縣衆間者也衆之所習雖危猶間况聖人之無危縣音𤣥間音閑冉相氏得其環中以隨成冉相氏古之聖王也居空以隨物物自成相息亮反與物無終無始無幾無時忽然與之俱徃日與物化者一不化者也日與物化故常無我常無我故常不化也闔嘗舍之言夫為者何不試舍其所為乎舍音捨夫師天而不得師天唯無所師乃得師天與物皆殉其以為事也若之何雖師天猶未免於殉奚足事哉師天猶不足稱事况又下斯耶夫聖人未始有天未始有人未始有始未始有物與世偕行而不替所行之備而不洫其合之也若之何都旡得㝠合洫音溢濫也壊敗也旡心偕行何徃而不至故曰皆殉也所行之備而物我旡傷故旡壊敗也湯得其司御門尹登恒為之傅之委之百官而不與焉門尹官名登恒人名為于偽反下同傅音付下同從師而不囿任其自聚非囿之也從其自散非解之也得其隨成為之司其名司御之屬亦能隨物之自成也而湯得之所以名寄於物而功不在已之名嬴法得其兩見名法者已過之迹而非適足也故曰蠃然旡心者寄治於群司則其名迹並見於彼蠃音盈法得其兩見賢遍反得其隨成之道以司其名名實法立故得兩見猶人鑑之相得也仲尼之盡慮為之傅之仲尼曰天下何思何慮慮已盡矣若有纎芥之慮豈得寂然不動應感無窮以輔萬物之自然也容成氏曰除日無嵗今所以有嵗而有日者為有死生故也若旡死旡生則嵗日之計除也容成老子師也無内無外旡彼我則旡内外也魏瑩與田侯牟約田侯牟背之魏瑩怒将使人刺之犀首聞而耻之曰君為萬乗之若也而以匹夫從讎衍請受甲二十萬為君攻之虜其人民係其牛馬使其君内熱發於背然後㧞其國忌也出走然後扶其背折其脊季子聞而恥之曰築十仞之城城者既十仞矣則又壊之此胥靡之所苦也今兵不起七年矣此王之基也衍亂人不可聴也華子聞而醜之曰善言伐齊者亂人也善言勿伐者亦亂人也謂伐之與不伐亂人也者又亂人也君曰然則若何曰君求其道而已矣惠子聞之而見戴晋人戴晉人曰有所謂蝸者君知之乎曰然蝸至㣲而有兩角魏莹魏惠王也田侯齊威王也名牟史記威王名因不名牟犀首魏官名也若今虎牙将軍公孫衍為此官元嘉本作齒首忌也出走忌畏而走抶猪栗反折之古反季子魏臣華子亦魏臣也惠子惠施也戴晉人梁國賢人惠施薦之於魏王蝸音戈蝸蟲有兩角俗謂之蝸牛三蒼云小牛螺也云俗名黄犢有國於蝸之左角者曰觸氏有國於蝸之右角者曰蠻氏時相與爭地而戰伏尸數萬逐北旬有五日而後反誠知所爭者若此之細也則天下旡爭矣軍走曰北君曰噫其虚言與曰臣請為君實之君以意在四方上下有窮乎君曰無窮曰知遊心於無窮而反在通達之國人迹所及為通達謂今四海之内也若存若亡乎君曰然今自以四海為大然計在旡窮之中若有若旡也曰通達之中有魏於魏中有梁於梁中有王王與蠻氏有辯乎君曰無辯王與蠻氏俱有限之物耳有限則不問大小俱不得與無窮者計也雖復天地共在無窮之中皆篾如也况魏中之梁梁中之王而足爭哉客出而君倘然若有亡也自悼所爭者細惝音敞字林云惘也客出惠子見君曰客大人也聖人不足以當之惠子曰夫吹管也猶有嗃也吹劍首者吷而已矣堯舜人之所譽也道堯舜於戴晉人之前譬猶一吷也曽不足聞莞音管本亦作管嗃許交反管聲也玉篇呼洛反劒首謂劍環頭小孔也吷音血吷然如風過孔子之楚舍於蟻丘之漿其鄰有夫妻臣妾登極者子路曰是稯稯何為者耶仲尼曰是聖人僕也是自埋於民與民同蟻丘山名漿賣漿家一謂逆旅舍以菰草覆之也極屋棟也升之以也一云極平頭屋也稯音緫聚貌聖人僕謂懐聖德而隱僕隸也自藏於畔進不荣華退不枯槁藏於畔脩田農之業是隱藏於畔其聲銷損其名也銷音消小也其志無窮規是生也其口雖言其心未嘗言所言者皆世言方且與世違而心不屑與之俱心與世異是陸沈者也人中隱者譬旡水而沈也陸沈當顯而反隱如旡水而沈也是其市南宜僚耶子路請徃召之孔子曰已矣彼知丘之著於己也著明也知丘之適楚也以丘為必使楚王之召已也彼且以丘為侫人也夫若然者其於侫人也羞聞其言而况親見其身乎而何以為存不如舍之以從其志𥙷存史記過存之存言又何存問之也口義作必去而不留子路徃視之其室虚矣果逃去也長梧封人問子牢曰君為政焉勿鹵莽治民焉勿㓕裂鹵莽㓕裂輕脱粗畧不盡其分長梧地名封人守封疆之人也子牢即琴牢孔子弟子鹵音魯鹵莽猶麄粗也謂淺耕稀種也㓕裂斷其草也昔予為禾耕而鹵莽之則其實亦鹵莽而報予芸而㓕裂之其實亦㓕裂而報予予來年變齊深其耕而熟耰之功盡其分旡所不至齊才細反一如字云變更也謂變更所法也齊同也耰音憂鋤也字林云摩田器也其禾繁以滋予終年厭飱荘子聞之曰今人之治其形理其心多有似封人之所謂遁其天離其性㓕其情亡其神以衆為夫遁離㓕亡以衆為之所致也若各致其極則何患也飱音孫故鹵莽其性者欲悪之孽為性萑葦萑葦害禾稷欲悪傷生性悪音路反萑音丸葦蘆也蒹葭始以扶吾形形扶踈則神氣傷蒹古恬反廉也葭音加亦蘆也尋擢吾性以欲悪引性不止於當並潰漏發不擇所出漂疽疥癰内熱溲膏是也此鹵莽之報也故治性者安可以不齊其至分潰回内反漏發謂精氣散泄上潰下漏不擇所出也漂疽謂病瘡膿出也疥音界溲所求反謂虚勞人尿上生肥白沫也皆為利欲感動失其正氣不如深耕熟耰之有實栢矩學於老曰請之天下遊老曰已矣天下猶是也又請之老曰汝将何始曰始於齊至齊見辠人焉推而强之解朝服而幕之號天而哭之曰子乎子乎天下有大菑子獨先離之曰莫為盗莫為殺人殺人大菑謂自此以下事大菑既有則雖戒以莫為其可得已乎栢矩有道之人辠罪也謂應死人也幕覆也菑音哉離著也榮辱立然後覩所病各自得則無榮辱得失紛紜故榮辱立榮辱立則夸其所謂辱而其所謂榮矣奔馳乎夸之間非病如何貨財聚然後覩所爭若以知足為富将何爭乎今立人之所病聚人之所爭窮困人之身使無休時欲無至此得乎上有所好則下不能安其本分古之君人者以得為在民以失為在已君莫之失則民自得矣以正為在民以枉為在已君莫之枉則民自正故一形有失其形者退而自責夫物之形性何為而失哉皆由人君撓之以至斯患耳故自責今則不然匿為物而愚不識反其性匿也用其性顯也故為物所顯則皆識大為難而罪不敢為物所易則皆敢重為任而罰不勝輕其所任則皆勝勝音升逺其塗而誅不至適其足力則皆至民知力竭則以偽繼之将以避誅罰也知音智下同日出多偽士民安取不偽主日興偽士於何許得其真乎夫力不足則偽知不足則欺財不足則盗盗之行於誰責而可乎當責上也蘧伯玉行年六十而六十化亦能順世而不係於彼我故也未嘗不始於是之而卒詘之以非也順物而暢物情之變然也未知今之所謂是之非五十九非也物情之變未始有極萬物有乎生而莫見其根有乎出而莫見其門旡根旡門忽爾自然故莫見也唯旡其生亡其出者為能覩其門而測其根也人皆尊其知之所知而莫知恃其知之所不知而後知可不謂大疑乎我所不知物有知之者矣故用物之知則旡所不知獨任我知知其寡矣今不恃物以知而自尊其知則物不告我非大疑如何已乎已乎且無所逃不能用彼則寄身旡地此則所謂然與然乎自謂然者天下未之然也仲尼問於大史大弢伯常蹇狶韋曰夫衛靈公飲酒湛樂不聽國家之政田獵畢弋不應諸侯之際其所以為靈公者何耶大弢曰是因是也靈即是旡道之謚也太音泰弢吐刀反伯常蹇曰夫靈公有妻三人同濫而浴男女同浴此旡禮也濫浴器也史鰌奉御而進所摶幣而扶翼以鰌為賢而奉御之勞故專幣而扶翼之使其不得終禮此其所以為肅賢也幣者奉御之物鰌音秋史魚也摶音慱幣音蔽云引衣裳自蔽扶翼公及浴女相扶翼自隱也𥙷奉御而進所句進所進所居之處也持慱幣以進公使人扶翼之言有禮也其慢若彼之甚也見賢人若此其肅也是其所以為靈公也欲以肅賢𥙷其私慢靈有二義亦可謂善故故仲尼問焉狶韋曰夫靈公也死卜葬於故墓不吉卜葬於沙丘而吉掘之数仞得石槨焉洗而視之有銘焉曰不馮其子靈公奪而里之夫靈公之為靈也久矣子謂蒯瞶也言不馮其子靈公将奪女處也夫物皆先有其命故来事可知也是以凡所為者不得不為凡所不為者不可得為而愚者以為之在已不亦妄乎故墓一本作大墓沙丘地名其子靈公讀絶句一以其子字絶句云言子孫不足可憑故使公得此處為塜也奪而里而汝也里居處也一本作奪而埋之之二人何足以識之徒識已然之見事耳未知已然之出於自然也少知問於大公調曰何謂丘里之言大公調曰丘里者合十姓百名而以為風俗也合異以為同散同以為異今指馬之百體而不得馬而馬係於前者立其百體而謂之馬也是故丘山積卑而為髙江河合水而為大大人合并而為公旡私於天下則天下之風一也大音㤗丘里四井為邑四邑為丘十姓百名一姓為十人十姓為百名是以自外入者有主而不執由中出者有正而不距自外入者大人之化也由中出者民物之性也性各得正故民旡違心化必至公故主旡所執所以能合丘里而并天下一萬物而夷群異也四時殊氣天不賜故嵗成殊氣自有故能常有若本旡之而由天賜則有時而廢賜與也五官殊職君不私故國治殊職自有其才故任之耳非私而與之文武大人不賜故德備文者自文武者自武非大人所賜也若由賜而能則有時而闕矣豈唯文武凡性皆然萬物殊理道不故無名無名故無為無為而無不為名止於實故無為實各自為故旡不為時有終始世有變化故無心者斯順禍福淳淳流行反覆至有所拂者而有所宜於此為戾於彼或以為宜自殉殊面各自性其所是不能離也自殉殊面廣雅云面向也謂心各不同而自殉焉殊向自殉是非天隔故有所正者亦有所差有所正者有所差正於此者或差於彼比於大澤百材皆度旡棄材也乎大山木石同壇合異以為同也此之謂丘里之言言於丘里則天下可知少知曰然則謂之道足乎大公調曰不然今計物之數不止於萬而期曰萬物者以数之多者號而讀之也夫有数之物猶不止於萬况旡数之數謂道而足耶是故天地者形之大者也隂陽者氣之大者也道者為之公物得以通通物旡私而强字之曰道因其大以號而讀之則可也所謂道可道也已有之矣乃将得比哉名已有矣故乃将旡可得而比耶則若以斯辯譬猶狗馬其不及逺矣今名之辯旡不及逺矣故謂道猶未足也必在乎旡名旡言之域而後至焉雖有名故莫之比也少知曰四方之内六合之裏萬物之所生悪起問此者或謂道能生之悪音烏大公調曰隂陽相照相蓋相治四時相代相生相殺言此皆其自爾非旡所生欲悪去就於是橋起雌雄片合於是庸有凡此事故云為趣舍近起於隂陽之相照四時之相代也悪烏路反橋起髙勁言所起之勁疾也片音判字安危相易禍福相生緩急相摩聚散以成此名實之可紀精之可志也過此以徃至於自然自然之故誰知所以也隨序之相理橋運之相使窮則反終則始此物之所有此物之所有自然而然耳非旡能有之也隨序謂變化相隨有次序也橋運謂相橋代𩔖至次序以相通理橋運以相制使也言之所盡知之所至極物而已物表無所復有故言知不過極物也覩道之人不隨其所廢不原其所起廢起皆自爾無所原隨也此議之所止極於自爾故無所議少知曰季真之莫為接子之或使二家之議孰正於其情孰偏於其理季真曰道莫為也接子曰道或使或使者有使物之功也季真接子二賢人大公調曰鷄鳴狗吠是人之所知雖有大知不能以言讀其所自化又不能以意其所将為物有自然非為之所能也由斯而觀季真之言當也斯而析之精至於無倫大至於不可圍皆不為而自爾或之使莫之為未免於物而終以為過物有相使亦皆自爾故莫之為者未為非物也凡物云云皆由莫為而過去或使則實實自使之莫為則虛無使之也有名有實是物之居指名實之所在無名無實在物之虚物之所在其實至虛可言可意言而愈䟽故求之於言意之表而後至焉未生不可忌突然自生制不由我我不能禁已死不可徂忽然自死吾不能違徂一本作阻死生非逺也理不可覩近於身中猶莫見其自爾而欲憂之或之使莫之為疑之所假此二者世所至疑也吾觀之本其往無窮吾求之末其來無止無窮無止言之無也與物同理物理無窮故其言無窮然後與物同理也或使莫為言之本也與物終始恒不為而自使然也道不可有有不可無道故不能使有而有者常自然也道之為名所假而行物所由而行故假名之曰道或使莫為在物一曲夫胡為於大方舉一隅便可知言而足則終日言而盡道求道於言意之表則足言而不足則終日言而盡物不能忘言而存意則不足道物之極言黙不足以載夫道物之極常莫為而自爾不在言與不言非言非黙議其有極極於自爾非言黙而議也莊子注巻八
