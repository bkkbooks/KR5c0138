body:
  text: 莊子注巻十晉郭象注説劒第三十昔趙文王喜劒劒士夾門而客三千餘人日夜相擊於前死傷者嵗百餘人好之不厭如是三年國衰諸侯謀之趙文王惠文王也名何武靈王子去莊子三百五十年周紀云周赧王十七年趙惠文王之元年一云案長厯推惠文王與莊子相值恐彪之言誤太子悝患之募左右曰孰能説王之意止劒士者賜之千金左右曰莊子當能悝苦回反太子名太子乃使人以千金奉莊子莊子弗受與使者俱往見太子曰太子何以教周賜周千金太子曰聞夫子眀聖謹奉千金以幣從者夫子弗受悝尚何敢言莊子曰聞太子所欲用周者欲絶王之喜好也使臣上説大王而逆王意下不當太子則身刑而死周尚安所事金乎使臣上説大王下當太子趙國何求而不得也太子曰然吾王所見唯劒士也莊子曰諾周善為劒太子曰然吾王所見劒士皆蓬頭突垂冠曼胡之纓短後之衣瞋目而語難王乃説之今夫子必儒服而見王事必大逆蓬頭謂著兠鍪也有毛故如蓬垂冠将欲闘故冠低傾也曼莫干反曼胡之纓謂麄纓無文理也短後之衣為便於事也荘子曰請治劒服治劒服三日乃見太子太子乃與見王王脱白刃待之莊子入殿門不趨見王不拜王曰子欲何以教寡人使太子先曰臣聞大王喜劒故以劒見王王曰子之劒何能禁制曰臣之劒十步一人千里不留行王大説之曰天下無敵矣千里不留行十步一人相擊輙殺之故千里不留於行也莊子曰夫為劒者示之以虚開之以利後之以發先之以至願得試之王曰夫子休就舍待命令設戱請夫子王乃校劒士七日死傷者六十餘人得五六人使奉劒於殿下乃召荘子王曰今日試使士敦劒敦断也試使用劒相擊断截也莊子曰望之久矣王曰夫子所御杖長短何如曰臣之所奉皆可所奉一本作所奏然臣有三劒唯王所用請先言而後試王曰願聞三劒曰有天子劒有諸侯劒有庻人劒王曰天子之劒何如曰天子之劒以燕谿石城為齊岱為鍔燕音煙燕谿地名在燕國石城在塞外鍔劒刃也一云劒稜也晉魏為周宋為鐔鐔音淫三蒼云徒感反劒口也一謂劒鐶也又云劒珥也韓魏為夾夾古協反把也一本作鋏同一云鐔從稜向背鋏從稜向刃也包以四夷裹以四時繞以渤海帶以常山制以五行論以刑德開以隂陽持以春夏行以秋冬此劒直之無前舉之無上案之無下運之無旁上決浮雲下絶地紀此劒一用匡諸侯天下服矣此天子之劒也文王芒然自失曰諸侯之劒何如曰諸侯之劒以知勇士為鋒以清亷士為鍔以賢良士為以忠勝士為鐔以豪傑士為夾此劒直之亦無前舉之亦無上案之亦無下運之亦無旁上法圎天以順三光下法方地以順四時中知民意以安四鄉此劒一用如雷霆之震也四封之内無不賔服而聴從君命者矣此諸侯之劒也王曰庻人之劒何如曰庻人之劒蓬頭突垂冠曼胡之纓短後之衣瞋目而語難相擊於前上斬頸領下決肝肺此庻人之劒無異於闘雞一旦命已絶矣無所用於國事今大王有天子之位而好庻人之劒臣為大王薄之王乃牽而上殿宰人上食王三環之三環繞饌三周不能坐食荘子曰大王安坐定氣劒事已畢奏矣於是文王不出宫三月劒士皆服斃其處也忿不見禮皆自死漁父第三十一孔子逰乎緇帷之林休坐乎杏壇之上弟子讀書孔子弦歌鼓琴奏曲未半緇帷黒林名也本或作惟杏壇壇名有漁父者下船而來須眉交白被髪揄袂行原以上距陸而止左手據膝右手持頥以聴曲終漁父一云是范蠡揄音俞謂垂手衣内而行也距至也而招子貢子路二人俱對客指孔子曰彼何為者也子路對曰魯之君子也客問其族子路對曰族孔氏客曰孔氏者何治也子路未應子貢對曰孔氏者性服忠信身行仁義飾禮樂選人倫上以忠於世主下以化於齊民将以利天下此孔氏之所治也又問曰有土之君與子貢曰非也侯王之佐與子貢曰非也客乃笑而還行言曰仁則仁矣恐不免其身苦心勞形以危其真嗚呼逺哉其分於道也子貢還報孔子孔子推琴而起曰其聖人與乃下求之至於澤畔方将杖拏而引其船顧見孔子還鄉而立孔子反走再拜而進客曰子将何求孔子曰曩者先生有緒言而去丘不肖未知所謂待於下風幸聞咳唾之音以卒相丘也客曰嘻甚矣子之好學也孔子再拜而起曰丘少而修學以至於今六十九嵗矣無所得聞至教敢不虚心客曰同𩔖相從同聲相應固天之理也吾請釋吾之所有而經子之所以子之所以者人事也天子諸侯大夫庻人此四者自正治之美也四者離位而亂莫大焉官治其職人憂其事乃無所陵故田荒室露衣食不足徴賦不屬妻妾不和長少無序庻人之憂也能不勝任官事不治行不清白羣下荒怠功美不有爵禄不持大夫之憂也廷無忠臣國家昬亂國技不巧貢職不美春秋後倫不順天子諸侯之憂也春秋後倫朝覲不及等是隂陽不和寒暑不時以傷庻物諸侯暴亂擅相攘伐以殘民人禮樂不節財用窮匱人倫不飭百姓淫亂天子有司之憂也今子既上無君侯有司之勢而下無大臣職事之官而擅飾禮樂選人倫以化齊民不㤗多事乎且人有八疵事有四患不可不察也非其事而事之謂之摠莫之顧而進之謂之侫希意道言謂之謟道音導不擇是非而言謂之䛕好言人之惡謂之䜛析交離親謂之賊稱譽詐偽以敗惡人謂之慝不擇善否兩容頰適偷㧞其所欲謂之險此八疵者外以亂人内以傷身君子不友明君不臣所謂四患者好經大事變更易常以挂功名謂之叨挂音卦專知擅事侵人自用謂之貪見過不更聞諫愈甚謂之狠人同於己則可不同於已雖善不善謂之矜此四患也能去八疵無行四患而始可教已孔子愀然而歎再拜而起曰丘再逐於魯削迹於衛伐樹於宋圍於陳蔡丘不知所失而離此四謗者何也客悽然變容曰甚矣子之難悟也人有畏影惡迹而去之走者舉足愈數而迹愈多走愈疾而影不離身自以為尚遲疾走不休絶力而死不知處隂以休影處靜以息迹愚亦甚矣子審仁義之間察同異之際觀動靜之變適受與之度理好惡之情和喜怒之節而幾於不免矣謹修而身慎守其真還以物與人則無所累矣今不修之身而求之人不亦外乎孔子愀然曰請問何謂真客曰真者精誠之至也不精不誠不能動人故强哭者雖悲不哀强怒者雖嚴不威强親者雖笑不和真悲無聲而哀真怒未發而威真親未笑而和真在内者神動於外是所以貴真也其用於人理也事親則慈孝事君則忠貞飲酒則歡樂處䘮則悲哀忠貞以功為主飲酒以樂為主處䘮以哀為主事親以適為主功成之美無一其迹矣事親以適不論所以矣飲酒以樂不選其具矣處䘮以哀無問其禮矣禮者世俗之所為也真者所以受於天也自然不可易也故聖人法天貴真不拘於俗愚者反此不能法天而恤於人不知貴真碌碌而受變於俗故不足惜哉子之蚤湛於偽而晚聞大道也孔子又再拜而起曰今者丘得過也若天幸然先生不羞而比之服役而身教之敢問舍所在請因受業而卒學大道客曰吾聞之可與徃者與之至於妙道不可與徃者不知其道慎勿與之身乃無咎子勉之吾去子矣吾去子矣乃刺船而去延縁葦間顔淵還車子路授綏孔子不顧待水波定不聞拏音而後敢乗子路旁車而問曰由得為役久矣未嘗見夫子遇人如此其威也萬乗之主千乗之君見夫子未嘗不分庭伉禮夫子猶有倨傲之容今漁父杖拏逆立而夫子曲要磬折再拜而應得無太甚乎門人皆怪夫子矣漁父何以得此乎孔子伏軾而歎曰甚矣由之難化也湛於禮義有間矣而樸鄙之心至今未去進吾語汝夫遇長不敬失禮也見賢不尊不仁也彼非至仁不能下人下人不精不得其真故長傷身惜哉不仁之於人也禍莫大焉而由獨擅之且道者萬物之所由也庻物失之者死得之者生為事逆之則敗順之則成故道之所在聖人尊之今漁父之於道可謂有矣吾敢不敬乎此篇言無江海而間者能下江海之士也夫孔子之所放任豈直漁父而已哉将周流六虛旁通無外蝡動之𩔖咸得盡其所懐而窮理致命固所以為至人之道也列御冦第三十二列御冦之齊中道而反遇伯昬瞀人伯昬瞀人曰奚方而反方道也曰吾驚焉曰惡乎驚曰吾嘗食於十賣之家讀曰漿十家並賣漿也而五先饋言其敬已五先饋饋遺也謂十家中五家先見遺伯昬瞀人曰若是則汝何為驚已曰夫内誠不解外自矜飾形諜成光舉動便僻而成光儀也形諜間也成光形諜於衷成光華也以外鎮人心其内實不足以服物使人輕乎貴老若鎮物由乎内實則使人貴老之情篤也貴老謂重禦冦過於老人而其所患信以美形動物則所患亂生也子兮反亂也夫人特為食羮之貨多餘之贏其為利也薄其為權也輕而猶若食權輕利薄可無求於人而况於萬乗之主乎身勞於國而知盡於事彼将任我以事而效我以功吾是以驚伯昬瞀人曰善哉觀乎汝處已人将保汝矣茍不遺形則所在見保保者守聚之謂也無幾何而徃則户外之屨滿矣伯昬瞀人北面而立敦杖蹙之乎頥立有間不言而出賔者以告列子列子提屨跣而走暨乎門曰先生既來曽不發藥乎曰已矣吾固告汝曰人将保汝果保汝矣非汝能使人保汝而汝不能使人無保汝也任平而化則無感無求無感無求乃不相保敦音頓䜿也賔者本亦作儐而焉用之感豫出異也先物施惠惠不因彼豫出則異也必且有感搖而本性又無謂也必将有感則為本性動也與汝逰者又莫汝告也彼所小言盡人毒也細巧入人為小言小言言不入道故曰小言人毒以其多患故曰人毒莫覺莫悟何相孰也巧者勞而知者憂無能者無所求食而遨逰汎若不繫之舟虚而遨逰者也夫無其能者唯聖人耳過此以下至於昆蟲未有自忘其能而任衆人者也鄭人緩也呻吟裘氏之地呻吟吟詠之謂緩名也呻謂吟詠學問之聲也裘儒服也祗三年而緩為儒祗適也河潤九里澤及三族使其弟墨儒墨相與辯其父助翟翟緩弟名河潤九里河從乾位來乾陽數九也使其弟墨謂使緩弟翟成墨也十年而緩自殺其父夣之曰使而子為墨者予也闔胡嘗視其良既為秋栢之實矣緩怨其父之助弟故感激自殺死而見夢謂己既能自化為儒又化弟令墨弟由己化而不能順己己以良師而便怨死精誠之至故為秋栢之實闔語助也胡何也良者良人謂緩也言何不試視緩墓上己化為秋栢之實良或作浪音涙冢也夫造物者之報人也不報其人而報其人之天自此以下荘子辭也夫積習之功為報報其性不報其為也然則學習之功成性而已豈為之成彼故使彼彼有彼性故使習彼夫人以已為有以異於人以賤其親言緩自美其儒謂已能有積學之功不知其性之自然也夾有功以賤物者不避其親也無其身以平性者貴賤不失其倫也齊人之井飲者相捽也故曰今之世皆緩也夫穿井所以通泉吟詠所以通性也無泉亦無所穿無性則無所詠而世皆忘其泉性之自然徒議穿詠之末功因欲矜而有之不亦妄乎自是有德者以不知也而況有道者乎觀緩之繆以為學久故能任其自爾而知故無為乎其間也知音智古者謂之遁天之刑仍自然之能以為已功者逃天者也故刑戮及之聖人安其所安不安其所不安夫聖人無安無不安順百姓之心也衆人安其所不安不安其所安所安相與異故所以為衆人也荘子曰知道易勿言難知而不言所以之天也知而言之所以之人也古之人天而不人知雖譽天地未嘗開言以引物也應其至分而已朱泙漫學屠龍於支離益單千金之家三年技成而無所用其巧事在於適無貴於遠功泙音平單盡也聖人以必不必故無兵理雖必然猶不必之斯至順矣兵其安有衆人以不必必之故多兵理雖未必抑而必之各必其所見則逆生順於兵故行有求物各順性則足足則無求順或作真兵恃之則亡不得已而用之以恬淡為上者未之亡也小夫之知不離苞苴竿牘苞苴以遺竿牘以問遺問之具小知所殉知音智苞苴有包裹也竿牘謂竹簡為書以相問遺敝精神乎蹇淺昬於小務所得者淺而欲兼濟道物大一形虚若是者迷惑于宇宙形累不知太初小夫之知而欲兼濟道物經虚渉逺志大神敝形為之累則迷惑而失致也道音導彼至人者歸精神乎無始而甘𡨕乎無何有之鄉水流乎無形發泄乎太清澹然無為而任其天行也悲哉乎汝為知在毫毛為知所得者細而不知大寧任拙大寧而至宋人有曹商者為宋王使秦其徃也得車数乗王説之益車百乗反於宋見荘子曰夫處窮閭阨巷困窘織屨槁項黄馘者商之所短也一悟萬乗之主而從車百乗者商之所長也荘子曰秦王有病召醫破癕潰痤者得車一乗舐痔者得車五乗所治愈下得車愈多子豈治其痔邪何得車之多也子行矣夫事下然後功髙功髙然後禄重故髙逺恬淡者遺荣也馘古獲反謂面黄熱也魯哀公問乎顔闔曰吾以仲尼為貞幹國其有瘳乎曰殆哉汲乎仲尼汲危也夫至人以民靜為安今一為貞幹則遺髙迹於萬世令飾兢於仁義而雕畫其毛彩百姓既危至人亦無以為安方且飾羽而畫凡言方且皆謂後世從事飾畫非任真也從事華辭以支為㫖将令後世之從事者無實而意趣横出也忍性以視民而不知不信後世人君将慕仲尼之遐而遂忍性自矯偽以臨民上下相習遂不自知也視音示受乎心宰乎神夫何足以上民令以上民則後世百姓非直外形從之而已乃以心神受面用之不能復自得於體中也彼宜女彼百姓也女哀公也彼與女各自有所宜相效則失真此即今之見驗予頥與效彼非所以飬已也誤而可矣正不可也今使民離實學偽非所以視民也為後世慮不若休之明不謂當時也難治也治之則偽故聖人不治也施於人而不忘非天布也布而識之非芻狗萬物也施如豉反商賈不齒况士君子乎賈音古雖以士齒之神者弗齒要能施惠故於事不得不齒以其不忘故心神忽之此百姓之大情為外刑者金與木也金謂刀鋸斧鉞木謂捶楚桎梏為内刑者動與過也靜而當則内外無刑宵人離外刑者金木訙之不由眀坦之塗者謂之宵人宵人非眀正之徒謂之宵夜之人也訙本人作訊音信問也離内刑者隂陽食之動而過分則性氣傷於内金木訊於外也夫免乎内外之刑者唯真人能之自非其人未有能止其分者故必外内受刑但不問訊耳孔子曰凡人心險於山川難於知天天猶有春秋冬夏旦暮之期人者厚貌深情故有貌愿而益有長若不肖有順懁而達者有堅而縵有緩而釬言人情貌之反有如此者懁音環又音絹三蒼云腹急也一云研辯也外順研辯嘗務質訥縵武諌反内堅實外如縵也釬胡旦反又音干急也故其就義若渴者其去義若熱但為難知耳未為殊無迹故君子逺使之而觀其忠近使之而觀其敬煩使之而觀其能卒然問焉而觀其知急與之期而觀其信委之以財而觀其仁告之以危而觀其莭醉之以酒而觀其則雜之以處而觀其色九徴至不肖人得矣君子易觀不肖難眀然視其所以觀其所由察其所安搜之有塗亦可知也則或作側不正也謂醉者喜傾側冠也正考父一命而傴再命而僂三命而俯循牆而走孰敢不軌言人不敢以不軌之事侮之正考父宋湣公之𤣥孫弗父何之曽孫傴紅矩反偻力矩反三命上士一命大夫再命卿三命如而夫者一命而吕鉅再命而於車上儛三命而名諸父孰協唐許而夫謂凡夫也唐謂堯許謂許由也言而夫為考父者誰同於唐許之事也吕鉅矯貌賊莫大乎德有心有心於為德非真德也夫真德者忽然自得而不知所以德也而心有睫有心為徳猶之可耳役心於眉睫之間則偽已甚矣睫音接及其有睫也而内視内視而敗矣乃欲探射幽隱以深為事則心與事俱敗矣凶德有五中德為首何謂中德中德也者有以自好也而吡其所不為者也吡訾也夫自是而非彼則攻之者非一故為㓙首也若中無自好之情則恣萬物之所是所是各不自失則天下皆思奉之矣吡匹爾反窮有八極達有三必形有六府美髯長大壮䴡勇敢八者俱過人也因以是窮窮於受役也然天下未曽窮於所短而恒以所長自困縁循偃佒困畏不若人三者俱通達縁循杖物而行者也偃佒不能自執者也困畏怯弱者也此三者既不以事見任乃将接佐之故通達也佒於丈反本亦作央偃佒守分歸一也知慧外通通外則以無涯傷其内也知音智勇動多怨怯而靜乃厚其身耳仁義多則天下皆望其愛然愛之則有不周矣故多責達生之情者傀傀然大恬解之貌傀呼懐反逹於知者肖肖失散也知音智達大命者隨泯然與化俱也達小命者遭毎在節上住乃悟也人有見宋王者賜車十乗以其十乗驕穉荘子荘子曰河上有家貧恃緯蕭而食者其子沒於淵得千金之珠其父謂其子曰取䂖來鍜之夫千金之珠必在九重之淵而龍頷下子能得珠者必遭其睡也使龍而寤子尚奚㣲之有哉今宋國之深非直九重之淵也宋王之猛非直龍也子能得車者必遭其睡也使宋王而寤子為粉夫夫取富貴必順乎民望也若挾竒説乗天衢以嬰人主之心者明君之所不受也故如有所譽必有所試於斯民不違僉曰舉之以合萬夫之望者此三代所以直道而行之也或聘於荘子荘子應其使曰子見夫犧牛乎衣以文繡食以芻菽及其牽而入於太廟雖欲為孤犢其可得乎樂生者畏犧而辭聘髑髅聞生而臏此死生之情異而各自當也荘子将死弟子欲厚葬之荘子曰吾以天地為棺槨以日月為連璧星辰為珠璣萬物為齎送吾葬具豈不備耶何以加此弟子曰吾恐烏鳶之食夫子也荘子曰在上為烏鳶食在下為蝼蟻食奪彼與此何其偏也以不平平其平也不平以一家之平平萬物未若任萬物之自平也以不徴徴其徴也不徴徴應也不因萬物之自應而欲以其所見應之則必有不合矣明者唯為之使夫執其所見受使多矣安能使物哉神者徴之唯任神然後能至順故無徃不應也夫眀之不勝神也久矣眀之所及不過於形骸也至順則無逺近幽深皆各自得也而愚者恃其所見入於人其功外也不亦悲乎夫至順則用發于彼而功藏於物若恃其所見執其自是雖欲入人其功之外也天下第三十三天下之治方術者多矣皆以其有為不可加矣為其所有為則真為也為其真為則無為矣又何加焉古之所謂道術者果惡乎在曰無乎不在曰神何由降眀何由出神明由事感而後降出惡音烏聖有所生王有所成皆原於一使物各復其根抱一而已無飾於外斯聖王所以生成也不離於宗謂之天人不離於精謂之神人不離於真謂之至人以天為宗以德為本以道為門兆於變化謂之聖人凡此四名一人耳所不言之異以仁為恩以義為理以禮為行以樂為和薫然慈仁謂之君子此四名之粗迹而賢人君子之所服膺也以法為分以名為表以参為驗以稽為决其數一二三四是也百官以此相齒以事相常以衣食為主蕃息畜藏老弱孤寡為意皆有以養民之理也民理既然故聖賢不逆古之人其備乎古之人即向之四名也配神明醇天地育萬物和天下澤及百姓眀於本数係於末度本数明故末不離六通四辟小大精粗其運無乎不在所以為備其眀而在厯数者舊法世傳之史尚多有之其在数度而可明者雖多有之已疏外也其在於詩書禮樂者鄒魯之士搢紳先生多能眀之能明其迹耳豈所以迹哉詩以道志書以道事禮以道行樂以道和易以道隂陽春秋以道名分其数散於天下而設於中國者百家之學時或稱而道之皆道古人之陳迹耳尚復不能常稱天下大亂用其迹而無統故也賢聖不眀能眀其迹又未易也道德不一百家穿鑿天下多得一各信其偏見而不能都舉也察焉以自好夫聖人統百姓之大情而因為之制故百姓寄情於所統而自忘其好惡故與一世而得澹漠焉亂而反之人恣其近好家用典法故國異政家殊俗譬如耳目鼻口皆有所眀不能相通猶百家衆技也皆有所長時有所用所長不同不得常用雖然不該不徧一曲之士也故未足備任也判天地之美析萬物之理各用其一曲故析判察古人之全寡能備於天地之美稱神眀之容况一曲者乎是故内聖外王之道闇而不眀鬰而不發全人難遇故也天下之人各為其所欲焉以自為方悲夫百家徃而不反必不合矣後世之學者不幸不見天地之純古人之大體大體各歸根抱一則天地之純也道術將為天下裂裂分離也道術流弊遂各奮其方或以主物則物離性以從其上而性命䘮矣不侈於後世不靡於萬物不暉於數度勤儉則瘁故不暉也以䋲墨自矯矯厲也而備世之急勤而儉則財有餘而急有備古之道術有在於是者墨翟禽滑聞其風而説之為之大過已之大順不復度衆所能也禽滑墨翟弟子也不順五帝三王之樂嫌其奢説音悦作為非樂命之曰節用生不歌死無服墨子汜愛兼利而非鬬夫物不足則以闘為是今墨子令百姓能勤儉各有餘故以闘為非也非樂節用墨子二篇名汜敖劒反其道不怒但自刻也又好學而博不異既自以為是則欲令萬物皆同乎已也不與先王同先王則恣其羣異然後同焉皆得而不知所以得也毁古之禮樂嫌其侈靡黄帝有咸池堯有大章舜有大韶禹有大夏湯有大濩文王有辟雍之樂武王周公作武古之䘮禮貴賤有儀上下有等天子棺槨七重諸侯五重大夫三重士再重今墨子獨生不歌死不服桐棺三寸而無槨以為法式以此教人恐不愛人以此自行固不愛已物皆以任力稱情為愛今以勤儉為法而為之太過雖欲饒天地更非所以為愛也未敗墨子道但非道德敗或作毁墨子是一家之正故不可以為敗也雖然歌而非歌哭而非哭樂而非樂是果𩔖乎雖獨成墨而不𩔖萬物之情其生也勤其死也薄其道大觳觳無潤也觳若角反使人憂使人悲其行難為也恐其不可以為聖人之道夫聖人之道恱以使民民得性之所樂則恱恱則天下無難矣反天下之心天下不堪墨子雖獨能任奈天下何離於天下其去王也逺矣王者必合天下之懽心而與物俱徃也墨子稱道曰昔者禹之湮洪水决江河而通四夷九州也名山三百支山三千小者無数禹親自操槖耜而九雜天下之川腓無胈脛無毛沐甚風櫛疾雨置萬國禹大聖也而形勞天下也如此墨子徒見禹之形勞耳未覩其性之適也槖盛土器也耜似也似齒断物三蒼云耒頭鐡也九音鳩本亦作鳩聚也雜本作籴音同所治非一故曰雜也腓音肥胈步葛反使後世之墨者多以裘褐為衣以蹻為服日夜不休以自苦為極謂自苦為盡理之法麻曰屩木曰屐屐與跂同屩與蹻同一云鞋𩔖也曰不能如此非禹之道也不足謂墨非其時而守其道所以為墨也相里勤之弟子五侯之徒南方之墨者苦獲已齒鄧陵子之属俱誦墨經而倍譎不同相謂别墨必其各守所見則所在無通故於墨之中又相與别也相息亮反姓相里名勤苦獲已齒二人姓字也以堅白同異之辯相訾以觭偶不仵之辭相應以巨子為聖人巨子最能辯其所是以成其行墨家號其道理成者為鉅子若儒家之碩儒皆願為之尸尸者主也冀得為其後世至今不决為欲係巨子之業也墨翟禽滑之意則是意在不侈靡而備世之急斯所以為是其行則非也為之大過故也将使後世之墨者必自苦以腓無胈脛無毛相進而已矣亂之上也亂莫大於逆物而傷性也治之下也任衆適性為上今墨反之故為下雖然墨子真天下之好也為其真好重聖賢不逆也但不可以教人将求之不得也無輩雖枯槁不也所以為真好也才士也夫非有德也不累於俗不飾於物不茍於人不忮於衆忮逆也願天下之安寧以活民命人我之養畢足而止不敢望有餘也以此白心古之道術有在於是者宋鈃尹文聞其風而悦之作為華山之冠以自表華山上下均平白心眀白其心也白或作任鈃音刑尹文齊宣王時人著書二篇華山之冠華山上下均平作冠象之表已心均平也接萬物以别宥為始不欲令相犯錯語心之容命之曰心之行以合驩以調海内强以其道㬉令合調令和也音而色厚貌請欲置之以為主二子請得若此者立以為物主也見侮不辱其於以活民為急也救民之鬬禁攻寢兵救世之戰所謂調以此周行天下上説下教雖天下不取强䀨而不者也調之理然也故曰上下見厭而强見也所謂不辱雖然其為人太多其自為太少不因其自化而强以慰之則其功太重也曰請欲固置五升之飯足矣斯眀自為之太少也先生恐不得飽弟子雖飢不忘天下宋鈃尹文稱天下為先生自稱為弟子也日夜不休曰我必得活哉謂民亦當報已也圖傲乎救世之士哉揮斥髙大之貌曰君子不為苛察務寛恕也不以身假物必自出其力也以為無益於天下者眀之不如已也所以為救世之士也以禁攻寢兵為外以情欲寡淺為内其小大精粗其行適至是而止未能經虚涉曠公而不黨易而無私决然無主各自任也物而不兩物得所趣故一不顧於慮不謀於知於物無擇與之俱徃古之道術有在於是者彭蒙田駢慎到聞其風而悦之齊萬物以為首曰天能覆之而不能載之地能載之而不能覆之大道能包之而不能辯之知萬物皆有所可有所不可故曰選則不徧都用乃周教則不至任其性乃至道則無遺者矣是故慎到棄知去已而縁不得已泠汰於物以為道理泠汰猶聴放也曰知不知将薄知而後鄰傷之者也謂知力淺不知任其自然故薄之而又鄰傷焉謑髁無任而笑天下之尚賢也不肯當其任而任夫衆人衆人各自能則無為横復尚賢也謑音奚耻也髁户寡反謑髁謹刻也無任無所施任也雖謹刻於法而猶能不自任以事事不與衆共之則無為尚賢所以笑也縱脱無行而非天下之大聖欲壊其迹使物不殉椎拍輐㫁與物宛轉法家雖妙猶有椎拍故未泯合輐五管反圎也㫁丁管反方也一云椎拍輐㫁皆刑截者所用是與非茍可以免不師知慮不知前後不能知是之與非前之與後䁕目恣性茍免當時之患也魏然而已矣任性獨立魏魚威反椎而後行曳而後徃所謂縁於不得已若飄風之還若羽之旋若磨石之隧全而無非動静無過未嘗有罪是何故夫無知之物無建已之患無用知之累動靜不離於理是以終身無譽患生於譽譽生於有建隧音遂回也故曰至於若無知之物而已無用賢聖唯聖人然後能去知與故循天之理故愚知處宜貴賤當位賢不肖襲情而云無用賢聖所以為不知道也夫塊不失道欲令去知如土塊也亦為凡物云云皆無縁得道道非偏物也豪傑相與笑之曰慎到之道非生人之行而至死人之理夫去知任性然後神明洞照所以為賢聖也而云土塊乃不失道人若土塊非死而何豪傑所以也適得怪焉未合至道故為詭怪田駢亦然學於彭䝉得不教焉得自任之道也彭蒙之師曰古之道人至於莫之是莫之非而已矣所謂齊萬物以為言其風窢然悪可而言逆風所動之聲窢字亦作罭又作閾况逼反逆風聲常反人不見觀不順民望而不免於魭㫁雖立法而魭㫁無圭角也魭五管反其所謂道非道而所言之韙不免於非韙是也彭蒙田駢慎到不知道道無所不在而云土塊乃不失道所以為不知雖然㮣乎皆嘗有聞者也但不聞也以本為精以物為粗以有積為不足寄之天下乃有餘也澹然獨與神眀居古之道術有在於是者闗尹老聞其風而悦之建之以常無有夫無有何所能建建之以常旡有則明有物之自建也闗尹闗令尹喜也或云尹喜字公度老子為喜著書十九篇主之以太一自天地以及羣物皆各自得而已不兼他飾斯非主之以太一邪以濡弱謙下為表以空虚不毁萬物為實闗尹曰在已無居物來則應應而不藏故功隨物去濡如朱反形物自著不自是而委萬物故物形各自彰著其動若水其静若鏡其應若響常無情也芴乎若亡寂乎若清同焉者和得焉者失嘗全者不知所得也芴音忍未嘗先人而常隨人老曰知其雄守其雌為天下谿知其白守其辱為天下谷物各自守其分則靜黙而已無雄白也夫雄白者非尚勝自顯耶尚勝自顯非逐知過分以殆其生邪故古人不隨無崖之知守其分内而已故其性全其性全然後能及天下能及天下然後歸之如谿谷人皆取先己獨取後不與萬物争然後天下樂推而不厭故後其身曰受天下之垢雌辱後下之𩔖皆物之所謂垢人皆取實唯知有之以為利未知無之以為用己獨取虛守冲泊以待羣實無藏也故有餘付萬物使各自守故不患其守巋然而有餘獨立自足之謂其行身也徐而不費因民所利而行之隨四時而成之常與道理俱故無疾無費也無為也而笑巧巧者有為以傷神器之自成故無為者因其自生任其自成萬物各得自為蜘蛛猶能結網則人人自有所能矣無貴于工倕也人皆求福已獨曲全委順至理則常全故無所求福福已足曰茍免於咎隨物故物不得咎也以深為根理根為太初之極不可謂之淺也以約為紀去甚㤗也曰堅則毁矣夫至順則雖金石無堅也迕逆則雖水氣無耎也至順則全忤逆則毁斯正理也鋭則挫矣進躁無崖為鋭常寛容於物各守其分則自容有餘也不削於人全其性也可謂至極闗尹老乎古之博大真人哉芴漠無形變化無常隨物也死與生與天地並與神眀徃與任化也芒乎何之忽乎何適無意趣也萬物畢羅莫足以歸故都任置古之道術有在於是者荘周聞其風而悦之以謬悠之説荒唐之言無端崖之辭時恣縱而不儻不以觭見之也不急欲使物見其意以天下為沈濁不可與荘語累於形名以荘語為狂而不信故不與也以巵言為曼衍以重言為真以寓言為廣獨與天地精神徃來而不敖倪於萬物其言通至理正當萬物之性命也不譴是非已無是非故恣物而行以與世俗處形羣於物其書雖瑋而連犿無傷也還與物合故無傷也犿芳𡊮反皆宛轉貌其辭雖参差而諔詭可觀不唯應當時之務故参差彼其充實不可以已多所有也上與造物者遊而下與外死生無終始者為友其於本也𢎞大而辟深閎而肆其於宗也可謂稠適而上遂矣雖然其應於化而解於物也其理不竭其來不蜕芒乎昧乎未之盡者荘子通以平意説已與説他人無異也案其辭明為汪汪然禹拜昌言亦何嫌乎此也惠施多方其書五車其道舛駁其言也不中麻物之意麻古歴字歴物之意分别歴説之曰至大無外謂之大一至小無内謂之小一無外不可一無内不可分故謂之一也天下所謂大小皆非形所謂一二非至名也至形無形至名無名無厚不可積也其大千里物言形為有形之外為無無形與有相為表裏故形物之厚盡於無厚無厚與有同一躰也其有厚大者其無厚亦大髙因廣立有因無積則其可積因不可積者茍其可積何但千里乎天與地卑山與澤平卑如字又音婢李云以地比天則地卑於天若宇宙之髙則天地皆平天地皆卑則山與澤平矣日方中方睨物方生方死睨音詣側視也謂日方中而景已復昃謂景方昃而光已復没謂光方沒而眀已復升凡中側之與升沒若轉樞循環自相與為前後始終無别則存亡死生與之何殊也大同而與小同異此之謂小同異萬物畢同畢異此之謂大同異同體異分故曰小同異死生禍福寒暑晝夜動靜變化衆辯莫同畢之至也衆異同於一物同之至也則萬物之同異一矣若堅白無不合無不離也若火含隂水含陽火中之隂異於水水中之陽異於火然則水異於水火異於水至異異所同至同同所異故曰大同異南方無窮而有窮四方無窮也四方無窮故無四方上下皆不能處其窮會有窮耳一云知四方之無窮是以無無窮無窮也形不盡形色不盡色形與色相盡也知不窮知物不窮物知與物相盡也獨言南方舉一隅也今日適越而昔來智之適物物之適智形有所止智有所行智有所守形有所從故形智徃来相為逆旅也鑒影而鑒亦有影兩鑒相鑒則重影無窮萬物入於一智而智無間萬物入於一物而物無朕天在心中則身在天外心在天内則天在心外也逺而思親者徃也病而思親者來也智在物為物物在智為智司馬云彼日猶此日則見此猶見彼也彼猶此見則吴與越人交相見矣連環可解也夫物盡於形形盡之外則非物也連環所貫貫於無環非貫於環也若兩環不相貫則雖連環故可解也我知天之中央燕之北越之南是也燕之去越有数而南北之逺無窮由無窮有数則燕越之間未始有分也天下無方故所在為中循環無端故所行為始也汜愛萬物天地一體也日月可而目不可見愛出於身而所愛在物天地為首足萬物為五臟故肝膽之别合於一人一人之别合於一體也惠施以此為大觀於天下而曉辨者天下之辨者相與樂之觀古亂反於天下所謂自以為最也樂音洛卵有毛胎卵之生必有毛羽雞伏鵠卵卵不為雞則生𩔖於鵠也毛氣成毛羽氣成羽雖胎卵未生而毛羽之性已著矣故鳶肩蜂眉寄感之分也龍顔虎喙威靈之氣也神以引眀氣以成質質之所尅如户牖明暗之懸以晝夜性相近習相逺則性之明逺有習於生雞三足雞兩足所以行而非動也故行由足發動由神御今雞雖兩足須神而行故曰三足也郢有天下郢楚都也在江陵北七十里九州之内於宇宙之中未萬中之一分也故舉天下者以喻盡而名大夫非大若各指其所有而言其未足雖郢方千里亦可有天下也犬可以為羊各以名物而非物也大羊之名非犬羊也非羊可以名為羊則犬可以名羊鄭人謂玉未理者曰璞周人謂䑕腊者亦曰璞故形在於物名在於人馬有卵形之所託名之所寄皆假耳非真也故犬羊無定名胎卵無定形故鳥可以有胎馬可以有卵也一云小異者大同犬羊之為胎卵無分於鳥馬也丁子有尾夫萬物無定形形無定稱在上為首在下為尾世人謂右行曲波為尾今丁子二字雖左行曲波亦是尾也火不熱木生於水火生於木木以水潤火以木光金寒於水而熱於火而寒熱相兼無窮水火之性有盡謂火熱水寒是偏舉也偏舉則水熱火寒可也一云猶金木加於人有楚痛楚痛發於人而金木非楚痛也如處火之鳥火生之蟲則火不熱也山出口形聲氣色合而成物律吕以聲兼形𤣥黄以色兼質呼於一山一山皆應一山之聲入於耳形與聲並行是山猶耳口也輪不蹍地地平輪圎則輪之所行者跡也目不見水中視魚必先見水光中視物必先見光魚之濡鱗非曝鱗異於曝鱗則視濡也光之曜形異於不曜則視見於曜形非見形也目不夜見非暗晝見非明有假也所以見者明也目不假光而後眀無以見光故目之于物未嘗有見也指不至至不絶夫指之取物不能自至要假物故至也然假物由指不絶也一云指之取火以針刺䑕以錐故假于物指是不至也龜長於蛇蛇形雖長而命不久龜形雖短而命甚長矩不方規不可以為圎矩雖為方而非方規雖為圎而非圎譬䋲為直而非直也鑿不圍枘枘如鋭反鑿枘異質合為一形鑿積于枘則鑿枘異圍鑿枘異圍是不相圍也飛鳥之景未嘗動景音影鳥之蔽光猶魚之蔽水魚動蔽水而水不動鳥動影生影有光亡亡非徃生非來墨子曰影不徙也鏃矢之疾而有不行不止之時形分止勢分行形分明者行遲勢分明者行疾自眀無形分無所止則其疾無間矢疾而有間者中有止也質薄而司離中有無及者也狗非犬狗犬同實異名名實合則彼所謂狗此所謂犬也名實離則彼所謂狗異于犬也黄馬牛三以二為三曰牛曰馬曰牛馬形之三也曰黄曰曰黄色之三也曰黄馬曰牛曰黄馬牛形與色為三也故曰一與一為一二與一為三也白狗黒狗之目𦕈謂之𦕈狗狗之目大不曰大狗此乃一是一非然則白狗黒目亦可謂黒狗孤駒未嘗有母一尺之棰日取其半萬世不竭孤駒未嘗有母駒生有母言孤則無母孤解立則母名失也母嘗為駒之母故孤駒未嘗有母也棰杖也若其可折其一嘗存故曰萬世不竭辯者以此與惠施相應終身無窮桓團公孫龍辯者之徒桓團人姓名飾人之心易人之意能勝人之口不能服人之心辯者之囿也惠施日以其知與人之辯特與天下之辯者為怪此其抵也然惠施之口談自以為最賢曰天地其壮乎施存雄而無術天地其壮乎惠施唯以天地為壮于己也施存雄而無術意在勝人而無道理之術南方有倚人焉曰黄繚問天地所以不墜不䧟風雨雷霆之故倚人本或作椅同紀宜反異也惠施不辭而應不慮而對徧為萬物説説而不休多而無已猶以為寡益之以怪以反人為實而欲以勝人為名是以與衆不適也弱於德强於物其塗隩矣隩深也謂其道深由天地之道觀惠施之能其猶一蚉一䖟之勞者也其於物也何庸夫充一尚可曰愈貴道幾矣自謂所慕愈貴近于道也惠施不能以此自寧散於萬物而不厭卒以善辯為名惜乎惠施之才駘蕩而不得逐萬物而不反是窮響以聲形與影兢走也悲夫昔吾未覧荘子嘗聞論者争夫尺棰連環之意而皆云荘生之言遂以荘生為辯者之流案此篇較評諸子至于此章則曰其道舛駁其言不中乃知道聴塗説之傷實也吾意亦謂無經國體致真所謂無用之談也然膏之子均之戱豫或倦于典言而能辯名析理以宣其氣以係其思流于後世使性不邪淫不猶賢于博奕者故存而不論以貽好事也子𤣥之註論其大體真可謂得荘生之㫖矣郭生前歎膏梁之塗説余亦已覩貴逰之妄誤斯所謂異代同風何可復言也或曰荘惠標濠梁之契發郢匠之謨而云其書五車其言不中何也豈契若郢匠褒國寢斤而相非之言如此之甚者也荅曰夫不失欲拯有教之肆神明其言者豈得不善其辭而盡其喻乎荘主振徽音七篇列斯文於世重言盡涉𤣥之路從事展有辭之叙雖談無貴辨而教無虛唱然其文易覧其趣難窺造懐而未逹者有過理之嫌袪斯之弊故大與惠子之云辨也荘子注卷十
