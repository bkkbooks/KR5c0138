body:
  text: 莊子注巻二晉郭象注養生主第三夫生以養存則養生者理之極也若乃養過其極以養傷生非養生之主也吾生也有涯所稟之分各有極也而知也無涯夫舉重攜輕而神氣自若此力之所限也而尚名好勝者雖復絶膂猶未足以慊其願此知之無涯也故知之為名生於失當而滅於𡨕極㝠極者任其至分而無毫銖之加是故雖負萬鈞茍當其所能則忽然不知重之在身雖應萬機冺然不覺事之在己此養生之主也知音智以有涯隨無涯殆己以有限之性尋無極之知安得而不困哉己而為知者殆而已矣己困於知而不知止又為知以救之斯養而傷之者真大殆也為善無近名為惡無近刑忘善惡而居中任萬物之自為悶然與至當為一故刑名逺己而全理在身也緣督以為經順中以為常也縁順也督中也經常也可以保身可以全生可以養親養親以適養羊尚反可以盡年茍得中而㝠度則事事無不可也夫養生非求過分盖全理盡年而已矣庖丁為文惠君解牛手之所解肩之所倚足之所履膝之所踦砉然嚮然奏刀騞然莫不中音合於桑林之舞乃中經首之㑹言其因便施巧無不開解盡理之甚既適牛理又合音節庖人丁其名也管子有屠牛坦一朝解九牛刀可剃毛為于偽反文惠君梁惠王也砉音畫皮骨相離聲奏如字開也騞音近獲聲大於砉也中丁仲反下皆同桑林宋舞樂名案即左𫝊舞師題以旌夏是也經首咸池樂章也文惠君曰譆善哉技盖至此乎庖丁釋刀對曰臣之所好者道也進乎技矣直寄道理於技耳所好者非技也譆音熈歎聲也始臣之解牛之時所見無非牛者未能見其理間三年之後未嘗見全牛也但見其理間也方今之時臣以神遇而不以目視闇與理㑹神遇向云闇與理㑹謂之神遇官知止而神欲行司察之官廢縱心而順理依乎天理不横截也批大郤有際之處因而批之令離批鋪迷反擊也郤音郄導大窽節解窽空就導令殊窽苦管反空也因其固然刀不妄加技經肯綮之未嘗技之妙也常遊刃於空未嘗經槩於㣲礙也肯苦等反著骨肉也肯著也綮音啟猶結處也而況大軱乎軱戾大骨衂刀肉也軱音孤軱戾大骨也良庖歳更刀割也不中其理間也歳一易刀猶堪割也族庖月更刀折也中骨而折刀也族衆也今臣之刀十九年矣所解數千牛矣而刀刃若新發於硎硎砥石也硎音刑磨石也彼節者有間而刀刃者無厚以無厚入有間恢恢乎其於遊刃必有餘地矣是以十九年而刀刃若新發於硎雖然每至於族吾見其難為交錯聚結為族怵然為戒視為止不復屬目於他物也為于偽反下皆同行為遲徐其手也動刀甚㣲謋然已解得其宜則用力少謋化百反如土委地理解而無刀迹若聚土也提刀而立為之四顧為之躊躇滿志逸足容豫自得之謂躊直留反躇直於反善刀而藏之拭刀而弢之也善刀善猶拭也文惠君曰善哉吾聞庖丁之言得養生焉以刀可養故知生亦可養公文軒見右師而驚曰是何人也惡乎介也介偏刖之名公文姓公文氏名軒宋人也右師宋人也介音戒一音兀偏則也天與其人與知之所無奈何天也犯其所知人也曰天也非人也天之生是使獨也偏則曰獨夫師一家之知而不能兩存其足則是知之無所奈何若以右師之知而必求兩全則心神内困而形骸外敝矣豈直偏刖而已哉人之貌有與也兩足共行曰有與有與之貌未有疑其非命也以是知其天也非人也以有與者命也故知獨者亦非我也是以達生之情者不務生之所無所為達命之情者不務命之所無奈何也全其自然而已澤雉十步一啄百步一飲不蘄畜乎樊中蘄求也樊所以籠雉也夫俯仰乎天地之間逍遥乎自得之場固養生之妙處也又何求於入籠而服養哉樊中藩也所以籠雉也神雖王不善也夫始乎適而未嘗不適者忘適也雖心神長王志氣盈豫而自放於清曠之地忽然不覺善之為善也王于況反老死秦失弔之三號而出人弔亦弔人號亦號老老子也弟子曰非夫子之友邪怪其不倚户觀化乃至三號也曰然然則弔焉若此可乎曰然至人無情與衆號耳故若斯可也始也吾以為其人也而今非也向吾入而弔焉有老者哭之如哭其子少者哭之如哭其母彼其所以㑹之必有不蘄言而言不蘄哭而哭者嫌其先物施惠不在理上住故致此甚愛也是遁天倍情忘其所受天性所受各有本分不可逃亦不可加古者謂之遁天之刑感物太深不止於當遁天者也將馳騖於憂樂之境雖楚戮未加而性情已困庸非刑哉適來夫子時也時自生也適去夫子順也理當死也安時而處順哀樂不能入也夫哀樂生於失得也今𤣥通合變之士無時而不安無順而不處𡨕然與造化為一則無往而非我矣將何得何失孰死孰生哉故任其所受而哀樂無所錯其間矣古者謂是帝之縣解以有係者為縣則無係者縣解也縣解而性命之情得矣此養生之要也縣音𤣥解音蟹以生為縣以死為解指窮於為薪火傳也窮盡也為薪猶前薪也前薪以指指盡前薪之理故火傳而不滅心得納養之中故命續而不絶明夫養生乃生之所以生也為猶前也傳者相傳繼續也不知其盡也夫時不再來今不一停故人之生也一息一得耳向息非今息故納養而命續前火非後火故為薪而火傳火傳而命續由夫養得其極也世豈知其盡而更生哉補此死生之喻也夫以薪熾火指薪而觀之則薪有窮盡之時而世間之火自古及今傳而不絶未始有盡也人間世第四與人羣者不得離人然人間之變故世世異宜唯無心而不自用者為能隨變所適而不荷其累也顔回見仲尼請行曰奚之曰將之衛曰奚為焉曰囬聞衛君其年壯其行獨不與民同欲也輕用其國夫君人者動必乗人一怒則伏尸流血一喜則軒冕塞路故君人者之用國不可輕也而不見其過莫敢諫也輕用民死輕用之於死也死者以國量乎澤若蕉舉國而輸之死地不可稱數視之若草芥也民其無如矣無所依歸回嘗聞之夫子曰治國去之亂國就之醫門多疾願以所聞思其則庶幾其國有瘳乎仲尼曰譆若殆往而刑耳其道不足以救彼患夫道不欲雜宜正得其人雜則多多則擾擾則憂憂而不救若夫不得其人則雖百醫守病適足致疑而不能一愈也古之至人先存諸己而後存諸人有其具然後可以接物也所存於己者未定何暇至於暴人之所行不虛心以應物而役思以犯難故知其所存於己者未定也夫唯外其知以養真寄妙當於羣才功名歸物而患慮逺身然後可以至於暴人之所行也且若亦知夫徳之所蕩而知之所為出乎哉徳蕩乎名知出乎爭徳之所以流蕩者矜名故也知之所以横出者爭善故也雖復桀跖其所矜惜無非名善也名也者相軋也知也者爭之器也二者凶器非所以盡行也夫名知者世之所用也而名起則相軋知用則爭興故遺名知而後行可盡也軋則列反折也夭也且徳厚信矼未達人氣名聞不爭未達人心而彊以仁義繩墨之言述暴人之前者是以人惡有其美也夫投人夜光鮮不按劍者未達故也今回之徳信與其不争之名彼所未達也而強以仁義繩墨於彼彼將謂回欲毁人以自成也是故至人不役志以經世而虛心以應物誠信著於天地不争揚於萬物然後萬物歸懐天地不逆故徳音發而天下嚮會景行彰而六合俱應而後始可以經寒暑涉治亂而不與逆鱗迕也矼音控慤實貌命之曰葘人葘人者人必反葘之適不信受則謂與己争名而反害之葘音災下皆同若殆為人葘夫且茍為恱賢而惡不肖惡用而求有以異茍能恱賢惡愚聞義而服便為明君也茍為明君則不苦無賢臣汝往亦不足復竒如其不爾往必受害故以有心而往無往而可無心而應其應自來則無往而不可也若唯無詔王公必將乗人而鬭其捷汝唯有寂然不言耳言則王公必乘人以君人之勢而鬬其捷辨以距諫飾非也詔絶句王公必將乗人絶句而鬬其捷在接反崔讀若唯無詔王公絶句必將乗人而鬬絶句而目將熒之其言辨捷使人眼眩而色將平之不能復自異於彼也口將營之自救解不暇容將形之心且成之乃且己以從彼也容將形之謂擎跽也是以火救火以水救水名之曰益多適不能救乃更足以成彼之盛順始無窮尋常守故未肯變也若殆以不信厚言必死於暴人之前矣未信而諌雖厚為害且昔者桀殺關龍逢紂殺王子比干是皆修其身以下傴拊人之民以下拂其上者也居下而任上之憂比干非其事也闗龍逢夏桀之賢臣王子比干殷紂之叔父下遐嫁反傴紆甫反拊徐句音撫李云傴拊謂齊愛之也崔云猶嘔呴謂養也拂符弗反崔云違也又勞弗反故其君因其修以擠之是好名者也不欲令臣有勝君之名也擠徐子計反又子體反司馬云毒也亦云陷也方言云滅也簡文云排也好呼報反令力呈反昔者堯攻叢枝胥敖禹攻有扈國為虛厲身為刑戮其用兵不止其求實無已是皆求名實者也而獨不聞之乎夫暴君非徒求恣其欲乃復求名但所求者非其道耳名實者聖人之所不能勝也而況若乎惜名貪欲之君雖復堯為不能勝化也故與衆攻之而汝乃欲空手而往化之以道哉雖然若必有以也嘗以語我來顔回曰端而虛正其形而虛其心也勉而一言遜而不貳也則可乎曰惡惡可言未可也惡惡皆音烏下同夫以陽為充孔揚言衛君亢陽之性充張於内而甚揚於外強禦之至也采色不定喜怒無常常人之所不違莫之敢逆因案人之所感以求容與其心夫頑強之甚人以快事感己巳陵藉而乃抑挫之以求從容自放而遂其侈心也名之曰日漸之徳不成而況大徳乎言乃少多無回降之勝也將執而不化故守其本意也外合而内不訾其庸詎可乎外合而内不訾即向之端虛而勉一耳言此未足以化之然則我内直而外曲成而上比顔回更說此三條也上時掌反下同内直者與天為徒與天為徒者知天子之與己皆天之所子而獨以己言蘄乎而人善之蘄乎而人不善之邪物無貴賤得生一也故善與不善付之公當耳一無所求於人也蘄音祈若然者人謂之童子是之謂與天為徒依乎天理推已性命若嬰兒之直往也外曲者與人之為徒也擎跽曲拳人臣之禮也人皆為之吾敢不為邪為人之所為者人亦無疵焉是之謂與人為徒外形委曲隨人事之所當為也擎其驚反跽其里反說文云長跪也拳音權成而上比者與古為徒成於今而比於古也其言雖教讁之實也雖是當教有諷責之㫖古之有也非吾有也若然者雖直不為病寄直於古故無以病我也是之謂與古為徒若是則可乎仲尼曰惡惡可大多政法而不諜當理無二而張三條以政之與事不𡨕也雖固亦無罪雖未𢎞大亦且不見咎責雖然止是耳矣夫胡可以及化罪則無矣化則未也猶師心者也挾三術以適彼非無心而付之天下也顔回曰吾無以進矣敢問其方仲尼曰齊吾將語若有而為之其易邪夫有其心而為之者誠未易也齊側皆反下同易之者曍天不宜以有為為易未見其宜也曍天自然也顔回曰回之家貧唯不飲酒不茹葷者數月矣若此則可以為齊乎曰是祭祀之齊非心齊也回曰敢問心齊仲尼曰若一志去異端而任獨也無聽之以耳而聽之以心無聽之以心而聽之以氣聽止於耳心止於符氣也者虛而待物者也遺耳目去心意而符氣性之自得此虛以待物者也唯道集虛虚者心齊也虛其心則至道集於懷也顔回曰回之未始得使實自回也未始心齊故有其身未始得使絶句得使之也未始有回也既得心齊之使則無其身可謂虛乎夫子曰盡矣吾語若若能入逰其樊而無感其名放心自得之場當於實而止入則鳴不入則止譬之宮商應而無心故曰鳴也夫無心而應者任彼耳不強應也無門無毒使物自若無門者也付天下之自安無毒者也毒治也一宅而寓於不得己不得己者理之必然者也體至一之宅而㑹乎必然之符也則幾矣理盡於斯絶迹易無行地難不行則易欲行而不踐地不可能也無為則易欲為而不傷性不可得也為人使易以偽為天使難以偽視聽之所得者粗故易欺也至於自然之報細故難偽也則失真少者不全亦少失真多者不全亦多失得之報未有不當其分者也而欲違天為偽不亦難乎聞以有翼飛者矣未聞以無翼飛者也聞以有知知者矣未聞以無知知者也言必有其具乃能其事今無至虛之宅無由有化物之實也知知上音智下如字下句同瞻彼闋者虛室生白夫視有若無虛室者也室虛而純白獨生矣闋空也室比喻心心能空虛則純白獨生也吉祥止止夫吉祥之所集者至虛至靜也夫且不止是之謂坐馳若夫不止於當不㑹於極此為以應坐之日而馳鶩不息也故外敵未至而内已困矣豈能化物哉夫狥耳目内通而外於心知鬼神將來舍而況人乎夫使耳目閉而自然得者心知之用外矣故將任性直通無往不𡨕尚無幽昧之責而況人間之累乎狥辭閏反徐辭倫反李云使也知音智註同是萬物之化也禹舜之所紐也伏戲几蘧之所行終而況散焉者乎言物無貴賤未有不由心知耳目以自通者也故出之所謂知者豈欲知而知哉所謂見者豈為見而見哉若夫知見可以欲為而得者則欲賢可以得賢為聖可以得聖乎固不可矣而世不知知之自知因欲為知以知之不見見之自見因欲為見以見之不知生之自生又將為生以生之故見目而求離婁之明見耳而責師曠之聰故心神奔馳於内耳目竭喪於外身處不適則與物不𡨕矣不𡨕矣而能合乎人間之變應乎世世之節者未之有也系而行之曰紐葉公子髙將使於齊問於仲尼曰王使諸梁也甚重重其使欲有所求也齊之待使者盖將甚敬而不急恐直空報其敬而不肯急應其求也匹夫猶未可動也而況諸侯乎吾甚慄之子嘗語諸梁也曰凡事若小若大寡不道以懽成夫事無小大少有不言以成為懽者耳此仲尼之所曽吿諸梁也事若不成則必有人道之患夫以成為懽者不成則怒矣此楚王之所不能免也事若成則必有陰陽之患人患雖去然喜懼戰於胷中固已結氷炭於五藏矣若成若不成而後無患者唯有徳者能之成敗若任之於彼而莫足以患心者唯有徳者乎吾食也執粗而不臧㸑無欲清之人對火而不思凉明其所饌儉薄也執衆家本並然簡文作熱粗音麤又才古反臧作郎反善也絶句一音才郎反句至㸑字爨七亂反清七性反凉也之人言㸑火為食而不思清凉明火㣲而食宜儉薄今吾朝受命而夕飲氷我其内熱與所饌儉薄而内熱飲氷者誠憂事之難非美食之為食美食者必内熱吾未至乎事之情而既有陰陽之患矣事若不成必有人道之患是兩也事未成則恐懼結於内而刑網羅於外也為人臣者不足以任之子其有以語我來仲尼曰天下有大戒二其一命也其一義也子之愛親命也不可解於心自然結固不可解也臣之事君義也無適而非君也無所逃於天地之間千人聚不以一人為主不亂則散故多賢不可以多君無賢不可以無君此天人之道必至之宜是之謂大戒若君可逃而親可解則不足戒也是以夫事其親者不擇地而安之孝之至也夫事其君者不擇事而安之忠之盛也自事其心者哀樂不易施乎前知其不可奈何而安之若命徳之至也知不可奈何者命也而安之則無哀無樂何易施之有哉故㝠然以所遇為命而不施心於其間冺然與至當為一而無休戚於其中雖事凡人猶無往而不適況君親乎為人臣子者固有所不得己行事之情而忘其身事有必至理固常通故任之則事濟事濟而身不存者未之有也又何容心於其身哉何暇至於恱生而惡死夫子其行可矣理無不通故當任所遇而直前耳若乃信道不篤而恱惡存懷不能與至當俱往而謀生慮死未見能成其事者也丘請復以所聞凡交近則必相靡以信近者得接故以其信驗親相靡服也逺則必忠之以言逺以言傳意也言必或傳之夫傳兩喜兩怒之言天下之難者也夫喜怒之言若過其實傳之者宜使兩不失中故未易也夫兩喜必多溢美之言兩怒必多溢惡之言溢過也喜怒之言常過其當也凡溢之𩔖妄嫌非彼言以傳者妄作妄則其信之也莫莫然疑之莫則傳言者殃就傳過言似於誕妄受者有疑則傳言者横以輕重為罪也故法言曰傳其常情無傳其溢言則幾乎全雖聞臨時之過言而勿傳也必稱其常情而要其誠至則近於全也且以巧鬭力者始乎陽本共好戲好呼報反常卒乎陰欲勝情至潛興害彼泰至則多竒巧不復循理泰音太以禮飲酒者始乎治尊卑有别旅酬有次常卒乎亂湛湎淫液也泰至則多竒樂淫流縱横無所不至凡事亦然始乎諒常卒乎鄙其作始也簡其將畢也必巨夫煩生於簡事起於㣲此必至之勢也言者風波也行者實喪也夫言者風波也故行之則實喪矣夫風波易以動實喪易以危故遺風波而弗行則實不喪矣夫事得其實則危可安而蕩可定也故忿設無由巧言偏辭夫忿怒之作無他由也常由巧言過實偏辭失當獸死不擇音氣息茀然於是並生心厲譬之野獸蹴之窮地意急情盡則和聲不至而氣息不理茀然暴怒但生疵以相對之尅核太至則必有不肖之心應之而不知其然也夫寛以容物物必歸焉尅核太精則鄙吝心生而不自覺也故大人蕩然放物於自得之場不苦人之能不竭人之歡故四海之交可全茍為不知其然也孰知其所終茍不自覺安能知禍福之所齊詣也故法言曰無遷令傳彼實也無勸成任其自成過度益也益則非任實遷令勸成殆事此事之危殆美成在久美成者任其時化譬之種植不可一朝成惡成不及改彼之所惡而勸彊成之則悔敗尋至可不慎與且夫乗物以遊心寄物以為意也託不得己以養中至矣任理之必然者中庸之符全矣斯接物之至也何作為報也當任齊所報之實何為為齊作意於其間哉莫若為致命此其難者直為致命最易而以喜怒施心故難也顔闔將傅衛靈公太子而問於蘧伯玉曰有人於此其徳天殺與之為無方則危吾國與之為有方則危吾身夫小人之性引之軌制則憎已縱其無度則亂邦顔闔魯之賢人𨼆者衛靈公左傳云名元太子音泰司馬云蒯瞶也蘧其居反伯玉名瑗衛賢大夫天殺如字謂如天殺物也徐所列反無方李云方道也其知適足以知人之過而不知其所以過不知民過之由已故罪責於民而不自改其知音智若然者吾奈之何蘧伯玉曰善哉問乎戒之慎之正女身哉反覆與㑹俱所以為正身形莫若就心莫若和形不乖迕和而不同雖然之二者有患就不欲入就者形順入者還與同和不欲出和者義濟出者自顯伐形就而入且為顛為滅為崩為蹶若還與同則是顛危而不扶持與彼俱亡矣故當模格天地但不立小異耳心和而出且為聲為名為妖為孽自顯和之且有含垢之聲濟彼之名彼將惡其勝已妄生妖孽故當悶然若晦𤣥同光塵然後不可得而親不可得而疎不可得而利不可得而害彼且為嬰兒亦與之為嬰兒彼且為無町畦亦與之為無町畦彼且為無崖亦與之為無崖達之入於無疵不小立圭角以逆其鱗也嬰兒喻無意也一云喻驕遊也町徒頂反畦户圭反畔垺也無畔垺無威儀也汝不知夫螳螂乎怒其臂以當車轍不知其不勝任也是其才之美者也夫螳螂之怒臂非不美也以當車轍顧非敵耳今知之所無奈何而欲彊當其任即螳螂之怒臂也戒之慎之積伐而美者以犯之幾矣積汝之才成汝之美以犯此人危殆之道汝不知夫養虎者乎不敢以生物與之為其殺之之怒也恐其因有殺心而遂怒也不敢以全物與之為其決之之怒也方使虎自齧分之則因用力而怒矣時其饑飽達其怒心知其所以怒而順之虎之與人異𩔖而媚養己者順也故其殺者逆也順理則異𩔖生愛逆節則至親交兵夫愛馬者以筐盛矢以蜄盛溺矢溺至賤而以寶器盛之愛馬之至也矢或作屎同蜄徐巿軫反蛤𩔖適有蚉䖟僕縁僕僕然羣著馬而拊之不時雖救其患而備馬之不意則缺銜毁首碎胷掩其不備故驚而至此意有所至而愛有所亡可不慎邪意至除患率然拊之以致毁碎失其所以愛矣故當世接物逆順之際不可不慎也匠石之齊至乎曲轅見櫟社樹其大蔽牛絜之百圍其髙臨山千仞而後有枝其可以為舟者旁十數觀者如市匠伯不顧遂行不輟弟子厭觀之走及匠石曰自吾執斧斤以隨夫子未嘗見材如此其美也先生不肯視行不輟何邪曰已矣勿言之矣散木也以為舟則沈以為棺槨則腐以為器則速毁以為門户則液樠以為柱則蠧是不材之木也無所可用故能若是之夀不在可用之數故曰散木曲轅道名櫟力狄反木名百圍徑尺為圍盖十丈也十仞小爾雅云四尺曰仞案七尺曰仞或云八尺曰仞旁十數旁旁枝也匠伯伯匠石字也樠亡言反液津液也樠謂脂出樠樠然也匠石歸櫟社見夢曰女將惡乎比予哉若將比予於文木邪凡可用之木為文木夫柤梨橘柚果蓏之屬實熟則剝則辱大枝折小枝泄此以其能苦其生者也故不終其天年而中道夭自掊擊於世俗者也物莫不若是物皆以自用傷柤側加反俗作查力果反且予求無所可用久矣幾死乃今得之數有睥睨已者唯今匠石明之耳幾音機下同為予大用積無用乃為濟生之大用使予也而有用且得有此大也邪若有用久見伐且也若與予也皆物也奈何哉其相物也而幾死之散人又惡知散木以戲匠石匠石覺而診其夢弟子曰趣取無用則為社何邪猶嫌其以為社自榮不趣取於無用而已診直信反占夢也曰密若無言彼亦直寄焉社自來寄耳非此木求之為社也以為不知已者詬厲也言此木乃以社為不知已而見辱病也豈榮之哉詬乎豆反辱也厲病也不為社者且幾有翦乎木自以無用為用則雖不為社亦終不近於翦伐之禍且也彼其所保與衆異彼以無保為保而衆以有保為保而以義譽之不亦逺乎利人長物禁民為非社之義也夫無用者泊然不為而羣才自適用者各得其叙而不與焉此無用之所以全也汝以社譽之無縁近也南伯子綦遊乎商之丘見大木焉有異結駟千乘𨼆將芘其所賴其枝所陰可以𨼆芘千乘南伯即南郭也伯長也商之丘今梁國睢陽縣是也𨼆傷於熱也芘本亦作庇賴音賴蔭也可以蔭芘千乘也子綦曰此何木也哉此必有異材夫仰而視其細枝則拳曲而不可以為棟梁俯而視其大根則軸解而不可以為棺槨咶其葉則口爛而為傷嗅之則使人狂醒三日而不已子綦曰此果不材之木也以至於此其大也嗟乎神人以此不材天王不材於百官故百官御其事而明者為之視聰者為之聽知者為之謀勇者為之扞夫何為哉𤣥黙而已而羣材不失其當則不材乃材之所至賴也故天下樂推而不厭乘萬物而無害也解如衣軸之直解也咶食紙反嗅許救反宋有荆氏者宜楸柏桑其拱把而上者求狙猴之杙者斬之三圍四圍求髙名之麗者斬之七圍八圍貴人富商之家求樿傍者斬之故未終其天年而中道之夭於斧斤此材之患也有材者未能無惜也荆氏地名一曰里名宜楸柏桑荆氏之地宜此三木兩手曰拱一手曰把杙以職反欲以栖戲狙猴也麗音禮小船也又屋𨼆也樿木亦作擅音膳傍薄剛反樿傍棺也棺之全一邊者謂之樿傍故解之以牛之白顙者與豚之亢鼻者與人有痔病者不可以適河巫祝解除棄此三者必妙選騂具然後敢用此皆巫祝以知之矣巫祝於此亦知不材者全所以為不祥也此乃神人之所以為大祥也夫全生者天下之所謂祥也巫祝以不材為不祥而弗用也彼乃以不祥全生乃大祥也神人者無心而順物者也故天下之所謂大祥神人不逆支離疏者頤𨼆於臍肩髙於頂㑹撮指天五管在上兩髀為脅挫鍼治繲足以餬口鼓筴播精足以食十人上徵武士則支離攘臂於其間恃其無用故不自竄匿支離疏形體支離不全貌疏其名也言脊曲頸縮也㑹撮髻也古者髻在頂中脊曲頭低故髻指天也管腧也五臟之腧皆在上也髀本又作脾僂人腹在髀裏也脊曲髀豎故與肩並也鍼執金反挫鍼縫衣也繲佳賣反浣衣也鼓簸也小箕曰筴簡米曰精云鼓筴播精言賣卜上有大役則支離以有常疾不受功不任作役故上與病者粟則受三鍾與十束薪役則不與賜則受之四斗曰鍾夫支離其形者猶足以養其身終其天年又況支離其徳者乎神人無用於物而物各得自用歸功名於羣才與物𡨕而無迹故免人間之害處常美之實此支離其徳也孔子適楚楚狂接輿遊其門曰鳳兮鳳兮何如徳之衰也當順時直前盡乎㑹通之宜耳世之衰盛蔑然不足覺故曰何如來世不可待往世不可追也趣當盡臨時之宜耳天下有道聖人成焉天下無道聖人生焉付之自爾而理自生成生成非我也豈為治亂易節哉治自求成故遺成而不敗亂自求生故亡生而不死方今之時僅免刑焉不瞻前顧後而盡當今之㑹𡨕然與時世為一而後妙當可全刑名可免福輕乎羽莫之知載足能行而放之手能執而任之聽耳之所聞視目之所見知止其所不知能止其所不能用其自用為其自為恣其性内而無纖芥於分外此無為之至易也無為而性命不全者未之有也性命全而非福者理未聞也故夫福者即嚮之所謂全耳非假物也豈有寄鴻毛之重哉率性而動動不過分天下之至易也舉其自舉載其自載天下之至輕也然知以無涯傷性心以欲惡蕩真故乃釋此無為之至易而知彼有為之至難棄夫自舉之至輕而取夫載彼之至重此世之常患也禍重乎地莫之知避舉其性内則雖負萬鈞而不覺其重也外物寄之雖重不盈錙銖有不勝任者矣為内福也故福至輕為外禍也故禍至重禍至重而莫之知避此世之大迷也已乎已乎臨人以徳殆乎殆乎畫地而趨夫畫地而使人循之其迹不可掩矣有其已而臨物與物不𡨕矣故大人不明我以耀彼而任彼之自明不徳我以臨人而付人之自得故能彌貫萬物而𤣥同彼我冺然與天下為一而内外同福也迷陽迷陽無傷吾行迷陽猶亡陽也亡陽任獨不蕩於外則吾行全矣天下皆全其吾則凡稱吾者莫不皆全也迷陽伏陽也言詐狂吾行郤曲無傷吾足曲成其形各自足矣山木自寇也膏火自煎也桂可食故伐之漆可用故割之人皆知有用之用而莫知無用之用也有用則與彼為功無用則自全其生夫割肌膚以為天下者天下之所知也使百姓不失其自全而彼我俱適者俛然不覺妙之在身也徳充符第五徳充於内應物於外外内𤣥合信若符命而遺其形骸也魯有兀者王駘從之遊者與仲尼相若弟子多少敵孔子兀五忽反又音界刖足曰兀王駘音臺人姓名也常季問於仲尼曰王駘兀者也從之逰者與夫子中分魯立不教坐不議虛而往實而歸各自得而足也常季或云孔子弟子固有不言之教無形而心成者邪慳其形殘而心乃充足也夫心之全也遺身形忘五藏忽然獨往而天下不能離是何人也仲尼曰夫子聖人也丘也直後而未往耳丘將以為師而況不若丘者乎奚假魯國丘將引天下而與從之夫神全心具則體與物𡨕與物𡨕者天下之所不能逺奚但一國而已哉丘也直後而未往耳自在衆人後未得往師之耳常季曰彼兀者也而王先生其與庸亦逺矣若然者其用心也獨若之何仲尼曰死生亦大矣人雖曰變然死生之變變之大也王子況反勝也君長也其與庸亦逺矣庸常人也而不得與之變彼與變俱故生死不變於彼雖天地覆墜亦將不與之遺斯順之也天地猶不能變已況生死也審乎無假明性命之固當而不與物遷任物之自遷命物之化以化為命而無怪迕而守其宗也不離至當之極常季曰何謂也仲尼曰自其異者視之肝膽楚越也甜苦之性殊則美惡之情背自其同者視之萬物皆一也雖所美不同而同有所美各美其所美則萬物一美也各是其所是則天下一是也夫以其所異而異之則天下莫不異而浩然大觀者官天地府萬物知異之不足異故因其所同而同之則天下莫不皆同又知同之不足有故因其所無而無之則是非美惡莫不皆無矣夫是我而非彼美已而惡人自中知以下至於昆蟲莫不皆然然此明乎我而不明乎彼者爾若夫𤣥通冺合之士因天下以明天下天下無曰我非也即明天下之無非無曰彼是也即明天下之無是無是無非混而為一故能乗變任化迕物而不憎夫若然者且不知耳目之所宜宜生於不宜者也無美無惡則無不宜無不宜故忘其宜也而逰心乎徳之和都忘宜故無不任也都任之而不得者未之有也無不得而不知者亦未聞也故放心於天地之間蕩然無不當而曠然無不適也物視其所一而不見其所喪視喪其足猶遺土也體夫極數之妙心故能無物而不同無物而不同則死生變化無往而非我矣故生為我時死為我順時為我聚順為我散聚散雖異而我皆我之則生故我耳未始有得死亦我也未始有喪夫死生之變猶以為一既觀其一則脫然無係𤣥同彼我以死生為寤寐以形骸為逆旅去生如脫屣斷足如遺土吾未見足以纓茀其心也常季曰彼為己以其知嫌王駘未能忘知而自存得其心以其心嫌未能遺心而自得得其常心物何為最之哉夫得其常心平往者也嫌其不能平往而與物過常故使物就之最徂會反聚也仲尼曰人莫鑑於流水而鑑於止水夫止水之致鑑者非為止以求鑑也故王駘之聚衆衆自歸之豈引物使從已唯止能止衆止動而為之則不能居衆物之止受命於地唯松柏獨也在冬夏青青夫松柏特稟自然之鍾氣故能為衆木之傑耳非能為而得之也受命於天唯舜獨也正言特受自然之正氣者至希也下首則唯為松柏上首則唯有聖人故凡不正者皆來求正耳若物皆有青全則無貴於松柏人各自正則無羨於大聖而趣之幸能正生以正衆生幸自能正耳非為正以正之夫保始之徵不懼之實勇士一人雄入於九軍將求名而能自要者而猶若是非能遺名而無不任保始之徵徵成也終始可保成也九軍天子六軍諸侯三軍通為九軍也兵書以攻九天收九地故謂之九軍而況官天地府萬物𡨕然無不體也直寓六骸所謂逆旅六骸手足首身也象耳目人用耳目亦用耳目非須耳目一知之所知而心未嘗死者乎知與變化俱則無往而不㝠此知之一者也心與死生順則無時而非生此心之未嘗死也彼且擇日而登假人則從是也以不失㑹為擇耳斯人無擇也任其天行而時動者也故假借之人由此而最之耳補假音格至也大宗師章是知之能登假於道也彼且何肯以物為事乎其恬漠故全也申徒嘉兀者也而與鄭子產同師於伯昏無人子產謂申徒嘉曰我先出則子止子先出則我止羞與刖者並行申徒氏嘉名無人離篇作瞀人其明日又與合堂同席而坐子產謂申徒嘉曰我先出則子止子先出則我止今我將出子可以止乎其未邪質而問之欲使必不並已且子見執政而不違子齊執政乎常以執政自多故直云子齊執政便謂足以明其不遜申徒嘉曰先生之門固有執政焉如此哉此論徳之處非計位也子而說子之執政而後人者也其矜說在位欲處物先說音恱聞之曰鑑明則塵垢不止止則不明也久與賢人處則無過今子之所取大者先生也而猶出言若是不亦過乎事明師而鄙吝之心猶未去乃真過也子產曰子既若是矣若是形殘猶與堯争善計子之徳不足以自反邪言不自顧省而欲輕蔑在位與有徳者並計子之徳故不足以補形殘之過申徒嘉曰自狀其過以不當亡者衆多自陳其過狀以已為不當亡者衆也不狀其過以不當存者寡黙然為過自以為應死者少也知不可奈何而安之若命唯有徳者能之遊於羿之彀中中央者中地也然而不中者命也羿古之善射者弓矢所及為彀中夫利害相攻則天下皆羿也自不遺身忘知與物同波者皆逰於羿之彀中耳雖張毅之出單豹之處猶未免於中地則中與不中唯在命耳而區區者各有其所遇而不知命之自爾故免乎弓矢之害者自以為巧欣然多已及至不免則自恨其繆而志傷神辱斯未能達命之情者也夫我之生也非我之所生也則一生之内百年之中其坐起行止動靜趣舍性情知能凡所有者凡所無者凡所為者凡所遇者皆非我也理自爾耳而横生休戚乎其中斯又逆自然而失者也中地丁仲反下不中註中地中與不中同人以其全足笑吾不全足者衆矣皆不知命而有斯笑我怫然而怒見其不知命而怒斯又未知命也而適先生之所則廢然而反見至人之知命遺形故廢向者之怒而復常不知先生之洗我以善邪不知先生洗我以善道故邪我為能自反邪斯自忘形而遣累吾與夫子遊十九年而未嘗知吾兀者也忘形故也今子與我逰於形骸之内而子索我於形骸之外不亦過乎形骸外矣其徳内也今子與我徳逰耳非與我形交而索我外好豈不過哉索色百反子產蹵然改容更貌曰子無乃稱己悟則厭其多言也魯有兀者叔山無趾踵見仲尼踵頻也叔山字無足趾踵頻也故踵行仲尼曰子不謹前既犯患若是矣雖今來何及矣無趾曰吾唯不知務而輕用吾身吾是以亡足人之生也理自生矣直莫之為而任其自生斯重其身而知務者也若乃忘其自生謹而矜之斯輕用其身而不知務也故五藏相攻於内而手足殘傷於外也今吾來也猶有尊足者存刖一足未足以虧其徳明夫形骸者逆旅也吾是以務全之也去其矜謹任其自生斯務全也夫天無不覆地無不載天不為覆故能常覆地不為載故能常載使天地而為覆載則有時而息矣使舟能沉而為人浮則有時而沒矣故物為焉則未足以終其生也吾以夫子為天地安知夫子之猶若是也責其不謹不及天地也孔子曰丘則陋矣夫子胡不入乎請講以所聞無趾出聞所聞而出全其無為也孔子曰弟子勉之夫無趾兀者也猶務學以復補前行之惡而況全徳之人乎全徳者生便忘生無趾語老曰孔丘之於至人其未邪彼何賓賓以學子為怪其方復學於老彼且蘄以諔詭幻怪之名聞不知至人之以是為己桎梏邪夫無心者人學亦學然古之學者為己今之學者為人其弊也遂至乎為人之所為矣夫師人以自得者率其常然者也舍己效人而逐物於外者求乎非常之名者也夫非常之名乃常之所生也故學者非為幻怪也幻怪之生必由於學禮者非為華薄也而華薄之興必由於禮斯必然之理至人之所無奈何故以為己之桎梏老曰胡不直使彼以死生為一條以可不可為一貫者解其桎梏其可乎欲以直理㝠之冀其無迹無趾曰天刑之安可解今仲尼非不㝠也顧自然之理行則影從言則嚮隨夫順物則名迹斯立而順物者非為名也非為名則至矣而終不免乎名則孰能解之哉故名者影嚮也影嚮者形聲之桎梏也明斯理也則名迹可遺名迹可遺則尚彼可絶尚彼可絶則性命可全矣魯哀公問於仲尼曰衛有惡人焉曰哀駘它惡醜也惡人惡貌醜駘音殆它徒何反哀駘醜貌它名丈夫與之處者思而不能去也婦人見之請於父母曰與人為妻寧為夫子妾者數十而未止也未嘗有聞其唱者也常和人而已矣無君人之位以濟乎人之死明物不由權勢而往無聚祿以望人之腹明非求食而往又以惡駭天下明不以形美故往和而不唱非招而致之知不出乎四域不役思於分外且而雌雄合乎前夫神全者與物無害故入獸不亂羣入鳥不亂行而為萬物之靈雌雄合乎前禽獸屬也是必有異乎人者也寡人召而觀之果以惡駭天下與寡人處不至以月數而寡人有意乎其為人也未經久已覺其有逺處不至乎期年而寡人信之國無宰而寡人傳國焉委之以國政悶然而後應寵辱不足以驚其神汜而若辭人辭亦辭汜浮劍反不係也寡人醜乎卒授之國無幾何也去寡人而行寡人䘏焉若有亡也若無與樂是國也是何人者也仲尼曰丘也嘗使於楚矣適見子食於其死母者食乳也醜慙也崔云醜也又作豚少焉㫬若皆棄之而走不見己焉爾不得𩔖焉爾夫生者以才徳為𩔖死而才徳去矣故生者以失𩔖而走也故含徳之厚比於赤子無往而不為之赤子也則天下莫之害斯得𩔖而明己故也情茍𩔖焉則雖形不與同而物無害心情𩔖茍亡則雖形同母子而不足以固其志矣㫬音舜驚貌目動也所愛其母者非愛其形也愛使其形者也使形者才徳也戰而死者其人之葬也不以翣資翣者武所資也戰而死者無武也翣將安施翣所早反扇也武士所造資送也刖者之屨無為愛之所愛屨者為足故耳皆無其本矣翣屨者以足武為本為天子之諸御不爪翦不穿耳全其形也取妻者止於外不得復使恐傷其形形全猶足以為爾採擇嬪御及燕爾新婚本以形好為意者也故形之全也可以降至尊之情回真女之操也而況全徳之人乎徳全而物愛之宜矣今哀駘它未言而信無功而親使人授已國唯恐其不受也是必才全而徳不形者也哀公曰何謂才全仲尼曰死生存亡窮達貧富賢與不肖毁譽飢渇寒暑是事之變命之行也其理故當不可逃也故人之生也非誤生也生之所有非妄有也天地雖大萬物雖多然吾之所遇適在於是則雖天地神明國家聖賢絶力至知而弗能違也故凡所不遇弗能遇也其所遇弗能不遇也凡所弗為弗能違也其所為弗能不為也付之而至當矣日夜相代乎前夫命行事變不舍晝夜推之不去留之不停故才全者隨所遇而任之而知不能規乎其始者也夫始非知之所規而故非情之所留是以知命之必行事之必變者豈於終規始在新戀故哉雖有至知而弗能規也逝者之往吾柰之何哉故不足以滑和茍知性命之固當則雖死生窮達千變萬化淡然自若而和理在身矣不可入於靈府靈府者精神之宅也夫至足者不以憂慮經神若皮外而過去使之和豫通而不失於兊茍使和性不滑靈府閒豫則雖涉乎至變不失其兊然也兊恱也使日夜無郤冺然常任之郤去逆反間也而與物為春羣生之所賴也是接而生時於心者也順四時而俱化是之謂才全何謂徳不形曰平者水停之盛也天下之平者莫盛於停水其可以為法也無情至平故天下取正焉内保之而外不蕩也内保其明外無情為𤣥鑒洞照與物無私故能全其平而行其法也徳者成和之修也事得以成物得以和謂之徳也徳不形者物不能離也無事不成無物不和此徳之不形也是以天下樂推而不厭哀公異日以吿閔子曰始也吾以南面而君天下執民之紀而憂其死吾自以為至通矣今吾聞至人之言恐吾無其實輕用吾身而亡吾國吾與孔丘非君臣也徳友而已矣聞徳無形之風者雖復哀公猶欲遺形骸忘貴賤也闉跂支離無脤說衛靈公靈公說之而視全人其脰肩肩甕㼜大癭說齊桓公桓公說之而視全人其脰肩肩偏情一性則醜者更好而好者更醜也闉音因音企闉支離言脚常曲行體不正卷縮也無脤名也桓公說之音恱下說之同脰音豆頸也甕烏貌送反㼜烏𦵏反甕㼜大癭故徳有所長而形有所忘其徳長於順物忘其醜長於逆物忘其好人不忘其所忘而忘其所不忘此謂誠忘生則愛之死則棄之故徳者世之所不忘也形者理之所不存也故夫忘形者非忘也不忘形而忘徳者乃誠忘也故聖人有所逰逰於自得之塲放之而無不至者才徳全也而知為孽約為膠徳為接工為商此四者自然相生其理已具知音智知慧生妖孽約誓所以為膠固散徳以接物工巧而商賈起聖人不謀惡用知不斲惡用膠無喪惡用徳不貨惡用商自然已具故聖人無所用其已也四者天鬻也天鬻也者天食也言自然而禀之鬻音育養也食音嗣既受食於天又惡用人既禀之自然其理已足則雖沉思以免難或明戒以避禍物無妄然皆天地之㑹至理之趣必自思之非我思也必自不思非我不思也或思而免之或思而不免或不思而免之或不思而不免凡此皆非我也又奚為哉任之而自至也有人之形視其形貌若人無人之情掘若槁木之枝掘其物反槁苦老反有人之形故羣於人𩔖聚羣分自然之道無人之情故是非不得於身無情故付之於物也眇乎小哉所以屬於人也形貌若人眇亡小反簡文云陋也謷乎大哉獨成其天無情故浩然無不任無不任者有情之所未能也故無情而獨成天也謷五羔反放也惠子謂莊子曰人故無情乎莊子曰然惠子曰人而無情何以謂之人莊子曰道與之貌天與之形惡得不謂之人人之生也非情之所生也生之所知豈情之所知哉故有情於為離曠而弗能也然離矌以無情而聰明矣有情於為賢聖而弗能也然賢聖以無情而賢聖矣豈有賢聖絶逺而離矌難慕哉雖下愚聾瞽及雞鳴狗吠豈有情於為之亦終不能也不問逺之與近雖去已一分顔孔之際終莫之得也是以閱之萬物反取諸身耳目不能以易任成功手足不能以代司致業故嬰兒之始生也不以目求乳不以耳向明不以足操物不以手求行豈百骸無定司形貌無素主而專由情以制之哉惠子曰既謂之人惡得無情未解形貌之非情也莊子曰是非吾所謂情也以是非為情則無是無非無好無惡者雖有形貌直是人耳情將安寄吾所謂無情者言人之不以好惡内傷其身任當而直前者非情也常因自然而不益生也止於當也惠子曰不益生何以有其身未明生之自生理之自足莊子曰道與之貌天與之形生理已自足於形貌之中但任之則身存不以好惡内傷其身夫好惡之情非所以益生祇足以傷身以其生之有分也今子外乎子之神勞乎子之精倚樹而吟據槁梧而瞑夫神不休於性分之内則外矣精不止於自生之極則勞矣故行則倚樹而吟坐則據梧而睡言有情者之自困也補槁梧枯木以為几據琴而睡也天選子之形子以堅白鳴言凡子所為外神勞精倚樹據梧且吟且睡此世之所謂情也而云天選明夫情者非情之所生而況他哉故雖萬物萬形云為趣舍皆在無情中來又何用情於其間哉莊子注巻二
