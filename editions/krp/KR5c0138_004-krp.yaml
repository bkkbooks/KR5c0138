body:
  text: 莊子注巻四晉郭象注外篇駢拇第八駢拇枝指出乎性哉而侈於徳附贅縣疣出乎形哉而侈於性夫長者不為有餘短者不為不足此則駢贅皆出於形性非假物也然駢與不駢其於各足而此獨駢枝則於衆以為多故曰侈耳而惑者或云非性因欲割而棄之是道有所不存徳有所不載而人有棄財物有棄用也豈是至治之意哉夫物有小大能有少多所大即駢所多即贅駢贅之分物皆有之若莫之任是都棄萬物之性也拇音母足大指也駢拇謂足拇指連第二指也枝指手有六指也音岐謂指有岐也贅疣也横生一肉屬著體也縣音𤣥疣音尤駢拇枝指附贅縣疣此四者各出於形性而非形性之正於衆人為侈耳於形為侈於性為多故在手為莫用之肉於足為無施之指也多方乎仁義而用之者列於五藏哉而非道徳之正也夫與物冥者無多也故多方於仁義者雖列於五藏然自一家之正耳未能與物無方而各正性命故曰非道徳之正夫方之少多天下未之有限然少多之差各有定分豪芒之降即不可以相跂故各守其方則少多無不自得而或者聞多之不足以正少因欲棄多而任少是舉天下而棄之不亦妄乎是故駢於足者連無用之肉也枝於手者𣗳無用之指也直自性命不得不然非以有用故然也多方駢枝於五藏之情者淫僻於仁義之行五藏之情直自多方耳而少者横復尚之以至淫僻而失至當於體中也而多方於聰明之用也聰明之用各有本分故多方不為有餘少方不為不足然情欲之所蕩未嘗不賤少而貴多也見夫可貴而矯以尚之則自多於本用而困其自然之性若乃忘其所貴而保其素分則與性無多而異方俱全矣是故駢於明者亂五色淫文章青黄黼黻之煌煌非乎而離朱是已多於聰者亂五聲淫六律金石絲竹黄鍾大吕之聲非乎而師曠是已夫有耳目者未嘗以慕聾盲自困也所困常在於希離慕曠則離曠雖性聰明乃是亂耳目之主也枝於仁者擢徳塞性以収名聲使天下簧鼔以奉不及之法非乎而曾史是已夫曽史性長於仁耳而性不長者横復慕之慕之而仁仁己偽矣天下未嘗慕桀跖而必慕曽史則曾史之簧鼔天下使失其真性甚於桀跖也擢音濯㧞也駢於辯者纍瓦結繩竄句逰心於堅白同異之間而敝跬譽無用之言非乎而楊墨是已夫騁其竒辯致其危辭者未豐容思於檮杌之口而必競辨於楊墨之間則楊墨乃亂羣言之主也纍劣彼反瓦危委反一云當作丸結繩言小辨危辭若結繩之纍瓦也句謂邪説微隱穿鑿成句一音鉤敝音婢罷也跬音屑敝跬分外用力之貌故此皆多駢旁枝之道非天下之至正也此數子皆師其天性直自多駢旁枝名自是一家之正耳然以一正萬則萬不正矣故至正者不以己正天下使天下各得其正而已彼正正者不失其性命之情物各任性乃正正也自此己下觀之至正可見矣故合者不為駢以枝正合乃謂合為駢而枝者不為以合正枝乃謂枝為其知反長者不為有餘以短正長乃謂長有餘短者不為不足以長正短乃謂短不足是故鳬脛雖短續之則憂鶴脛雖長㫁之則悲各自有正不可以此正彼而損益之鳬音符故性長非所㫁性短非所續無所去憂也知其性分非所㫁續而任之則無所去憂而憂自去也意仁義其非人情乎夫仁義自是人之情也但當任之耳彼仁義何其多憂也恐仁義非人情而憂之者真可謂多憂也且夫駢於拇者決之則泣枝於手者齕之則啼二者或有餘於數或不足於數其於憂一也謂之不足故泣而決之以為有餘故啼而齕之夫如此雖羣品萬殊無釋憂之地矣唯各安其天性不決駢而齕枝則曲成而無傷又何憂哉齕李音紇齒㫁也今世之仁人蒿目而憂世之患兼愛之迹可尚則天下之目亂矣以可尚之迹蒿令有患而遂憂之此為陷人於難而後拯之也然今世正謂此為仁也蒿好羔反不仁之人決性命之情而饕貴富夫貴富所以可饕由有蒿之者也若乃無可尚之迹則人安其分将量力受任豈有決已效彼以饕竊非望哉饕吐刀反貪財曰饕故意仁義其非人情乎自三代以下者天下何其囂囂也夫仁義自是人情也而三代以下横共囂囂棄情逐迹如将不及不亦多憂乎且夫待鉤繩規矩而正者是削其性也待繩約膠漆而固者是侵其徳也屈折禮樂呴俞仁義以慰天下之心者此失其常然也天下有常然常然者曲者不以鉤直者不以繩圓者不以規方者不以矩附離不以膠漆約束不以纆索故天下誘然皆生而不知其所以生同焉皆得而不知其所以得生物有常然任而不助則泯然自得而不自覺也呴况於反故古今不二不可虧也同物故與物無二而常全則仁義又奚連連如膠漆纆索而逰乎道徳之間為哉任道而得則抱朴獨徃連連假物無為其間也使天下惑也仁義連連秖足以惑物使喪其真夫小惑易方大惑易性夫東西易方於體未虧矜仁尚義失其常然以之死地乃大惑也何以知其然邪自虞氏招仁義以撓天下也天下莫不奔命於仁義夫與物無傷者非為仁也而仁迹行焉令萬理皆當者非為義也而義功見焉故當而無傷者非仁義之招也然而天下奔馳棄我殉彼以失其常然故亂心不由於醜而恒在美色撓世不出於惡而恒由仁義則仁義者撓天下之具也是非以仁義易其性與雖虞氏無易之情而天下之性固以異矣故嘗試論之自三代以下者天下莫不以物易其性矣自三代以上實有無為之迹無為之迹亦有為者之所尚也尚之則失自然之素故雖聖人有不得已或以槃夷之事易拱之性而况悠悠者哉小人則以身殉利士則以身殉名大夫則以身殉家聖人則以身殉天下鶉居而鷇食鳥行而無章何措而不殉哉故與世常冥唯變所適其迹則殉世之迹也所遇者或時有槃夷禿脛之變其迹則傷性之迹也然而雖揮斤八極而神氣無變手足槃夷而居形者不憂則奚殉哉無殉也故乃不殉其所殉而迹與世同殉也故此數子者事業不同名聲異號其於傷性以身為殉一也臧與榖二人相與牧羊而俱亡其羊問臧奚事則挾筴讀書問榖奚事則博塞以逰二人者事業不同其於亡羊均也伯夷死名於首陽之下盜跖死利於東陵之上二人者所死不同其於殘生傷性均也奚必伯夷之是而盜跖之非乎天下之所惜者生也今殉之太甚俱殘其生則所殉是非不足復論塞博之𩔖也漢書云吾丘壽王以善格五待詔謂博塞也天下盡殉也彼其所殉仁義也則俗謂之君子其所殉貨財也則俗謂之小人其殉一也則有君子焉有小人焉若其殘生損性則盜跖亦伯夷已又惡取君子小人於其間哉天下皆以不殘為善今均於殘生則雖所殉不同不足復計也夫生奚為殘性奚為易哉皆由乎尚無為之迹也若知迹之由乎無為而成則絶尚去甚而反冥我極矣堯桀将均於自得君子小人奚辨哉且夫屬其性乎仁義者雖通如曾史非吾所謂臧也以此係彼為屬屬性於仁殉仁者耳故不善也屬其性於五味雖通如俞兒非吾所謂臧也率性通味乃善俞兒古之善識味人也屬其性乎五聲雖通如師曠非吾所謂聰也屬其性乎五色雖通如離朱非吾所謂明也不付之於我而屬之於彼則雖通之如彼而我已喪矣故各任其耳目之用而不係於離曠乃聰明也吾所謂臧非仁義之謂也臧於其徳而已矣善於自得志仁而仁吾所謂臧者非所謂仁義之謂也任其性命之情而已矣謂仁義為善則損身以殉之此於性命還自不仁也身且不仁其如人何故任其性命乃能及人及人而不累於己彼我同於自得斯可謂善也吾所謂聰者非謂其聞彼也自聞而已矣吾所謂明者非謂其見彼也自見而已矣夫絶離棄曠自任聞見則萬方之聰明莫不皆全也夫不自見而見彼不自得而得彼者是得人之得而不自得其得者也適人之適而不自適其適者也此舍己效人者也雖效之若人而已己亡矣夫適人之適而不自適其適雖盜跖與伯夷是同為淫僻也茍以失性為淫僻則雖所失之塗異其為失之一也余愧乎道徳是以上不敢為仁義之操而下不敢為淫僻之行也愧道徳之不為謝冥復之無迹故絶操行忘名利從容吹累遺我忘彼若斯而已矣馬蹄第九馬蹄可以踐霜雪毛可以禦風寒齕草飲水翹足而陸此馬之真性也駑各適於身而足雖有義臺路寢無所用之馬之真性非辭鞍而惡乘但無羡於榮華及至伯樂曰我善治馬燒之剔之刻之雒之連之以羈馽編之以皁棧馬之死者十二三矣有意治之則不治矣治之為善斯不善也伯樂音洛姓孫名陽善馭馬石氏星經云伯樂天星名主典天馬孫陽善馭故以為名雒音洛燒謂燒鐵以爍之剔謂翦其毛刻謂削其甲雒謂羈雒其頭也羈君宜反勒也馽丁邑反絆也皁才老反也一云槽也馬闌也棧士板反編木作似牀曰棧以禦濕也飢之渇之馳之驟之整之齊之前有橛飾之患而後有鞭筴之威而馬之死者已過半矣夫善御者将以盡其能也盡能在於自任而乃走作驅步求其過能之用故有不堪而多死焉若乃任駑驥之力適遲疾之分雖則足迹接乎八荒之表而衆馬之性全矣而或者聞任馬之性乃謂放而不乘聞無為之風遂云行不如卧何其生而不返哉斯失乎莊生之旨逺矣橛銜也排銜也謂加飾於馬鑣也陶者曰我善治埴圓者中規方者中矩匠人曰我善治木曲者中鉤直者應繩夫埴木之性豈欲中規矩鉤繩哉然且世世稱之曰伯樂善治馬而陶匠善治埴木此亦治天下者之過也世以任自然而不加巧者為不善於治也操曲為直厲駑習驥能為規矩以矯拂其性使死而後已乃謂之善治也不亦過乎吾意善治天下者不然以不治治之乃善治也彼民有常性織而衣耕而食是謂同徳夫民之徳小異而大同故性之不可去者衣食也事之不可廢者耕織也此天下之所同而為本者也守斯道者無為之至也一而不黨命曰天放放之而自一耳非黨也故謂之天放故至徳之世其行填填其視顛顛此自足於内無所求及之貌當是時也山無蹊隧澤無舟梁不求非望之利故止於一家而足蹊徑也隧音遂道也萬物羣生連屬其鄉混芒而同得也則與一世而淡漠焉豈國異而家殊也禽獸成羣草木遂長足性而止無吞夷之欲故物全是故禽獸可係羈而逰鳥鵲之巢可攀援而闚與物無害故物馴也夫至徳之世同與禽獸居族與萬物並惡乎知君子小人哉同乎無知其徳不離知則離道以善也同乎無欲是謂素樸欲則離性以飾也素樸而民性得矣無煩乎知欲也重意者三章常使民無知無欲及至聖人聖人者民得性之迹耳非所以迹也此云及至聖人猶云及至其迹也蹩躠為仁踶為義而天下始疑矣澶漫為樂摘僻為禮而天下始分矣夫聖迹既彰則仁義不真而禮樂離性徒得形表而已矣有聖人即有斯弊吾若是何哉蹩步結反躠悉結反踶音緹音枝蹩躠踶皆用心為仁義之貌澶徒旦反澶漫淫衍也故純樸不殘孰為犧樽白玉不毁孰為珪璋道徳不廢安取仁義性情不離安用禮樂五色不亂孰為文采五聲不亂孰應六律凡此皆變樸為華棄本崇末於其天素有殘廢矣世雖貴之非其貴也犧樽畫犧牛象以飾樽也王肅云刻為牛頭鄭𤣥云畫鳳凰羽飾尊婆娑然也銳上方下曰珪半珪曰璋夫殘樸以為器工匠之罪也毁道徳以為仁義聖人之過也工匠則有規矩之制聖人則有可尚之迹夫馬陸居則食草飲水喜則交頸相靡怒則分背相踶馬知已此矣御其真知乘其自陸則萬里之路可致而羣馬之性不失夫加之以衡扼齊之以月題而馬知介倪闉扼鷙曼詭銜竊轡故馬之知而能至盜者伯樂之罪也馬性不同而齊求其用故有力竭而態作者衡轅前横木縳軛者也扼又馬頸者也月題馬額上當顱如月形者也介倪猶脾倪也闉曲也鷙抵也曼突也夫赫胥氏之時民居不知所為行不知所之含哺而熈鼓腹而逰民能以此矣此民之真能也赫胥氏上古帝王也及至聖人屈折禮樂以匡天下之形縣仁義以慰天下之心而民乃始踶好知争歸於利不可止也此亦聖人之過也其過皆由乎迹之可尚也縣音𤣥踶直氏反丘氏反好呼報反知音智胠篋第十将為胠篋探嚢發匱之盜而為守備則必攝緘縢固扄鐍此世俗之所謂知也然而巨盜至則負匱掲篋擔囊而趨唯恐緘縢扄鐍之不固也然則鄉之所謂知者不乃為大盜積者也知之不足恃也如此胠起居反從旁開為胠一云發也緘古減反徒登反緘縢皆繩也扄古熒反闗也鐍古宂反紐也故嘗試論之世俗所謂知者有不為大盜積者乎所謂聖者有不為大盜守者乎何以知其然邪昔者齊國鄰邑相望雞狗之音相聞罔罟之所布耒耨之所刺方二千餘里闔四竟之内所以立宗廟社稷治邑屋州閭鄉曲者曷嘗不法聖人哉然而田成子一旦殺齊君而盜其國法聖人者法其迹耳夫迹者已去之物非應變之具也奚足尚而執之哉執成迹以御乎無方無方至而迹滯矣所以守國而為人守之也所盜者豈獨其國邪并與其聖知之法而盜之不盜其聖法乃無以取其國也故田成子有乎盜賊之名而身處堯舜之安小國不敢非大國不敢誅十二世有齊國則是不乃竊齊國并與其聖知之法以守其盜賊之身乎言聖法唯人所用未足以為全當之具十二世有齊國自敬仲至莊子九世知齊政自太公和至威王三世為齊侯故云十二世也嘗試論之世俗之所謂至知者有不為大盜積者乎所謂至聖者有不為大盜守者乎何以知其然邪昔者龍逄斬比干剖萇𢎞胣子胥靡故四子之賢而身不免乎戮言暴亂之君亦得據君人之威以戮賢人而莫之敢亢者皆聖法之由也向無聖法則桀紂焉得守斯位而放其毒使天下側目哉周人殺萇𢎞一云刳腸曰胣子胥靡縻也爛之於江中也故跖之徒問於跖曰盜亦有道乎跖曰何適而無有道邪夫妄意室中之藏聖也入先勇也出後義也知可否知也分均仁也五者不備而能成大盜者天下未之有也五者所以禁盜而反為盜資也由是觀之善人不得聖人之道不立跖不得聖人之道不行天下之善人少而不善人多則聖人之利天下也少而害天下也多信哉斯言斯言雖信而猶不可亡聖者猶天下之知未能都亡故須聖道以鎮之也羣知不亡而獨亡聖則天下之害又多於有聖矣然則有聖之害雖多猶愈於亡聖之無治也雖愈於亡聖故未若都亡之無害也甚矣天下莫不求利而不能一亡其知何其迷而失致哉故曰脣竭則齒寒魯酒薄而邯鄲圍聖人生而大盜起夫竭脣非以寒齒而齒寒魯酒薄非以圍邯鄲而邯鄲圍聖人生非以起大盜而大盜起此自然相生必至之勢也夫聖人雖不立尚於物而亦不能使物不尚也故人無貴賤事無真偽茍效聖法則天下吞聲而闇服之斯乃桀跖之所至頼而以成其大盜者也許慎注淮南云楚會諸侯魯趙俱獻酒於楚王魯酒薄而趙酒厚楚之主酒吏求酒於趙趙不與吏怒乃以趙厚酒易魯薄酒奏之楚王以趙酒薄故圍邯鄲也掊擊聖人縱舍盜賊而天下始治矣夫聖人者天下之所尚也若乃絶其所尚而守其素朴棄其禁令而代以寡欲此所以掊擊聖人而我素朴自全縱舍盜賊而彼姦自息也故古人有言曰閑邪存誠不在善察息淫去華不在嚴刑此之謂也夫川竭而谷虛丘夷而淵實聖人已死則大盜不起竭川非以虛谷而谷虛夷丘非以實淵而淵實絶聖非以止盜而盜止故止盜在去欲不在彰聖知聖人已死則大盜不起向云事業日新新者為生故者為死故曰聖人已死也乘天地之正御日新之變得實而損其名歸真而忘其途則大盜息矣天下平而無故矣非惟息盜争尚之迹故都去矣聖人不死大盜不止雖重聖人而治天下則是重利盜跖也将重聖人以治天下而桀跖之徒亦資其法所資者重故所利不得輕也為之斗斛以量之則并與斗斛而竊之為之權衡以稱之則并與權衡而竊之為之符璽以信之則并與符璽而竊之為之仁義以矯之則并與仁義而竊之小盜之所因乃大盜之所資而利也何以知其然邪彼竊鉤者誅竊國者為諸侯諸侯之門而仁義存焉則是非竊仁義聖知邪故逐於大盜掲諸侯竊仁義并斗斛權衡符璽之利者雖有軒冕之賞弗能勸斧鉞之威弗能禁夫軒冕斧鉞賞罰之重者也重賞罰以禁盜然大盜者又逐而竊之則反為盜用矣所用者重乃所以成其大盜也大盜也者必行以仁義平以權衡信以符璽勸以軒冕威以斧鉞盜此公器然後諸侯可得而掲也是故仁義賞罰者適足以誅竊鉤者也鉤謂帶也此重利盜跖而使不可禁者是乃聖人之過也夫跖之不可禁由所盜之利重也利之所以重由聖人之不輕也故絶盜在賤貨不在重聖也故曰魚不可脫於淵國之利器不可以示人魚失淵則為人禽利器明則為盜資故不可示人彼聖人者天下之利器也夫聖人者誠能絶聖棄知而反冥物極物極各冥則其迹利物之迹也器猶迹耳可執而用曰器非所以明天下也示利器於天下所以資其盜賊故絶聖棄知大盜乃止去其所資則未施禁而自止也擿玉毁珠小盜不起賤其所寳則不加刑而自息也擿持赤反義與擲字同焚符破璽而民朴鄙除矯詐之所賴者則無以行其姦巧掊斗折衡而民不争夫小平乃大不平之所用也殫殘天下之聖法而民始可與論議外無所矯則内全我朴而無自失之言也殫音丹盡也擢亂六律鑠絶竽瑟塞瞽曠之耳而天下始人含其聰矣滅文章散五采膠離朱之目而天下始人含其明矣夫聲色離曠有耳目者之所貴也受生有分而以所貴引之則性命喪矣若乃毁其所貴棄彼任我則聰明各全人含其真也毁絶鉤繩而棄規矩攦工倕之指而天下始人有其巧矣故曰大巧若拙夫以蜘蛛蛣之陋而布網轉丸不求之於工匠則萬物各有能也所能雖不同而所習不敢異則若巧而拙矣故善用人者使能方者為方能圓者為圓各任其所能人安其性不責萬民以工倕之巧故衆技以不相能似拙而天下皆自能則大巧矣夫用其自能則規矩可棄而妙匠之指可攦也倕音堯時巧者也削曾史之行鉗楊墨之口攘棄仁義而天下之徳始𤣥同矣去其亂羣之率則天下各復其所而同於𤣥徳也彼人含其明則天下不鑠矣人含其聰則天下不累矣人含其知則天下不惑矣人含其徳則天下不僻矣彼曽史楊墨師曠工倕離朱者皆外立其徳而以爚亂天下者也此數人者所稟多方故使天下躍而效之效之則失我我失由彼則彼為亂主矣夫天下之大患者失我也法之所無用也若夫法之所用者視不過於所見故衆目無不明聽不過於所聞故衆耳無不聰事不過於所能故衆技無不巧知不過於所知故羣性無不適徳不過於所得故羣徳無不當安用立所不逮於性分之表使天下奔馳而不能自反哉子獨不知至徳之世乎昔者容成氏大庭氏伯皇氏中央氏栗陸氏驪畜氏軒轅氏赫胥氏尊盧氏祝融氏伏戲氏神農氏當是時也民結繩而用之足以紀畧而已此十二氏皆古帝王甘其食美其服適故常甘當故常美若思夫侈靡則無時慊矣樂其俗安其居鄰國相望雞狗之音相聞民至老死而不相徃來無求之至若此之時則至治已今遂至使民延頸舉踵曰某所有賢者贏裹也糧而趣之則内棄其親而外去其主之事足跡接諸侯之境車軌結乎千里之外至治之迹猶致斯弊則是上好知之過也上謂好知之君知而好之則有斯過矣上誠好知而無道則天下大亂矣何以知其然邪夫弓弩畢弋機變之知多則鳥亂於上矣鉤餌網罟罾笱之知多則魚亂於水矣削格羅落罝罘之知多則獸亂於澤矣政之愈密避之愈巧則雖禽獸猶不可圖之以知而况人哉故治天下者唯不任知任知無妙也兔網曰畢繳射曰弋弩弓曰機罾音曽笱音鉤罟謂網罾魚網也爾雅云婺婦之笱謂之罶削格所以施羅網也子斜反罘音浮爾雅云鳥罟謂之羅兔罟謂之罬謂之罦孚覆車也郭璞云今飜車也知詐漸毒頡滑堅白解垢同異之變多則俗惑於辯矣上之所多者下不能安其少也性少而以逐多則迷也漸漬之毒不覺深也猶深害頡滑謂難料理也一云頡滑不正之語也解垢隔角也或云詭曲之辭故天下每每大亂罪在於好知故天下皆知求其所不知而莫知求其所已知者不求所知而求所不知此乃舍已効人而不止其分也皆知非其所不善而莫知非其所已善者善其所善争尚之所由生也是以大亂故上悖日月之明下爍山川之精中墮四時之施惴耎之蟲肖翹之物莫不失其性甚矣夫好知之亂天下也夫吉凶悔吝生於動也而知之所動誠能搖蕩天地運御羣生故君人者胡可以不忘其知哉惴本亦作端耎耳轉反蠉動蟲也一云惴耎謂無足蟲肖翹音肖下音祁饒反肖翹植物也輕飛之屬自三代以下者是已舍夫種種之民而悦夫役役之佞釋夫恬淡無為而悦夫啍啍之意啍啍已亂天下矣啍啍以已誨人也在宥第十一聞在宥天下不聞治天下也宥使自在則治治之則亂也人之生也直莫之蕩則性命不過欲惡不爽在上者不能無為上之所為而民皆赴之故有誘慕好欲而民性淫矣故所貴聖王者非貴其能治也貴其無為而任物之自為也宥音又寛也在之也者恐天下之淫其性也宥之也者恐天下之遷其徳也天下不淫其性不遷其徳有治天下者哉無治乃不遷淫昔堯之治天下也使天下欣欣焉人樂其性是不恬也桀之治天下也使天下瘁瘁焉人苦其性是不愉也夫堯雖在宥天下其迹則治也治亂雖殊其與夫後之世恬愉使物争尚畏鄙而不自得則同耳故譽堯而非桀不若兩忘也夫不恬不愉非徳也非徳也而可以長久者天下無之恬愉自得乃可長久人大喜邪毗於陽大怒邪毗於陰陰陽並毗四時不至寒暑之和不成其反傷人之形乎使人喜怒失位居處無常思慮不自得中道不成章此皆堯桀之流使物喜怒大過致斯患也人在天地之中最能以靈知喜怒憂亂羣生而振蕩陰陽也故得失之間喜怒集乎百姓之懷則寒暑之和敗四時之節差百度昏亡而萬事失落也於是乎天下始喬詰卓鷙而後有盜跖曽史之行故舉天下以賞其善者不足慕賞乃善故賞不能供舉天下以罰其惡者不給畏罰乃止故罰不能勝勝音升故天下之大不足以賞罰自三代以下者匈匈焉終以賞罰為事彼何暇安其性命之情哉忘賞罰而自善性命乃大足耳夫賞罰者聖王之所以當功過非著勸畏也故理至則遺之然後至一可反也而三代以下遂尋其事迹故匈匈焉與迹兢逐終以所寄為事性命之情何暇而安哉匈音㓙而且説明邪是淫於色也説聰邪是淫於聲也説仁邪是亂於徳也説義邪是悖於理也説禮邪是相於技也説樂邪是相於淫也説聖邪是相於藝也説知邪是相於疪也當理無悦悦之則致淫悖之患矣相助也天下将安其性命之情之八者存可也亡可也存亡無所在任其所受之分則性命安矣天下将不安其性命之情之八者乃始臠卷愴囊而亂天下也必存此八者則不能縱任自然故為臠卷愴囊也而天下乃始尊之惜之甚矣天下之惑也不能遺之已為誤矣而乃復尊之以為貴豈不甚惑哉豈直過也而去之邪乃齋戒以言之跪坐以進之鼓歌以儛之吾若是何哉非直由寄而過去也乃珍貴之如此故君子不得已而臨莅天下莫若無為無為也而後安其性命之情無為者非拱黙之謂也直各任其自為則性命安矣不得已者非迫於威刑也直抱道懷朴任乎必然之極而天下自賓也故貴以身於為天下則可以託天下愛以身於為天下則可以寄天下若夫輕身以赴利棄我而殉物則身且不能安其如天下何故君子茍能無解其五藏無擢其聰明解擢則傷也尸居而龍見淵黙而雷聲出處語黙常無其心而付之自然神動而天隨神順物而動天隨理而行從容無為而萬物炊累焉若逰塵之自動吾又何暇治天下哉任其自然而已崔瞿問於老曰不治天下安臧人心老曰汝慎無攖人心攖之則傷其自善也人心排下而進上排之則下進之則上言其易搖蕩也上下囚殺無所排進乃安全耳淖約柔乎剛强言能淖約則剛强者柔矣亷劌雕琢其熱焦火其寒凝氷非焦火之熱凝氷之寒皆喜怒并積之所生若乃不雕不琢各全其朴則何氷炭之有哉劌居衛反傷也其疾俛仰之間而再撫四海之外風俗之所動也其居也淵而静其動也縣而天静之可使如淵動之則係天而踊躍也縣而天音𤣥僨驕而不可係者其唯人心乎人心之變靡所不為順而放之則静而通治而係之則而僨驕僨驕者不可禁之勢也昔者黄帝始以仁義攖人之心夫黄帝非為仁義也直與物冥則仁義之迹自見迹自見則後世之心必自殉之是亦黄帝之迹使物攖也堯舜於是乎股無胈脛無毛以養天下之形愁其五藏以為仁義矜其血氣以規法度然猶有不勝也堯於是放讙兠於崇山投三苗於三峗流共工於幽都此不勝天下也夫施及三王而天下大駭矣夫堯舜帝王之名皆其迹耳我寄斯迹而迹非我也故駭者自世世彌駭其迹愈粗粗與妙自塗之夷險耳逰者豈常改其足哉故聖人一也而有堯舜湯武之異名斯異者時世之名耳未足以名聖人之實也故夫堯舜者豈直堯舜而已哉是以雖有矜愁之貌仁義之迹者故全也下有桀跖上有曽史而儒墨畢起於是乎喜怒相疑愚知相欺善否相非誕信相譏而天下衰矣莫能齊於自得大徳不同而性命爛漫矣立小異而不止於分天下好知而百姓求竭矣知無涯而好之故無以供其求於是乎釿鋸制焉繩墨殺焉椎鑿決焉彫琢性命遂至於此雕釿音斤天下脊脊大亂罪在攖人心故賢者伏處大山嵁岩之下而萬乘之君憂慄乎廟堂之上故夫任自然而居當則賢愚襲情而貴賤履位君臣上下莫匪爾極而天下無患矣斯迹也攖天下之心使奔馳而不可正故中知以下莫不外飾其性以眩惑衆人惡直醜正蕃徒相引是以任真者失其據而崇偽者竊其柄於是主憂於上民困於下矣脊脊音籍今世殊死者相枕也桁楊者相推也刑戮者相望也而儒墨乃始離攘臂乎桎梏之間意甚矣哉其無愧而不知恥也甚矣由腐儒守迹故致斯禍不思捐迹反一而方復攘臂用迹以治迹此可謂無愧而不知恥之甚也殊死殊㫁也械錮頸及脛者皆曰桁楊吾未知聖知之不為桁楊椄槢也仁義之不為桎梏鑿枘也桁楊以椄槢為管而桎梏以鑿枘為用聖知仁義者逺於罪之迹也迹逺罪則民思尚之尚之則矯詐生焉驕詐生而禦奸之器不具者未之有也故棄所尚則矯詐不作驕詐不作則桁楊桎梏廢矣何鑿枘椄槢之為哉椄槢械者音息節反椄槢桎梏梁也淮南曰大者為柱梁小者為椄槢也枘人銳反鑿頭厠木如柱頭焉知曽史之不為桀跖嚆矢也嚆矢矢之猛者言曽史為桀跖之利用也嚆矢矢之鳴者也故曰絶聖棄知而天下大治去其所以攖也治直吏反又起吕反黄帝立為天子十九年令行天下聞廣成子在於空同之上故徃見之曰我聞吾子達於至道敢問至道之精吾欲取天地之精以佐五榖以養民人吾又欲官陰陽以遂羣生為之奈何廣成子曰而所欲問者物之質問至道之精可謂質也廣成子或云即老子也空同當北斗下山也爾雅云北戴斗極為空同而所欲官者物之殘也不任其自爾而欲官之故殘也自而治天下雲氣不待族而雨草木不待黄而落日月之光益以荒矣而佞人之心翦翦者又奚足以語至道黄帝退捐天下築特室席白茅閒居三月復徃邀之廣成子南首而卧黄帝順下風膝行而進再拜稽首而問曰聞吾子達於至道敢問治身奈何而可以長久廣成子蹷然而起曰善哉問乎人皆自修而不治天下則天下治矣故善之也雲氣不待族而雨族聚也未聚而雨言澤少草木不待黄而落言殺氣多也來吾語女至道至道之精窈窈冥冥至道之極昏昏黙黙窈冥昏黙皆了無也夫莊老之所以屢稱無者何哉明生物者無物而物自生耳自生耳非為生也又何有為於已生乎無視無聽抱神以静形将自正忘視而自見忘聽而自聞則神不擾而形不邪也必静必清無勞女形無搖女精乃可以長生任其自動故間静而不夭也目無所見耳無所聞心無所知女神将守形形乃長生此皆率性而動故長生也慎女内全其真也閉女外守其分也多知為敗知無崖故敗我為女遂於大明之上矣至彼至陽之原也為女入於窈冥之門矣至彼至陰之原也夫極陰陽之原乃遂於大明之上入於窈冥之門也天地有官陰陽有藏但當任之慎守女身物将自壯我守其一以處其和故我修身千二百嵗矣吾形未常衰取於盡性命之極極長生之致耳身不夭乃能及物也黄帝再拜稽首曰廣成子之謂天矣天無為也廣成子曰來余語女彼其物無窮而人皆以為終彼其物無測而人皆以為極徒見其一變也得吾道者上為皇而下為王皇王之稱隨世之上下耳其於得通變之道以應無窮一也失吾道者上見光而下為土失無窮之道則自信於一變而不得均同上下故俯仰異心今夫百昌皆生於土而反於土故余将去女土無心者也生於無心故當反守無心而獨徃也百昌猶百物也入無窮之門以逰無極之野與化俱也吾與日月參光吾與天地為常都任之也當我緡乎逺我昬乎物之去來皆不覺也人其盡死而我獨存乎以死生為一體則無徃而非存雲将東逰過扶搖之枝而適遭鴻䝉鴻䝉方将拊脾雀躍而逰雲将見之倘然止贄然立曰叟何人邪叟何為此鴻䝉拊脾雀躍不輟對雲将曰逰雲将曰朕願有問也鴻䝉仰而視雲将曰吁雲将曰天氣不和地氣鬱結六氣不調四時不節今我願合六氣之精以育羣生為之奈何鴻䝉拊脾雀躍掉頭曰吾弗知吾弗知雲将不得問又三年東逰過有宋之野而適遭鴻䝉雲将大喜行趨而進曰天忘朕邪天忘朕邪再拜稽首願聞於鴻䝉鴻䝉曰浮逰不知所求而自得所求也雲将子匠反雲主帥也扶搖神木也生東海猖狂不知所徃而自得所徃也逰者鞅掌以觀無妄夫内足者舉目皆自正也鞅掌失容也今此言自得而正也朕又何知以斯而已也雲将曰朕也自以為猖狂而民隨予所徃朕也不得已於民今則民之放也夫乘物非為迹而迹自彰猖狂非招民而民自徃故為民所放效而不得已也願聞一言鴻䝉曰亂天下之經逆物之情𤣥天弗成若夫順物性而不治則情不逆而經不亂𤣥黙成而自然得也解獸之羣而鳥皆夜鳴離其所以静也災及草木禍及止蟲皆坐而受害也意治人之過也夫有治之迹亂之所由生也雲将曰然則吾奈何鴻䝉曰意毒哉言治人之過深僊僊乎歸矣僊僊坐起之貌嫌不能隤然通放故遣使歸雲将曰吾遇天難願聞一言鴻䝉曰意心養心以用傷則養心者其唯不用心乎汝徒處無為而物自化墮爾形體吐爾聰明倫與物忘理與物皆不以存懷而闇付自然則無為而自化矣大同乎涬溟與物無際涬音幸涬溟自然氣也解心釋神莫然無魂坐亡獨徃萬物云云各復其根各復其根而不知不知而復乃真復也渾渾沌沌終身不離渾沌無知而任其自復乃能終身不離其本也若彼知之乃是離之知而復知與復乖矣無問其名無闚其情物故自生闚問則失其自生也雲将曰天降朕以徳示朕以黙躬身求之乃今也得知而不黙常自失也再拜稽首起辭而行世俗之人皆喜人之同乎已而惡人之異於已也同於已而欲之異於已而不欲者以出乎衆為心也心欲出羣為衆攜也夫以出乎衆為心者曷常出乎衆哉衆皆以出為心故所以為衆人也若我亦欲出乎衆則與衆無異而不能相出矣夫衆皆以相出為心而我獨無徃而不同乃大殊於衆而為衆主也因衆以寧所聞不如衆技衆矣吾一人之所聞不如衆技多故因衆則寧也若不因衆則衆之千萬皆我敵也因衆以寧所聞因衆人之所聞見委而任之則自寧安不如衆技衆矣若役我之知達衆人衆人之技多於我矣安得而不自困哉而欲為人之國者此攬乎三王之利而不見其患者也夫欲為人之國者不因衆之為而以已為之者此為徒求三王主物之利而不見已為之患也然則三王之所以利豈為之哉因天下之自為而任耳攬音覽此以人之國僥倖也㡬何僥倖而不喪人之國乎其存人之國也無萬分之一而喪人之國也一不成而萬有餘喪矣與天下相因而成者也今以一已專制天下則天下塞矣已豈通哉故一身不成而萬方有餘喪矣悲夫有土者之不知也夫有土者有大物也有大物者不可以物物不能用物而為物用即是物耳豈能物物哉不能物物則不足以有大物矣而不物故能物物夫用物者不為物用也不為物用斯不物矣用物不物故物天下之物使各自得也明乎物物者之非物也豈獨治天下而已哉出入六合逰乎九州用天下之自為故馳萬物而不窮獨徃獨來是謂獨有人皆自異而已獨羣逰斯乃獨徃獨來者也獨有斯獨可謂獨有矣獨有之人是之謂至貴夫與衆𤣥同非求貴於衆而衆人不能不貴斯至貴也若乃信其偏見而以獨異為心則雖同於一致故是俗中之一物耳非獨有者也未能獨有而欲饕竊軒冕冐取非分衆豈歸之也哉故非至貴也大人之教若形之於影聲之於響百姓之心形聲也大人之教影響也大人於天下何心哉猶影響之隨形聲耳有問而應之盡其所懷使物之所懷各得自盡也為天下配問者為主應故為配處乎無響寂以待物行乎無方隨物轉化挈汝適復之撓撓撓撓自動也提挈萬物使復歸自動之性即無為之至也挈苦結反廣雅云持也撓而小反以逰無端與化俱故無端出入無旁𤣥同無表與日無始與日新俱故無始也頌論形軀合乎大同其形容與天地無異大同而無已有已則不能大同也無已惡乎得有有天下之難無者已也已既無矣則羣有不足復有之覩有者昔之君子能美其名者耳覩無者天地之友覩無則任其獨生也賤而不可不任者物也卑而不可不因者民也因其性而任之則治反其性而凌之則亂夫民物之所以卑而賤者不能因任故也是以任賤者貴因卑者尊此必然之符也匿而不可不為者事也夫事藏於彼故匿也彼各自為故不可不為但當因任耳麤而不可不陳者法也法者妙事之迹也安可以迹麤而不陳妙事哉逺而不可不居者義也當乃居之所以為逺親而不可不廣者仁也親則苦偏故廣乃仁耳節而不可不積者禮也夫禮節者患於係一故物物體之則積而周矣中而不可不髙者徳也事之下者雖中非徳中者順也順其性而髙也一而不可不易者道也事之難者雖一非道况不一哉易以䜴反下注同神而不可不為者天也執意不為雖神非天况不神哉故聖人觀於天而不助順自為而已成於徳而不累自然與髙會也出於道而不謀不謀而一所以為易會於仁而不恃恃則不廣薄於義而不積率性居逺非積也應於禮而不諱自然應禮非由忌諱接於事而不辭事以理接能否自任應動而動無所辭讓齊於法而不亂御麤以妙故不亂也恃於民而不輕恃其自為耳不輕用也因於物而不去因而就任之不去其本也物者莫足為也而不可不為夫為者豈以足為故為哉自體此為故不得而止也物者莫足為也分外也而不可不為分内也不明於天者不純於徳不明自然則有為有為而徳不純也不通於道者無自而可不能虛已以待物則事事失會不明於道者悲夫何謂道有天道有人道無為而尊者天道也在上而任萬物之自為也有為而累者人道也以有為為累者不能率其自然也主者天道也同乎天之任物則自然居物上臣者人道也各當所任天道之與人道也相去逺矣君任無為而委百官百官有所司而君不與焉二者俱以不為而自得則君道逸臣道勞勞逸之際不可同日而論之也不可不察也不察則君臣之位亂矣莊子注巻四
