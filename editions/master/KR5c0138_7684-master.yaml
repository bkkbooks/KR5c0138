body:
  text: 聖人與乃下求之至於澤畔方将杖拏而引其船顧見孔子還鄉而立孔子反走再拜而進客曰子将何求孔子曰曩者先生有緒言而去丘不肖未知所謂待於下風幸聞咳唾之音以卒相丘也客曰嘻甚矣子之好學也孔子再拜而起曰丘少而修學以至於今六十九嵗矣無所得聞至教敢不虚心客曰同𩔖相從同聲相應固天之理也吾請釋吾之所有而經子之所以子之所以者人事也天子諸侯大夫庻人此四者自正治之
