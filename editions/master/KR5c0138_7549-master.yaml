body:
  text: 讓瞀光曰知者謀之武者遂之仁者居之古之道也吾子胡不立乎瞀光辭曰廢上非義也殺民非仁也人犯其難我享其利非廉也吾聞之曰非其義者不受其禄無道之世不踐其土况尊我乎吾不忍久見也乃負石而自沉於廬水
