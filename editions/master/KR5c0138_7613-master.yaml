body:
  text: 世之所謂忠臣者莫若王子比干伍子胥子胥沉江比干剖心此二子者世謂忠臣也然卒為天下笑自上觀之至于子胥比干皆不足貴也丘之所以説我者若告我以鬼事則我不能知也若告我以人事者不過此矣皆吾所聞知也今吾告子以人之情目欲視色耳欲聴聲口欲察味志氣欲盈人上夀百嵗中夀八十下夀六十除病痩死䘮憂
  hash: sha256:c74d441cbe63a0e4233a5f4efae1918edaf60fff25b4445d67b46781c5627076
