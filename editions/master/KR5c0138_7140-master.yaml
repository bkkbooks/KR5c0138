body:
  text: 此言志趣不同故經世之冝小大各有所適也任國名巨緇大黒綸也犗古邁反云犍牛音界説文云騬也蹲音存腊音昔制諸設反依字應作浙漢書音義音浙河亦江也北人名水皆曰河浙江今在餘杭郡㑹稽錢塘輇七全反輇量人也本或作軨軨小也本又或作輕累劣彼反謂次足不得並足也本亦作累一云力追反云綸也灌瀆溉瀆之瀆鯢鮒皆小魚
