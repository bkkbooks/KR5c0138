body:
  text: 事之以皮帛而不受事之以犬馬而不受事之以珠玉而不受狄人之所求者土地也太王亶父曰與人之兄居而殺其弟與人之父居而殺其子吾不忍也子皆勉居矣為吾臣與為狄人臣奚以異且吾聞之不以所用養害所養因杖筴而去之民相連而從之遂成國於岐山之下
