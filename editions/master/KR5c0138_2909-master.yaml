body:
  text: 堯舜於是乎股無胈脛無毛以養天下之形愁其五藏以為仁義矜其血氣以規法度然猶有不勝也堯於是放讙兠於崇山投三苗於三峗流共工於幽都此不勝天下也夫施及三王而天下大駭矣
