body:
  text: 也出走然後扶其背折其脊季子聞而恥之曰築十仞之城城者既十仞矣則又壊之此胥靡之所苦也今兵不起七年矣此王之基也衍亂人不可聴也華子聞而醜之曰善言伐齊者亂人也善言勿伐者亦亂人也謂伐之與不伐亂人也者又亂人也君曰然則若何曰君求其道而已矣惠子聞之而見戴晋人戴晉人曰有所謂蝸者君知之乎曰然
