body:
  text: 魯君之使者至顔闔自對之使者曰此顔闔之家與顔闔對曰此闔之家也使者致幣顔闔對曰恐聽者謬而遺使者罪不若審之使者還反審之復來求之則不得已故若顔闔者真惡富貴也故曰道之真以治身其緒餘以為國家其土苴以治天下由此之帝王之功聖人之餘事也非所以完身養生也
