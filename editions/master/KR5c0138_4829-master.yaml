body:
  text: 子欲聞死之説乎莊子曰然髑髏曰死無君於上無臣於下亦無四時之事從然以天地為春秋雖南面王樂不能過也莊子不信曰吾使司命復生子形為子骨肉肌膚反子父母妻子閭里知識子欲之乎髑髏深矉蹙額曰吾安能棄南面王樂而復為人間之勞乎
