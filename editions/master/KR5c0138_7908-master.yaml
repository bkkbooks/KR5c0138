body:
  text: 河上有家貧恃緯蕭而食者其子沒於淵得千金之珠其父謂其子曰取䂖來鍜之夫千金之珠必在九重之淵而龍頷下子能得珠者必遭其睡也使龍而寤子尚奚㣲之有哉今宋國之深非直九重之淵也宋王之猛非直龍也子能得車者必遭其睡也使宋王而寤子為粉夫
