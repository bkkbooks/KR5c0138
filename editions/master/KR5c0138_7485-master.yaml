body:
  text: 昭僖侯曰寡人不攫也子華子曰甚善自是觀之兩臂重於天下也身亦重於兩臂韓之輕於天下亦逺矣今之所爭者其輕於韓又逺君固愁身傷生以憂戚不得也僖侯曰善哉教寡人者衆矣未嘗得聞此言也子華子可謂知輕重矣魯君聞顔闔得道之人也使人以幣先焉
