body:
  text: 所學夫子之道者足以自樂也回不願仕孔子愀然變容曰善哉回之意丘聞之知足者不以利自累也審自得者失之而不懼行脩於内者無位而不怍丘誦之久矣今於回而後見之是丘之得也
