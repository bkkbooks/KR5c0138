body:
  text: 無憂色吾始也疑子今視子之鼻間栩栩然子之用心獨奈何孫叔敖曰吾何以過人哉吾以其来不可却也其去不可止也吾以為得失之非我也而無憂色而已矣我何以過人哉且不知其在彼乎其在我乎其在彼亡乎我在我耶亡乎彼
