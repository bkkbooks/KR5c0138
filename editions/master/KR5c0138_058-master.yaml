body:
  text: 夫年知不相及若此之懸也比於衆人之所悲亦可悲矣而衆人未嘗悲此以其性各有極也茍知其極則毫分不可相跂天下又何所悲乎哉夫物未嘗以大欲小而必以小羨大故舉小大之殊各有定分非羨欲
