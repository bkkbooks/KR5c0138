body:
  text: 無以應入告孔子孔子推琴喟然而歎曰由與賜細人也召而來吾語之子路子貢入子路曰如此者可謂窮矣孔子曰是何言也君子通於道之謂通窮於道之謂窮今丘抱仁義之道以遭亂世之患其何窮之為故内省而不窮於道臨難而不失其德天寒既至霜雪既降吾是以知松栢之茂也陳蔡之隘於丘其幸乎孔子削然反琴而弦歌子路扢然執干而舞
