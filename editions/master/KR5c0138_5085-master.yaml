body:
  text: 而烹之豎子請曰其一能鳴其一不能鳴請奚殺主人曰殺不能鳴者明日弟子問於莊子曰昨日山中之木以不材得終其天年今主人之鴈以不材死先生将何處莊子笑曰周將處夫材與不材之間材與不材之間似之而非也故未免乎累
