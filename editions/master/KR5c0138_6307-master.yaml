body:
  text: 徐無鬼見武侯武侯曰先生居山林食芧栗厭葱韭以賔寡人久矣夫今老耶其欲于酒肉之味耶其寡人亦有社稷之福耶徐無鬼曰無鬼生於貧賤未嘗敢飲食君之酒肉将來勞君也君曰何哉奚勞寡人曰勞君之神與形武侯曰何謂耶徐無
