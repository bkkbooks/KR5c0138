body:
  text: 患其中開口而笑者一月之中不過四五日而已矣天與地無窮人死者有時操有時之具而託於無窮之間忽然無異騏驥之馳過隙也不能説其志意養其夀命者皆非通道者也丘之所言皆吾之所棄也亟去走歸無復言之子之道彺彺汲汲詐巧虚偽事也非可以全真也奚足論哉孔子再拜趨走出門上車執轡三失目芒然無見色若死灰據軾低頭不能出氣歸到魯東門外適遇栁下季栁下季曰今者闕然數日不見車馬有
  hash: sha256:1489dd959627dba7d2df62892922e92f416993d66169a6be8dfd38390fe705dc
