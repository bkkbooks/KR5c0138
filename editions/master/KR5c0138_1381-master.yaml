body:
  text: 舟者旁十數觀者如市匠伯不顧遂行不輟弟子厭觀之走及匠石曰自吾執斧斤以隨夫子未嘗見材如此其美也先生不肯視行不輟何邪曰已矣勿言之矣散木也以為舟則沈以為棺槨則腐以為器則速毁以為門户則液樠以為柱則蠧是不材之木也無所可用故能若是之夀
