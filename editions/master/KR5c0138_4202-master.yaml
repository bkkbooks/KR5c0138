body:
  text: 此數子者所好不同恣具所好各之其方亦所以為逍遙也然此僅各自得焉能靡所不樹哉若夫使萬物各得其分而不自失者故當付之無所執為也枯槁若鮑焦介推赴淵若申徒狄熊經若熊之攀𣗳而引氣也鳥申若鳥之嚬呻也道音導
