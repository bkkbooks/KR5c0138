body:
  text: 顔淵問於仲尼曰夫子步亦步夫子趨亦趨夫子馳亦馳夫子奔逸絶塵而囘瞠若乎後矣夫子曰囘何謂耶曰夫子步亦步也夫子言亦言也夫子趨亦趨也夫子辯亦辯也夫子馳亦馳也夫子言道囘亦言道也及奔逸絶塵而囘瞠若乎後者夫子不言而信不比而周無器而民
