body:
  text: 大本擁腫而不中繩墨其小枝卷曲而不中規矩立之塗匠者不顧今子之言大而無用衆所同去也莊子曰子獨不見狸狌乎卑身而伏以候敖者東西跳梁不避髙下中於機辟死於罔罟今夫斄牛其大若垂天之雲此能為大矣而不能執鼠今子有大樹患其無用何不樹之於無何有之鄉廣莫之野彷徨乎無為其側逍遥乎寢卧其下不夭斤斧物無害者無所可用安所困苦哉
  hash: sha256:67cd1ecbf29edfd3326b267f08ae5704d1f74e3746417c67ded5bb0f2725ed42
