body:
  text: 曰子知道乎無窮曰吾不知又問乎無為無為曰吾知道曰子之知道亦有數乎曰有曰其數若何無為曰吾知道之可以貴可以賤可以約可以散此吾所以知道之數也泰清以之言也問乎無始曰若是則無窮之弗知與無為之知孰是而孰非乎無始曰不知深矣知之淺矣弗知内矣知之外矣於是泰清中而歎曰弗知乃知乎知乃不知乎孰知不知之知
