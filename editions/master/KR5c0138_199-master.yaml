body:
  text: 客聞之請買其方百金聚族而謀曰我世世為洴澼絖不過數金今一朝而鬻技百金請與之客得之以說呉王越有難呉王使之將冬與越人水戰大敗越人裂地而封之能不龜手一也或以封或不免於洴澼絖則所用之異也今子有五石之瓠何不慮以為大樽而浮乎江湖而憂其瓠落無所容則夫子猶有蓬之心也夫
  hash: sha256:ba4cddbccfe97ae19ad276265e3486a11e0bc1dd10e3155a858ca488dba20c44
