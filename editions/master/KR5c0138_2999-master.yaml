body:
  text: 羣生為之奈何鴻䝉拊脾雀躍掉頭曰吾弗知吾弗知雲将不得問又三年東逰過有宋之野而適遭鴻䝉雲将大喜行趨而進曰天忘朕邪天忘朕邪再拜稽首願聞於鴻䝉鴻䝉曰浮逰不知所求
