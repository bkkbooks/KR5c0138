body:
  text: 故此數子者事業不同名聲異號其於傷性以身為殉一也臧與榖二人相與牧羊而俱亡其羊問臧奚事則挾筴讀書問榖奚事則博塞以逰二人者事業不同其於亡羊均也伯夷死名於首陽之下盜跖死利於東陵之上二人者所死不同其於殘生傷性均也奚必伯夷之是而盜跖之非乎
