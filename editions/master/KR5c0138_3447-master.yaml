body:
  text: 功寡子貢曰有械於此一日浸百畦用力甚寡而見功多夫子不欲乎為圃者卬而視之曰奈何曰鑿木為機後重前輕挈水若抽數如泆湯其名為橰為圃者忿然作色而笑曰吾聞之吾師有機械者必有機事有機事者必有機心機心存於胷中則純白不備純白不備則神生不定神生不定者道之所不載也吾非不知羞而不為也
