body:
  text: 財君子殉名其所以變其情易其性則異矣乃至於棄其所為而殉其所不為則一也故曰無為小人反殉而天無為君子從天之理若枉若直相為天極靣觀四方與時消息若是若非執而圓機獨成而意與道徘徊無轉而行無成而義将失而所為無赴而富無狥而成将棄而天比干剖心子胥抉眼忠之禍也直躬證父尾生溺死信之患也鮑子立乾勝子不自理廉之害也孔子不見母匡子不見父義之失也此上世之所傳下世之
