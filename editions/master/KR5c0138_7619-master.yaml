body:
  text: 也若棄名利反之於心則夫士之為行抱其天乎子張曰昔者桀紂貴為天子富有天下今謂臧聚曰汝行如桀紂則有怍色有不服之心者小人所賤也仲尼墨翟窮為匹夫今謂宰相曰子行如仲尼墨翟則變容易色稱不足者士誠貴也
