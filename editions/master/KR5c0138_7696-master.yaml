body:
  text: 請因受業而卒學大道客曰吾聞之可與徃者與之至於妙道不可與徃者不知其道慎勿與之身乃無咎子勉之吾去子矣吾去子矣乃刺船而去延縁葦間顔淵還車子路授綏孔子不顧待水波定不聞拏音而後敢乗子路旁車而問曰由得為役久矣未嘗見夫子遇人如此其威也萬乗之主千乗之君見夫子未嘗不分庭伉禮夫子猶有倨傲之容今漁父杖拏逆立而夫子曲要磬折再拜而應得無太甚乎門人皆怪夫子矣漁父
  hash: sha256:c980565f041398b99c070940d0e8cbceb42c8f28448504eb5f7d1bc560d2c683
