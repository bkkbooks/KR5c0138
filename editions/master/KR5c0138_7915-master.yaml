body:
  text: 荘子将死弟子欲厚葬之荘子曰吾以天地為棺槨以日月為連璧星辰為珠璣萬物為齎送吾葬具豈不備耶何以加此弟子曰吾恐烏鳶之食夫子也荘子曰在上為烏鳶食在下為蝼蟻食奪彼與此何其偏也以不平平其平也不平
