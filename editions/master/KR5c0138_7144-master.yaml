body:
  text: 者乃有用之為姦則迹不足恃也臚音盧蘇林注漢書云上傳語告下曰臚臚猶行也傳治戀反又大蓴反遽也東方作謂日出也襦而朱反青青之麥此逸詩刺死人也厭本亦作壓同乃恊反字林云厭一指按也顪本亦作嵗許反頤下毛也椎直追反控若江反别彼列反
