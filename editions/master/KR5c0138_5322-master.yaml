body:
  text: 田子方第二十一田子方侍坐於魏文侯數稱谿工文侯曰谿工子之師耶子方曰非也無擇之里人也稱道數當故無擇稱之文侯曰然則子無師耶子方曰有曰子之師誰耶子方曰東郭順子文侯曰然則夫子何故未嘗稱之子方曰
