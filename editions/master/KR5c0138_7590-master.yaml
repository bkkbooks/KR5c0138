body:
  text: 有矢下子孫無置錐之地湯武立為天子而後世絶㓕非以其利大故邪且吾聞之古者禽獸多而人民少於是民皆巢居以避之晝拾橡栗暮栖木上故命之曰有巢氏之民古者民不知衣服夏多積薪冬則焬之故命之曰知生之民神農之世卧則居居起則于于民知其母不知其父與麋鹿共處耕而食織而衣無有相害之心此至德之隆也然而黄帝不能致德與尤戰於涿鹿之野流血百里
