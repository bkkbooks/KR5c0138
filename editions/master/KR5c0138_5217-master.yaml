body:
  text: 為其累與赤子之累多矣棄千金之璧負赤子而趨何也林囘曰彼以利合此以天屬也夫以利合者迫窮禍患害相棄也以天屬者迫窮禍患害相收也夫相收之與相棄亦逺矣且君子之交淡若水小人之交甘若醴君子淡以親
