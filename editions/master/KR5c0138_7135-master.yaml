body:
  text: 莊周家貧故徃貸粟於監河侯曰諾我将得邑金将貸子三百金可乎莊周忿然作色曰周昨來有中道而呼者周顧視車轍中有鮒魚焉周問之曰鮒魚來子何為者耶對曰我東海之波臣也君豈有斗升之水而活我哉周曰諾我将南
