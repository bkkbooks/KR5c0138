body:
  text: 湯遂與伊尹謀伐桀尅之以讓卞隨卞隨辭曰后之伐桀也謀乎我必以我為賊也勝桀而讓我必以我為貪也吾生乎亂世而無道之人再來漫我以其辱行吾不忍数聞也乃自投椆水而死
