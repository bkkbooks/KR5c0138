body:
  text: 亦幸矣又何暇乎天之怨哉子徃矣孫子出扁子入坐有間仰天而歎弟子問曰先生何為歎乎扁子曰向者休來吾告之以至人之德吾恐其驚而遂至於惑也弟子曰不然孫子之所言是耶先生之所言非耶非固不能惑是孫子所言非耶先生所言是耶彼固惑而來矣又奚罪焉扁子曰不然昔者有鳥止於魯郊魯君説之為具太牢以饗之奏九韶以樂之鳥乃始憂悲眩視不敢飲食此之謂以己飬飬鳥也若夫以鳥養飬鳥者宜
