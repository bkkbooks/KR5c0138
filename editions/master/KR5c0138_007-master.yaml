body:
  text: 吾示之以太沖莫勝句郭改其末句淵有九名以處三焉句郭増其首十六字尾五十一字鄉吾示之以未始出吾宗句故逃也句食狶如食人句向郭並同於事無與親以下則並大同小異是所謂竊據向書㸃定文句者殆非無證又秋水篇與道大蹇句釋文云蹇向紀輦反則此篇向亦有注併世說所云象自注秋水至樂二篇者尚未必實録矣錢曽
