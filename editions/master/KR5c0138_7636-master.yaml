body:
  text: 下而不以財戯人計其患慮其反以為害於性故辭而不受也非以要名譽也堯舜為帝而雍非仁天下也不以美害生也善卷許由得帝而不受非虚辭讓也不以事害己此皆就其利辭其害而天下稱賢焉則可以有之彼非以興名譽也無足曰必持其名苦體絶甘約養以持生則亦久病長阨而不死者也知和曰平為福有餘為害者物莫不然而財其甚者也今富人耳營鐘皷管籥之聲口嗛於芻豢醪醴之味以感其意遺忘其業
