body:
  text: 貞以功為主飲酒以樂為主處䘮以哀為主事親以適為主功成之美無一其迹矣事親以適不論所以矣飲酒以樂不選其具矣處䘮以哀無問其禮矣禮者世俗之所為也真者所以受於天也自然不可易也故聖人法天貴真不拘於俗愚者反此不能法天而恤於人不知貴真碌碌而受變於俗故不足惜哉子之蚤湛於偽而晚聞大道也孔子又再拜而起曰今者丘得過也若天幸然先生不羞而比之服役而身教之敢問舍所在
