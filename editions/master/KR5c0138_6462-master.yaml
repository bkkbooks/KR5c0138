body:
  text: 桓公問之曰仲父之病病矣可不謂云至於大病則寡人悪乎屬國而可管仲曰公誰欲與公曰鮑叔牙曰不可其為人絜亷善士也其於不已若者不比之又一聞人之過終身不忘使之治國上且鉤乎君下且逆乎民其得罪於君也将弗久矣公曰然則孰可對曰勿已則隰朋可其為人也上忘而下畔
  hash: sha256:951ea26f4698fcc228892b740caa7bb2a25662efb65c6a9bdd69fa740644d40e
