body:
  text: 子天之合也我人之合也夫天地者古之所大也而黄帝堯舜之所共美也故古之王天下者奚為哉天地而已矣孔子西藏書於周室子路謀曰由聞周之徴藏史有老者免而歸居夫子欲藏書則試徃因焉孔子曰善徃見老而老不許於是繙十二經以説老中其説曰大謾願聞其要孔子曰要在仁義老曰請問仁義人之性邪孔子曰然君子不仁則不成不義則不生仁義真人之性也又將奚為矣老曰請問
