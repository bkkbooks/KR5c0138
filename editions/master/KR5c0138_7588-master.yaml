body:
  text: 孔子曰丘聞之凡天下有三德生而長大美好無雙少長貴賤見而皆説之此上德也知維天地能辯諸物此中德也勇悍果敢聚衆率兵此下德也凡人有此一德者足以南面稱孤矣今将軍兼此三者身長八尺二寸靣目有光脣如激丹齒如齊貝音中黄鍾而名曰盗跖丘為将軍耻不取焉将軍有意聽臣臣請南使吳越北使齊魯東使
