body:
  text: 何以得此乎孔子伏軾而歎曰甚矣由之難化也湛於禮義有間矣而樸鄙之心至今未去進吾語汝夫遇長不敬失禮也見賢不尊不仁也彼非至仁不能下人下人不精不得其真故長傷身惜哉不仁之於人也禍莫大焉而由獨擅之且道者萬物之所由也庻物失之者死得之者生為事逆之則敗順之則成故道之所在聖人尊之今漁父之於道可謂有矣吾敢不敬乎
