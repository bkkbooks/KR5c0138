body:
  text: 曰然則有鬼乎曰有沈有履竈有髻户内之煩壌雷霆處之東北方之下者倍阿鮭蠪躍之西北方之下者則泆陽處之水有罔象丘有崒山有野有澤有委蛇公曰請問委蛇之状何如皇子曰委蛇其大如轂其長如轅紫衣而朱冠其為物也惡聞雷車之聲則捧其首而立見之者殆乎霸桓公囅然而笑曰此寡人之所見者也於是正衣冠與之坐不終日而不知病之去也
  hash: sha256:a8b6d34511b5e65b28809bdd2d45ec70aac6a52767a2e1f0ac6881f6c184cdf2
