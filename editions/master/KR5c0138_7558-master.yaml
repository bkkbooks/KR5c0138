body:
  text: 至於岐陽武王聞之使叔旦往見之與之盟曰加富二等就官一列血牲而埋之二人相視而笑曰嘻異哉此非吾所謂道也昔者神農之有天下也時祀盡敬而不祈喜其于人也忠信盡治而無求焉樂與政為政樂與治為治不以人之壊自成也不以人之卑自髙也不以遭時自利也今周見殷之亂而遽為政上謀而下行貨阻兵而保威割牲而盟以為信楊行以説衆殺伐以
