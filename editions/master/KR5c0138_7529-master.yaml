body:
  text: 魏牟萬乗之公子也其隠巖宂也難為於布衣之士雖未至乎道可謂有其意矣孔子窮於陳蔡之間七日不火食藜不糝顔色甚而弦歌於室顔回擇菜子路子貢相與言曰夫子再逐於魯削迹於衛伐樹於宋窮於商周圍於陳蔡殺夫子者無罪籍夫子者無禁弦歌鼓琴未嘗絶音君子之無恥也若此乎
