body:
  text: 宋衛西使晉楚使将軍造大城數百里立數十萬户之邑尊将軍為諸侯與天下更始罷兵休卒收養昆弟共祭先祖此聖人才士之行而天下之願也盗跖大怒曰丘來前夫可規以利而可諫以言者皆愚陋恒民之謂耳今長大美好人見而説之者此吾父毋之遺德也丘雖不吾譽吾獨不自知耶且吾聞之好靣譽人者亦好背而毁之今丘告我以大城衆民是欲規我以利而恒民畜我也安可長久也城之大者莫大乎天下矣堯舜
  hash: sha256:5fa63d75787b7fc1912f22df38615e119131d82593071c5c7bd3496c16914d7c
