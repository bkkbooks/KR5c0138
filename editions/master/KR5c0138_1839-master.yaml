body:
  text: 天者自然之謂也夫為為者不能為而為自為耳為知者不能知而知自知耳自知耳不知也不知也則知出於不知矣自為耳不為也不為也則為出於不為矣為出於不為故以不為為主知岀於不知故以不知為宗是故真人遺知而知不為而為自然而生坐忘而得故知稱絶而為名去也
