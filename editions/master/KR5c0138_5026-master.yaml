body:
  text: 孔子觀於吕梁縣水三十仞流沫四十里黿鼉魚鱉之所不能游也見一丈夫游之以為有苦而欲死也使弟子並流而拯之數百步而出被髮行歌而游於塘下孔子從而問焉曰吾以子為鬼察子則人也請問蹈水有道乎曰亡吾無道吾始乎故長乎性成乎命與齊俱入與汨偕出
