body:
  text: 然察其始而本無生非徒無生也而本無形非徒無形也而本無氣雜乎芒芴之間變而有氣氣變而有形形變而有生今又變而之死是相與為春秋冬夏四時行也人且偃然寢於巨室而我噭噭然隨而哭之自以為不通乎命故止也
