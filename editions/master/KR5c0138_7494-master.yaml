body:
  text: 人於此以隨侯之珠彈千仞之雀世必笑之是何也則其所用者重而所要者輕也夫生者豈特隨侯之重哉子列子窮容貌有飢色客有言之於鄭子陽者曰列禦冦盖有道之士也居君之國而窮君無乃為不好士乎
