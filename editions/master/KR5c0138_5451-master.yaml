body:
  text: 見魯哀公哀公曰魯多儒士少為先生方者荘子曰魯少儒哀公曰舉魯國而儒服何謂少乎荘子曰周聞之儒者冠圜冠者知天時履方履者知地形緩佩玦者事至而斷君子有其道者未必為其服也為其服者未必知其道也公固以為不然何不號於國中曰無此道而為此服者其罪死於是哀公號之五日而魯國無敢儒服者獨有一丈夫儒服而立乎公門公即召而問以國事千轉萬變而不窮荘子曰以魯國而儒者一人耳可
  hash: sha256:e46615e6fccab6d3b65d03bf6b0c68d9c89dcb79eacbcf5e167c4fe7be19d1d5
