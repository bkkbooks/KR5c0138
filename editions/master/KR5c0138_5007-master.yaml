body:
  text: 祝宗人𤣥端以臨牢筴説彘曰汝奚惡死吾将三月㹖汝十日戒三日齊藉白茅加汝肩尻乎彫爼之上則汝為之乎為彘謀曰不如食以糠糟而錯之牢筴之中自為謀則茍生有軒冕之尊死得於腞楯之上聚僂之中則
