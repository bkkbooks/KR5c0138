body:
  text: 力不能行耶故推正不忘耶知和曰今夫此人以為與已同時而生同鄉而處者以為夫絶俗過世之士焉是專無主正所以覧古今之時是非之分也與俗化世去至重棄至尊以為其所為也此其所以論長生安體樂意之道不亦逺乎慘怛之疾恬愉之安不監於體惕之恐欣之喜不監於心知為為而不知所以為是以貴為天子富有天下而不免於患也無足曰夫富之於人無所不利窮美䆒埶
