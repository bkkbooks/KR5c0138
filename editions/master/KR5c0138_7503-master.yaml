  text: 昭王反國将賞從者及屠羊説屠羊説曰大王失國說失屠羊大王反國説亦反屠羊臣之爵禄已復矣又何賞之言王曰强之屠羊説曰大王失國非臣之罪故不敢伏其誅大王反國非臣之功故不敢當其賞王曰見之屠羊説曰楚國之法必有重賞大功而後得
