body:
  text: 鄭子陽即令官遺之粟子列子見使者再拜而辭使者去子列子入其妻望之而拊心曰妾聞為有道者之妻子皆得佚樂今有飢色君過而遺先生食先生不受豈不命耶子列子笑謂之曰君非自知我也以人
