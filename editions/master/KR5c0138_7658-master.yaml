body:
  text: 荘子曰請治劒服治劒服三日乃見太子太子乃與見王王脱白刃待之莊子入殿門不趨見王不拜王曰子欲何以教寡人使太子先曰臣聞大王喜劒故以劒見王王曰子之劒何能禁制曰臣之劒十步一人千里不留行王大説之曰天下無敵矣
