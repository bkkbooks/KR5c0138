body:
  text: 季徹曰魯君謂葂也曰請受教辭不獲命既已告矣未知中否請嘗薦之吾謂魯君曰必服恭儉拔出公忠之屬而無阿私民孰敢不輯季徹局局然笑曰若夫子之言於帝王之德猶螳螂之怒臂以當車軼則必不勝任矣
