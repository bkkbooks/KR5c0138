body:
  text: 夫與物冥者無多也故多方於仁義者雖列於五藏然自一家之正耳未能與物無方而各正性命故曰非道徳之正夫方之少多天下未之有限然少多之差各有定分豪芒之降即不可以相跂故各守其方則少多無不自得而或者聞多之不足以正少因欲棄多而任少是舉天下而棄之不亦妄乎
