body:
  text: 而招子貢子路二人俱對客指孔子曰彼何為者也子路對曰魯之君子也客問其族子路對曰族孔氏客曰孔氏者何治也子路未應子貢對曰孔氏者性服忠信身行仁義飾禮樂選人倫上以忠於世主下以化於齊民将以利天下此孔氏之所治也又問曰有土之君與子貢曰非也侯王之佐與子貢曰非也客乃笑而還行言曰仁則仁矣恐不免其身苦心勞形以危其真嗚呼逺哉其分於道也子貢還報孔子孔子推琴而起曰其
