body:
  text: 乎人謂我朱愚知乎反愁我軀不仁則害人仁則反愁我身不義則傷彼義則反愁我已我安逃此而可此三言者趎之所患也願因楚而問之老子曰向吾見若眉睫之間吾因以得汝矣今汝又言而信之若規規然若喪父母掲竿而求諸海也汝亡人哉惘惘乎汝欲反汝情性而無由入可憐哉南榮趎請入就舍召其所好去其所惡十日自愁復見老子老子曰汝自洒濯孰哉欝欝乎然而其中津津乎猶有惡也夫外韄者不可繁而
  hash: sha256:94ea04060dd840c26bb79ef3b09a3233075295ddbf8c119bfd12ecae0d9fbeb0
