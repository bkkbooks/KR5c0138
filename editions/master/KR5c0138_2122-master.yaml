body:
  text: 子杞子輿子犂子來四人相與語曰孰能以無為首以生為脊以死為尻孰知死生存亡之一體者吾與之友矣四人相視而笑莫逆於心遂相與為友俄而子輿有病子把往問之曰偉哉夫造物者將以予為此拘拘也曲僂發背上有五管頤𨼆於齊肩髙於頂句贅指天陰陽之氣有沴
