body:
  text: 曰先生言為人父者必能詔其子為人兄者必能教其弟若子不聴父之詔弟不受兄之教雖今先生之辯将奈之何哉且跖之為人也心如涌泉意如飄風强足以拒敵辯足以飾非順其心則喜逆其心則怒易辱人以言先生必無往孔子不聴顔回為馭子貢為右徃見盗跖盗跖乃方休卒徒大山之陽膾人肝而餔之
