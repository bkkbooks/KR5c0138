body:
  text: 聰明之用各有本分故多方不為有餘少方不為不足然情欲之所蕩未嘗不賤少而貴多也見夫可貴而矯以尚之則自多於本用而困其自然之性若乃忘其所貴而保其素分則與性無多而異方俱全矣
