body:
  text: 子綦曰此何木也哉此必有異材夫仰而視其細枝則拳曲而不可以為棟梁俯而視其大根則軸解而不可以為棺槨咶其葉則口爛而為傷嗅之則使人狂醒三日而不已子綦曰此果不材之木也以至於此其大也嗟乎神人以此不材
