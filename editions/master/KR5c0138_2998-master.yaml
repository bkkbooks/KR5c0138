body:
  text: 雲将東逰過扶搖之枝而適遭鴻䝉鴻䝉方将拊脾雀躍而逰雲将見之倘然止贄然立曰叟何人邪叟何為此鴻䝉拊脾雀躍不輟對雲将曰逰雲将曰朕願有問也鴻䝉仰而視雲将曰吁雲将曰天氣不和地氣鬱結六氣不調四時不節今我願合六氣之精以育
