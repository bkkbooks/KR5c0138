body:
  text: 見今臣之知不足以存國而勇不足以死冦吴軍入郢說畏難而避冦非故隨大王也今大王欲廢法毁約而見説此非臣之所以聞天下也王謂司馬子綦曰屠羊說居處卑賤而陳義甚髙子綦為我延之以三旌之位
