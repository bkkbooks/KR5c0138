body:
  text: 莊子徃見之曰南方有鳥其名鵷鶵子知之乎夫鵷鶵發於南海而飛於北海非梧桐不止非練實不食非醴泉不飲於是鴟得腐鼠鵷鶵過之仰而視之曰嚇今子欲以子之梁國而嚇我耶
