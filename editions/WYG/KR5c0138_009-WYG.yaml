body:
  text: 莊子注卷九晉郭象注外物第二十六外物不可必故龍逄誅比干戮箕子狂惡來死桀紂亡善惡之所致俱不可必也外物夫忘懐於我者固無對於天下然後外物無所用必焉若乃有所執為者諒亦無時而妙矣人主莫不欲其臣之忠而忠未必信故伍貟流于江萇𢎞死于蜀藏其血三年而化為碧精誠之至化為碧呂氏春秋藏其血三年化為碧玉人親莫不欲其子之孝而孝未必愛故孝已憂而曽參悲是以至人無心而應物唯變所適孝已殷髙宗之太子曽參李云至孝為父所憎嘗見絶糧而後蘇木與木相摩則然金與火相守則流隂陽錯行則天地大絯於是乎有雷有霆水中有火乃焚大槐所謂錯行絯音駭又音該水中有火謂電也焚謂霹時燒大樹也補槐當夏時其上忽起火自焚乃信有也註非如註則不必舉槐淮南子曰老槐生火有甚憂兩陷而無所逃茍不能忘形則隨形所遭而陷於憂樂左右無宜也兩陷兩謂心與膽也陷破也畏雷霆甚憂心膽破陷也補兩陷言無徃不憂矣註大非螴蜳不得成矜之愈重則所在為難莫知所守故不得成螴音陳蜳音惇螴蜳讀曰冲融言怖畏之氣冲融兩溢不安定也心若縣於天地之間所希者髙而闊也縣音𤣥慰暋沈屯非清夷平暢也暋音昬又音泯慰欝也暋悶也屯張倫反司馬云沈深也屯難也利害相摩生火甚多内熱故也衆人焚和衆人而遺利則和若利害存懐則其和焚也月固不勝火大而闇則多累小而眀則知分於是乎有僓然而道盡唯僓然無矜遺形自得道乃盡也僓音頺順也莊周家貧故徃貸粟於監河侯曰諾我将得邑金将貸子三百金可乎莊周忿然作色曰周昨來有中道而呼者周顧視車轍中有鮒魚焉周問之曰鮒魚來子何為者耶對曰我東海之波臣也君豈有斗升之水而活我哉周曰諾我将南逰吳越之王激西江之水而迎子可乎鮒魚忿然作色曰吾失我常與我無所處吾得斗升之水然活耳君乃言此曽不如早索我於枯魚之肆此言當理無小茍其不當雖大何益監河侯説苑作魏文侯任公子為大鉤巨緇五十犗以為餌蹲乎㑹稽投竿東海旦旦而釣期年不得魚已而大魚食之牽巨鉤陷沒而下騖揚而奮鬐白波若山海水震蕩聲侔鬼神憚赫千里任公子得若魚離而腊之自制河以東蒼梧以北莫不厭若魚者已而後世輇才諷説之徒皆驚而相告也夫掲竿累趣灌瀆守鯢鮒其於得大魚難矣飾小説以干縣令其於大達亦遠矣是以未嘗聞任氏之風俗其不可與經於世亦遠矣此言志趣不同故經世之冝小大各有所適也任國名巨緇大黒綸也犗古邁反云犍牛音界説文云騬也蹲音存腊音昔制諸設反依字應作浙漢書音義音浙河亦江也北人名水皆曰河浙江今在餘杭郡㑹稽錢塘輇七全反輇量人也本或作軨軨小也本又或作輕累劣彼反謂次足不得並足也本亦作累一云力追反云綸也灌瀆溉瀆之瀆鯢鮒皆小魚儒以詩禮發冡大儒臚傳曰東方作矣事之何若小儒曰未解裙襦口中有珠詩固有之曰青青之麥生於陵陂生不布施死何含珠為接其厭其顪儒以金椎控其頥徐别其頰無傷口中珠詩禮者先王之陳迹也茍非其人道不虛行故夫儒者乃有用之為姦則迹不足恃也臚音盧蘇林注漢書云上傳語告下曰臚臚猶行也傳治戀反又大蓴反遽也東方作謂日出也襦而朱反青青之麥此逸詩刺死人也厭本亦作壓同乃恊反字林云厭一指按也顪本亦作嵗許反頤下毛也椎直追反控若江反别彼列反老萊子之弟子出薪遇仲尼反以告曰有人於彼脩上而趍下長上而促下也老萊子楚人也出薪出採薪也趍音促下短也末僂而後耳耳却近後而上僂又末僂末上謂頭前也謂背膂也後耳耳却後近附近之近視若營四海視之儡然似營他人事者視若營四海夫勞形役智以應世務失其自然者也故堯有亢龍之喻舜有卷僂之談周公𩔖之走狼仲尼比之逸狗豈不或信哉不知其誰氏之子老萊子曰是丘也召而來仲尼至曰丘去汝躬矜與汝容知斯為君子矣謂仲尼能遺形去知故以為君子仲尼揖而退受其教也蹙然改容而問曰業可得進乎設問之令老萊眀其不可進老萊子曰夫不忍一世之傷而驁萬世之患一世為之則其迹萬世為患故不可輕也𥙷斯民失其所一世之傷也不忍其傷而反矜躬飾智以營之天下益擾矣是萬世之患也固窶而遺慮耶深怪之也抑固窶耶亡其畧弗及耶直任之則民性不窶而皆自有畧無弗及之士也惠以歡為驁終身之醜惠之而歡者無惠則醜矣然惠不可長故一惠終身醜也中民之行進焉耳言其易進則不可妄惠之𥙷猶云在中民之行所謂知耳豈至譽則然乎言其慮淺也註非相引以名相結以隱隱括進之謂也隱病患也雖相引以名聲是相結以病患與其譽堯而非桀不如兩忘而閉其所譽閉者閉塞反無非傷也動無非邪也順之則全靜之則正反無非傷反逆於理動無非邪動矜於是也聖人躊躇以興事以毎成功事不逺本故其功毎成毎者毎有成功也躊躇者從容也從容興事雖有成功聖人不存猶致敝迹流毒百世况動矜善行而載之不已乎奈何哉其載焉終矜爾矜不可載故遺而弗有也宋元君夜半而夣人被髪闚阿門曰予自宰路之淵予為清江使河伯之所漁者余且得予元君覺使人占之曰此神龜也君曰漁者有余且乎左右曰有君曰令余且㑹朝明日余且朝君曰漁何得對曰且之網得白龜焉箕圎五尺君曰獻若之龜龜至君再欲殺之再欲活之心疑卜之曰殺龜以卜吉乃刳龜七十二鑚而無遺筴仲尼曰神龜能見夣扵元君而不能避余且之網知能七十二鑚而無遺筴不能避刳腸之患如是則知有所困神有所不及也神知之不足恃也如是夫唯靜然居其所能而不營於外者為全宋元君元公也案元公名佐平公之子阿門阿屋曲簷也宰路淵名且子餘反姓余名且也雖有至知萬人謀之不用其知而用衆謀知音智下同魚不畏網而畏鵜鶘網無情故得魚鵜徒兮反鵜鶘水鳥也一名淘河去小知而大知眀小知自私大知任物去善而自善矣去善則善無所慕善無所慕則善者不矯而自善也嬰兒生無石師而能言與能言者處也汎然無習而自能者非跂而學彼也補石之為言碩也碩大之師惠子謂荘子曰子言無用荘子曰知無用而始可與言用矣夫地非不廣且大也人之所用容足耳然則厠足而墊之致黄泉人尚有用乎惠子曰無用莊子曰然則無用之為用也亦明矣聖應其内當事而發已言其外以暢事情情暢則事通外明則内用相須之理然也厠音側墊丁念反下也荘子曰人有能逰且得不逰乎人而不能逰且得逰乎性之所能不得不為也性所不能不得强為故聖人惟莫之制則同焉皆得而不知所以得也夫流遁之志决絶之行噫其非至知厚德之任與非至厚則莫能任其志行而信其殊能也行下孟反覆墜而不反火馳而不顧人之所好不避是非死生以之雖相與為君臣時也易世而無以相賤所以為人齊同故曰至人不留行焉惟所遇而因之故能與化俱夫尊古而卑今學者之流也古無所尊今無所卑而學者尊古而卑今失其原矣且以豨韋氏之流觀今之世夫孰能不波隨時因物乃平泯也唯至人乃能逰於世而不僻當時應務所在為正順人而不失已本無我我何失焉彼教不學教因彼性故非學也承意不彼彼意自然故承而用之則夫萬物各至其我目徹為眀耳徹為聦鼻徹為鸇口徹為甘心徹為知知徹為徳凡道不欲壅壅則哽哽而不止則跈當通而塞則理有不泄而相騰踐也鸇舒延反哽庚猛反塞也跈女展反廣雅云履也止也本或作蹍同跈則衆害生生起也物之有知者恃息凡根生者無知亦作恃息也其不殷非天之罪殷當也夫息不由知由知然後失當失當然後不通故知恃息息不恃知也然知欲之用制之由人非不得已之符也天之穿之日夜無降通理有常運人則顧塞其竇無性在天竇乃開胞有重閬閬空曠也胞普交反腹中胎重直龍反閬音浪心有天逰逰不係也室無空虛則婦姑勃豀争處也豀音奚勃争也豀空也勃豀反戾也無空虚以容其私則反戾共闘争也心無天逰則六鑿相攘攘逆謂六情攘奪大林丘山之善於人也亦神者不勝自然之理有寄物而通也德溢乎名夫名髙則利深故脩德者過其當名溢乎暴夫禁暴則名美於德謀稽乎誸誸急也急而後考其謀誸音𤣥知出乎爭平性則無用知柴生乎守柴塞也柴積也官事果乎衆宜衆之所宜者不二故官事立也春雨日時草木怒生銚辱於是乎始脩夫事物之生皆有由銚七遥反削也能有所穿削也又他堯反辱乃豆反似鋤田具也草木之到植者過半而不知其然夫事由理發故不覺鋤拔反之更生者曰到植靜然可以補病非不病也眥可以休老非不老也眥子斯反本亦作偂子淺反三蒼云偂猶翦也玉篇云也本亦作滅音㓕又武齊反字林云批也寧可以止遽非不遽也雖然若是勞者之務也非佚者之所未嘗過而問焉若是猶有勞故佚者超然不顧失音逸聖人之所以駴天下神人未嘗過而問焉神人即聖人也聖言其外神言其内駴户楷反謂改百姓之視聴也駴一音戒謂上不問下也賢人所以駴世聖人未嘗過而問焉君子所以駴國賢人未嘗過而問焉小人所以合時君子未嘗過而問焉趨步各有分髙下各有等演門有親死者以善毁爵為官師其黨人毁而死者半慕賞而孝去真逺矣斯尚賢之過也演門城門名堯與許由天下許由逃之湯與務光務光怒之紀他聞之帥弟子而踆於水諸侯弔之三年申徒狄因以踣河真波蕩傷性遂至於此他徒河仄踆音存音款水名弔之恐其自投故弔之踣芳附反荃者所以在魚得魚而忘荃蹄者所以在兎得兔而忘蹄言者所以在意得意而忘言吾安得夫忘言之人而與之言哉至於兩聖無意乃都無所言也荃七全反香草也可以餌魚或云積柴水中使魚依而食焉一云魚笱也蹄大兮反兎也又云兔弶也係其脚故曰蹄也寓言第二十七寓言十九寄之他人則十言而九見信寓言十九寓寄也以人不信已故託之他人十言而九見信也重言十七世之所重則十言而七見信重言謂為人所重者之言也巵言日出和以天倪夫巵滿則傾空則仰非持故也况之於言因物隨變唯彼之從故曰日出日出謂日新也日新則盡其自然之分自然之分盡則和也巵圎酒器也巵器滿即傾空則仰隨物而變非執一守故者也施之於言而隨人從變已無常主者也寓言十九藉外論之言出於已俗多不受故借外耳肩吾連叔之𩔖皆所借也親父不為其子媒親父譽之不若非其父者也父之譽子誠多不信然時有信者輙以常嫌見疑故借外論也非吾罪也人之罪也已雖信而懐常疑者猶不受寄之彼人則信之人之聽有斯累也與已同則應不與已同則反互相非也同於己為是之異於己為非之三異同處而二異訟其所取是必於不訟者俱異耳而獨信其所是非借外如何重言十七所以已言也是為耆艾以其耆艾故俗共重之雖使言不借外猶十信其七年先矣而無經緯本末以期年耆者是非先也年在物先耳其餘本末無以待人則非所以先也期待也人而無以先人無人道也人而無人道是之謂陳人直是陳乆之人耳而俗便共信之此俗之所以為安故而習常巵言日出和以天倪因以曼衍所以窮年夫自然有分而是非無主無主則曼衍矣誰能定之哉故曠然無懐因而任之所以各終其天年不言則齊齊與言不齊言與齊不齊也付之與物而就用其言則彼此是非居然自齊若不能因彼而立言以齊之則我與萬物復不齊耳故曰無言言彼所言故雖有言而我竟不言也言無言終身言未嘗言雖出吾口皆彼言耳終身不言未嘗不言㨿出我口有自也而可有自也而不可有自也而然有自也而不然惡乎然然於然惡乎不然不然於不然惡乎可可於可惡乎不可不可於不可自由也由彼我之情偏故有可不可物固有所然物固有所可各自然各自可無物不然無物不可統而言之則無可無不可無可無不可而至也非巵言日出和以天倪孰得其久夫唯言隨物制而任其天然之分者能無天落萬物皆種也以不同形相禪雖變化相代原其氣則一種章勇反始卒若環於今為始者於昨已復為卒也莫得其倫物自爾故莫得是謂天均天均者天倪也夫均齊者豈妄哉皆天然之分莊子謂惠子曰孔子行年六十而六十化與時俱也始時所是卒而非之時變則俗情亦變乗物以逰心者豈異於俗哉未知今之所謂是之非五十九非也變者不停是不可常惠子曰孔子勤志服知也謂孔子勤志服膺而後知非能任其自化也此明惠子不及聖人之韻逺矣荘子曰孔子謝之矣而其未之嘗言謝變化之自爾非知力之所為故隨時任物而不造言也孔子云夫受才乎大本復靈以生若役其才知而不復其本靈則生亡矣鳴而當律言而當法鳴者律之所生言者法之所出而法律者衆之所為聖人就用之耳故無不當而未之嘗言未之嘗為也利義陳乎前而好惡是非直服人之口而已矣服用也我無言也我之所言直用人之口耳好惡是非利義之陳未始出吾口也使人乃以心服而不敢蘁立定天下之定口所以宣心故用衆人之口則衆人之心用矣我順衆心則衆心信矣誰敢逆立哉吾因天下之自定而定之又何為乎蘁音悟又五各反逆也已乎已乎吾且不得及彼乎因而乗之故無不及曽子再仕而心再化曰吾及親仕三釡而心樂後仕三千鍾不洎吾心悲洎及也三釡小爾雅云六斗四升曰釡洎其器反弟子問於仲尼曰若參者可謂無所縣其罪乎縣係也謂參仕以為親無係禄之罪也縣其音𤣥曰既已縣矣係於禄以養也夫無所縣者可以有哀乎夫養親以適不問其具若能無係則不以貴賤經懐而平和恰翕盡色養之宜矣彼視三釡三千鍾如觀雀蚊虻相過乎前也彼謂無係也夫無係者視榮祿若蚊虻鳥雀之在前而過去耳豈有哀樂於其間哉觀本亦作同古亂反觀雀飛疾與蚊相過忽然不覺也取大小相縣以喻三釡三千鍾之多少元嘉本作如蚊無虻字顔成子㳺謂東郭子綦曰自吾聞子之言一年而野外權利也綦音其二年而從不自專也三年而通通彼我也四年而物與物同也五年而來自得也六年而鬼入外形骸也七年而天成無所復為八年而不知死不知生所遇皆適而安九年而大妙妙善也善惡同故無徃而不宜此言久聞道知天籟之自然将忽然自忘則累日去以至於盡耳生有為死也生而有為則喪其生勸公以其死也有自也自由也由有為故死由私其生故有為今所以公者以其死之由私耳而生陽也無自也夫生之陽遂以其絶迹無為而忽然獨尔非由有也而果然乎惡乎其所適惡乎其所不適然而果然故無適無不適而後皆適皆適而至也天有厯數地有人據吾惡乎求之皆已自足莫知其所終若之何其無命也理必自終不由於知非命如何莫知其所始若之何其有命也不知其所以然而然謂之命似若有意也故又遣命之名以明其自爾而後命理全也有以相應也若之何其無鬼耶理必有應若有神靈以致也無以相應也若之何其有鬼耶理自相應相應不由於故也則雖相應而無靈也衆罔兩問於景曰若向也俯而今也仰向也括而今也被髪向也坐而今也起向也行而今也止何也景曰搜搜也奚稍問也動運自尔無所稍問景音影予有而不知其所以自爾故不知所以予蜩甲也蛇蛻也似之而非也影似形而非形蜩甲音條條甲蟬蛻皮也蛻音帨又吐卧反又始鋭反火與日吾屯也隂與夜吾代也彼吾所以有待耶而况乎以有待者乎推而極之則今之所謂有待者率至於無待而獨化之理彰矣屯徒門反聚也彼來則我與之來彼徃則我與之徃彼强陽則我與之强陽强陽者又何以有問乎直自强陽運動相隨徃來耳無意不可問也陽子居南之沛老西逰於秦邀於郊至於梁而遇老子老子中道仰天而嘆曰始以汝為可教今不可也陽子居不答至舍進漱巾櫛脫屨户外膝行而前曰向者弟子欲請夫子夫子行不間是以不敢今間矣請問其故老子曰而睢睢盱盱而誰與居睢睢盱盱䟦扈之貌人将畏難而䟽逺陽子居姓陽名戎字子居音管小爾雅云溧也洒也漱所又反櫛荘乙反間音閒睢睢盱盱元氣也而汝也大白若辱盛德若不足陽子居蹵然變容曰敬聞命矣其徃也者迎将其家公執席妻執巾櫛舍者避席煬者避竈尊形自異故憚而避之也家公主人公也云讀舍者迎将其家為句煬羊尚反炊也其反也舍者與之爭席矣去其夸矜故也讓王第二十八堯以天下讓許由許由不受又讓於子州支父子州支父曰以我為天子猶之可也雖然我適有幽憂之病方且治之未暇治天下也父音甫支父字也即支伯幽憂之病謂其病深固也夫天下至重也而不以害其生又况他物乎唯無以天下為者可以託天下也舜讓天下於子州支伯子州支伯曰予適有幽憂之病方且治之未暇治天下也故天下大器也而不以易生此有道者之所以異乎俗者也舜以天下讓善卷善卷曰余立於宇宙之中冬日衣皮毛夏日衣葛絺春耕種形足以勞動秋收歛身足以休食日出而作日入而息逍遥於天地之間而心意自得吾何以天下為哉卷眷勉反又音眷姓善名卷悲夫子之不知余也遂不受於是去而入深山莫知其處舜以天下讓其友石户之農石户之農曰捲捲乎后之為人葆力之士也石户本亦作后農石户地名農農人也以舜之德為未至也於是夫負妻戴㩦子以入於海終身不反也太王亶父居邠狄人攻之事之以皮帛而不受事之以犬馬而不受事之以珠玉而不受狄人之所求者土地也太王亶父曰與人之兄居而殺其弟與人之父居而殺其子吾不忍也子皆勉居矣為吾臣與為狄人臣奚以異且吾聞之不以所用養害所養因杖筴而去之民相連而從之遂成國於岐山之下不以所用養害所養地所以養人也今爭以殺人是以地害人也人為地養故不以地故害人也筴初革反夫大王亶父可謂能尊生矣能尊生者雖貴富不以養傷身雖貧賤不以利累形今世之人居髙官尊爵者皆重失之見利輕亡其身豈不惑哉越人三世弑其君王子搜患之逃乎丹宂而越國無君求王子搜不得從之丹宂王子搜不肯出越人薫之以艾乗以王輿搜素羔反淮南子作翳丹宂爾雅云南戴日為丹宂王子搜援綏登車仰天而呼曰君乎君乎獨不可以舍我乎王子搜非惡為君也惡為君之患也若王子搜者可謂不以國傷生矣此固越人之所欲得為君也韓魏相與爭侵地子華子見昭僖侯昭僖侯有憂色子華子魏人子華子曰今使天下書銘於君之前書之言曰左手攫之則右手廢右手攫之則左手廢然而攫之者必有天下君能攫之攫俱縳反取也廢棄也一云攫者援書銘廢者斬右手昭僖侯曰寡人不攫也子華子曰甚善自是觀之兩臂重於天下也身亦重於兩臂韓之輕於天下亦逺矣今之所爭者其輕於韓又逺君固愁身傷生以憂戚不得也僖侯曰善哉教寡人者衆矣未嘗得聞此言也子華子可謂知輕重矣魯君聞顔闔得道之人也使人以幣先焉魯君哀公也顔闔守陋閭苴布之衣而自飯牛苴音麤有子麻也魯君之使者至顔闔自對之使者曰此顔闔之家與顔闔對曰此闔之家也使者致幣顔闔對曰恐聽者謬而遺使者罪不若審之使者還反審之復來求之則不得已故若顔闔者真惡富貴也故曰道之真以治身其緒餘以為國家其土苴以治天下由此之帝王之功聖人之餘事也非所以完身養生也土苴如糞草也今世俗之君子多危身棄生以殉物豈不悲哉凡聖人之動作也必察其所以之與其所以為今且有人於此以隨侯之珠彈千仞之雀世必笑之是何也則其所用者重而所要者輕也夫生者豈特隨侯之重哉子列子窮容貌有飢色客有言之於鄭子陽者曰列禦冦盖有道之士也居君之國而窮君無乃為不好士乎子陽鄭相鄭子陽即令官遺之粟子列子見使者再拜而辭使者去子列子入其妻望之而拊心曰妾聞為有道者之妻子皆得佚樂今有飢色君過而遺先生食先生不受豈不命耶子列子笑謂之曰君非自知我也以人之言而遺我粟至其罪我也又且以人之言此吾所以不受也其卒民果作難而殺子陽子陽嚴酷罪者無赦舍人折弓畏子陽怒責因國人逐猘狗而殺子陽楚昭王失國屠羊説走而從於昭王楚昭王名軫平王子昭王反國将賞從者及屠羊説屠羊説曰大王失國說失屠羊大王反國説亦反屠羊臣之爵禄已復矣又何賞之言王曰强之屠羊説曰大王失國非臣之罪故不敢伏其誅大王反國非臣之功故不敢當其賞王曰見之屠羊説曰楚國之法必有重賞大功而後得見今臣之知不足以存國而勇不足以死冦吴軍入郢說畏難而避冦非故隨大王也今大王欲廢法毁約而見説此非臣之所以聞天下也王謂司馬子綦曰屠羊說居處卑賤而陳義甚髙子綦為我延之以三旌之位三旌三公位也一作三珪云謂諸侯之三卿皆執珪者屠羊説曰夫三旌之位吾知其貴於屠羊之肆也萬鍾之禄吾知其富於屠羊之利也然豈可以貪爵禄而使吾君有妄施之名乎説不敢當願復反吾屠羊之肆遂不受也原憲居魯環堵之室茨以生草蓬户不完桑以為樞而甕牖二室褐以為塞上漏下濕匡坐而弦茨盖屋也蓬户織蓬為户桑以為樞屈桑條為户樞也牖音酉破甕為牖二室司馬云夫妻各一室以褐衣塞牖也匡正也弦謂弦歌子貢乗大馬中紺而表素軒車不容巷徃見原憲原憲華冠縰履杖藜而應門子貢曰嘻先生何病原憲應之曰憲聞之無財謂之貧學而不能行謂之病今憲貧也非病也子貢逡巡而有愧色原憲笑曰夫希世而行比周而友學以為人教以為己仁義之慝輿馬之飾憲不忍為也紺為中衣加素為表華冠以華木皮為冠縱三蒼解詁作躧云躡也聲𩔖或作屣通俗文云履不著跟曰屣一云縰履謂履無跟也杖藜以藜為杖也應門自對門也曽子居衛緼袍無表顔色腫噲手足胼胝緼袍謂麻緼為絮三日不舉火十年不製衣正冠而纓絶捉衿而肘見納屨而踵決曳縰而歌商頌聲滿天地若出金石天子不得臣諸侯不得友故養志者忘形養形者忘利致道者忘心矣孔子謂顔回曰回來家貧居卑胡不仕乎顔回對曰不願仕回有郭外之田五十畆足以給飦粥郭内之田十畆足以為絲麻鼓琴足以自娛所學夫子之道者足以自樂也回不願仕孔子愀然變容曰善哉回之意丘聞之知足者不以利自累也審自得者失之而不懼行脩於内者無位而不怍丘誦之久矣今於回而後見之是丘之得也飦或作饘廣雅云糜也家語云厚粥中山公子牟謂瞻子曰身在江海之上心居乎魏闕之下奈何公子牟魏之公子封中山名牟瞻子賢人也淮南作詹象魏觀闕人君門也言心存榮貴許慎云天子兩觀也瞻子曰重生重生則利輕中山公子牟曰雖知之未能勝也瞻子曰不能自勝則從神無惡乎不能自勝則從絶句不能自勝而强不從者此之謂重傷重傷之人無夀𩔖矣重直用反下同魏牟萬乗之公子也其隠巖宂也難為於布衣之士雖未至乎道可謂有其意矣孔子窮於陳蔡之間七日不火食藜不糝顔色甚而弦歌於室顔回擇菜子路子貢相與言曰夫子再逐於魯削迹於衛伐樹於宋窮於商周圍於陳蔡殺夫子者無罪籍夫子者無禁弦歌鼓琴未嘗絶音君子之無恥也若此乎伐樹於宋孔子適宋與弟子習禮大樹下宋司徒桓魋欲殺孔子伐其樹孔子遂行顔回無以應入告孔子孔子推琴喟然而歎曰由與賜細人也召而來吾語之子路子貢入子路曰如此者可謂窮矣孔子曰是何言也君子通於道之謂通窮於道之謂窮今丘抱仁義之道以遭亂世之患其何窮之為故内省而不窮於道臨難而不失其德天寒既至霜雪既降吾是以知松栢之茂也陳蔡之隘於丘其幸乎孔子削然反琴而弦歌子路扢然執干而舞削琴聲子貢曰吾不知天之髙也地之下也古之得道者窮亦樂通亦樂所樂非窮通也道德於此則窮通為寒暑風雨之序矣故許由娱於潁陽而共伯得乎丘首虞安也共音恭得乎丘首共伯名和脩其行好賢人諸侯皆以為賢周厲王之難天子曠絶諸侯皆請以為天子共伯不聴即于王位十四年大旱屋焚卜于太陽兆曰厲王為祟召公乃立宣王共伯復歸于宗逍遥得意共山之首共丘山今在河内共縣西魯連子云共伯後歸于國得意共山之首本作丘首舜以天下讓其友北人無擇北人無擇曰異哉后之為人也居於畆之中而逰堯之門不若是而已又欲以其辱行漫我吾羞見之因自投清冷之淵孔子曰士志於仁者有殺身以成仁無求生以害仁夫志尚清遐髙風邈世與夫貪利没命者故有天地之隔也田中曰畆壟中曰湯将伐桀因卞隨而謀卞隨曰非吾事也湯曰孰可曰吾不知也湯又因瞀光而謀瞀光曰非吾事也湯曰孰可曰吾不知也湯曰伊尹何如曰强力忍垢吾不知其他也瞀或作務湯遂與伊尹謀伐桀尅之以讓卞隨卞隨辭曰后之伐桀也謀乎我必以我為賊也勝桀而讓我必以我為貪也吾生乎亂世而無道之人再來漫我以其辱行吾不忍数聞也乃自投椆水而死数疏各反椆水又作淍水又音封本作洞云洞水在潁陽一云在范陽郡界湯又讓瞀光曰知者謀之武者遂之仁者居之古之道也吾子胡不立乎瞀光辭曰廢上非義也殺民非仁也人犯其難我享其利非廉也吾聞之曰非其義者不受其禄無道之世不踐其土况尊我乎吾不忍久見也乃負石而自沉於廬水舊説曰如卞隨瞀光者其視天下也若六合外人所不能察也斯則謬矣夫輕天下者不得有所重也茍無所重則無死也矣以天下為六合之外故當付之堯舜湯武耳淡然無係故汎然從衆得失無㮣於懐何自投之為哉若二子者可以為殉名慕髙矣未可謂外天下也廬水一本作盧水在遼東西界昔周之興有士二人處於孤竹曰伯夷叔齊二人相謂曰吾聞西方有人似有道者試往觀焉孤竹國在遼西令支縣至於岐陽武王聞之使叔旦往見之與之盟曰加富二等就官一列血牲而埋之二人相視而笑曰嘻異哉此非吾所謂道也昔者神農之有天下也時祀盡敬而不祈喜其于人也忠信盡治而無求焉樂與政為政樂與治為治不以人之壊自成也不以人之卑自髙也不以遭時自利也今周見殷之亂而遽為政上謀而下行貨阻兵而保威割牲而盟以為信楊行以説衆殺伐以要利是推亂以易暴也吾聞古之士遭治世不避其任遇亂世不為茍存今天下闇周德衰其並乎周以塗吾身也不如避之以潔吾行二子北至於首陽之山遂餓而死焉若伯夷叔齊者其於富貴也茍可得已則必不賴髙節戾行獨樂其志不事於世此二士之節也論語曰伯夷叔齊餓于首陽之下不言其死也而此云死焉亦欲明其永餓以終未必餓死也此篇大意以起髙讓逺退之風故被其風者雖貪冐之人乗天衢入紫庭猶時慨然中路而歎況其凢乎故夷許之徒足以當稷契對伊吕矣夫居山谷而𢎞天下者雖不俱為聖佐不猶髙於蒙埃塵者乎其事雖難為然其風少弊故可遺也曰夷許之弊安在曰許由之弊使人飾讓以求進遂至乎之噲也伯夷之風使暴虐之君得肆其毒而莫之敢抗也伊吕之弊使天下貪冐之雄敢行篡逆唯聖人無迹故無弊也若以伊吕為聖人之迹則伯夷叔齊亦聖人之迹也若以伯夷叔齊非聖人之迹耶則伊吕之事亦非聖矣夫聖人因物之自行故無迹然則所謂聖者我本無迹故物得其迹迹得而强名聖則聖者乃無迹之名也或曰讓王之篇其事多重生而務光二三子自投于水何也答曰荘書之興存乎反本反本之由先乎去䇿是以明讓王之一篇標傲世之逸志㫖在不降以厲俗無厚身以全生所以時有重生之辭者亦歸棄榮之意耳深於塵務之為弊也其次者雖復被褐投粥保身而已其全身尚髙而超俗自逸寧投身於清冷終不屈于世累也盗跖第二十九孔子與栁下季為友栁下季之弟名曰盗跖盗跖從卒九千人横行天下侵暴諸侯宂室樞户驅人牛馬取人婦女貪得忘親不顧父母兄弟不祭先祖所過之邑大國守城小國入保萬民苦之栁下季即栁下惠字季禽孔子謂栁下季曰夫為人父者必能詔其子為人兄者必能教其弟若父不能詔其子兄不能教其弟則無貴父子兄弟之親矣今先生世之才士也弟為盗跖為天下害而弗能教也丘為先生羞之丘請為先生往説之栁下季曰先生言為人父者必能詔其子為人兄者必能教其弟若子不聴父之詔弟不受兄之教雖今先生之辯将奈之何哉且跖之為人也心如涌泉意如飄風强足以拒敵辯足以飾非順其心則喜逆其心則怒易辱人以言先生必無往孔子不聴顔回為馭子貢為右徃見盗跖盗跖乃方休卒徒大山之陽膾人肝而餔之餔字林云日中時食也孔子下車而前見謁者曰魯人孔丘聞将軍髙義敬再拜謁者謁者入通盗跖聞之大怒目如明星髪上指冠曰此夫魯國之巧偽人孔丘非邪為我告之爾作言造語妄稱文武冠枝木之冠帶死牛之脅冠多華飾如木之枝繁帶死牛之脅取牛皮為大革帶多辭繆説不耕而食不織而衣搖脣鼓舌擅生是非以迷天下之主使天下學士不反其本妄作孝弟而徼倖於封侯富貴者也子之罪大極重疾走歸不然我将以子肝益晝餔之膳孔子復通曰丘得幸於季願望履幕下願望履幕下言視不敢望跖面望履結而還也謁者復通盗跖曰使來前孔子趨而進避席反走再拜盗跖盗跖大怒兩展其足案劒瞋目聲如乳虎曰丘來前若所言順吾意則生逆吾心則死反走小却行也孔子曰丘聞之凡天下有三德生而長大美好無雙少長貴賤見而皆説之此上德也知維天地能辯諸物此中德也勇悍果敢聚衆率兵此下德也凡人有此一德者足以南面稱孤矣今将軍兼此三者身長八尺二寸靣目有光脣如激丹齒如齊貝音中黄鍾而名曰盗跖丘為将軍耻不取焉将軍有意聽臣臣請南使吳越北使齊魯東使宋衛西使晉楚使将軍造大城數百里立數十萬户之邑尊将軍為諸侯與天下更始罷兵休卒收養昆弟共祭先祖此聖人才士之行而天下之願也盗跖大怒曰丘來前夫可規以利而可諫以言者皆愚陋恒民之謂耳今長大美好人見而説之者此吾父毋之遺德也丘雖不吾譽吾獨不自知耶且吾聞之好靣譽人者亦好背而毁之今丘告我以大城衆民是欲規我以利而恒民畜我也安可長久也城之大者莫大乎天下矣堯舜有矢下子孫無置錐之地湯武立為天子而後世絶㓕非以其利大故邪且吾聞之古者禽獸多而人民少於是民皆巢居以避之晝拾橡栗暮栖木上故命之曰有巢氏之民古者民不知衣服夏多積薪冬則焬之故命之曰知生之民神農之世卧則居居起則于于民知其母不知其父與麋鹿共處耕而食織而衣無有相害之心此至德之隆也然而黄帝不能致德與尤戰於涿鹿之野流血百里尤神農時諸侯始造兵者也神農之後第八帝曰榆罔世尤氏强與榆罔争王逐榆罔榆罔與黄帝合謀擊殺尤漢書音義云尤古之太子一曰庻人貪者涿鹿地名故城今在上谷郡西南八十里堯舜作立羣臣湯放其主武王殺紂自是之後以强凌弱以衆暴寡湯武以來皆亂人之徒也殺音試今子脩文武之道掌天下之辯以教後世縫衣淺帶矯言偽行以迷惑天下之主而欲求富貴焉盗莫大於子天下何故不謂子為盗丘而乃謂我為盗跖子以甘辭説子路而使從之使子路去其危冠解其長劒而受教於子天下皆曰孔丘能止暴禁非子路好勇冠似雄雞形背負猳斗用表已勇也其卒之也子路欲殺衛君而事不成菹於衛東門之上是子教之不至也子自謂才士聖人邪則再逐於魯削跡於衛窮於齊圍於陳蔡不容身於天下子教子路菹此患上無以為身下無以為人子之道豈足貴邪世之所髙莫若黄帝黄帝尚不能全德而戰涿鹿之野流血百里堯不慈舜不孝禹偏枯湯放其主武王伐紂文王拘羑里此六子者世之所髙也孰論之皆以利惑其真而强反其情性其行乃甚可羞也世之所謂賢士伯夷叔齊辭孤竹之君而餓死於首陽之山骨肉不葬鮑焦飾行非世抱木而死申徒狄諫而不聴負石自投於河為魚鼈所食負石自投於河申徒狄将投於河崔喜止之曰吾聞聖人曰士民父母若濡足故不救溺人可乎申徒狄日不然昔桀殺龍逢紂殺比干而亡天下吴殺于胥陳殺泄冶而賊其國非聖人不仁不用故也遂沉河而死介子推至忠也自割其股以食文公文公後背之子推怒而去抱木而燔死左僖二十四年晉侯賞從亡者介子推不言禄禄亦弗及遂隱而死晉侯求之不獲以綿上為之田曰以志吾過且旌善尾生與女子期於梁下女子不來水至不去抱梁柱而死此四者無異於磔犬流豕操瓢而乞者皆離名輕死不念本養夀命者也尾生一本作㣲生戰國䇿作尾生髙世之所謂忠臣者莫若王子比干伍子胥子胥沉江比干剖心此二子者世謂忠臣也然卒為天下笑自上觀之至于子胥比干皆不足貴也丘之所以説我者若告我以鬼事則我不能知也若告我以人事者不過此矣皆吾所聞知也今吾告子以人之情目欲視色耳欲聴聲口欲察味志氣欲盈人上夀百嵗中夀八十下夀六十除病痩死䘮憂患其中開口而笑者一月之中不過四五日而已矣天與地無窮人死者有時操有時之具而託於無窮之間忽然無異騏驥之馳過隙也不能説其志意養其夀命者皆非通道者也丘之所言皆吾之所棄也亟去走歸無復言之子之道彺彺汲汲詐巧虚偽事也非可以全真也奚足論哉孔子再拜趨走出門上車執轡三失目芒然無見色若死灰據軾低頭不能出氣歸到魯東門外適遇栁下季栁下季曰今者闕然數日不見車馬有行色得㣲徃見跖耶孔子仰天而歎曰然栁下季曰跖得無逆汝意若前乎孔子曰然丘所謂無病而自灸也疾走料虎頭編虎須幾不免虎口哉此篇寄明因衆之所欲亡而亡之雖桀紂可去也不因衆而獨用已雖盗跖不可御也子張問於滿茍得曰盍不為行無行則不信不信則不任不任則不利故觀之名計之利而義真是也若棄名利反之於心則夫士之為行不可一日不為乎滿苟得曰無耻者富多信者顯夫名利之大者幾在無耻而信故觀之名計之利而信真是也若棄名利反之於心則夫士之為行抱其天乎子張曰昔者桀紂貴為天子富有天下今謂臧聚曰汝行如桀紂則有怍色有不服之心者小人所賤也仲尼墨翟窮為匹夫今謂宰相曰子行如仲尼墨翟則變容易色稱不足者士誠貴也臧聚謂臧獲盜濫竊聚之人故勢為天子未必貴也窮為匹夫未必賤也貴賤之分在行之美惡滿苟得曰小盗者拘大盗者為諸侯諸侯之門義士存焉昔者桓公小白殺兄入嫂而管仲為臣田成子常弑君國而孔子受幣論則賤之行則下之則是言行之情悖戰於胷中也不亦拂乎故書曰孰惡孰美成者為首不成者為尾子張曰子不為行即将䟽戚無倫貴賤無義長幼無序五紀六位将何以為别乎滿苟得曰堯殺長子舜流母弟䟽戚有倫乎湯放桀武王伐紂貴賤有義乎王季為適周公殺兄長幼有序乎儒者偽辭墨者兼愛五紀六位将有别乎且子正為名我正為利名利之實不順於理不監於道吾日與子訟於無約曰小人殉財君子殉名其所以變其情易其性則異矣乃至於棄其所為而殉其所不為則一也故曰無為小人反殉而天無為君子從天之理若枉若直相為天極靣觀四方與時消息若是若非執而圓機獨成而意與道徘徊無轉而行無成而義将失而所為無赴而富無狥而成将棄而天比干剖心子胥抉眼忠之禍也直躬證父尾生溺死信之患也鮑子立乾勝子不自理廉之害也孔子不見母匡子不見父義之失也此上世之所傳下世之所語以為士者正其言必其行故服其殃離其患也此章言尚行則行矯貴士則士偽故蔑行賤士以全其内然後行髙而士貴耳立乾鮑子名焦周末人汙時君不仕擇蔬而食子貢見之謂曰何為不仕食禄答曰無可仕者子貢曰汙其君不食其禄惡其政不踐其土今子悪其君處其土食其蔬何志行之相違乎鮑焦遂棄其蔬而餓死勝子不自理一本理作里本乂作申子自理或云謂申徒抱甕之河也古本作申子不自理謂申生也孔子不見母未聞匡子不見父匡子名章齊人諫其父為父所逐無足問於知和曰人卒未有不興名就利者彼富則人歸之歸則下之下則貴之夫見下貴者所以長生安體樂意之道也今子獨無意焉知不足耶意知而力不能行耶故推正不忘耶知和曰今夫此人以為與已同時而生同鄉而處者以為夫絶俗過世之士焉是專無主正所以覧古今之時是非之分也與俗化世去至重棄至尊以為其所為也此其所以論長生安體樂意之道不亦逺乎慘怛之疾恬愉之安不監於體惕之恐欣之喜不監於心知為為而不知所以為是以貴為天子富有天下而不免於患也無足曰夫富之於人無所不利窮美䆒埶音勢至人之所不得逮聖人之所不能及俠人之勇力而以為威强秉人之知謀以為明察因人之德以為賢良非享國而嚴若君父且夫聲色滋味權勢之於人心不待學而樂之體不待象而安之夫欲惡避就固不待師此人之性也天下雖非我孰能辭之知和曰知者之為故動以百姓不違其度是以足而不爭無以為故不求不足故求之爭四處而不自以為貪有餘故辭之棄天下而不自以為亷亷貪之實非以迫外也反監之度勢為天子而不以貴驕人富有天下而不以財戯人計其患慮其反以為害於性故辭而不受也非以要名譽也堯舜為帝而雍非仁天下也不以美害生也善卷許由得帝而不受非虚辭讓也不以事害己此皆就其利辭其害而天下稱賢焉則可以有之彼非以興名譽也無足曰必持其名苦體絶甘約養以持生則亦久病長阨而不死者也知和曰平為福有餘為害者物莫不然而財其甚者也今富人耳營鐘皷管籥之聲口嗛於芻豢醪醴之味以感其意遺忘其業可謂亂矣侅溺於馮氣若負重行而上也可謂苦矣侅音礙飲食至為侅一云徧也馮氣馮音憤滿也言憤畜不通之氣也貪財而取慰貪權而取竭靜居則溺體澤則馮可謂疾矣為欲富就利故滿若堵耳而不知避且馮而不舍可謂辱矣財積而無用服膺而不舍滿心戚醮求益而不止可謂憂矣内則疑刦請之賊外則畏㓂盗之害内周樓疏外不敢獨行可謂畏矣刦許業反内周樓疏重樓内匝疏軒外通謂設備守具此六者天下之至害也皆遺忘而不知察及其患至求盡性竭財單以反一日之無故而不可得也單音丹本或作靳音析故觀之名則不見求之利則不得繚意絶體而争此不亦惑乎此章言知足者常足繚音了理也荘子注巻九
