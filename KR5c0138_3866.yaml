body:
  text: 公曰聖人之言也曰聖人在乎公曰已死矣曰然則君之所讀者古人之糟粕已夫桓公曰寡人讀書輪人安得議乎有説則可無説則死輪扁曰臣也以臣之事觀之斵輪徐則甘而不固疾則苦而不入不徐不疾得之於手而應於心口不能言有數存焉於其間臣不能以喻臣之子臣之子亦不能受之於臣是以行年七十而老斵輪
