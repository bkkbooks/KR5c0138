body:
  text: 其卒之也子路欲殺衛君而事不成菹於衛東門之上是子教之不至也子自謂才士聖人邪則再逐於魯削跡於衛窮於齊圍於陳蔡不容身於天下子教子路菹此患上無以為身下無以為人子之道豈足貴邪世之所髙莫若黄帝黄帝尚不能全德而戰涿鹿之野流血百里堯不慈舜不孝禹偏枯湯放其主武王伐紂文王拘羑里此六子者世之所髙也孰論之皆以利惑其真而强反其情性其行乃甚可羞也世之所謂賢
