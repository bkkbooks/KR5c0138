body:
  text: 夫舉重攜輕而神氣自若此力之所限也而尚名好勝者雖復絶膂猶未足以慊其願此知之無涯也故知之為名生於失當而滅於𡨕極冥極者任其至分而無毫銖之加是故雖負萬鈞茍當其所能則忽然不知重之在身雖應萬機泯然不覺事之在己此養生之主也知音智
