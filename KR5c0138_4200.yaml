body:
  text: 刻意尚行離世異俗髙論怨誹為亢而已矣此山谷之士非世之人枯槁赴淵者之所好也語仁義忠信恭儉推讓為修而已矣此平世之士教誨之人逰居學者之所好也語大功立大名禮君臣正上下為治而已矣此朝廷之士尊主彊國之人致功并兼者之所好也就藪
