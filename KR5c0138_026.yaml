body:
  text: 鵬鯤之實吾所未詳也夫莊子之大意在乎逍遙逰放無為而自得故極小大之致以明性分之適逹觀之士宜要其會歸而遺其所寄不足事事曲與生説自不害其𢎞旨皆可略之北冥海也取其溟溟無涯也水黑色謂乏冥海無風洪波百丈鯤大魚名鵬即古鳳字非來儀之鳳也説文云朋及鵬
