body:
  text: 鵬鯤之實吾所未詳也夫莊子之大意在乎逍遥逰放無為而自得故極小大之致以明性分之適逹觀之士宜要其㑹歸而遺其所寄不足事事曲與生說自不害其𢎞㫖皆可畧之北㝠海也取其溟溟無涯也水黒色謂乏㝠海無風洪波百丈鯤大魚名鵬即古鳳字非來儀之鳳也說文云朋及鵬
